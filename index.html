<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>보성여고 선택과목 안내</title>
  <style>
    :root {
      --bg: #f8faf5;
      --surface: #ffffff;
      --line: #d2dacb;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #5f8f3f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      text-align: left;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.28;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
      font-weight: 500;
      word-break: keep-all;
    }

    button {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
    }

    .note {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>보성여고 선택과목 안내</h1>
    <p>선택과목 안내 페이지를 새 창으로 엽니다.</p>
    <button type="button" id="startBtn">열기</button>
    <div class="note">창이 열리지 않으면 브라우저의 팝업 허용을 확인해 주세요.</div>
  </main>

  <script>
    (function () {
      var APP_URL = "https://bosunghs.github.io/choose2026/app.html?v=" + Date.now() + (window.location.hash || "");

      function openApp() {
        var win = window.open(
          "about:blank",
          "choose2026_app_view",
          "width=430,height=900,resizable=yes,scrollbars=yes"
        );

        if (!win) {
          alert("팝업이 차단되었습니다. 브라우저에서 팝업 허용 후 다시 눌러주세요.");
          return;
        }

        win.document.open();
        win.document.write(`<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>보성여고 선택과목 안내</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8faf5;
    }
    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <iframe src="${APP_URL}" title="보성여고 선택과목 안내" scrolling="yes"></iframe>
</body>
</html>`);
        win.document.close();
      }

      document.getElementById("startBtn").addEventListener("click", openApp);
    })();
  </script>
</body>
</html>
