몸이 작동하는 방식부터 생물이 다양하게 진화해 온 과정까지, 생명 현상을 세포·몸·생태계의 관점에서 탐구하는 과목입니다. 세포 물질대사 생태계 항상성 면역반응 신경계 내분비계 염색체 생식세포 진화 생물다양성 계통수 ### 핵심 학습\n\n#### 1. 생명시스템의 구성\n- 세포에서 생태계까지 이어지는 생명시스템을 살펴본다.\n- 생물이 생명을 유지하기 위해 어떤 구조와 작용을 갖추고 있는지 학습한다.\n- 생물의 특징과 생명 활동 사이의 관계를 추론한다.\n- 소화 효소를 이용해 영양소가 분해되는 과정을 실험한다.\n- 방형구법으로 식물 군집을 분석하고 생태계 구조를 이해한다.\n> 핵심 개념: 세포, 물질대사, 생태계, 기관계의 통합 작용\n\n#### 2. 항상성과 몸의 조절\n- 우리 몸이 자극을 받아들이고 반응하며 체내 상태를 일정하게 유지하는 과정을 학습한다.\n- 신경계, 내분비계, 면역 반응을 함께 다루며 몸의 조절 원리를 이해한다.\n- 실감형 콘텐츠로 뇌 구조를 탐구한다.\n- 스마트 헬스케어 사례를 통해 항상성 유지 작용을 분석한다.\n- 약물이 시냅스 전달에 영향을 주는 사례를 조사하고, 혈액형 판별 원리를 이해한다.\n> 핵심 개념: 자극의 전도와 전달, 신경계, 내분비계, 항상성, 항원·항체 반응\n\n#### 3. 생명의 연속성과 다양성\n- 생명이 세대를 거쳐 이어지는 방식과 다양한 생물이 생겨나고 분류되는 과정을 학습한다.\n- 유전, 생식세포 형성, 진화, 생물다양성을 연결해서 이해한다.\n- 염색체 모형으로 핵형을 분석한다.\n- 생식세포 형성 과정을 창의적인 모델로 표현한다.\n- 온라인 식물도감을 제작하고, 생물 분류 프로그래밍을 활용해 계통수를 작성한다.\n> 핵심 개념: 염색체, 생식세포 형성, 진화, 생물다양성, 계통수 ### 실험과 관찰\n\n#### 생명 현상 실험\n- 소화제와 소화 효소를 이용한 영양소 분해 실험을 진행한다.\n- 혈액형 검사와 혈액형 판별 활동을 한다.\n- 방형구법을 활용하여 식물 군집을 분석한다.\n- 물벼룩 심장 박동수 변화를 탐구한다.\n\n### 조사와 분석\n\n#### 신경·건강·운동 관련 자료 분석\n- 약물이 시냅스 전달에 미치는 영향을 조사한다.\n- 스트레스 수준과 카페인 섭취량의 관계를 분석한다.\n- 데드포인트와 러너스하이의 생리 변화를 조사한다.\n- 운동 습관에 따른 건강 지표를 탐구한다.\n\n### 모델링과 제작\n\n#### 유전과 분류 모델링\n- 염색체 모형을 이용해 핵형을 분석한다.\n- 생식세포 형성 과정 모델을 제작한다.\n- 온라인 식물도감을 제작한다.\n- 생물 분류 프로그래밍과 계통수 작성 활동을 한다.\n\n### 표현과 공유\n\n#### 탐구 결과 공유\n- 카페인 오남용 인식 개선 캠페인을 기획한다.\n- 실험 결과를 카드뉴스나 인포그래픽으로 제작한다.\n- 탐구 결과를 그래프와 통계로 정리해 발표한다. ### 사회 계열\n\n#### 약물 오남용이 청소년기 정신 건강에 미치는 영향 탐구\n- 지각과 행동이 일어나는 신경 메커니즘을 조사한다.\n- 스트레스 수준과 카페인 섭취량의 상관관계를 분석한다.\n- 카페인 오남용 인식 개선 캠페인을 기획한다.\n> 연결 관심 분야: 심리학, 보건행정, 청소년 건강, 사회 문제 탐구\n\n### 자연 계열\n\n#### 물질에 따른 물벼룩의 심장 박동수 변화 탐구\n- 각성제 농도에 따른 물벼룩 심장 박동수 변화 실험을 설계한다.\n- 실험 결과를 그래프로 정리한다.\n- 통계 분석과 생리학적 해석을 수행한다.\n- 결과를 카드뉴스나 인포그래픽으로 제작한다.\n> 연결 관심 분야: 생명과학, 생명공학, 약학, 의학, 임상병리\n\n### 체육 계열\n\n#### 운동 강도에 따른 물질대사 변화 탐구\n- 데드포인트와 러너스하이의 생리 변화를 조사한다.\n- 휴대용 장비나 센서를 활용해 운동 습관별 건강 지표를 측정한다.\n- 운동 강도와 물질대사의 관계를 분석한다.\n> 연결 관심 분야: 체육학, 스포츠과학, 스포츠의학, 건강관리 - 세포, 몸의 조절, 유전, 진화, 생태계 등 생명 현상을 폭넓게 탐구하고 싶은 학생\n- 생명과학, 생명공학, 의학, 약학, 간호, 임상병리, 환경, 식품, 스포츠의학 분야에 관심이 있는 학생\n- 실험, 관찰, 자료 분석, 모델 제작, 캠페인 활동을 통해 생명 현상을 이해하고 싶은 학생 생명과학과 생명공학과 식품공학과 식품영양학과 환경공학과 간호학과 임상병리학과 약학과 의예과 수의학과 스포츠의학과 과학 교과 교육과 지질학과 화학과 의류학과 식물자원학과 동물자원학과 원예학과 조경학과 해양공학과 섬유공학과 신소재공학과 에너지자원공학과 재료공학과 화장품과학과 화학공학과 물리치료학과 응급구조학과 재활치료학과 치기공학과 치위생학과 치의예과 한의예과 보건행정학과 심리학과 수학교육과 초등교육과 체육학과 스포츠과학과 체육교육과 로봇공학과 인공지능학과 융합학과"},{"kind":"course","id":"course_생물의_유전","name":"생물의 유전","text":"생물의 유전 생명체의 특징이 부모에서 자손으로 전달되는 원리를 DNA와 유전자 수준에서 이해하고, 유전 정보가 생명공학과 의학에 어떻게 활용되는지 탐구하는 과목입니다. DNA 유전자 염색체 유전 정보 유전 양식 돌연변이 유전체 생명공학 질병 유전 유전자 분석 ### 핵심 학습\n\n#### 유전 정보는 어디에 저장될까\n- 생명체의 형질을 결정하는 정보가 DNA와 유전자에 저장되는 방식을 이해한다.\n- 염색체와 유전자의 관계를 통해 세포 안의 정보가 생명 현상 전체와 어떻게 연결되는지 탐구한다.\n- DNA와 염색체의 구조를 모형으로 표현한다.\n- 유전자와 형질의 관계를 설명한다.\n- 세포 분열 과정에서 유전 정보가 전달되는 방식을 이해한다.\n\n#### 형질은 어떤 방식으로 이어질까\n- 부모의 형질이 자손에게 전달되는 유전 양식을 이해한다.\n- 단순한 우열 관계뿐 아니라 다양한 유전 양식과 확률적 예측을 학습한다.\n- 가계도를 분석한다.\n- 유전 확률을 계산한다.\n- 유전 양식별 사례를 비교한다.\n\n#### 유전 정보가 달라지면 어떤 일이 생길까\n- 돌연변이와 염색체 이상이 생명체의 형질과 질병에 미치는 영향을 이해한다.\n- 유전적 변화가 질병, 다양성, 진화와 어떻게 연결되는지 탐구한다.\n- 돌연변이 사례를 조사한다.\n- 유전 질환의 원리를 탐구한다.\n- 유전 정보 변화와 생물 다양성의 관계를 생각한다.\n\n#### 유전 기술은 어디까지 활용될까\n- 유전자 분석과 생명공학 기술이 질병 진단, 치료, 식량, 환경, 법과 윤리 문제로 확장되는 과정을 이해한다.\n- 유전 기술의 가능성과 책임을 함께 탐색한다.\n- 유전체 분석 사례를 조사한다.\n- 유전자 기술의 장단점을 토론한다.\n- 생명윤리 쟁점을 정리한다. ### 분석과 추론\n\n#### 유전 자료 분석\n- 가계도를 분석한다.\n- 유전 확률을 계산한다.\n- 유전 질환 사례를 해석한다.\n\n### 모형과 시각화\n\n#### 유전 정보 표현\n- DNA 구조 모형을 제작한다.\n- 염색체와 유전자의 관계를 도식화한다.\n- 유전 정보 전달 과정을 표현한다.\n\n### 사회·윤리 탐구\n\n#### 유전 기술의 사회적 쟁점\n- 유전자 검사와 개인정보 문제를 토론한다.\n- 생명공학 기술 활용 사례를 조사한다.\n- 유전 기술의 윤리적 기준을 세운다. ### 보건·의약학 계열\n\n#### 유전 질환과 맞춤형 치료 탐구\n- 특정 유전 질환의 원인을 조사한다.\n- 유전자 검사와 조기 진단의 장단점을 분석한다.\n- 맞춤형 치료와 생명윤리 쟁점을 토론한다.\n\n### 생명공학 계열\n\n#### 유전자 편집 기술의 가능성과 한계 탐구\n- 유전자 편집의 원리를 조사한다.\n- 농업, 의학, 환경 분야의 활용 사례를 정리한다.\n- 유전자 편집 기술의 안전성과 윤리 기준을 제안한다. - 생명 현상을 분자 수준에서 이해하고 싶은 학생\n- 유전 질환, 유전자 검사, 생명공학 기술에 관심이 있는 학생\n- 생명과학, 의학, 약학, 생명공학 분야 진로를 생각하는 학생\n- 과학 기술의 윤리 문제까지 함께 고민하고 싶은 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 의생명공학과 식품공학과 환경공학과 수의학과"},{"kind":"course","id":"course_생태와_환경","name":"생태와 환경","text":"생태와 환경 자연 현상과 환경 변화를 통합적으로 탐구하고, 인류의 지속 가능한 발전에 기여하는 시민 역량을 기르는 과목입니다. 환경감수성 기후위기와기후행동 지속가능성과시민참여 환경관 환경윤리 지역환경 생태계 물과대기 토양 대기오염 폐기물 멸종 기후시스템 탄소중립 행복추구권 환경정의 실천 ### 핵심 학습\n\n#### 환경과 인간은 어떤 관계일까\n- 인간과 환경의 상호 연결성을 파악한다.\n- 환경을 바라보는 다양한 관점을 이해한다.\n\n#### 지구 환경의 특징은 무엇일까\n- 환경 체계의 상호작용을 이해하고 시스템 사고력을 기른다.\n- 지구 환경의 구성 요소와 생물 다양성의 중요성을 이해한다.\n\n#### 환경 문제의 쟁점은 무엇일까\n- 물, 대기, 토양, 생물과 관련된 환경 문제와 쟁점을 이해한다.\n- 지역 및 지구 차원의 환경 문제와 쟁점을 이해한다.\n\n#### 기후 행동에 어떻게 참여할까\n- 기후 변화 양상과 기후 위기의 심각성을 이해한다.\n- 학교와 지역을 위한 기후 행동 계획을 수립하고 실천한다.\n\n#### 지속 가능 발전 목표란 무엇일까\n- 삶의 질 향상을 위한 지속 가능 발전 목표, 즉 SDGs를 이해하고 실천 방안을 모색한다.\n- 생태 시민의 역할과 책무를 알고 실천 방안을 찾는다. ### 이해와 분석\n\n#### 환경 문제 분석\n- 환경 문제를 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 실천 중심 활동\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 환경 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다. ### 생활과학 계열\n\n#### 동물 복지의 개념과 대체육 시장 분석\n- 농림축산식품부 동물복지 인증제 자료와 동물 복지 관련 서적을 참고하여 동물 복지의 개념과 축산업의 문제점을 조사한다.\n- 대체육 관련 서적과 학술논문을 참고하여 식물성 대체육과 배양육의 과학적 원리를 탐구한다.\n- 대체육이 환경에 갖는 의미를 분석한다.\n\n### 기계·전기·전자 계열\n\n#### 스마트 그리드 기술을 활용한 가상 도시 설계\n- 산업통상자원부와 한국전력공사 자료, 스마트그리드 개론서를 참고하여 스마트 그리드의 개념과 필요성을 정리한다.\n- 스마트 그리드 적용 사례를 바탕으로 학교 또는 지역을 가상의 스마트 에너지 시스템으로 설정한다.\n- 전력 사용 개선 방안을 설계하고 카드뉴스로 제작한다.\n\n### 국제·사회 계열\n\n#### 기후 난민을 위한 정책 제안\n- 기후 난민에 관한 국내 서적을 참고하여 기후 난민의 정의와 발생 원인을 조사한다.\n- 유엔난민기구와 환경부 자료를 통해 기후 난민의 현황을 파악한다.\n- 학술논문 및 국제기구 보고서를 참고하여 기후 난민에 대한 국제 협력 방안을 조사하고 정책 제안서를 작성한다. - 사물에 대한 호기심과 환경에 대한 관심이 있는 학생\n- 지구, 환경, 도시공학, 생명·화학 관련 진로를 희망하는 학생\n- 생태와 환경 문제를 합리적으로 해결하는 과학자나 세계 시민이 되고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_세계_문화와_영어","name":"세계 문화와 영어","text":"세계 문화와 영어 세계 영어를 통해 다양한 문화 현상과 문화적 산물을 이해하고, 자신의 문화적 관점을 영어로 표현하고 공유하는 과목입니다. 세계영어 문화현상 세계시민 문화감수성 감상과표현 설명하기 추론하기 의사소통에참여하기 비교 대조하기 재구성하기 문화콘텐츠제작하여공유하기 ### 핵심 학습\n\n#### 새로운 문화 현상을 영어로 설명하기\n- 우리나라에서 최근 등장한 새로운 문화 현상을 영어로 설명할 수 있다.\n- 최근 등장한 새로운 문화 현상을 정의한다.\n- 인포그래픽 스토리보드를 제작한다.\n- 글로벌 리포트를 작성한다.\n> 관련 역량: 설명하기, 추론하기, 의사소통에 참여하기\n\n#### 다른 문화권의 영화와 우리 문화 비교하기\n- 다른 문화권의 영화에 나타난 요소 중 우리 문화와 다른 점을 말할 수 있다.\n- 영화에서 문화적 특징을 추출하고 대조하여 말한다.\n- 비언어적 의사소통 사전을 만든다.\n- 영화의 배경이 한국이라면 인물들이 어떻게 행동했을지 상상하여 대사를 고쳐 쓴다.\n> 관련 역량: 비교·대조하기, 재구성하기 ### 이해와 분석\n\n#### 문화 현상 분석\n- 세계 영어와 문화 현상을 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 영어 표현 활동\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 영어로 표현한다.\n- 생활 속 문화 사례나 진로 관심 분야에 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다. ### 상경 계열\n\n#### 글로벌 브랜드의 현지화 전략 분석 리포트\n- 유명 글로벌 기업을 골라 영미권 광고와 아시아권 광고를 비교한다.\n- 제3의 국가를 정해 해당 국가의 문화 특징을 조사한다.\n- 해당 국가를 위한 가상의 현지화 마케팅 제안서를 작성한다.\n\n### 인문과학 계열\n\n#### 나만의 문화 개념 사전 만들기\n- 영어로 옮기기 힘든 우리말 단어를 조사한다.\n- 해당 단어를 사전 형식의 영어 정의로 설명한다.\n- 나만의 문화 사전 페이지를 꾸민다. - 외교, 국제기구, NGO 등에서 활동하고 싶은 학생\n- 글로벌 비즈니스와 마케팅처럼 다양한 국적의 사람들을 직접 응대하는 일에 관심이 많은 학생\n- 다른 나라의 의식주, 예술, 종교가 형성된 역사적 배경을 영어로 읽고 토론하는 과정을 즐기는 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과 디자인과"},{"kind":"course","id":"course_세계사","name":"세계사","text":"세계사 오늘날의 세계가 만들어지기까지 각 지역의 발전 과정과 고유한 역사·문화를 이해하고, 세계시민 의식을 기르는 과목입니다. 지역세계의형성 교역망 문화변동 포용적관점 현대세계의과제 고대문명 고대종교와문화 이슬람 몽골제국 신항로개척 시민혁명 산업혁명 제1 2차세계대전 냉전 ### 핵심 학습\n\n#### 지역 세계의 형성\n- 세계 각 지역의 서로 다른 문화가 어떻게 생겨나고 발전했는지 이해한다.\n- 문명의 형성 과정을 이해한다.\n- 각 지역의 문화, 종교, 사상을 분석한다.\n- 문화권의 성립이 갖는 의의를 파악한다.\n> 핵심어: 고대 문명, 고대 종교와 문화\n\n#### 교역망의 확대\n- 동서 문명의 만남과 신항로 개척에 따른 변화를 이해한다.\n- 이슬람 세계와 몽골 제국을 이해한다.\n- 신항로 개척 이후 재정·군사 국가의 출현을 파악한다.\n- 지역별 교역망을 분석한다.\n> 핵심어: 이슬람, 몽골 제국, 신항로 개척\n\n#### 국민 국가의 형성\n- 국민 국가의 개념과 세계 각지에서의 형성 과정을 이해한다.\n- 청, 무굴 제국, 오스만 제국을 이해한다.\n- 시민 혁명과 시민 사회 형성의 관계를 파악한다.\n- 산업 혁명의 영향을 분석한다.\n- 국민 국가 건설 운동을 조사한다.\n> 핵심어: 시민 혁명, 산업 혁명\n\n#### 현대 세계의 과제\n- 세계 대전의 영향과 오늘날 인류에게 주어진 과제를 이해한다.\n- 제1·2차 세계 대전의 양상을 파악한다.\n- 냉전의 전개에 따른 변화를 분석한다.\n- 현대 세계의 문제 해결을 위한 노력을 탐구한다.\n> 핵심어: 제1·2차 세계 대전, 냉전 ### 이해와 분석\n\n#### 역사 자료와 개념 분석\n- 핵심 개념을 역사적 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 역사 해석 표현\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 역사적 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다. ### 인문과학 계열\n\n#### 나의 희망 진로 분야의 각국 역사 조사\n- 희망 진로 분야가 세계 각국의 역사 속에서 어떻게 발전해 왔는지 조사한다.\n- 내가 꿈꾸는 진로에 대한 포트폴리오를 작성한다.\n\n### 사회·상경 계열\n\n#### 지역 분쟁의 역사적 근원 분석\n- 세계 각지에서 벌어지는 여러 분쟁의 역사적 연원을 분석한다.\n- 지역 분쟁이 무엇을 둘러싼 갈등에서 시작되었는지 파악하여 발표한다.\n\n### 자연과학 계열\n\n#### 인류가 당면한 기후 위기의 해결 방안\n- 기후 변화에 대한 선진국과 개발도상국의 대응을 조사한다.\n- 기후 불평등 해결을 위해 실천할 수 있는 방안을 모색한다. - 세계 각 지역 문명의 형성과 발전 과정에 관심이 많은 학생\n- 세계의 역사, 언어, 문화, 경제, 미술 등에 흥미가 있는 학생\n- 현대 국제 분쟁 문제의 근원을 알아보고 해결책을 찾는 데 기여하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과"},{"kind":"course","id":"course_세계시민과_지리","name":"세계시민과 지리","text":"세계시민과 지리 지구촌의 다양한 자연환경과 인간 생활의 모습을 공간적 관점에서 탐구하고, 세계시민으로서 지역과 세계의 문제를 이해하는 과목입니다. 세계화 지역화 환경문제 세계문제 공간문제 세계시민 글로컬라이제이션 지리정보기술 세계기후구분 지형의형성과변화 지속가능성 보편종교 종교 음식문화 인구분포 인구구조 국제적이주 식량자원 ### 핵심 학습\n\n#### 세계화는 우리의 삶을 어떻게 바꿀까\n- 다국적 기업의 현지화 전략을 분석한다.\n- 글로컬라이제이션 사례를 탐구한다.\n- 지리정보분석, 국제 통계 분석, 공공데이터 분석을 활용한다.\n\n#### 세계의 다양한 자연환경과 문화를 어떻게 이해할까\n- 세계의 다양한 자연환경과 문화를 이해하는 관점을 기른다.\n- 세계 기후 구분과 그에 따른 인간 생활 모습을 이해한다.\n- 세계 주요 지형을 탐구하고 지속 가능한 이용을 위한 대안을 모색한다.\n- 세계 주요 종교를 이해하고 종교 경관을 비교한다.\n- 세계의 다양한 음식문화와 축제 사례를 탐구한다.\n> 핵심어: 세계 기후 구분, 지형의 형성과 변화, 지속 가능성, 보편 종교, 세계 축제\n\n#### 인구·자원·경제 활동은 공간적으로 어떻게 나타날까\n- 인구 분포와 인구 구조를 이해하고 국제 이동 사례를 탐구한다.\n- 식량 자원의 생산과 소비, 이동을 분석하고 식량 문제 해결 방안을 모색한다.\n- 글로벌 가치 사슬과 공간적 불균등의 관계를 분석한다.\n\n#### 현존하는 세계 문제는 어떻게 해결할 수 있을까\n- 세계의 에너지 생산과 소비, 이동 패턴을 분석한다.\n- 세계 문제를 공간적 관점에서 파악하고 지속 가능한 해결 방안을 생각한다. ### 이해와 분석\n\n#### 지리 자료 분석\n- 핵심 개념을 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 지도, 그래프, 통계 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 공간 문제 표현 활동\n- 보고서, 발표, 토론, 지도 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 지리적 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다. ### 상경 계열\n\n#### 지리정보기술의 활용\n- 공공데이터를 활용하여 글로벌 데이터 센터의 최적 입지를 분석한다.\n- 전력 공급, 네트워크 연결성, 상수도 및 냉각 인프라, 재해 위험 평가, 기후 데이터를 고려한다.\n\n### 인문·예술 분야\n\n#### 기후 변화에 따른 경관 변화 예측\n- 2050년 가상 경작 지도를 작성한다.\n- 과거 명화 속 배경 지역의 현재 기후 데이터를 조사한다.\n\n### 환경공학 분야\n\n#### 분쟁 지역 탐구\n- 기후 난민 예방을 위한 적정 기술을 탐구한다.\n- 국제 협력 방안을 함께 조사한다. - 낯선 나라의 기후, 지형, 음식 문화와 축제에 흥미를 느끼는 학생\n- 자연현상과 인간의 삶 사이의 인과관계를 파악하며 공부하는 것을 즐기는 학생\n- 지도, 그래프, 통계 자료를 해석하여 지역적 특성을 도출하는 과정에 능숙한 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 영어영문학과"},{"kind":"course","id":"course_세계시민교육","name":"세계시민교육","text":"세계시민교육 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 세계시민교육\n- 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 활동 안내\n- 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 심화 탐구 안내\n- 상세 내용은 담당선생님께 문의하세요. - 상세 내용은 담당선생님께 문의하세요. 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과 교육학과 심리학과 상담심리학과 사회복지학과"},{"kind":"course","id":"course_세포와_물질대사","name":"세포와 물질대사","text":"세포와 물질대사 세포의 구조와 기능을 이해하고, 생명체가 광합성과 세포호흡으로 에너지를 만들고 사용하는 원리를 탐구하는 과목입니다. 세포 세포소기관 원핵세포 진핵세포 세포막 물질수송 물질대사 ATP 효소 세포호흡 발효 광합성 미토콘드리아 엽록체 전자전달계 ### 핵심 학습\n\n#### 세포는 생명의 기본 단위다\n- 모든 생명체가 세포를 기본 단위로 이루어져 있음을 이해한다.\n- 세포를 구성하는 물질과 구조가 어떤 기능을 하는지 살펴본다.\n- 세포막을 통한 물질 이동과 원핵세포·진핵세포의 차이를 이해한다.\n- 핵산과 단백질 모형을 제작한다.\n- 현미경으로 세포 크기를 측정한다.\n- 간이 원심분리기구를 제작한다.\n- 세포에서 삼투현상을 관찰한다.\n\n#### 물질대사는 생명을 유지하는 에너지 흐름이다\n- 생명체가 끊임없이 물질을 분해하고 합성하며 에너지를 획득하는 과정을 이해한다.\n- ATP와 효소의 역할을 이해한다.\n- 음식물 섭취와 에너지 소비가 생명 활동과 어떻게 연결되는지 학습한다.\n- 1일 칼로리 섭취량과 소비량을 조사한다.\n- 에너지 섭취량과 소비량을 비교한다.\n- 발아 중인 콩의 물질대사와 에너지대사를 탐구한다.\n- 효소 작용에 영향을 미치는 요인을 탐구한다.\n\n#### 세포호흡과 광합성은 에너지 전환 과정이다\n- 세포호흡이 생명체가 에너지를 얻는 과정임을 이해한다.\n- 광합성이 빛에너지를 화학 에너지로 바꾸는 과정임을 이해한다.\n- 미토콘드리아, 엽록체, 발효, 명반응, 전자전달계가 에너지 전환에 어떤 역할을 하는지 학습한다.\n- 미토콘드리아와 엽록체의 내부 구조 모형을 제작한다.\n- 발효 실험을 설계하고 수행한다.\n- 크로마토그래피로 식물 잎의 광합성 색소를 분리한다.\n- 세포호흡과 광합성의 에너지 전환을 비교한다. ### 관찰과 측정\n\n#### 세포와 물질 이동 관찰\n- 현미경으로 세포 크기를 측정한다.\n- 세포에서 삼투현상을 관찰한다.\n- 광합성 색소를 분리한다.\n\n### 모형 제작\n\n#### 생명 현상 시각화\n- 핵산과 단백질 모형을 제작한다.\n- 미토콘드리아와 엽록체 내부 구조 모형을 제작한다.\n- 세포 구조와 기능을 시각화한다.\n\n### 실험과 탐구\n\n#### 물질대사 실험\n- 효소 작용에 영향을 미치는 요인을 탐구한다.\n- 발효 실험을 설계하고 수행한다.\n- 발아 중인 콩의 에너지대사를 탐구한다.\n\n### 생활과 연결\n\n#### 건강과 에너지 대사\n- 1일 칼로리 섭취량과 소비량을 비교한다.\n- 물질대사와 건강의 관계를 생각한다.\n- 세포 수준의 변화가 생명 활동 전체와 연결되는 방식을 설명한다. ### 자연 계열\n\n#### 삼투현상과 세포막 물질 이동 심화 탐구\n- 생명을 작동시키는 분자 기계 관련 자료를 읽는다.\n- 용질 농도에 따른 삼투율을 측정한다.\n- 삼투가 생명을 유지하는지, 때로는 위협하는지 토론한다.\n\n### 보건·의약학 계열\n\n#### 알지네이트 비드를 이용한 약물 전달 시스템 탐구\n- 약물 흡수 과정을 조사한다.\n- 알지네이트 비드 생성 원리를 조사한다.\n- 인공 위액과 인공 장액 조건에서 비드의 변화를 관찰한다.\n- 특정 pH에서만 용해되는 비드 제조 가능성을 탐구한다.\n\n### 공학 계열\n\n#### 전자 흐름 기반 세포호흡 에너지 변환 모델링\n- 전자전달계의 산화·환원 반응을 조사한다.\n- 세포호흡의 에너지 흐름을 시스템으로 모델링한다.\n- 세포호흡과 연료전지의 효율을 비교·대조해 발표한다. - 세포와 생명 현상의 원리가 궁금한 학생\n- 생명과학을 더 깊이 공부하고 싶은 학생\n- 실험, 관찰, 모형 제작을 통해 생명 현상을 이해하고 싶은 학생\n- 의약, 생명공학, 식품, 환경, 에너지 분야에 관심이 있는 학생\n- 이공계열 진로를 위해 생명과학 기초 역량을 기르고 싶은 학생 생명과학과 생명공학과 의생명공학과 약학과 의예과 간호학과 식품공학과 식품영양학과 화학공학과 환경공학과 에너지자원공학과 임상병리학과"},{"kind":"course","id":"course_수학과_문화","name":"수학과 문화","text":"수학과 문화 수학이라는 도구로 인류 문명의 발자취를 따라가며, 우리 삶 곳곳에 스며든 수학의 지혜와 이야기를 쉽고 즐겁게 풀어가는 과목입니다. 융합적사고 실생활수학 문화속수학 예술과수학 합리적의사결정 황금비 프랙탈 원근법 암호 알고리즘 게임이론 선거와투표 빅데이터 통계 탄소발자국 모델링 지속가능성 ### 핵심 학습\n\n#### 음악, 미술, 문학, 영화에는 어떤 수학이 숨어 있을까\n- 음악의 피타고라스 음계, 미술의 투시 원근법과 테셀레이션, 문학의 운율, 영화의 CG 원리 속에 내재된 수학적 원리를 탐구한다.\n- 문화와 예술 속 수학 원리를 찾아보고, 이를 활용한 창작 활동으로 연결한다.\n\n#### 공정한 선택과 생활 속 수학은 어떻게 연결될까\n- 암호, 알고리즘, 게임이론을 통해 사회 문제를 수학적으로 해석하는 방법을 이해한다.\n- 스포츠 경기 기록을 분석하고 게임의 승리 전략을 수립한다.\n- 바코드와 QR코드의 원리, 디지털 보안과 암호 체계를 이해한다.\n- 투표에 활용되는 수학적 원리를 이해한다.\n- 민속 수학과 건축 양식 속 수학적 원리를 탐구한다.\n\n#### 합리적으로 해결할 수 있을까\n- 대중매체 속 데이터를 비판적으로 분석한다.\n- 가치소비를 위한 합리적 의사 결정 방법을 탐구한다.\n\n#### 기후 위기와 환경 문제를 수학 데이터로 예측할 수 있을까\n- 식생활 및 소비 패턴과 환경의 관계를 분석한다.\n- 대기 오염 및 사막화 데이터를 해석한다.\n- 지속가능한 발전을 위한 수학적 해결 방안을 모색한다. ### 문화와 예술 분석\n\n#### 예술 속 수학 찾기\n- 음악, 미술, 문학, 영화 속 수학적 원리를 찾아 설명한다.\n- 수학 원리를 활용한 디자인 도안이나 창작물을 만든다.\n\n### 생활 문제 해결\n\n#### 합리적 의사결정 활동\n- 투표, 게임, 암호, 알고리즘의 원리를 실생활 사례와 연결한다.\n- 데이터와 수학적 근거를 바탕으로 합리적 선택 방안을 제안한다.\n\n### 환경과 데이터\n\n#### 지속가능성 탐구\n- 환경 데이터를 해석하고 미래 변화를 예측한다.\n- 수학적 모델링을 통해 환경 문제 해결 방안을 제안한다. ### 인문·예술 계열\n\n#### 문학 및 예술 작품 속 수학적 구조 분석\n- 시나 소설의 구조적 운율을 분석한다.\n- 명화 속 기하학적 구도, 황금비, 대칭 구조를 분석한다.\n- 수학적 원리를 적용한 디자인 도안을 제작한다.\n\n### 사회·상경 계열\n\n#### 공정한 의사결정을 위한 투표 시스템 모델링\n- 다수결의 역설 등 투표 이론을 분석한다.\n- 학급 회의나 사회적 갈등 해결에 적용할 수 있는 가중치 투표 방식 또는 의사결정 알고리즘을 제안한다.\n\n### 자연·공학 계열\n\n#### 환경 데이터 분석을 통한 기후 변화 예측\n- 기상청 공공 데이터에서 지역별 기온 관련 데이터를 수집한다.\n- 특정 지역의 기온 변화 추세를 함수로 모델링한다.\n- 시나리오별 미래 기온 변화를 예측한다. - 건축, 디자인, 음악, 영화 등 예술 분야와 수학의 연결 고리를 찾고 싶은 학생\n- 사회 현상이나 환경 문제를 데이터를 통해 논리적으로 분석해 보고 싶은 학생\n- 수학을 공식 풀이뿐 아니라 문화, 사회, 환경 문제와 연결해 보고 싶은 학생 수학과 통계학과 경제학과 산업공학과 빅데이터학과 컴퓨터공학과 소프트웨어학과 인공지능학과 정보보안학과 사회학과 정치외교학과"},{"kind":"course","id":"course_수학과제_탐구","name":"수학과제 탐구","text":"수학과제 탐구 ‘왜 그럴까?’라는 평소의 작은 궁금증을 출발점 삼아, 스스로 자료를 찾고 고민하며 수학적 해결책이 담긴 결과물을 만들어 보는 과목입니다. 연구윤리 문헌연구 수학실험 개발연구 탐구방법 수학과제탐구의의미 사례조사 주제선정 탐구수행 반성및평가 ### 핵심 학습\n\n#### 올바른 연구 윤리란 무엇인가\n- 수학과제 탐구의 필요성을 이해한다.\n- 표절과 데이터 조작을 방지하는 책임 있는 연구 수행 원칙을 이해한다.\n\n#### 주제에 적합한 탐구 도구는 무엇인가\n- 연구 논문과 서적을 활용한 문헌 조사 방법을 익힌다.\n- 설문 기반 사례 조사 방법을 이해한다.\n- 수학적 모델링을 통한 실험 방법을 익힌다.\n- 산출물 설계를 위한 개발 연구 방법론을 이해한다.\n\n#### 탐구 결과를 어떻게 공유할까\n- 스스로 설정한 탐구 문제를 해결한다.\n- 보고서, 포스터, 수학 소설 등 다양한 형태로 산출물을 제작한다.\n- 발표와 성찰을 통해 탐구 과정을 정리한다. ### 연구 설계\n\n#### 주제 선정과 연구 윤리\n- 자신의 관심사나 진로와 연결된 탐구 문제를 설정한다.\n- 연구 윤리와 자료 활용 기준을 지킨다.\n\n### 자료 조사와 분석\n\n#### 탐구 방법 적용\n- 문헌 조사, 사례 조사, 수학 실험, 개발 연구 중 주제에 맞는 방법을 선택한다.\n- 수집한 자료를 수학적으로 분석한다.\n\n### 산출물 제작과 발표\n\n#### 결과 공유\n- 보고서, 포스터, 발표 자료 등으로 결과를 정리한다.\n- 탐구 결과의 한계와 개선점을 성찰한다. ### 공학 계열\n\n#### 자율주행 알고리즘의 최적 경로 탐색 원리 연구\n- 행렬 연산과 다익스트라 알고리즘의 수학적 구조를 분석한다.\n- 가상 지도 데이터에서 장애물을 피하며 목적지에 도달하는 최단 거리 산출 시뮬레이션을 수행한다.\n\n### 건축·예술 계열\n\n#### 테셀레이션을 활용한 비정형 건축물 외벽 설계\n- 평행이동과 대칭이동의 기하학적 원리를 적용하여 빈틈없이 평면을 채우는 독창적인 패턴을 설계한다.\n- 설계한 패턴을 3D 모델링 도구로 구현한 산출물을 제작한다.\n\n### 상경 계열\n\n#### 몬테카를로 기법을 이용한 보드게임 균형성 분석\n- 개발 연구 방법론을 적용하여 새로운 보드게임의 규칙을 설계한다.\n- 확률적 시뮬레이션을 통해 특정 전략이 필승법이 되지 않도록 밸런스를 조정한다. - 희망 진로와 관련된 문제나 자신만의 문제를 주제로 정하여 이를 수학적 절차로 해결해 나가고 싶은 학생\n- 데이터 수집, 분석, 보고서 작성, 발표로 이어지는 연구 절차를 미리 경험하고 싶은 학생\n- 대학 학습의 기초 체력을 기르고 싶은 학생 수학과 통계학과 경제학과 산업공학과 빅데이터학과 사회학과 정치외교학과 법학과 행정학과 사회복지학과"},{"kind":"course","id":"course_스포츠_과학","name":"스포츠 과학","text":"스포츠 과학 스포츠를 사회과학과 자연과학적으로 탐구하는 과목입니다. 스포츠사회학 스포츠심리학 운동생리학 운동역학 ### 핵심 학습\n\n#### 스포츠 속 사회과학적 요소는 무엇일까\n- 스포츠와 사회과학의 관계를 알아본다.\n- 스포츠 심리·사회학적 현상과 원리를 탐구한다.\n- 스포츠 현상을 과학적으로 탐구한다.\n\n#### 스포츠 속 자연과학적 요소는 무엇일까\n- 스포츠와 자연과학의 관계를 이해한다.\n- 스포츠 생리·역학적 현상과 원리를 탐구한다.\n- 스포츠 현상에 과학적 이론을 적용한다. ### 사회과학적 분석\n\n#### 스포츠와 사회 현상\n- 스포츠 산업, 마케팅, 심리, 사회 현상을 조사한다.\n- 스포츠가 사회 변화와 개인 행동에 미치는 영향을 분석한다.\n\n### 자연과학적 분석\n\n#### 신체 움직임과 에너지\n- 운동 강도와 에너지 시스템의 관계를 조사한다.\n- 운동 생리와 운동 역학의 원리를 실제 스포츠 활동에 적용한다. ### 사회·상경 계열\n\n#### 스포츠 산업의 개념과 특징 분석\n- 스포츠 산업의 개념을 조사한다.\n- 자본주의에 따른 스포츠의 변화 양상을 찾아본다.\n- 앰부시 마케팅 사례와 인플루언서를 활용한 스포츠 마케팅 성공 사례를 분석한다.\n- 프로 스포츠의 순기능과 역기능을 조사하고 자신의 생각을 글로 작성한다.\n\n### 자연·공학 계열\n\n#### 운동에 따른 신체 변화 탐구\n- 운동 강도에 따라 신체가 어떤 에너지 시스템을 적용하는지 조사한다.\n- 유산소 운동과 무산소 운동의 특징과 차이점을 비교·분석한다.\n- 에너지 시스템을 활용하여 트레이닝 방법을 구상한다.\n- 탐구한 내용을 자신이 좋아하는 운동에 적용한다. - 스포츠와 관련된 다양한 사회·과학적 현상을 분석하고 싶은 학생\n- 인간의 움직임을 자연·과학적으로 분석하여 실제 스포츠 활동에 적용해 보고 싶은 학생 물리학과 기계공학과 전기공학과 전자공학과 항공우주공학과 천문학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_스포츠_문화","name":"스포츠 문화","text":"스포츠 문화 스포츠를 매개로 하는 다양한 문화에 대해 이해하는 과목입니다. 인문문화 경기문화 역사 철학 스포츠대회 스포츠역사 스포츠철학 비판적태도 확산적사고 ### 핵심 학습\n\n#### 스포츠의 개념을 확장하면 무엇이 보일까\n- 스포츠 인문 문화의 개념과 특성을 이해한다.\n- 스포츠의 역사, 철학, 문학, 예술을 알아본다.\n- 스포츠 대회를 기획하고 운영한다.\n\n#### 스포츠 경기 문화는 어떻게 구성될까\n- 스포츠 경기 문화의 개념과 특성을 이해한다.\n- 스포츠 경기 문화의 구성 체계와 방법을 알아본다.\n- 스포츠 대회에 참여하고 관련 분야 진로를 설계한다. ### 인문 문화 탐구\n\n#### 스포츠와 역사·철학·예술\n- 스포츠를 역사, 철학, 문학, 예술의 관점에서 살펴본다.\n- 스포츠가 인간과 사회를 표현하는 문화적 방식임을 이해한다.\n\n### 경기 문화 경험\n\n#### 대회 기획과 참여\n- 스포츠 대회의 구성 요소를 이해한다.\n- 스포츠 경기 문화의 운영 방식과 참여 태도를 익힌다. ### 인문·예술 계열\n\n#### 스포츠 윤리와 공정성\n- 선수들의 승부조작, 도핑, 일탈 행동 사례를 조사하고 원인을 분석한다.\n- 문제 상황 예방을 위한 개선책을 함께 토의한다.\n- 트랜스젠더 선수의 경기 참여에 대한 생각을 정리한다.\n- 현대 스포츠의 윤리적 쟁점 사례를 조사하고 토론한다.\n\n### 사회·상경 계열\n\n#### 사회 계층과 스포츠 종목의 분화\n- 자본과 여가 시간에 따른 선호 종목의 차이를 국가별로 비교한다.\n- 국가별로 선호하는 종목이 다른 원인을 조사한다.\n- 우리나라의 스포츠 특성을 외국과 비교하고 장단점에 대해 토론한다. - 스포츠의 개념과 의미를 문화적으로 확장하고 싶은 학생\n- 스포츠 대회를 구성하고 운영하는 능력을 경험해 보고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 체육학과 스포츠과학과 스포츠의학과 체육교육과 스포츠경영학과"},{"kind":"course","id":"course_스포츠_생활1","name":"스포츠 생활1","text":"스포츠 생활1 스포츠 경기 수행을 통해 바람직한 인성을 쌓는 과목입니다. 영역형스포츠 생활자연환경스포츠 경기기능 스포츠퍼슨십 축구 농구 핸드볼 당구 볼링 골프 자전거 스키 ### 핵심 학습\n\n#### 영역형 스포츠를 통해 무엇을 배울 수 있을까\n- 영역형 스포츠의 경기 기능과 과학적 원리를 이해한다.\n- 영역형 스포츠의 창의적인 경기 전략을 수립한다.\n- 스포츠 경기 수행 능력을 고도화한다.\n\n#### 생활·환경형 스포츠란 무엇일까\n- 생활·환경형 스포츠의 경기 기능과 과학적 원리를 이해한다.\n- 생활·환경형 스포츠의 창의적인 경기 전략을 구상한다.\n- 스포츠퍼슨십과 스포츠에 대한 환경친화적 태도를 익힌다. ### 경기 수행\n\n#### 영역형 스포츠 전략\n- 경기 기능을 연습하고 전술을 적용한다.\n- 팀 상황에 맞는 창의적 경기 전략을 수립한다.\n\n### 생활 스포츠 경험\n\n#### 생활·환경형 스포츠\n- 생활 속에서 접할 수 있는 스포츠의 원리를 이해한다.\n- 스포츠퍼슨십과 환경친화적 태도를 실천한다. ### 인문·예술 계열\n\n#### 문학 속에 표현된 스포츠 분석\n- 시나 소설 등 문학 작품에서 스포츠가 언급된 작품을 조사한다.\n- 스포츠가 인간의 역경 극복이나 성장의 장치로 어떻게 활용되었는지 분석한다.\n- 스포츠를 주제로 나만의 문학 작품을 창작한다.\n\n### 사회·상경 계열\n\n#### 스포츠 구단의 마케팅 사례 분석\n- 축구, 농구 등 종목별 프로 구단의 마케팅 사례를 조사한다.\n- 구단별 마케팅 전략의 공통점과 차이점을 비교한다.\n- 데이터를 활용하여 저평가된 선수를 발굴하는 경제적 효율성을 탐구한다.\n- 게임 시뮬레이션을 활용한 스포츠 구단 경영을 체험하고 소감을 작성한다.\n\n### 자연·공학 계열\n\n#### 농구 수행 동작의 과학적 원리 분석\n- 슛 동작에서 손목 스냅을 이용한 역회전의 과학적 원리를 분석한다.\n- 슛의 포물선 각도와 성공률의 상관관계를 분석한다.\n- 자유투 상황에서 느끼는 심리적 불안감의 원인과 해결 방안을 탐구한다. - 다양한 스포츠 수행 동작에 숨겨진 과학적 원리를 찾아 분석해 보고 싶은 학생\n- 창의적인 경기 전략을 수립하여 스포츠 상황에 적용해 보고 싶은 학생 체육학과 스포츠과학과 스포츠의학과 체육교육과 스포츠경영학과"},{"kind":"course","id":"course_스포츠_생활2","name":"스포츠 생활2","text":"스포츠 생활2 스포츠의 경기 기능과 과학적 원리를 이해하고 경기 수행을 고도화하는 과목입니다. 네트형스포츠 필드형스포츠 스포츠수행 스포츠퍼슨십 탁구 배구 배드민턴 테니스 야구 소프트볼 크리켓 ### 핵심 학습\n\n#### 네트형 스포츠를 통해 무엇을 배울 수 있을까\n- 네트형 스포츠의 경기 기능과 과학적 원리를 이해한다.\n- 네트형 스포츠의 창의적인 경기 전략을 수립한다.\n- 스포츠 경기 수행 능력을 고도화한다.\n\n#### 필드형 스포츠를 통해 무엇을 배울 수 있을까\n- 필드형 스포츠의 경기 기능과 과학적 원리를 이해한다.\n- 필드형 스포츠의 창의적인 경기 전략을 구상한다.\n- 스포츠퍼슨십과 스포츠에 대한 환경친화적 태도를 익힌다. ### 경기 수행\n\n#### 네트형 스포츠 전략\n- 네트형 스포츠의 경기 기능과 전술을 익힌다.\n- 경기 상황에 맞는 전략을 적용한다.\n\n### 필드형 스포츠 경험\n\n#### 필드형 스포츠 전략\n- 필드형 스포츠의 경기 기능과 과학적 원리를 이해한다.\n- 스포츠퍼슨십을 바탕으로 경기 수행을 개선한다. ### 인문·예술 계열\n\n#### 스포츠 역사 속의 정치적 사건\n- 남북한 선수들이 국제대회에 단일팀으로 참가한 사례를 조사한다.\n- 핑퐁 외교나 뮌헨 올림픽 참사에 대해 조사한다.\n- 스포츠가 국제 정치와 외교에 미친 영향을 탐구한다.\n\n### 사회·상경 계열\n\n#### 스포츠 심리와 경기력의 상관관계\n- 루틴이나 자기효능감이 실제 자유투 성공률 등에 미치는 영향을 조사한다.\n- 적정 각성 수준과 역 U자 이론을 탐구하고 사례를 수집한다.\n- 경기력을 끌어올리기 위한 심상훈련, 즉 이미지 트레이닝의 원리를 분석한다.\n\n### 자연·공학 계열\n\n#### 야구 수행 동작의 과학적 원리 분석\n- 타격 동작의 과학적 원리, 충격량, 각속도, 회전반경 등을 분석한다.\n- 빠른 공을 치기 위해 필요한 능력과 훈련 방법을 생각한다.\n- 야구 경기에 적용된 다양한 첨단 시스템을 조사한다. - 이론으로 익힌 과학적 원리를 다양한 종목에 적용해 보고 싶은 학생\n- 스포츠를 통해 사람들과 함께 땀 흘리며 희열을 느끼고 싶은 학생 체육학과 스포츠과학과 스포츠의학과 체육교육과 스포츠경영학과"},{"kind":"course","id":"course_실용_통계","name":"실용 통계","text":"실용 통계 우리 반 친구들의 관심사나 사회 문제처럼 평소 궁금했던 점을 직접 조사하고, 그래프와 도표 등 통계 시각화를 통해 결과를 해석하는 과목입니다. 통계적전략 자료의표현 통계적추정 가설검정 의사결정 변이성 모집단과표본 자료수집방법 그래프표현 모평균 모비율추정 통계적탐구 연구윤리 ### 핵심 학습\n\n#### 불확실한 현상을 어떻게 문제로 정의할까\n- 통계적 문제 해결 과정의 단계별 역할을 이해한다.\n- 상황에 적합한 표본 추출 방법을 탐구한다.\n> 예: 단순임의추출, 층화임의추출, 계통추출\n\n#### 방대한 데이터를 한눈에 보여주는 방법은 무엇일까\n- 설문과 문헌 연구를 통해 자료를 수집한다.\n- 도수분포표와 히스토그램 등 다양한 그래프를 활용해 자료의 특성을 해석한다.\n\n#### 표본을 통해 전체의 특성을 어떻게 예측할까\n- 정규분포와 t분포의 성질을 탐구한다.\n- 공학 도구를 활용하여 모평균·모비율 추정과 가설검정의 원리를 이해한다.\n\n#### 데이터로 세상을 설득할 수 있을까\n- 실생활 주제 선정부터 결과 도출까지의 전 과정을 수행한다.\n- 탐구 결과의 타당성을 비판적으로 성찰한다. ### 자료 수집과 표현\n\n#### 통계 자료 만들기\n- 설문, 문헌, 공공데이터 등을 활용해 자료를 수집한다.\n- 그래프와 도표를 활용해 자료를 시각화한다.\n\n### 추정과 검정\n\n#### 표본에서 모집단 추론하기\n- 표본 자료를 바탕으로 전체의 특성을 추정한다.\n- 가설검정을 활용해 주장의 타당성을 확인한다.\n\n### 탐구와 발표\n\n#### 통계적 의사소통\n- 관심 주제를 통계적으로 탐구한다.\n- 분석 결과를 보고서나 발표 자료로 정리한다. ### 사회 계열\n\n#### 인구 구조 변화 데이터를 활용한 지역 소멸 위험도 분석\n- 국가통계포털 KOSIS의 연령별 인구 데이터를 수집하여 지역별 노령화 지수를 산출한다.\n- 엑셀을 활용해 향후 인구 변화 추이를 예측하고 대응 정책을 제안한다.\n\n### 보건 계열\n\n#### 감염병 예방 수칙 준수 여부와 확산 속도의 상관관계 탐구\n- 실생활 위생 관리 데이터와 감염병 발생 자료를 비교·분석한다.\n- 공학 도구를 이용해 특정 방역 수칙의 효과성을 통계적으로 검증한다.\n> 방법 예시: 가설검정 - 데이터 분석 역량을 키우고자 하는 학생\n- 수학의 이론적 학습을 넘어 실생활의 복잡한 문제를 수학적으로 해석하고 해결하는 데 흥미가 있는 학생\n- 확률과 통계 과목의 내용을 더 깊이 있게 이해하고 싶은 학생 수학과 통계학과 경제학과 산업공학과 빅데이터학과 사회학과 정치외교학과 법학과 행정학과 사회복지학과"},{"kind":"course","id":"course_심화_영어","name":"심화 영어","text":"심화 영어 일상생활에 필요한 의사소통 능력을 심화하고, 기초 학문 분야를 포함한 다양한 주제와 관련된 영어 이해 능력과 표현 능력을 기르는 과목입니다. 기초학문분야주제 자기주도학습과협업 타문화에대한이해와포용 심미적감수성 주제나요지파악하기 전략적용하기 예측하기 비교 대조하기 요약하기 자료재구성하여발표하기 ### 핵심 학습\n\n#### 주어진 글을 통해 필자가 말하고자 하는 바는 무엇인가\n- 필자의 주관이나 가치 판단이 들어간 부분을 확인한다.\n- 글의 내용을 한 문장으로 요약한다.\n- 독자에게 보내는 짧은 필자의 말을 상상하여 작성한다.\n\n#### 주어진 두 글의 내용을 서로 비교·대조해 본다면\n- 두 글에 대한 비교 매트릭스를 작성한다.\n- 두 글의 필자가 각각 어떤 입장인지 추론한다.\n- 제3의 관점을 탐색하여 발표한다. ### 읽기와 요약\n\n#### 글의 주제와 관점 파악\n- 영어 지문에서 필자의 의도와 주장을 파악한다.\n- 핵심 내용을 요약하고 자신의 언어로 재구성한다.\n\n### 비교와 발표\n\n#### 관점 비교 활동\n- 서로 다른 두 글을 비교·대조한다.\n- 자료를 재구성하여 영어로 발표한다. ### 보건 계열\n\n#### 국가별 보건 불평등 지표 분석 활동\n- 두 개 이상의 국가를 선정하여 핵심 보건 지표를 조사한다.\n- 수집한 데이터를 통해 보건 불평등이 발생하는 원인을 분석한다.\n- 글로벌 보건 불평등을 줄이기 위한 해결책을 제안하는 영문 보고서를 작성한다.\n\n### 교육 계열\n\n#### 메타인지 전략을 활용한 영어 독해력 향상 방법 탐구\n- 메타인지의 개념과 하위 요소를 조사한다.\n- 어려운 영어 지문을 읽을 때 메타인지가 인지 부하를 줄여줄 수 있는 방법을 탐구한다.\n- 메타인지 기반의 효율적인 영어 학습 방법을 발표한다. - 전문적인 학술적 문해력을 기르고 싶은 학생\n- 다양한 분야의 깊이 있는 텍스트를 접하며 배경지식을 확장하고, 고급 어휘와 구문을 익히고 싶은 학생\n- 회의에서 영문 발표를 하거나 해외 파트너와 협상하는 등 국제적 소통이 잦은 일을 하고자 하는 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_심화_영어_독해와_작문","name":"심화 영어 독해와 작문","text":"심화 영어 독해와 작문 다양한 주제와 장르의 글을 읽고 비판적으로 이해하며, 자신의 의견을 논리적인 영어 글로 표현하는 역량을 기르는 과목입니다. 비판적영어독해능력 창의적글쓰기능력 다양하고복잡한구조의문장 심화 추론하기 의미파악하기 비판적으로읽기 비교 대조하기 재구성하기 고쳐쓰기 ### 핵심 학습\n\n#### 반어법은 글의 의미와 효과를 어떻게 바꿀까\n- 반어법이 사용된 문장을 찾아 실제 의미를 파악한다.\n- 반어법이 독자에게 주는 심리적 효과를 탐색한다.\n- 분석한 내용을 친구들과 교환하며 해석의 차이를 비교한다.\n\n#### 설득력 있는 글은 어떻게 재구성할 수 있을까\n- 세부 근거의 배치 순서를 바꾸어 독자가 느끼는 설득력의 차이를 분석한다.\n- 주장과 근거 사이의 논리적 연결 고리를 만들고, 취약한 연결을 수정한다.\n- 설득력 있는 글쓰기를 위한 점검표를 작성한다. ### 독해와 의미 분석\n\n#### 수사 표현 분석\n- 반어법, 중의성, 어조 등 글의 의미를 바꾸는 표현을 찾는다.\n- 표현 방식이 독자의 이해와 반응에 어떤 영향을 주는지 분석한다.\n\n### 작문과 재구성\n\n#### 논증 구조 개선\n- 주장, 근거, 반론, 재반박의 관계를 정리한다.\n- 글의 흐름을 재배치하여 설득력을 높인다.\n- 고쳐쓰기 과정에서 논리적 연결성과 표현의 정확성을 점검한다. ### 의약학 계열\n\n#### WHO 가이드라인을 활용한 Health Literacy 개선 프로젝트\n- WHO 홈페이지에서 최신 보건 지침을 선정하여 읽는다.\n- 보건 지침에 사용된 전문 용어를 쉬운 영어로 재구성한다.\n- 재구성한 내용이 건강 문해력 향상에 도움이 되는 이유를 발표한다.\n\n### 언어·문학 계열\n\n#### 중의적 문장의 가독성 개선 가이드 제작 활동\n- 구조적 중의성을 가진 문장을 수집한다.\n- 평범한 문장과 구조적 중의성을 지닌 문장의 뜻을 이해하는 데 걸리는 시간을 각각 측정한다.\n- 오해 없는 명확한 문장을 쓰기 위한 글쓰기 지침서를 영어로 작성한다. - 국제 사회의 복잡한 이슈를 다룬 심도 있는 텍스트를 읽고, 자신의 견해를 격식 있는 영문 에세이로 표현하고 싶은 학생\n- 높은 수준의 학술적 연구를 위해 고도의 영어 역량이 필요한 학생\n- 해외 미디어의 텍스트를 비판적으로 수용하고, 영문 메시지를 전달하는 능력을 기르고 싶은 학생 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과"},{"kind":"course","id":"course_심화_제2외국어(심화_프랑스어,_심화_일본어)","name":"심화 제2외국어(심화 프랑스어, 심화 일본어)","text":"심화 제2외국어(심화 프랑스어, 심화 일본어) 일상생활 기본 표현을 바탕으로 제2외국어 의사소통 능력을 심화하고, 제2외국어권 문화 이해를 통해 세계시민적 소통 역량을 기르는 과목입니다. 상호문화적관점 문화이해 세계시민 소통능력 발음 억양 상황에 대화문 텍스트 다양한 ### 핵심 학습\n\n#### 제2외국어로 어떻게 말하고 들을 수 있을까\n- 상황에 맞는 표현을 익힌다.\n- 자신의 생각을 제2외국어로 말한다.\n- 기본 의사소통 표현을 실제 상황에 맞게 활용한다.\n\n#### 제2외국어 텍스트를 어떻게 읽고 쓸 수 있을까\n- 제2외국어로 쓰인 대화문과 텍스트를 읽고 핵심 내용을 파악한다.\n- 세부 내용을 이해하고 필자의 의도나 목적을 추론한다.\n- 읽은 내용을 바탕으로 짧은 글을 작성한다. ### 의사소통 표현\n\n#### 상황별 말하기와 듣기\n- 인사, 소개, 의견 표현 등 기본 표현을 상황에 맞게 사용한다.\n- 제2외국어로 자신의 생각을 짧게 말한다.\n\n### 읽기와 쓰기\n\n#### 텍스트 이해와 표현\n- 다양한 자료를 읽고 중심 내용을 정리한다.\n- 세부 정보와 필자의 의도를 파악한다.\n- 학급이나 학교생활을 소재로 짧은 글을 작성한다. ### 전 계열\n\n#### 제2외국어 신문 만들기\n- 제2외국어 신문 기사를 읽고 자주 쓰이는 표현을 익힌다.\n- 학급 또는 학교에서 일어난 일을 소재로 기사를 작성한다.\n- 모둠별로 제2외국어 신문을 만든다.\n\n### 문학 계열\n\n#### 제2외국어로 쓰인 문학작품 탐구하기\n- 제2외국어권 국가에서 발행된 쉬운 문학작품을 읽는다.\n- 작품의 내용과 표현을 이해한다.\n- 우리나라에 비슷한 내용의 문학작품이 있는지 탐구한다.\n\n### 언어 계열\n\n#### 한국어와 제2외국어의 차이점 알아보기\n- 한국어와 제2외국어의 음운 체계를 대조한다.\n- 두 언어의 어휘 차이를 분석한다.\n- 언어 차이가 문화와 의사소통 방식에 미치는 영향을 생각한다. - 제2외국어를 깊이 있게 학습하고 싶은 학생\n- 국제 무대에서 자신의 역량을 발휘하고 싶은 학생\n- 제2외국어로 쓰인 문학작품이나 다양한 매체를 이해하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과 문헌정보학과 미디어학과 교육학과 영어영문학과 통번역학과"},{"kind":"course","id":"course_언어생활_탐구","name":"언어생활 탐구","text":"언어생활 탐구 문법, 듣기·말하기, 쓰기, 매체 영역을 연결하여 일상의 언어생활을 비판적·창의적으로 탐구하고 바람직한 의사소통 방식을 고민하는 과목입니다. 언어사용 사회언어학 매체언어 의사소통윤리 담화분석 언어문화 비판적성찰 언어와권력 차별적표현 SNS언어 이모티콘 온라인담화 공감적표현 갈등조정 ### 핵심 학습\n\n#### 언어는 사회 속에서 어떤 의미와 권력을 만들어낼까\n- 세대, 지역, 집단에 따른 언어 사용 차이를 조사한다.\n- 정치 연설이나 광고 속 언어 표현을 분석한다.\n- 차별적 표현과 혐오 표현 사례를 조사하여 사회적 영향을 탐구한다.\n\n#### 디지털 환경은 우리의 언어생활을 어떻게 바꾸고 있을까\n- SNS 댓글과 온라인 커뮤니티의 담화 구조를 분석한다.\n- 뉴스 제목과 기사 표현 방식을 비교한다.\n- 이모티콘, 밈 등 새로운 언어 표현 방식을 탐구한다.\n\n#### 책임 있는 언어 사용은 어떻게 실천할 수 있을까\n- 갈등 상황의 대화문을 공감적 표현으로 다시 작성한다.\n- 온라인 언어 갈등 사례를 분석하고 해결 방안을 제시한다.\n- 바람직한 언어생활을 위한 캠페인 콘텐츠를 기획한다. ### 언어와 사회 분석\n\n#### 언어 사용 사례 조사\n- 세대, 지역, 집단별 언어 사용 차이를 수집한다.\n- 광고, 연설, 뉴스 등 공적 언어 자료를 분석한다.\n\n### 디지털 담화 탐구\n\n#### 온라인 언어생활 분석\n- SNS, 댓글, 숏폼 콘텐츠에서 나타나는 언어 전략을 분석한다.\n- 밈과 이모티콘이 의미 전달에 어떤 역할을 하는지 탐구한다.\n\n### 언어 윤리와 실천\n\n#### 바람직한 언어 사용 제안\n- 차별적 표현과 혐오 표현의 사회적 영향을 정리한다.\n- 공감적 언어 사용을 위한 가이드라인이나 캠페인 콘텐츠를 기획한다. ### 전 계열\n\n#### 혐오 표현과 표현의 자유 탐구\n- 혐오 표현 관련 뉴스 기사와 판례를 조사한다.\n- 표현의 자유와 언어 책임 사이의 쟁점을 정리한다.\n- 토론을 진행한 뒤 언어 사용 가이드라인 제안서를 작성한다.\n\n### 인문·사회 계열\n\n#### 젠더 언어와 사회 인식 변화 연구\n- 광고, 뉴스, 드라마 속 성별 표현 사례를 조사한다.\n- 언어 표현이 사회 인식에 미치는 영향을 분석한다.\n- 설문 조사 결과를 바탕으로 연구 보고서를 작성한다.\n\n### 미디어·콘텐츠 계열\n\n#### 유튜브·숏폼 콘텐츠의 언어 전략 분석\n- 인기 콘텐츠의 대본과 화법 전략을 분석한다.\n- 시청자 반응과 댓글 담화를 분석한다.\n- 새로운 콘텐츠 언어 전략을 기획한다. - 일상 속 언어 사용을 비판적으로 바라보고 사회적 의미를 탐구하고 싶은 학생\n- 미디어와 온라인 환경에서의 언어 변화에 관심이 있는 학생\n- 바람직한 의사소통 방식과 언어 윤리에 대해 고민해 보고 싶은 학생\n- 언론·방송·미디어, 법·행정, 교육, 상담·심리, 경영·마케팅 등 언어 이해와 의사소통 능력이 중요한 분야로 진학을 희망하는 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과 문헌정보학과 미디어학과 교육학과 디자인과 연극영화학과"},{"kind":"course","id":"course_에너지와_탄소_중립","name":"에너지와 탄소 중립","text":"에너지와 탄소 중립 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 에너지와 탄소 중립\n- 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 활동 안내\n- 상세 내용은 담당선생님께 문의하세요. ### 담당교사 문의\n\n#### 심화 탐구 안내\n- 상세 내용은 담당선생님께 문의하세요. - 상세 내용은 담당선생님께 문의하세요. 화학과 화학공학과 약학과 신소재공학과 환경공학과 에너지자원공학과"},{"kind":"course","id":"course_여행지리","name":"여행지리","text":"여행지리 세계 여러 지역의 자연경관과 인문경관을 이해하고, 행복하고 안전하며 지속가능한 여행을 위한 지리적 안목을 기르는 과목입니다. 여행 관광 지역축제 지속가능한여행 다크투어리즘 장소 모빌리티 여행지 도시여행 문화경관 지오투어리즘 산업유산여행 기념물여행 평화여행 지속가능여행 미래여행 미디어여행 ### 핵심 학습\n\n#### 여행은 우리의 삶에 어떤 의미를 줄까\n- 여행의 의미, 목적, 방법을 이해한다.\n- 자신의 여행 경험을 공유하며 여행이 삶에 주는 영향을 생각한다.\n- 모빌리티와 여행의 관계를 이해하고 여행 계획을 세운다.\n\n#### 문화와 자연을 찾아가는 여행은 어떻게 준비할까\n- 다양한 매력을 가진 도시의 사례를 조사하고 여행을 상상한다.\n- 문화 경관의 형성 배경과 의미를 파악한다.\n- 기후, 지형, 지질을 활용한 지오투어리즘을 이해하고 지속가능한 지오투어리즘 방안을 모색한다.\n\n#### 성찰과 공존을 위한 여행은 무엇을 고민해야 할까\n- 산업유산여행, 기념물여행, 평화여행, 다크투어리즘의 의미를 이해한다.\n- 인류 발전의 역사를 따라가는 여행 사례를 조사한다.\n- 평화와 공존의 가치를 탐색하기 위한 여행 계획을 세운다.\n\n#### 미디어와 기술 발달은 미래 여행에 어떤 영향을 미칠까\n- 미디어와 여행의 관계에 대한 사례를 탐구한다.\n- 지역 브랜드와 여행 산업의 변화를 비교 분석한다.\n- 지속가능한 여행을 위한 여행자 윤리를 만든다. ### 여행 계획과 장소 이해\n\n#### 행복하고 안전한 여행 설계\n- 여행의 목적과 방법을 정리한다.\n- 장소의 특성과 이동 방식을 고려해 여행 계획을 세운다.\n\n### 문화·자연 경관 탐구\n\n#### 여행지의 의미 분석\n- 도시, 문화 경관, 지오투어리즘 사례를 조사한다.\n- 경관의 형성 배경과 여행의 의미를 연결한다.\n\n### 지속가능한 여행\n\n#### 여행자 윤리 만들기\n- 평화, 공존, 환경, 지역사회와 연결되는 여행 방식을 탐구한다.\n- 지속가능한 여행을 위한 실천 원칙을 제안한다. ### 정보·통계 계열\n\n#### 도시 여행 콘텐츠 개발\n- 미디어 노출이 도시 관광 수요에 미치는 영향을 데이터로 분석한다.\n- 국제 공항 이용객 수를 기준으로 시기별·지역별 도시 여행 데이터를 분석한다.\n- 분석 결과를 바탕으로 도시 여행 콘텐츠를 개발한다.\n\n### 인문·예술 계열\n\n#### 여행지로 재탄생한 문화유산 탐구\n- 산업화 시대 주요 유산의 재탄생 사례를 조사한다.\n- 문화 경관의 사례를 조사하고 인포그래픽이나 일러스트로 표현한다.\n\n### 정치·국제 계열\n\n#### 다크투어리즘 탐구\n- 평화를 주제로 대륙별 여행 계획을 세워 ‘세계 평화 일주’ 지도를 만든다.\n- 전쟁사와 전쟁 유적을 테마로 하는 스토리텔링 다크투어리즘을 계획한다. - 여행의 의미를 이해하고 장소와 지역에 대해 흥미와 관심을 갖고 싶은 학생\n- 사회 변화와 기술 발달이 여행 산업에 미치는 영향을 탐구하고 싶은 학생\n- 지속가능한 여행과 여행자 윤리에 대해 고민해 보고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_역사로_탐구하는_현대_세계","name":"역사로 탐구하는 현대 세계","text":"역사로 탐구하는 현대 세계 제1·2차 세계 대전 이후 현대 세계의 변화와 과제를 세계사의 맥락에서 탐구하고, 다양한 역사 자료를 분석하는 역량을 기르는 과목입니다. 전후체제형성 냉전과열전 생태환경 갈등과화해 현대세계의과제 현대세계형성 역사탐구방법 전쟁기억의방법 세계경제성장 기후변화 제3세계 공동역사교과서 경제의세계화 다문화사회 ### 핵심 학습\n\n#### 현대 세계의 형성 과정과 역사 탐구 방법은 무엇일까\n- 세계 대전 이후 국제 정세의 형성과 변화를 파악한다.\n- 현대 세계의 과제를 선정하고 조사한다.\n\n#### 냉전의 배경과 열전의 전개 과정은 어떠했을까\n- 냉전의 전개 양상과 전쟁 당사국의 경험을 비교한다.\n- 전쟁을 기억하는 방법을 조사하고 분석한다.\n\n#### 경제 성장과 기술 발전은 어떤 문제를 낳았을까\n- 세계 경제의 성장과 기술 혁신 양상을 조사한다.\n- 생태환경 문제와 기후 변화의 원인을 파악한다.\n- 환경 문제 극복을 위한 노력과 대안을 정리한다.\n\n#### 국제 분쟁과 갈등은 어떻게 화해로 나아갈 수 있을까\n- 국제 분쟁과 갈등의 역사적 연원과 전개 양상을 파악한다.\n- 탈냉전 시기 변화를 분석하고 분쟁 해결 정책을 탐구한다.\n\n#### 세계화와 문화 다양성은 어떤 쟁점을 만들까\n- 경제의 세계화 이후 변화를 시간순으로 정리한다.\n- 다문화 사회의 이해와 문화 다양성 관련 규범을 파악한다. ### 현대사 자료 분석\n\n#### 국제 정세와 전쟁 기억 탐구\n- 세계 대전 이후 국제 질서의 변화를 정리한다.\n- 전쟁과 분쟁을 기억하는 방식의 차이를 조사한다.\n\n### 현대 세계의 과제 탐구\n\n#### 성장, 환경, 갈등 분석\n- 기술 발전과 경제 성장이 가져온 풍요와 문제를 함께 분석한다.\n- 생태환경 문제, 국제 분쟁, 다문화 갈등을 역사적 맥락에서 탐구한다.\n\n### 해결 방안 모색\n\n#### 역사적 관점에서 대안 제시\n- 현대 세계의 과제를 선정하여 자료를 조사한다.\n- 역사적 원인과 현재의 쟁점을 연결해 해결 방향을 제안한다. ### 인문과학 계열\n\n#### 국제 분쟁을 소재로 한 문학 작품 분석\n- 세계 대전 이후에 벌어진 국제 분쟁의 사례를 조사한다.\n- 국제 분쟁의 양상을 보여주는 문학 작품을 분석하여 소개한다.\n\n### 사회·상경 계열\n\n#### 다문화 사회의 갈등 해결 방안 모색\n- 다문화 사회에서 벌어지는 갈등의 사례와 원인을 파악한다.\n- 구성원들의 화합을 촉진할 수 있는 방법에 대해 토론한다.\n\n### 자연과학 계열\n\n#### 과학 기술 발전의 양면성 분석\n- 인류의 풍요와 부작용을 함께 초래한 과학 기술 사례를 조사한다.\n- 기술 개발에 결부되어야 할 윤리적 자세에 대해 발표한다. - 정치, 외교, 사회 계열 진학을 희망하는 학생\n- 국제 정세와 연결하여 국제 분쟁의 현황을 조사해 보고 싶은 학생\n- 현대 세계의 과제를 역사적 맥락에서 이해하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과"},{"kind":"course","id":"course_역학과_에너지","name":"역학과 에너지","text":"역학과 에너지 인공위성의 운동부터 블랙홀의 시공간 왜곡까지, 거시 세계를 움직이는 힘과 에너지의 법칙을 탐구하는 과목입니다. 포물선운동 일반상대성이론 열역학법칙 엔트로피 도플러효과 벡터합성 일반상대론 열기관 소음제어 정상파 ### 핵심 학습\n\n#### 물체의 운동을 어떻게 정량적으로 예측하고 설명할까\n- 케플러 법칙을 바탕으로 인공위성의 궤도를 분석한다.\n- 일반 상대성 이론을 통해 블랙홀과 시공간 왜곡을 해석한다.\n\n#### 열과 에너지는 어떻게 전환되며 왜 방향성을 가질까\n- 열역학 제1법칙을 통해 에너지 보존을 이해한다.\n- 열기관 효율의 한계를 과학적으로 설명한다.\n- 비가역 현상과 엔트로피 개념으로 자연 현상을 설명한다.\n\n#### 파동의 성질은 첨단 기술과 예술에 어떻게 활용될까\n- 도플러 효과를 이용해 속도 측정 원리를 이해한다.\n- 정상파를 적용하여 악기의 원리를 탐구한다. ### 운동과 우주\n\n#### 궤도와 중력 탐구\n- 물체의 운동을 수식과 그래프로 표현한다.\n- 인공위성 궤도와 천체 운동을 물리 법칙으로 설명한다.\n\n### 열과 에너지\n\n#### 에너지 전환 분석\n- 열기관과 에너지 보존을 사례로 이해한다.\n- 엔트로피와 비가역 현상을 자연 현상에 적용한다.\n\n### 파동과 응용\n\n#### 소리와 파동 활용\n- 도플러 효과와 정상파를 실제 사례와 연결한다.\n- 악기나 음향 장치의 원리를 파동 개념으로 설명한다. ### 기계·항공 공학\n\n#### 연료 소모에 따른 로켓의 속도 변화 탐구\n- 운동량 보존 법칙을 기반으로 연료 소모량에 따른 로켓의 질량 변화율을 수식화한다.\n- 파이썬 프로그램을 코딩하여 지표면 및 고도별 탈출 속도 데이터를 산출한다.\n\n### 건축·토목 공학\n\n#### 에너지 손실을 최소화하는 패시브하우스 구조 설계\n- 벽을 통해 빠져나가는 열을 계산한다.\n- 유리벽을 두 겹으로 설치하거나 단열재 위치를 바꾸어 실내 온도를 잘 유지하는 벽면 구조를 설계한다.\n- 최적의 벽면 구조 설계도를 작성한다.\n\n### 응용 물리·음향\n\n#### 정상파 원리를 적용한 악기 제작\n- 소리가 울리는 원리인 정상파를 확인한다.\n- 스마트폰 앱을 이용해 음악을 연주할 수 있는 관악기를 직접 제작한다. - 기계, 항공, 조선, 건축, 토목 등 거시적 물체의 거동을 다루는 공학 계열 진로를 희망하는 학생\n- 물체의 운동, 에너지 전환, 파동 현상을 수학적·물리적으로 설명해 보고 싶은 학생\n- 실험, 설계, 코딩을 통해 물리 개념을 응용하고 싶은 학생 화학과 화학공학과 약학과 신소재공학과 환경공학과 에너지자원공학과 물리학과 기계공학과 전기공학과 전자공학과 항공우주공학과 천문학과"},{"kind":"course","id":"course_영미_문학_읽기","name":"영미 문학 읽기","text":"영미 문학 읽기 시, 희곡, 소설 등 영어로 쓰인 다양한 장르의 문학 작품을 감상하며 영어 능력을 확장하고, 작품에 대한 생각과 느낌을 표현하는 과목입니다. 문학작품감상 비판적사고 창의적표현 심미적가치소통 구조분석 설명하기 느낌이나감상공유하고표현하기 창의적으로표현하기 요약하기 ### 핵심 학습\n\n#### 주어진 시를 통해 작가가 말하고자 하는 바는 무엇일까\n- 시의 내용에 대해 친구들과 생각을 주고받는다.\n- 작가와의 가상 인터뷰를 구성한다.\n- 시를 창의적으로 재구성한다.\n\n#### 주어진 소설의 결말이 달라진다면 어떻게 될까\n- 소설 속 결정적인 사건 전후로 묘사되지 않은 장면을 상상한다.\n- 주인공이 다른 선택을 했다면 결말이 어떻게 바뀌었을지 추측한다.\n- ‘What if’ 시나리오를 작성한다. ### 문학 감상과 해석\n\n#### 작품의 의미 이해\n- 시와 소설의 주제, 인물, 갈등, 분위기를 파악한다.\n- 작품 속 표현과 장면이 주는 효과를 친구들과 이야기한다.\n\n### 창의적 재구성\n\n#### 인물과 장면 다시 쓰기\n- 작가나 인물의 관점에서 가상 인터뷰를 작성한다.\n- 결말이나 장면을 바꾸어 새로운 시나리오를 만든다. ### 언어·문학 계열\n\n#### 문학 속 주인공의 일상 재구성하기\n- 문학작품을 읽고 인상적인 장면을 고른다.\n- 주인공이 느꼈을 법한 감정을 나타내는 영어 단어를 찾아본다.\n- 해당 장면을 주인공의 시선으로 영어 글로 작성한다.\n- 주인공의 포스팅을 올리고 등장인물이 되어 영어로 댓글을 단다.\n\n### 인문과학 계열\n\n#### 문학 속 지워진 목소리 복원하기\n- 작품 속 조연이나 소외된 인물을 선정한다.\n- 인물의 속마음 독백을 영어로 작성한다.\n- 현대적 시점으로 메시지를 재구성하여 영어로 발표한다. - 인문·예술 및 어문계열 진학을 희망하는 학생\n- 영미권 문화에 대한 비판적 시각을 통해 어문학적 통찰력을 넓히고 싶은 학생\n- 깊이 있는 문해력과 비판적 사고를 기르고 싶은 학생\n- 인문학적 소양과 언어적 감수성, 표현력을 키우고 싶은 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 국어국문학과 문헌정보학과 미디어학과 교육학과 법학과 영어영문학과"},{"kind":"course","id":"course_영어_독해와_작문","name":"영어 독해와 작문","text":"영어 독해와 작문 영어 읽기와 쓰기를 중점적으로 학습하여 일상생활, 사회생활, 학문 및 전공 분야에서 필요한 영어 독해·작문 역량을 기르는 과목입니다. 지식과정보습득 글의내용파악및추론 글의의미구성 자기주도적작문활동 주제나요지파악하기 논리적관계파악하기 글의전개방식이나구조파악하기 설명하기 고쳐쓰기 적절한쓰기전략적용하기 ### 핵심 학습\n\n#### 주장을 뒷받침하는 증거는 어떻게 제시될까\n- 텍스트에 사용된 다양한 증거를 시각적으로 분류한다.\n- 각 증거가 주장을 뒷받침하는 강도를 평가한다.\n- 주장에 가장 적합한 증거 유형을 연결하며 논리적 연관성을 이해한다.\n\n#### 회의적인 독자가 제기할 수 있는 반론은 무엇일까\n- 상대방의 논리에서 허점을 찾아내고 관점을 뒤집어 생각한다.\n- 양보와 반박의 글 구조를 분석한다.\n- 공격적인 주석을 다는 분석적 독해 활동을 연습한다. ### 독해와 논리 분석\n\n#### 주장과 증거 연결\n- 글의 주요 주장과 근거를 구분한다.\n- 증거의 유형과 설득력을 평가한다.\n\n### 작문과 고쳐쓰기\n\n#### 반론을 고려한 글쓰기\n- 독자의 반론을 예상한다.\n- 양보와 반박 구조를 활용해 글을 고쳐 쓴다.\n- 자신의 생각을 논리적인 영어 글로 정리한다. ### 화학·생명 계열\n\n#### 즐겨 쓰는 제품의 성분 및 영향에 대한 보고서\n- 자주 사용하는 제품 속 화학 성분의 영문 명칭과 기능을 검색한다.\n- 해당 성분이 환경이나 인체에 미치는 영향에 관한 영어 자료를 찾아 핵심 내용을 정리한다.\n- 성분 분석 및 영향에 대한 보고서를 작성한다.\n\n### 상경 계열\n\n#### 일상 속 경제 법칙 카드 뉴스\n- 자주 접하는 경제 법칙이나 용어를 영어로 설명한 경제 기사나 교육용 지문을 읽는다.\n- 실생활에서 경제 법칙이나 용어가 적용된 사례를 찾는다.\n- 친구들에게 경제 용어를 설명해 주는 카드 뉴스를 작성한다. - 논리적 일관성을 갖춘 영작문 과정을 익히고 싶은 학생\n- 영어 지문의 구조 분석을 즐기거나, 자신의 생각을 영어로 정교하게 표현하는 데 관심이 많은 학생\n- 영어 논문이나 기술 보고서 등 전문 용어가 포함된 텍스트를 정확히 읽고 연구 결과를 요약하는 훈련이 필요한 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과"},{"kind":"course","id":"course_영어_발표와_토론","name":"영어 발표와 토론","text":"영어 발표와 토론 영어 듣기와 말하기 기능을 심화하고, 다양한 상황에서 적절한 의사소통 전략을 활용하여 발표와 토론 역량을 기르는 과목입니다. 발표 토론 정보수집과분석 갈등조정 매체활용 설명하기 발표하기 발표기법및전략적용하기 근거제시하기 설득하기 토론절차및전략적용하기 ### 핵심 학습\n\n#### 최근 발생한 중요한 이슈에 대해 어떻게 생각하는가\n- 최근 영어 뉴스 중 하나를 골라 핵심 내용과 선정 이유를 카드 뉴스로 만들어 발표한다.\n- 제시된 이슈에 대한 자신의 생각을 세 가지 정도로 정리하여 말한다.\n\n#### 제시된 토론 논제에 대한 자신의 입장은 무엇인가\n- 자신의 입장을 정하고 주장에 대한 근거를 제시한다.\n- 상대방의 주장에 효과적으로 반박한다. ### 영어 발표\n\n#### 뉴스와 이슈 발표\n- 영어 뉴스를 읽고 핵심 내용을 정리한다.\n- 선정 이유와 자신의 의견을 영어로 발표한다.\n\n### 영어 토론\n\n#### 주장과 반박 구성\n- 토론 논제에 대한 입장을 정한다.\n- 근거를 바탕으로 주장을 펼치고 상대 의견에 반박한다.\n- 토론 후 자신의 표현과 논리를 점검한다. ### 자연과학 계열\n\n#### 배양육은 미래 식량인가, 과학적 재앙인가?\n- 세포 배양의 메커니즘을 조사한다.\n- 기존 축산업과 배양육 생산의 자원 소모량을 수치로 비교하며 과학적 타당성을 검토한다.\n- 기술적 한계와 윤리적 쟁점을 영어로 토론한다.\n\n### 건축·환경 계열\n\n#### 지속 가능한 건축의 과학적 메커니즘 분석\n- 영미권 학술 자료와 사례를 통해 바이오필릭 디자인의 핵심 요소를 영어로 분석한다.\n- 경제성과 실현 가능성을 모둠별로 조사한다.\n- 바이오필릭 디자인의 효용성에 대해 찬반 토론한다. - 글로벌 리더 및 국제 관계 분야로 진학하고자 하는 학생\n- 비즈니스 및 커뮤니케이션 역량이 중요한 분야에 관심이 있는 학생\n- 논리적 사고와 말하기에 자신감을 얻고 싶은 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과"},{"kind":"course","id":"course_영어Ⅰ","name":"영어Ⅰ","text":"영어Ⅰ 진로 및 전공 분야와 관련된 영어 이해 능력과 표현 능력의 기본을 다지는 과목입니다. 의사소통 공감적이해와문화적감수성 자기주도적참여태도 문제해결 유창성 세부정보파악하기 순서파악하기 원인과결과파악하기 내용요약하기 고쳐쓰기 적절한쓰기전략적용하기 ### 핵심 학습\n\n#### 지문에 묘사된 사건들의 시간적 순서는 어떻게 될까\n- 지문 속 시간 표지어를 분석한다.\n- 텍스트 정보를 도표로 변환한다.\n- 도표를 활용해 시간의 선후 관계를 파악한다.\n\n#### 주요 주장을 어떻게 강력한 결론 문장으로 요약할 수 있을까\n- 문장에서 수식어를 걷어내고 핵심어만 남기는 전략을 활용한다.\n- 더 강렬한 의미를 담은 동사로 교체한다.\n- 동료 피드백을 통해 독자에게 강한 인상을 주는 문장을 확인한다. ### 지문 구조 이해\n\n#### 시간 순서와 논리 흐름 파악\n- 시간 표지어와 연결어를 찾아 글의 흐름을 정리한다.\n- 텍스트 정보를 도표, 마인드맵, 인포그래픽으로 바꾼다.\n\n### 영어 표현\n\n#### 요약과 표현 다듬기\n- 핵심어 중심으로 문장을 압축한다.\n- 강한 동사와 명확한 표현을 사용해 결론 문장을 만든다.\n- 피드백을 반영하여 문장을 고쳐 쓴다. ### 전 계열\n\n#### 관심 분야의 최신 트렌드를 다룬 영문 기사 분석\n- 자신의 관심 전공과 관련된 짧은 영문 칼럼이나 에세이를 선정한다.\n- 핵심 어휘와 논리 구조를 분석한다.\n- 핵심 내용을 인포그래픽이나 마인드맵으로 시각화하여 영어로 설명한다.\n\n### 언어·문학 계열\n\n#### 문학 작품에 나타난 문화적 고유성과 보편적 가치 분석\n- 다양한 문화적 배경을 가진 인물이 등장하는 영문 텍스트를 읽는다.\n- 문화적 갈등 상황을 정리하고 문화적 상대주의 관점에서 분석한다.\n- 우리 사회의 다문화 현상을 바라보는 방식에 대한 영문 에세이를 작성한다. - 외교, 국제기구, NGO, 다국적 기업 취업을 희망하거나 사회 문제 해결에 관심이 있는 학생\n- 자신의 관심 분야를 영어라는 도구로 깊이 있게 탐구하고 싶은 학생\n- 대학 진학 후 전공 서적을 읽거나 해외 논문을 참고해야 하는 학생\n- 프로젝트 수업, 토론, 그룹 과제 등 협동 학습을 통해 영어 결과물을 만들어 내는 것을 즐기는 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과"},{"kind":"course","id":"course_영어Ⅱ","name":"영어Ⅱ","text":"영어Ⅱ 사회생활이나 학업에 필요한 영어 의사소통 능력을 향상하고, 진로 및 전공 분야와 관련된 영어 이해 능력과 표현 능력을 심화하는 과목입니다. 이해와표현 기초학문 영어의사소통 문제해결능력 세부정보파악하기 논리적관계추론하기 글의구조파악하기 서식에맞게글작성하기 고쳐쓰기 적절한쓰기전략적용하기 ### 핵심 학습\n\n#### 이론에서 실제 사례로 전환하는 문장은 무엇일까\n- Bridge Sentence를 찾는다.\n- 포스트잇이나 마인드맵을 활용하여 글의 구조를 시각화한다.\n- 필자가 사용하는 전환 방식인 어조 변화, 질문, 지시어 활용 등을 분류한다.\n\n#### 평범한 보고서를 설득력 있는 연설문으로 어떻게 바꿀 수 있을까\n- 보고서와 연설문의 구조를 분석한다.\n- 보고서에 자주 쓰이는 객관적 수동태 문장을 연설용 능동태 문장으로 고쳐 쓴다.\n- 설득력을 높이는 핵심 수사법을 보고서 내용에 적용한다. ### 글의 구조 분석\n\n#### 전환 문장과 논리 흐름 파악\n- 이론과 사례를 연결하는 문장을 찾는다.\n- 글의 구조를 시각화하고 전환 방식을 분류한다.\n\n### 표현 방식 전환\n\n#### 보고서에서 연설문으로 바꾸기\n- 객관적 보고서의 문장을 발표용 문장으로 고친다.\n- 설득적 표현과 수사법을 적용한다.\n- 발표 상황에 맞는 영어 표현을 연습한다. ### 사회과학 계열\n\n#### 우리 사회의 문제점 분석 및 영어 캠페인 기획\n- 모둠별로 UN 지속가능발전목표(SDGs) 중 하나를 선택한다.\n- 외신에서 해당 주제가 국가별로 어떻게 다루어지는지 관점을 비교한다.\n- 문제 해결을 촉구하는 영어 공익광고 영상을 제작하여 공유한다.\n\n### 기계·전기·전자 계열\n\n#### UAM과 미래 도시 예측하기\n- UAM에 관한 자료를 찾아 읽고 핵심 개념을 구조화한다.\n- 지도를 통해 버티포트 입지를 선정하고 관련 기술을 분석한다.\n- 영어로 미래 도시 설계 보고서를 작성한다. - 영어를 도구로 활용해 깊이 있는 사고를 하고 싶은 학생\n- 대학 진학 후 원서 교재를 읽거나 영어 논문을 참고해야 하는 전공을 희망하는 학생\n- 일상 대화를 넘어 토론, 발표, 보고서 작성 등 비즈니스나 학술 현장에서 쓰이는 격식 있는 영어를 익히고 싶은 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 영어영문학과 통번역학과 국제관계학과 무역·유통학과 호텔·관광경영학과"},{"kind":"course","id":"course_윤리문제_탐구","name":"윤리문제 탐구","text":"윤리문제 탐구 인공지능부터 기후 위기까지 우리 사회의 윤리적 이슈에 대해 주체적으로 탐구 계획을 수립하고 수행하는 과목입니다. 시민의삶 반려동물 인공지능윤리 기후정의 진로연계탐구 가치판단기준 탐구방법 행복 뇌과학 사생활 사회적차별 난민 메타버스 알고리즘 인공지능 동물복지 기후위기 탄소중립 ### 핵심 학습\n\n#### 도덕적 문제들에 어떤 기준으로 답해야 할까\n- 윤리문제의 의미와 가치 판단 기준의 다양성을 이해한다.\n- 윤리문제 탐구의 중요성과 탐구 방법을 이해한다.\n\n#### 개인의 삶과 공동체 이익 사이의 균형점은 어디일까\n- 행복한 삶을 위한 윤리의 필요성을 정당화한다.\n- 사생활 보호와 공익 간의 갈등 사례를 조사한다.\n- 사회적 차별 사례와 난민 문제를 조사하고 해결 방안을 토론한다.\n\n#### 알고리즘의 추천은 항상 공정할까\n- 메타버스에 관한 다양한 관점을 분석한다.\n- 빅데이터와 알고리즘 관련 문제 사례를 조사한다.\n- 인공지능 활용의 윤리적 딜레마를 토론한다.\n\n#### 우리는 반려동물의 주인일까, 동반자일까\n- 반려동물과 동물 복지를 둘러싼 논쟁을 성찰한다.\n- 기후 위기와 인류의 책임을 분석한다.\n- 에너지 전환과 탄소 중립을 둘러싼 논쟁을 탐구한다.\n\n#### 나의 진로와 연결된 윤리적 쟁점은 무엇일까\n- 진로와 연계된 윤리문제를 선정한다.\n- 탐구 계획을 수립하고 발표한다. ### 윤리 쟁점 분석\n\n#### 현대 사회의 윤리문제 탐구\n- 사생활, 차별, 난민, 인공지능, 기후 위기 등 윤리적 쟁점을 조사한다.\n- 다양한 가치 기준에 따라 문제를 분석한다.\n\n### 토론과 의사결정\n\n#### 근거 있는 판단 만들기\n- 쟁점에 대한 찬반 논거를 정리한다.\n- 윤리적 판단 기준을 세워 해결 방안을 토론한다.\n\n### 진로 연계 탐구\n\n#### 나의 관심 분야와 윤리문제 연결\n- 희망 진로와 관련된 윤리적 문제를 선정한다.\n- 탐구 계획을 세우고 결과를 발표한다. ### 인문·사회 계열\n\n#### 디지털 잊힐 권리와 사생활 보호의 윤리적 쟁점 탐구\n- 개인의 정보 주권과 공공의 알 권리가 충돌하는 사례를 분석한다.\n- 특정 디지털 기록의 삭제 여부를 논리적 근거로 결정하는 온라인 게시물 심의 의견서를 작성한다.\n\n### 사회 계열\n\n#### 반려동물의 법적 지위와 성숙한 반려 문화 탐구\n- 동물을 물건으로 규정하는 법의 한계를 분석한다.\n- 동물을 생명으로 존중하기 위한 법적 변화를 조사한다.\n- 반려인과 비반려인이 공존할 수 있는 우리 동네 맞춤형 정책을 제안한다.\n\n### 자연·공학 계열\n\n#### 인공지능 알고리즘의 편향성 분석과 공정성 확보 방안\n- 인공지능이 특정 집단을 차별한 사례를 조사한다.\n- 기술이 편향성을 가질 수 있는 원인을 탐구한다.\n- 인공지능의 공정성을 높이기 위한 개발자 윤리 가이드라인을 제안한다. - 희망 진로와 연계된 윤리적 문제를 직접 선정하여 자기 주도적으로 탐구하고 싶은 학생\n- 인공지능, 기후 위기 등 현대 사회의 다양한 윤리적 쟁점과 해결 방안에 관심이 많은 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_윤리와_사상","name":"윤리와 사상","text":"윤리와 사상 동서양 윤리 사상과 사회사상의 지혜를 바탕으로 자신의 삶의 기준을 세우고 세상을 보는 안목을 넓혀 가는 과목입니다. 인간본성 수양방법 행복과 의무와결과 국가 무위자연 자비 마음의 조화 도덕적감정 도덕적실천 행복 신앙 의무론 결과론 주체성 자유 공동선 ### 핵심 학습\n\n#### 사람은 태어날 때부터 선할까, 이기적일까\n- 유교의 다양한 인성론을 비교한다.\n- 도가 사상을 통해 현대사회의 갈등과 경쟁을 성찰한다.\n- 불교 사상을 일상의 고통 공감과 치유에 적용한다.\n\n#### 내 마음의 감정을 다스리고 아는 것을 행동으로 옮기려면 어떻게 해야 할까\n- 한국 불교의 통합 정신을 통해 사회 갈등의 대안을 모색한다.\n- 퇴계와 율곡의 사상으로 일상의 감정을 조절하는 방법을 생각한다.\n- 지행합일 정신을 통해 구체적 윤리 실천 방안을 수립한다.\n- 고대부터 근대까지의 행복론을 비교하여 자신의 행복관을 세운다.\n\n#### 다수의 행복을 위해 소수가 희생되는 것은 정당할까\n- 의무론과 결과론의 관점에서 윤리적 문제를 탐색한다.\n- 실존주의, 책임 윤리, 배려 윤리를 통해 삶의 목적을 설정한다.\n\n#### 국가는 왜 필요하며, 시민은 어떤 역할을 해야 할까\n- 다양한 국가관을 비교하여 국가의 바람직한 역할을 토론한다.\n- 개인의 자유와 공동선의 조화 방안을 모색한다.\n- 민주주의의 이상과 자본주의의 현실적 개선을 위한 민주시민의 역할을 탐구한다. ### 사상 비교\n\n#### 동서양 윤리 사상 탐구\n- 유교, 불교, 도가, 서양 윤리 이론의 관점을 비교한다.\n- 각 사상이 인간관, 행복관, 사회관을 어떻게 설명하는지 정리한다.\n\n### 현대 사회 적용\n\n#### 갈등과 공동체 문제 해석\n- 현대사회의 갈등, 경쟁, 양극화 문제를 윤리 사상과 연결해 해석한다.\n- 공동선과 개인의 자유가 조화를 이룰 수 있는 방안을 토론한다.\n\n### 자기 성찰\n\n#### 삶의 기준 세우기\n- 여러 사상의 관점을 바탕으로 자신의 행복관과 윤리적 기준을 정리한다.\n- 구체적인 윤리 실천 방안을 수립한다. ### 인문 계열\n\n#### 동서양 인성론을 통한 문학·영화 속 인물의 내면 분석\n- 인성론을 바탕으로 소설이나 영화 속 인물의 도덕적 갈등 상황을 분석한다.\n- 사상가의 수양론을 활용하여 주인공의 선택을 재해석하고 도덕적 성장 방안을 모색한다.\n\n### 사회 계열\n\n#### 화쟁 사상을 통한 양극화 해소 방안 모색\n- 원효의 화쟁 사상을 통해 우리 사회의 이념적·경제적 양극화 현상의 원인을 분석한다.\n- 서로 다른 집단 간의 갈등을 해소하고 상생을 돕는 소통 원칙을 제시한다.\n\n### 자연·공학 계열\n\n#### 서양 윤리 이론으로 본 신기술 연구의 정당성\n- 의무론과 공리주의의 관점에서 과학 기술 발전이 인간의 존엄성과 사회적 행복에 미치는 영향을 분석한다.\n- 적정 기술 등 기술 속에 담긴 윤리적 가치를 성찰하여 발표한다. - 동서양 윤리 사상에 대한 이론적 탐구에 관심이 있으며, 인문학적 소양을 쌓고 싶은 학생\n- 민주주의와 자본주의 등 우리 사회를 지탱하는 사상적 토대를 탐구하고 싶은 학생\n- 자신의 삶의 기준과 사회를 바라보는 관점을 세우고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_융합과학_탐구","name":"융합과학 탐구","text":"융합과학 탐구 빅데이터, 인공지능, 모의실험 같은 디지털 탐구 도구를 활용해 사회와 일상 속 과학 문제를 융합적으로 해결해 보는 과목입니다. 융합과학 디지털 탐구 도구 데이터 빅데이터 인공지능 모의실험 문제 발견 가설 설정 데이터 시각화 윤리 시민 참여 ### 핵심 학습\n\n#### 융합과학 탐구는 왜 필요할까\n- 현대 사회의 문제는 한 과목만으로 해결하기 어려움을 이해한다.\n- 과학기술이 인류의 문제를 해결해 온 사례를 살펴보며 융합과학의 필요성을 이해한다.\n- 인류의 문제를 해결한 과학기술을 조사한다.\n- 우리 주변의 데이터를 찾아본다.\n- 디지털 도구로 가정의 전력량을 계산한다.\n\n#### 데이터를 활용해 탐구를 어떻게 설계할까\n- 융합 탐구가 문제 발견, 가설 설정, 데이터 수집, 분석 과정으로 이루어짐을 이해한다.\n- 미세먼지 관련 가설을 설정한다.\n- 공개 데이터셋으로 자료를 수집한다.\n- 데이터를 시각화하고 분석한다.\n- 인공지능으로 미세먼지 농도를 예측한다.\n\n#### 미래 문제를 어떻게 해결할까\n- 식량자원 부족, 대기오염, 기후 위기 같은 난제를 과학, 기술, 사회, 윤리의 연결 속에서 바라본다.\n- 새로운 융합과학 기술을 조사한다.\n- 식량자원 부족과 대기오염 해결 기술을 고안한다.\n- 기술 발달로 발생할 수 있는 윤리 쟁점을 토론한다. ### 데이터 기반 탐구\n\n#### 공개 데이터 활용\n- 공개 데이터를 찾는다.\n- 데이터를 정리하고 시각화한다.\n- 가설을 검증하고 결과를 해석한다.\n\n### 디지털 도구 활용\n\n#### 인공지능과 모의실험\n- 인공지능 예측 모델을 사용한다.\n- 모의실험으로 결과를 비교한다.\n- 전력량 계산과 생활 데이터 분석을 수행한다.\n\n### 융합 문제 해결\n\n#### 과학기술과 사회문제 연결\n- 과학기술과 사회문제를 연결한다.\n- 윤리적 쟁점을 토론한다.\n- 시민 참여형 해결 방안을 제안한다. ### 자연 계열\n\n#### 생활 속 미세먼지 데이터 활용 탐구\n- 서울 열린데이터광장 자료를 정리한다.\n- 구역별·시간대별 미세먼지 농도를 비교한다.\n- 사용자 위치 기반 건강 수칙 안내 서비스를 기획한다.\n\n### 공학 계열\n\n#### 건강한 생활을 돕는 과학기술 소개\n- 인공지능, 정보통신, 사물인터넷, 빅데이터 중 한 주제를 선정한다.\n- 건강한 삶에 기여하는 원리를 조사한다.\n- 다양한 표현 방법으로 알기 쉽게 발표한다. - 과학, 기술, 데이터, 사회문제를 함께 연결해 보고 싶은 학생\n- 일상생활 속 문제를 창의적으로 해결하는 활동을 좋아하는 학생\n- 빅데이터와 인공지능을 과학 탐구에 활용해 보고 싶은 학생\n- 융합적 사고와 탐구 능력을 기르고 싶은 학생 빅데이터학과 인공지능학과 컴퓨터공학과 환경공학과 기후·환경 관련 학과 산업공학과 보건행정학과 생명공학과 에너지자원공학과 도시공학과"},{"kind":"course","id":"course_음악_감상과_비평","name":"음악 감상과 비평","text":"음악 감상과 비평 영화, 드라마, 공연, 대중음악 등 다양한 음악을 듣고, 음악의 특징을 분석하고 비평하면서 음악을 향유하는 안목을 기르는 과목입니다. 깊이듣기 음악감상 음악비평 시대와문화 음악과삶 취향과소통 음악요소 구성과원리 음악취향 음악의의미 사회문화맥락 비평적사고 토의토론 생활속음악 ### 핵심 학습\n\n#### 같은 음악을 들어도 사람마다 느낌이 다른 이유는 무엇일까\n- 음악 요소와 구성 원리를 바탕으로 다양한 음악의 특징을 파악한다.\n- 시대, 지역, 사회, 문화에 따라 음악이 변화하는 과정을 이해한다.\n- 음악을 듣고 언어, 움직임, 이미지 등으로 표현하며 서로의 감상과 취향을 나눈다.\n\n#### 음악은 우리 삶과 사회에서 어떤 역할을 할까\n- 음악의 사회·문화적 의미와 음악적 특징을 함께 살펴본다.\n- 사회, 문화, 산업 속에서 음악이 수행하는 역할을 사례로 이해한다.\n- 생활 속 음악의 가치와 활용 방법을 탐색한다.\n\n#### 음악의 예술적 가치는 어떻게 판단할 수 있을까\n- 음악 작품을 여러 관점에서 감상하고 비평한다.\n- 음악의 표현 방식, 사회적 맥락, 예술적 효과를 근거로 자신의 평가를 구성한다.\n- 음악 비평문이나 감상문을 작성하며 음악을 깊이 있게 향유하는 태도를 기른다. ### 감상과 분석\n\n#### 음악 요소 분석\n- 선율, 리듬, 화성, 음색 등 음악 요소를 중심으로 작품의 특징을 분석한다.\n- 같은 곡을 서로 다른 연주나 편곡으로 감상하고 표현 차이를 비교한다.\n\n#### 사회·문화적 맥락 이해\n- 시대와 지역, 사회 분위기에 따라 음악이 달라지는 양상을 조사한다.\n- 영화, 드라마, 공연, 대중음악 속 음악의 역할을 사례로 정리한다.\n\n### 비평과 표현\n\n#### 음악 비평문 작성\n- 감상한 음악의 특징과 가치를 근거를 들어 설명한다.\n- 자신의 취향과 감상 경험을 바탕으로 음악 리뷰나 비평문을 작성한다.\n\n#### 감상 결과 공유\n- 음악을 언어, 이미지, 움직임 등 다양한 방식으로 표현한다.\n- 친구들과 감상 결과를 공유하고 서로의 해석 차이를 비교한다. ### 인문·예술 계열\n\n#### 낭만주의 시대 문학과 서양 음악의 상호작용 분석\n- 괴테, 쉴러 등의 문학 작품이 낭만주의 가곡에 미친 영향을 탐색한다.\n- 악곡의 가사, 선율, 반주에 나타난 특징을 다양한 관점에서 분석한다.\n- 문학과 음악의 융합이 지니는 예술적 가치에 대해 비평문을 작성한다.\n\n### 사회·상경 계열\n\n#### 대중음악 트렌드 변화와 현대 대중문화 산업 분석\n- K-pop 등 특정 대중음악 장르의 시대별 변화와 발전 양상을 파악한다.\n- 대중음악 유행에 따른 팬덤 문화와 경제적 파급력을 분석한다.\n- 음악 산업의 지속 가능한 발전을 위한 비평적 보고서를 작성하고 발표한다.\n\n### 자연·공학 계열\n\n#### 음향 공간의 건축 구조와 음악 감상 효과 분석\n- 실제 공연장의 건축 구조와 잔향 시간 등 음향학적 데이터를 수집한다.\n- 동일한 악곡을 서로 다른 음향 환경에서 들었을 때의 차이를 분석한다.\n- 최적의 음악 감상을 위한 공간 설계 아이디어를 도출하고 제안서를 작성한다. - 여러 장르의 숨은 명곡을 찾아 들으며 음악적 취향을 넓히고 깊이 있게 감상하고 싶은 학생\n- 음악이 사회에 미치는 영향을 탐구하고, 자신의 시선이 담긴 음악 리뷰를 써보고 싶은 학생\n- 음악을 인문, 사회, 예술 등 다양한 분야와 연결해 폭넓게 공부하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 디자인과 연극영화학과 영상학과 음악교육과 미술교육과"},{"kind":"course","id":"course_음악_연주와_창작","name":"음악 연주와 창작","text":"음악 연주와 창작 악기나 목소리로 곡을 직접 표현하고, 자신의 아이디어를 살린 새로운 음악을 만들어 무대나 발표로 완성해 보는 과목입니다. 연주해석 음악창작 공연기획 협업과소통 공연예절 음악윤리 융합활동 음악적해석 음악비평 공동체참여 융합과협업 ### 핵심 학습\n\n#### 나의 감정과 아이디어를 어떻게 음악으로 표현할까\n- 다양한 악곡을 자신의 해석을 담아 개성 있게 연주한다.\n- 악기, 목소리, 디지털 매체 등 적절한 표현 수단을 선택해 음악을 만든다.\n- 음악적 해석과 창작 과정을 통해 자신의 감정과 생각을 표현한다.\n\n#### 새로운 음악은 어떻게 창작할 수 있을까\n- 적합한 기보법과 매체를 활용하여 음악 아이디어를 구체화한다.\n- 소리, 리듬, 선율, 구조를 조합하여 새로운 음악을 창작한다.\n- 창작한 음악을 발표하고 수정하며 완성도를 높인다.\n\n#### 음악은 사람들과 사회를 연결하는 힘이 될 수 있을까\n- 음악의 사회적 역할을 분석하고 공동체에 기여하는 음악 활동을 기획한다.\n- 공연 윤리와 예절을 바탕으로 협동 연주나 발표를 준비한다.\n- 타 분야와의 융합 연주를 통해 배려, 소통, 협업 능력을 기른다. ### 연주와 표현\n\n#### 개성 있는 연주\n- 악곡의 분위기와 구조를 이해하고 자신의 해석을 담아 연주한다.\n- 연주 과정에서 음색, 빠르기, 셈여림 등을 조절하며 표현력을 높인다.\n\n#### 합주와 소통\n- 친구들과 역할을 나누어 합주나 공동 연주를 준비한다.\n- 공연 예절과 협동 태도를 바탕으로 발표를 진행한다.\n\n### 창작과 공연 기획\n\n#### 음악 창작\n- 선율, 리듬, 가사, 디지털 도구 등을 활용해 짧은 음악 작품을 만든다.\n- 창 화 `인터스텔라`의 특정 장면에 활용된 배경음악의 역할과 기능을 분석한다.\n- 디지털 도구를 활용하여 해당 장면에 어울리는 배경음악을 창작한다.\n- 원곡과 창작곡의 서사적 효과 차이를 비교하는 비평문을 작성한다.\n\n### 사회·상경 계열\n\n#### 인공지능 커버곡의 저작권 쟁점 분석 및 가이드라인 제안\n- 유튜브 등에서 유행하는 AI 커버곡의 수익 창출 사례를 탐색한다.\n- AI 학습용 데이터와 저작권 침해 판례를 조사한다.\n- 안전하고 공정한 AI 커버곡 활용 가이드라인을 제작해 발표한다.\n\n### 자연·공학 계열\n\n#### 오다시티와 AI를 활용한 사운드 디자인 및 오디오 클립 제작\n- 오다시티를 활용해 생활 속 소리를 녹음하고 파동 데이터를 분석한다.\n- 오디오 이펙트 기능을 적용하여 자신만의 사운드를 디자인한다.\n- 완성된 사운드에 AI 프로그램을 융합하여 오디오 클립을 제작한다. - 디지털 기기와 소프트웨어를 활용하여 음악을 직접 만들고 다듬어 보고 싶은 학생\n- 음악을 다른 분야와 연결해 새로운 콘텐츠 아이디어로 확장해 보고 싶은 학생\n- 인공지능 등 최신 기술이 결합된 음악·미디어 콘텐츠에 관심 있는 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 디자인과 연극영화학과 영상학과 음악교육과 미술교육과"},{"kind":"course","id":"course_인간과_심리","name":"인간과 심리","text":"인간과 심리 마음과 행동을 과학적으로 이해하고, 자신과 타인을 더 잘 이해하며 건강하고 행복한 삶을 설계해 보는 과목입니다. 과학적 탐구 심리학 연구 방법 뇌 자기효능감 성격 동기 정서 집단 사회적 영향 회복탄력성 스트레스 정신건강 행복 ### 핵심 학습\n\n#### 마음을 어떻게 과학적으로 탐구할까\n- 심리학은 성격 테스트가 아니라 연구 방법과 과학적 근거를 통해 마음과 행동을 분석하는 학문임을 이해한다.\n- 심리학 연구 방법과 연구 윤리를 살펴본다.\n- 과학적 근거를 바탕으로 마음의 원리를 분석하고, 심리 관련 진로를 탐색한다.\n\n#### 나는 어떤 사람일까\n- 행동의 생물학적 기초를 이해한다.\n- 발달 과정에서 자신의 경험을 성찰한다.\n- 성격, 동기, 정서가 행동에 미치는 영향을 살펴본다.\n- 실생활에 심리학 개념을 적용해 자기 이해를 넓힌다.\n\n#### 타인과 집단 속에서 우리는 왜 달라질까\n- 사람은 혼자 있을 때와 집단 속에 있을 때 다르게 행동할 수 있음을 이해한다.\n- 사회적 영향, 집단, 관계, 사회인지 개념을 통해 인간을 사회적 존재로 바라본다.\n- 사회문제의 원인을 분석하고 해결 방안을 도출한다.\n- 공동체 의식의 토대가 되는 다양한 관계를 수용한다.\n\n#### 건강하고 행복한 삶은 어떻게 만들까\n- 스트레스, 정신 건강, 부적응, 사회적 낙인 문제를 이해한다.\n- 스트레스와 정신 건강 문제의 해결 방안을 탐색한다.\n- 행복한 삶을 설계하기 위한 실천 계획을 세운다. ### 자기 탐구\n\n#### 자기 이해 활동\n- 자신의 발달 경험을 성찰한다.\n- 성격, 동기, 정서가 행동에 미치는 영향을 분석한다.\n- 자기효능감과 회복탄력성을 이해한다.\n\n### 사회 문제 분석\n\n#### 집단과 관계 탐구\n- 집단 속 행동 변화를 관찰한다.\n- 사회적 영향과 동조 현상을 분석한다.\n- 공동체 관계와 사회문제 해결 방안을 탐색한다.\n\n### 과학적 연구\n\n#### 연구 방법과 윤리\n- 심리학 연구 방법을 살펴본다.\n- 설문조사와 통계 분석을 경험한다.\n- 심리학 연구윤리의 필요성을 생각한다.\n\n### 삶의 설계\n\n#### 정신 건강과 행복\n- 스트레스 관리 전략을 탐색한다.\n- 정신 건강 문제와 낙인 해소 방안을 생각한다.\n- 행복한 삶을 위한 실천 계획을 세운다. ### 인문 계열\n\n#### 회복탄력성의 작동 원리 탐구\n- 회복탄력성의 개념을 이해한다.\n- 스트레스 상황에서 심리적 보호 요인을 조사한다.\n- 실패 원인 해석에 대한 설문을 실시한다.\n- 회복 속도의 차이를 통계적으로 분석해 발표한다.\n\n### 사회 계열\n\n#### 디지털 군중 심리와 비판적 사고 탐구\n- SNS 댓글 여론이 개인에게 미치는 사회적 영향을 분석한다.\n- 군중 심리에 휩쓸리지 않는 방안을 탐구한다.\n- 동조와 복종 실험을 참고해 집단 사고의 위험성을 분석한다.\n- 집단 사고 방지 대안을 제안한다.\n\n### 의학·보건 계열\n\n#### 정신 건강과 낙인 해소 탐구\n- 우울증과 불안장애의 생물학적 원인을 조사한다.\n- 낙인이 치료 예후와 재발률에 미치는 영향을 분석한다.\n- 정신 건강 문제에 대한 치료 환경 개선 방안을 제안한다. - 심리학에 호기심이 많은 학생\n- 인간의 마음과 행동 뒤에 숨은 원리를 과학적으로 탐구하고 싶은 학생\n- 자신과 타인을 더 잘 이해하고 싶은 학생\n- 몸과 마음이 모두 건강한 삶을 설계하고 싶은 학생\n- 상담, 교육, 보건, 사회문제, 미디어, 조직 분야에 관심이 있는 학생 심리학과 상담심리학과 교육학과 사회복지학과 간호학과 의예과 보건학과 사회학과 미디어학과 커뮤니케이션학과 아동학과 체육학과"},{"kind":"course","id":"course_인공지능_기초","name":"인공지능 기초","text":"인공지능 기초 인공지능이 문제를 이해하고 데이터를 학습해 판단하는 과정을 배우고, 생활 속 문제를 AI 프로젝트로 해결해 보는 과목입니다. 인공지능 기계학습 데이터와 모델 탐색 지식 표현 추론 데이터 전처리 모델 학습 성능 평가 인공지능 윤리 SDGs ### 핵심 학습\n\n#### 인공지능은 문제를 어떻게 이해할까\n- 인공지능이 문제를 구조화하고 가능한 해결 경로를 탐색하는 방식을 이해한다.\n- 지식 표현과 추론, 지능 에이전트의 역할을 사례로 살펴본다.\n- 문제를 상태, 조건, 목표로 나누어 인공지능의 해결 방식과 연결한다.\n\n#### 기계학습은 데이터를 어떻게 배울까\n- 기계학습을 데이터 수집, 전처리, 모델 선택, 학습, 평가, 개선의 문제 해결 절차로 이해한다.\n- 기계학습으로 해결할 문제를 정의한다.\n- 문제에 맞는 기계학습 유형과 모델을 선택한다.\n- 모델 결과를 평가하고 개선 방향을 탐색한다.\n\n#### 인공지능은 사회와 진로를 어떻게 바꿀까\n- 인공지능이 사회와 직업 세계에 미치는 변화를 탐색한다.\n- 관심 분야의 진로와 인공지능 기술을 연결해 본다.\n- 편향, 개인정보, 책임, 공정성 등 인공지능 윤리 쟁점을 분석한다.\n\n#### 인공지능으로 어떤 문제를 해결할 수 있을까\n- SDGs와 연결해 해결할 문제를 정의한다.\n- 인공지능 프로젝트 계획을 세운다.\n- 데이터와 모델을 활용해 문제 해결 과정을 수행한다.\n- 프로젝트 결과와 성능을 평가한다. ### 문제 구조화\n\n#### 인공지능의 문제 해결 방식 이해\n- 문제를 상태, 조건, 목표로 나눈다.\n- 탐색과 추론 사례를 분석한다.\n- 지능 에이전트의 역할을 이해한다.\n\n### 데이터와 모델\n\n#### 기계학습 프로젝트 수행\n- 데이터를 수집하고 전처리한다.\n- 문제에 맞는 모델을 선택한다.\n- 모델 결과를 평가하고 개선한다.\n\n### 사회와 윤리 탐구\n\n#### AI 활용 기준 세우기\n- 인공지능이 직업 세계에 미치는 변화를 조사한다.\n- 편향, 공정성, 책임 문제를 토론한다.\n- 책임 있는 AI 활용 기준을 정리한다.\n\n### 프로젝트 수행\n\n#### SDGs 기반 문제 해결\n- SDGs와 연결해 문제를 정의한다.\n- AI 프로젝트 계획을 세운다.\n- 모델을 활용해 문제를 해결하고 결과를 발표한다. ### 인문·사회·경영 계열\n\n#### AI 추천 시스템의 편향성과 공정성 탐구\n- 유튜브, 쇼핑, 뉴스 추천 결과를 비교한다.\n- 검색 기록과 이용 방식이 추천 결과에 주는 영향을 분석한다.\n- 추천 결과에 영향을 주는 데이터와 편향 요소를 정리한다.\n- 공정한 추천 기준과 개선 방안을 카드뉴스나 발표자료로 만든다.\n\n### 예술·체육 계열\n\n#### 동작 이미지 데이터를 활용한 자세 분류 모델 제작\n- 스쿼트, 점프슛 등 자세 이미지 데이터를 수집한다.\n- 자세 유형별로 데이터를 분류한다.\n- 티처블머신 등으로 자세 분류 모델을 학습하고 테스트한다.\n- 분석 결과를 바탕으로 자세 교정 피드백을 제안한다. - 인공지능이 어떻게 학습하고 판단하는지 직접 이해하고 싶은 학생\n- 생활 속 문제를 데이터와 모델로 해결해 보고 싶은 학생\n- AI가 사회와 직업 세계에 미치는 영향을 진로와 연결해 보고 싶은 학생\n- 프로젝트형 활동을 통해 문제 정의, 모델 학습, 성능 평가까지 경험해 보고 싶은 학생\n- 기술의 편리함뿐 아니라 공정성과 윤리 문제도 함께 고민하고 싶은 학생 컴퓨터공학과 인공지능학과 소프트웨어학과 빅데이터학과 정보보안학과 경영학과 경제학과 미디어학과 산업공학과 스포츠과학과 로봇공학과 통계학과"},{"kind":"course","id":"course_인공지능_수학","name":"인공지능 수학","text":"인공지능 수학 인공지능이 데이터를 배우고 판단하는 과정을 행렬, 벡터, 확률, 미분 같은 수학적 도구로 이해하는 과목입니다. 인공지능 빅데이터 기계학습 데이터 편향성 집합 벡터 행렬 RGB 추세선 손실함수 경사하강법 최적화 의사결정윤리 ### 핵심 학습\n\n#### 인공지능은 어떻게 학습할까\n- 인공지능이 데이터를 이용해 패턴을 찾고 판단하는 과정을 이해한다.\n- 지도 학습, 비지도 학습, 강화 학습의 차이를 비교한다.\n- 데이터가 편향되면 인공지능의 판단도 불공정해질 수 있음을 탐구한다.\n\n#### 데이터를 숫자로 바꾸는 방법은 무엇일까\n- 인공지능이 텍스트나 이미지를 처리하려면 데이터를 숫자로 표현해야 함을 이해한다.\n- 집합과 벡터를 이용해 텍스트 데이터를 표현한다.\n- 행렬 연산으로 이미지 변환과 자동 분류의 기초 원리를 이해한다.\n\n#### 예측 모델은 어떻게 좋아질까\n- 확률과 추세선을 활용해 데이터의 경향을 예측한다.\n- 손실함수의 의미를 이해한다.\n- 경사하강법을 통해 예측 모델이 개선되는 과정을 살펴본다.\n\n#### 인공지능을 어떻게 책임 있게 사용할까\n- 수학적 원리로 실생활 문제를 해결한 사례를 탐색한다.\n- 인공지능 결과의 공정성을 검토한다.\n- 책임 있는 인공지능 활용을 위한 윤리 기준을 세운다. ### 데이터 표현\n\n#### 텍스트와 이미지의 수학적 표현\n- 텍스트 데이터를 집합과 벡터로 표현한다.\n- 이미지 픽셀 데이터를 행렬로 나타낸다.\n- RGB 정보를 이용해 이미지 처리 원리를 이해한다.\n\n### 예측과 모델링\n\n#### 모델 개선 과정 이해\n- 확률과 추세선을 활용해 미래 값을 예측한다.\n- 손실함수로 예측 오차를 이해한다.\n- 경사하강법으로 모델이 개선되는 과정을 살펴본다.\n\n### 탐구와 토론\n\n#### 공정한 인공지능 활용\n- 인공지능의 역사적 사례를 조사한다.\n- 데이터 편향성과 공정성 문제를 토론한다.\n- 인공지능 윤리 선언문이나 가이드라인을 만든다. ### 공학 계열\n\n#### 행렬 연산을 이용한 이미지 필터와 분류 알고리즘 탐구\n- 이미지 픽셀 데이터를 행렬로 변환한다.\n- 행렬 곱셈을 통해 인공신경망의 이미지 인식 원리를 탐구한다.\n- 자율주행차나 스마트 CCTV에 쓰이는 사물 분류 모델의 기초 프로그래밍을 수행한다.\n\n### 사회·상경 계열\n\n#### 데이터 편향성 분석과 공정한 AI 채용 가이드라인 제작\n- AI 결과물에서 차별적 요소를 수집한다.\n- 집단 간 빈도수와 상대도수를 비교한다.\n- 알고리즘 편향성을 수학적으로 검증한다.\n- 공정한 AI 채용 가이드라인과 윤리 선언문을 제작한다. - 인공지능, 로봇, 자율주행 같은 첨단 기술에 관심이 있는 학생\n- 데이터를 숫자로 표현하고 분석하는 과정이 흥미로운 학생\n- 수학을 실제 기술과 사회 문제에 연결해 보고 싶은 학생\n- 논리적 근거를 바탕으로 합리적인 의사결정을 해 보는 것을 좋아하는 학생 컴퓨터공학과 인공지능학과 통계학과 수학과 빅데이터학과 소프트웨어학과 전자공학과 로봇공학과 경영학과 경제학과 산업공학과 정보보안학과"},{"kind":"course","id":"course_인문학과_윤리","name":"인문학과 윤리","text":"인문학과 윤리 동서양 고전을 통해 나를 깊이 있게 이해하고, 우정과 사랑, 정의 등 우리 삶에 꼭 필요한 가치들의 의미를 찾아가는 과목입니다. 자아성찰 우정 사랑 자유 정의 다양성과포용 공존과지속가능성 몸과마음의관계 고통과쾌락 진정한우정 참된사랑 정신적자유 정의로운사회 사상의자유 가상세계와현실 자아실현과직업 기후위기와상생 종교와윤리 ### 핵심 학습\n\n#### 즐거운 것만 좇으면 정말 행복할까\n- 『격몽요결』을 통해 몸과 마음의 관계를 탐구한다.\n- 『쾌락』을 통해 내면의 평온에 이르는 과정을 탐구한다.\n\n#### 관계 맺기는 왜 어려울까\n- 『금강경』을 통해 관계 속에서 나의 의미를 성찰한다.\n- 『논어』를 통해 존재와 삶의 관계적 양상을 자각한다.\n\n#### 능력에 따른 차등은 항상 정당할까\n- 『장자』를 통해 자유와 평등의 의미를 탐구한다.\n- 『정의론』을 통해 정의로운 사회적 조건을 생각한다.\n\n#### 나와 다른 의견을 어디까지 포용할 수 있을까\n- 『자유론』을 통해 다양한 의견을 포용하는 태도를 탐색한다.\n- 『스노 크래시』를 통해 가상 세계와 인간 삶의 문제를 살펴본다.\n\n#### 우리의 편리함이 자연을 침묵하게 만들지는 않을까\n- 『목민심서』를 통해 현대인의 삶의 방식을 성찰한다.\n- 『침묵의 봄』을 통해 기후 위기 문제의 근본 원인을 탐구한다.\n- 자아실현, 직업, 기후 위기, 상생의 문제를 윤리적으로 연결해 생각한다. ### 고전 읽기와 해석\n\n#### 고전 속 질문 찾기\n- 동서양 고전의 핵심 구절을 읽고 주요 질문을 정리한다.\n- 고전 속 개념을 오늘날의 삶과 연결해 해석한다.\n\n### 가치 탐구와 토론\n\n#### 삶의 가치 토론\n- 행복, 관계, 자유, 정의, 포용, 공존의 의미를 사례와 함께 토론한다.\n- 서로 다른 견해를 비교하며 자신의 윤리적 입장을 구성한다.\n\n### 성찰과 표현\n\n#### 윤리적 글쓰기\n- 고전의 관점을 활용해 현대 사회 문제를 분석한다.\n- 자신의 삶과 진로에 연결되는 윤리적 성찰문을 작성한다. ### 인문 계열\n\n#### 『논어』로 본 사회적 고립 문제와 공동체 윤리\n- 현대 사회의 고립 문제를 공자의 사상으로 분석한다.\n- 소통 방법을 탐구한다.\n- 공동체 의식 회복을 위해 인의 가치를 담은 이웃 연결 캠페인을 기획한다.\n\n### 사회·보건 계열\n\n#### 에피쿠로스의 쾌락과 현대인의 도파민 추구 현상 탐구\n- 에피쿠로스의 관점에서 자극적인 즐거움을 좇는 현대인의 도파민 추구 현상을 분석한다.\n- 내면의 평온인 아타락시아를 회복하기 위한 실천적 방법을 제안한다.\n\n### 생명·환경 계열\n\n#### 『침묵의 봄』으로 본 환경 위기와 생태 윤리\n- 인간 중심적 사고에 따른 생태계 파괴 현상을 진단한다.\n- 자연을 도구가 아닌 동반자로 대우하는 방안을 모색한다.\n- 주변의 생물 다양성 위기 사례를 조사하고, 생명 존중의 가치를 담은 지역 맞춤형 생태계 복원 프로젝트를 기획한다. - “나는 누구이며 어떻게 살아야 할까?”라는 근원적인 질문에 대한 답을 찾고 싶은 학생\n- 동서양 고전을 읽는 즐거움을 느끼며 고전 속 구절을 통해 삶의 지혜를 발견하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과 문헌정보학과 미디어학과 교육학과 영어영문학과 통번역학과"},{"kind":"course","id":"course_전자기와_양자","name":"전자기와 양자","text":"전자기와 양자 스마트폰 속 반도체부터 양자 컴퓨터까지, 보이지 않는 미시 세계의 법칙을 바탕으로 현대 문명과 미래 기술을 이해하는 물리 탐구 과목입니다. 반도체소자 전자기유도 광전효과 양자역학 불확정성원리 로런츠힘 간섭과회절 레이저 입자파동이중성 양자기술 ### 핵심 학습\n\n#### 전하와 자석은 어떻게 상호작용하며 현대 문명을 움직일까\n- 로런츠 힘을 활용한 기술을 탐구한다.\n- 트랜지스터 등 반도체 소자의 회로를 분석한다.\n- 전자기 현상이 현대 전기·전자 기술과 연결되는 방식을 이해한다.\n\n#### 빛의 기묘한 성질은 어떻게 디지털 정보를 전달할까\n- 홀로그램 등 정밀 기술을 빛의 간섭과 회절로 설명한다.\n- 광전효과와 레이저 원리를 통해 디지털 영상 정보와 광통신 기술의 활용 사례를 조사한다.\n\n#### 눈에 보이지 않는 미시 세계는 어떤 법칙을 따를까\n- 입자-파동 이중성과 확률 파동을 해석한다.\n- 터널 효과와 불확정성 원리를 통해 세계관의 변화를 인식한다.\n- 양자 컴퓨터와 양자 암호 통신 등 미래 사회 변화를 탐색한다.\n- 별의 빛 방출 원리를 핵융합과 연결해 설명한다. ### 전자기 현상 분석\n\n#### 전하와 자기장의 상호작용\n- 전기장과 자기장 속에서 전하가 받는 힘을 사례로 이해한다.\n- 로런츠 힘과 전자기 유도 현상이 활용되는 기술을 조사한다.\n\n### 빛과 정보 기술\n\n#### 파동과 광학 기술\n- 간섭, 회절, 편광 등 빛의 성질을 실험이나 자료로 분석한다.\n- 광전효과, 레이저, 광통신 기술을 현대 정보 기술과 연결한다.\n\n### 양자 세계 탐구\n\n#### 미시 세계와 미래 기술\n- 입자-파동 이중성, 터널 효과, 불확정성 원리를 사례와 연결한다.\n- 양자 컴퓨터와 양자 암호 통신의 기본 원리를 조사한다. ### 반도체·전자 공학 계열\n\n#### 트랜지스터를 활용한 신호 증폭 및 스피커 제작\n- 트랜지스터의 증폭 원리를 이용해 실제 회로를 구성한다.\n- 스마트폰 음성 신호를 스피커로 출력하는 장치를 설계한다.\n- 제작한 장치의 성능을 측정하고 개선 방안을 정리한다.\n\n### 디스플레이 공학 계열\n\n#### 디스플레이 장치의 과학적 원리 비교\n- 센서와 편광판을 활용하여 LCD, OLED 등 다양한 디스플레이에서 방출되는 빛의 편광 특성을 비교한다.\n- 3D 영상 기술에 적용된 물리적 원리를 조사한다.\n\n### 이론 물리·양자역학 계열\n\n#### 시뮬레이션을 활용한 원자 모형의 변천 과정 논증\n- Phet 시뮬레이션으로 알파 입자 산란 실험 등을 재현한다.\n- 기존 모델을 뒤집은 결정적 실험을 바탕으로 과학 이론이 수정·발전하는 과정을 논리적으로 입증한다. - 전기, 전자, 반도체, 정보 통신, 양자 컴퓨팅 등 현대 첨단 산업의 근간이 되는 공학 계열 진로를 희망하는 학생 물리학과 기계공학과 전기공학과 전자공학과 항공우주공학과 천문학과"},{"kind":"course","id":"course_정치","name":"정치","text":"정치 서로 다른 생각을 가진 사람들이 대화와 타협을 통해 공동의 문제를 해결해 나가는 과정을 배우는 과목입니다. 민주주의 정치과정 정당 선거 정부형태 지방자치 국제문제 아테네민주정치 사회계약설 자유주의 공동체주의 정치적무관심 국가권력 대통령제 의원내각제 삼권분립 국제정치 국제기구 ### 핵심 학습\n\n#### 교칙은 누가 결정할까\n- 정치의 필요성을 이해한다.\n- 민주 정치의 발전 과정을 살펴본다.\n- 민주주의의 이념과 원리, 다양한 민주주의 모델을 이해한다.\n\n#### 왜 학생회 선거에 참여해야 할까\n- 집단적 정치 참여의 주체인 정당과 정치 과정의 핵심인 선거 제도를 이해한다.\n- 민주시민의 권리와 책임을 인식한다.\n- 공동체의 의사결정 과정에 적극적으로 참여하는 태도를 기른다.\n\n#### 왜 일본은 우리나라와 달리 대통령이 없을까\n- 대통령제와 의원내각제를 바탕으로 우리나라의 정부 형태를 이해한다.\n- 입법부, 행정부, 사법부의 견제와 균형 원리를 탐색한다.\n\n#### 국제 평화를 위해서는 힘이 중요할까, 협력이 중요할까\n- 국제 사회를 바라보는 현실주의와 자유주의 관점을 구별한다.\n- 전 지구적 갈등을 평화적으로 해결하는 세계시민적 태도를 기른다. ### 정치 제도 이해\n\n#### 민주주의와 정부 형태 분석\n- 민주주의의 기본 원리와 다양한 모델을 비교한다.\n- 대통령제와 의원내각제의 차이를 사례로 이해한다.\n- 권력 분립과 견제와 균형의 원리를 정리한다.\n\n### 참여와 의사결정\n\n#### 선거와 시민 참여\n- 학생회 선거, 지역 선거, 정당 활동 등 정치 참여 사례를 분석한다.\n- 공동체 문제 해결을 위한 의사결정 과정을 모의 활동으로 경험한다.\n\n### 국제 정치 탐구\n\n#### 갈등과 평화\n- 국제 갈등 사례를 현실주의와 자유주의 관점에서 비교한다.\n- 평화적 해결을 위한 협력 방안을 토론한다. ### 전 계열\n\n#### 우리 지역 정책 제안 활동\n- 지역 사회의 문제점을 찾는다.\n- 기존 법규를 검토한다.\n- 조례 제정 또는 개정 방향을 제안한다.\n\n### 인문 계열\n\n#### 모의 선거 포스터 제작\n- 역사적 인물을 설정하고 해당 인물의 업적을 현대적으로 재해석한다.\n- 재해석한 내용을 바탕으로 공약을 제시한다.\n- 공약을 종합하여 포스터와 공약집을 제작한다.\n\n### 사회 계열\n\n#### 선거구제 분석\n- 소선거구제와 중대선거구제의 차이점을 분석한다.\n- 중앙선거관리위원회 선거통계시스템을 활용해 자료를 조사한다.\n- 현행 소선거구제의 장점 또는 한계를 중심으로 논술문을 작성한다. - 뉴스, 시사, 사회 이슈에 관심이 많은 학생\n- 논리적인 토론으로 상대를 설득하고 합리적인 의사 결정을 이끄는 소통 능력을 기르고 싶은 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_제2외국어(프랑스어,_일본어)","name":"제2외국어(프랑스어, 일본어)","text":"제2외국어(프랑스어, 일본어) 일상생활에 필요한 제2외국어 의사소통 능력을 키우고, 다양한 의사소통 과정에 적극적으로 참여하는 태도를 기르는 과목입니다. 상호문화적관점 타문화이해 세계시민 의사소통 발음및문자 어휘 문법 의사소통표현 한국문화와의차이점 4차산업혁명시대의사회변화 ### 핵심 학습\n\n#### 제2외국어로 어떻게 의사소통해야 할까\n- 발음 규칙에 유의하여 다양한 표현을 상황에 맞게 말한다.\n- 간단한 글을 읽고 내용을 이해한다.\n- 인사와 소개, 감정 및 의사 표현, 정보 요구와 제공 등 일상생활에 필요한 표현을 익힌다.\n\n#### 제2외국어를 사용하는 나라의 문화는 어떠할까\n- 상호문화적 관점에서 제2외국어권 문화를 이해한다.\n- 문화적 감수성을 바탕으로 다른 문화권 사람들과 소통하는 태도를 기른다. ### 의사소통 표현\n\n#### 상황별 표현 연습\n- 인사, 소개, 감정 표현, 정보 묻고 답하기 표현을 연습한다.\n- 간단한 대화문을 읽고 상황에 맞게 표현을 바꾸어 말한다.\n\n### 읽기와 쓰기\n\n#### 기본 문장 이해와 작성\n- 짧은 글을 읽고 핵심 내용을 파악한다.\n- 일상생활과 관련된 간단한 문장을 작성한다.\n\n### 문화 이해\n\n#### 제2외국어권 문화 탐구\n- 프랑스어권 또는 일본어권 국가의 생활 문화와 의사소통 방식을 조사한다.\n- 우리 문화와 비교하며 문화적 차이를 존중하는 태도를 기른다. ### 교육 계열\n\n#### 제2외국어 기초 학습을 위한 교재 제작\n- 다양한 제2외국어 의사소통 상황을 연출하여 사진을 촬영한다.\n- 사진에 말풍선을 넣어 기초 표현을 익힐 수 있는 교재를 제작한다.\n\n### 사회 계열\n\n#### 4차 산업혁명 시대의 사회 변화 탐구\n- 도서나 디지털 정보를 활용해 4차 산업혁명 시대 제2외국어 사용 국가의 사회 변화 모습을 조사한다.\n- 모둠별 조사 결과를 정리해 발표한다.\n\n### 예술 계열\n\n#### 제2외국어권 영화 탐구와 영상 제작\n- 제2외국어권 국가에서 만들어진 영화를 감상한다.\n- 영화를 언어적·문화적 관점에서 분석한다.\n- 제2외국어를 활용한 짧은 영상을 제작한다. - 제2외국어 의사소통 능력의 기초를 다지고 싶은 학생\n- 제2외국어 사용자들과 소통하며 자신의 세계를 넓혀 가고 싶은 학생\n- 폭넓은 시각과 열린 마음으로 제2외국어 사용 국가의 문화를 이해하고 싶은 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과 문헌정보학과 미디어학과 교육학과 영어영문학과 통번역학과"},{"kind":"course","id":"course_주제_탐구_독서","name":"주제 탐구 독서","text":"주제 탐구 독서 읽기 영역을 심화·확장한 과목으로, 주제를 깊이 탐구하는 독서 경험을 통해 자신만의 관점과 견해를 만들고 스스로 탐구하는 힘을 기르는 과목입니다. 주제중심독서 융합적사고 자료탐색 비판적분석 심층탐구 보고서작성 자기주도학습 문제발견 탐구질문설정 관점비교 자료신뢰성 근거분석 탐구보고서 발표 ### 핵심 학습\n\n#### 나는 어떤 질문을 탐구하고 싶은가\n- 관심 분야를 중심으로 “왜?”라는 질문을 떠올린다.\n- 브레인스토밍을 통해 탐구 질문을 구체화한다.\n- 탐구 질문을 연구 질문으로 발전시킨다.\n\n#### 같은 문제를 다룬 글은 왜 서로 다른 결론에 도달할까\n- 동일 주제를 다룬 도서, 논문, 기사 속 주장을 비교한다.\n- 자료의 근거 유형을 통계, 사례, 전문가 의견 등으로 구분해 분석한다.\n- 그래프와 데이터를 해석하고 관점의 차이를 정리·평가한다.\n\n#### 다양한 자료를 읽은 뒤 나만의 관점은 어떻게 만들 수 있을까\n- 탐구 결과를 구조화하여 연구 보고서를 작성한다.\n- 핵심 주장과 근거를 정리한 발표 자료를 제작한다.\n- 질의응답을 통해 탐구 결과를 보완하고 수정한다. ### 탐구 주제 설정\n\n#### 질문 만들기\n- 관심 분야에서 탐구할 만한 문제를 찾는다.\n- 넓은 관심사를 구체적인 연구 질문으로 좁힌다.\n\n### 자료 읽기와 비교\n\n#### 주장과 근거 분석\n- 도서, 논문, 기사 등 다양한 자료를 읽는다.\n- 자료의 주장, 근거, 관점 차이를 비교한다.\n- 통계와 그래프를 해석하여 자료의 신뢰도를 점검한다.\n\n### 보고서와 발표\n\n#### 탐구 결과 표현\n- 탐구 내용을 구조화하여 보고서를 작성한다.\n- 핵심 주장과 근거를 발표 자료로 정리한다.\n- 질의응답과 피드백을 반영해 결과물을 보완한다. ### 인문·사회 계열\n\n#### 디지털 사회와 인간관계 변화 연구\n- SNS와 온라인 커뮤니티가 인간관계에 미치는 영향 관련 도서와 기사를 읽는다.\n- 사회학과 심리학 관점에서 주장을 비교 분석한다.\n- 실제 사례를 조사하고 디지털 사회의 관계 변화에 대한 탐구보고서를 작성한다.\n\n### 보건·의학 계열\n\n#### 청소년 정신 건강과 사회 환경 탐구\n- 정신 건강 관련 연구 보고서와 기사를 비교 분석한다.\n- 스트레스 요인과 사회 환경의 관계를 정리한다.\n- 학교나 지역 사회 차원의 예방 프로그램 제안 보고서를 작성한다.\n\n### 경영·경제 계열\n\n#### 플랫폼 경제의 구조와 문제점 분석\n- 플랫폼 노동 관련 경제 기사와 연구 자료를 읽는다.\n- 배달 플랫폼, 콘텐츠 플랫폼 등 구체적 사례를 조사한다.\n- 플랫폼 경제의 장단점을 분석하고 정책 개선 방안을 제시한다. - 다양한 자료를 읽고 비교·분석하여 통합적인 사고력을 기르고 싶은 학생\n- 자기 주도적으로 탐구 과정을 설계하고 결과를 보고서와 발표로 정리하고 싶은 학생\n- 대학 진학 후 요구되는 심층 독서 능력과 연구 보고서 작성 능력을 미리 준비하고 싶은 학생 국어국문학과 문헌정보학과 미디어학과 교육학과 법학과"},{"kind":"course","id":"course_지구과학","name":"지구과학","text":"지구과학 일상생활에서 접하는 자연현상과 우주에 관한 호기심에 과학적으로 접근하는 과목입니다. 기후시스템 지질공원 별 자료분석및해석 호기심과추론 과학의유용성 해류 기상현상 기후변화 지층의선후관계 암석의생성과순환 한반도지질공원 행성의시운동 별의진화 우주팽창 ### 핵심 학습\n\n#### 대기와 해양의 상호작용은 기후 시스템을 어떻게 변화시킬까\n- 해수의 순환을 일으키는 요인을 탐구한다.\n- 다양한 기상 현상과 기후변화를 일으키는 요인들의 상호작용을 탐구한다.\n\n#### 지질시대의 생물과 환경은 어떻게 알아낼 수 있을까\n- 지층과 화석, 지구 내부 탐구를 통해 지질시대의 환경과 생물 변천 과정을 탐구한다.\n- 다양한 종류의 암석 생성 과정과 순환을 탐구한다.\n- 우리나라의 대표 지질공원 형성 과정을 살펴본다.\n\n#### 태양계 천체와 별, 우주는 어떻게 진화할까\n- 식 현상과 행성의 시운동 원리를 탐구한다.\n- 별의 진화 과정을 알아내기 위한 방법을 탐구한다.\n- 우주 팽창의 증거를 바탕으로 우주의 미래를 추론한다. ### 대기와 해양\n\n#### 기후 시스템 자료 분석\n- 해수 순환, 대기 운동, 기후 자료를 조사한다.\n- 대기와 해양의 상호작용이 기상 현상과 기후변화에 미치는 영향을 분석한다.\n\n### 지질과 환경\n\n#### 지층·화석·암석 탐구\n- 지층과 화석 자료를 바탕으로 과거 환경을 추론한다.\n- 암석의 생성 과정과 순환을 사례로 정리한다.\n- 지질공원의 형성 과정을 설명한다.\n\n### 천문과 우주\n\n#### 천체 운동과 우주 진화\n- 식 현상과 행성의 시운동을 관측 자료와 연결한다.\n- 별의 진화와 우주 팽창의 증거를 조사한다. ### 경제·경영 계열\n\n#### 기후변화가 인류에 미치는 경제적 영향 분석\n- 기후변화로 발생하는 직접 피해와 간접 피해 비용 자료를 찾는다.\n- 경제적 피해 비용을 추정·비교하기 위한 데이터를 변환하고 시각화한다.\n- 기후변화 피해 규모에 영향을 주는 요인을 분석하고 발표한다.\n\n### 인문·예술 계열\n\n#### 한반도 지질공원의 과거 모습 추론\n- 한반도 지질공원의 암석, 지질 구조, 화석 등을 분석한다.\n- 지질공원의 과거 환경과 지형 모습을 추론한다.\n- 설명문, 에세이, 시, 풍경화, 일러스트, 만화 등으로 표현해 발표한다.\n\n### 정보·통계 계열\n\n#### 은하 분류 프로그램 개발\n- 여러 AI 도구를 활용하여 은하 이미지 자동 분류 모델을 만든다.\n- 분류 성능을 개선하기 위해 필요한 학습 데이터의 조건을 조사한다.\n- 데이터의 양, 품질, 전처리 요소, 관측 파장대, 해상도, 신호대잡음비, 적색편이, 거리 등을 고려해 분석한다. - 자연재해와 기후 위기 등 현실 문제의 원인을 자료로 분석하고 대응 방안을 설계해 보고 싶은 학생\n- 다양한 관측 자료를 바탕으로 대기, 해양, 지질, 우주 시스템의 상호작용을 통합적으로 탐구하고 싶은 학생 물리학과 기계공학과 전기공학과 전자공학과 항공우주공학과 천문학과"},{"kind":"course","id":"course_지구시스템과학","name":"지구시스템과학","text":"지구시스템과학 지권·수권·기권의 구성과 상호작용을 이해하고, 개인과 사회 문제를 과학적으로 해결할 수 있는 역량을 키우는 과목입니다. 지구의탄생 유체역학 과학적모델 사례중심 탐구중심 판구조론 지진파 편광현미경 에크만수송 지형류 해파와 단열변화 대기안정도 편서풍파동 ### 핵심 학습\n\n#### 지구는 어떤 과정을 거쳐 지금의 모습으로 진화해 왔을까\n- 관측 기기의 발달과 관련지어 판구조론 정립 과정과 판 이동의 원동력을 탐구한다.\n- 판구조론과 연계하여 암석의 순환 과정을 탐구한다.\n- 암석의 종류에 따른 광학적 특징을 관찰한다.\n\n#### 거대한 바닷물은 어떤 힘에 의해 움직이고 순환할까\n- 지형류 발생 원리를 탐구한다.\n- 천해파와 심해파의 특성을 비교·설명한다.\n- 해일의 발생 원인을 탐구한다.\n\n#### 대기의 움직임은 어떻게 구름과 바람을 만들까\n- 단열선도를 이용해 대기 안정도를 분석하고 구름의 생성 과정을 탐구한다.\n- 대기에 작용하는 힘을 물리적으로 분석·설명한다.\n- 편서풍 파동과 제트류 시뮬레이션을 통해 상층 기상을 해석한다. ### 지권 시스템 탐구\n\n#### 판구조론과 암석 순환\n- 판구조론 정립 과정과 판 이동의 원동력을 조사한다.\n- 암석의 순환과 광
