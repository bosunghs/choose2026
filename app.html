<script>
(function(){
  var SCHOOL_URL = "https://bosung.sen.hs.kr/215868/subMenu.do";
  var GATE_KEY = "BOSUNG_CHOOSE2026_GATE";

  function isFramed(){
    try { return window.self !== window.top; }
    catch(e) { return true; }
  }

  function getParam(name){
    var query = window.location.search ? window.location.search.substring(1) : "";
    var parts = query.split("&");
    for(var i=0; i<parts.length; i++){
      var pair = parts[i].split("=");
      if(decodeURIComponent(pair[0] || "") === name){
        return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
      }
    }
    return "";
  }

  function isAllowedReferrer(){
    var ref = document.referrer || "";
    return ref.indexOf("https://bosung.sen.hs.kr/") === 0 ||
           ref.indexOf("https://www.bosung.sen.hs.kr/") === 0 ||
           ref.indexOf("https://bosunghs.github.io/choose2026/") === 0 ||
           ref === "about:blank";
  }

  function hasGate(){
    var gate = getParam("gate");
    var stored = "";
    try { stored = sessionStorage.getItem(GATE_KEY) || ""; } catch(e) {}
    return !!gate && !!stored && gate === stored;
  }

  if(!isFramed() && !isAllowedReferrer() && !hasGate()){
    window.location.replace(SCHOOL_URL);
  }
})();
</script>

/* Home guide rebuild: 선택 전 안내 아코디언 홈 */
.home-guide-hero{padding:21px 18px 19px!important;background:linear-gradient(135deg,#ffffff 0%,#eff7e8 48%,#f7f5e8 100%)!important}
.home-guide-hero h2{margin-bottom:10px!important}
.home-guide-hero p{max-width:640px}
.home-guide-list{display:grid;grid-template-columns:1fr;gap:9px;margin-top:12px}
.guide-card{background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid var(--line);border-radius:19px;box-shadow:var(--soft-shadow);height:auto;max-height:none;overflow:hidden}
.guide-card summary{list-style:none;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 15px;cursor:pointer;touch-action:manipulation}
.guide-card summary::-webkit-details-marker{display:none}
.guide-title{display:flex;align-items:center;gap:9px;min-width:0}
.guide-tag{display:inline-flex;align-items:center;min-height:24px;padding:4px 9px;border-radius:999px;background:#eff7e8;border:1px solid #cddfc4;color:#4f7f37;font-size:12px;line-height:1.25;font-weight:950;white-space:nowrap}
.guide-title b{display:block;color:#0f172a;font-size:16px;line-height:1.32;font-weight:950;letter-spacing:-.04em;word-break:keep-all;overflow-wrap:anywhere}
.guide-toggle{flex:0 0 auto;color:#64748b;font-size:15px;font-weight:950;transition:transform .15s ease}
.guide-card[open] .guide-toggle{transform:rotate(180deg)}
.guide-body{padding:0 15px 14px}
.guide-body p{margin:0 0 9px;color:#334155;font-size:14px;line-height:1.58;font-weight:650;word-break:keep-all;overflow-wrap:anywhere}
.guide-body ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px}
.guide-body li{position:relative;margin:0;padding-left:15px;color:#475569;font-size:13.3px;line-height:1.48;font-weight:700;word-break:keep-all;overflow-wrap:anywhere}
.guide-body li:before{content:"";position:absolute;left:1px;top:.65em;width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2))}
.guide-note{margin-top:12px;padding:11px 12px;border-radius:17px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:13.3px;line-height:1.55;font-weight:730;word-break:keep-all;overflow-wrap:anywhere}
@media(max-width:430px){.home-guide-hero{padding:18px 16px 17px!important}.guide-card{border-radius:18px}.guide-card summary{padding:13px 14px}.guide-title b{font-size:15.5px}.guide-body{padding:0 14px 13px}.guide-body p{font-size:13.8px}.guide-body li{font-size:13px}.guide-note{font-size:13px}}

body.intro-mode{padding-bottom:calc(env(safe-area-inset-bottom) + 14px)!important;background:radial-gradient(circle at 18% 14%,rgba(95,143,63,.16),transparent 22rem),linear-gradient(180deg,#f8faf5 0%,#fffdf2 100%)}
body.intro-mode main{padding:0!important}
.intro-wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px 18px calc(24px + env(safe-area-inset-bottom));}
.intro-splash{
  width:min(100%,560px);
  text-align:center;
  padding:34px 22px 26px;
  border-radius:34px;
  background:linear-gradient(135deg,#ffffff 0%,#eff7e8 54%,#f7f5e8 100%);

  position:relative;

}
.intro-splash:before{content:"";position:absolute;left:50%;top:26px;transform:translateX(-50%);width:86px;height:86px;border-radius:30px;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 16px 34px rgba(95,143,63,.24)}
.intro-splash:after{content:"보";position:absolute;left:50%;top:47px;transform:translateX(-50%);color:#fff;font-size:32px;font-weight:950;letter-spacing:-.04em}
.intro-title{position:relative;margin:116px 0 10px;font-size:35px;line-height:1.16;letter-spacing:-.075em;font-weight:950;color:var(--text);word-break:keep-all}
.intro-subtitle{position:relative;margin:0 auto;color:#334155;font-size:15.5px;line-height:1.65;font-weight:680;word-break:keep-all;max-width:360px}
.intro-start-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;min-width:180px;min-height:50px;margin-top:26px;padding:12px 24px;border-radius:999px;background:var(--accent);border:1px solid var(--accent);color:#fff;font-size:16px;font-weight:950;box-shadow:0 11px 24px rgba(95,143,63,.24)}

@keyframes introFadeUp{from{opacity:0;transform:translateY(12px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
@media (prefers-reduced-motion: reduce){.intro-splash{animation:none}}
@media(max-width:430px){
  body.has-compare-floating{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 86px)}

  font-size:12.5px;
  line-height:1.35;
  font-weight:720;
}
.next-schedule-card .schedule-dday{
  flex:0 0 auto;
  min-width:54px;
  min-height:34px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 9px;
  border-radius:999px;
  background:#f8faf5;
  border:1px solid #ced8c5;
  color:#315f2d;
  font-size:12.5px;
  line-height:1;
  font-weight:800;
  white-space:nowrap;
}
.schedule-timeline{
  display:flex;
  flex-direction:column;
  gap:9px;
  margin-top:12px;
}
.schedule-item{
  display:grid;
  grid-template-columns:84px 1fr;
  gap:12px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:15px;
  background:#fff;
  box-shadow:var(--soft-shadow);
}
.schedule-item.is-current{
  border-color:#aac98c;
  background:linear-gradient(180deg,#ffffff,#f6fbf0);
}
.schedule-item.is-done{
  opacity:.68;
}
.schedule-left{
  display:flex;
  flex-direction:column;
  gap:5px;
}
.schedule-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:max-content;
  max-width:100%;
  min-height:24px;
  padding:4px 8px;
  border-radius:999px;
  background:#eff7e8;
  border:1px solid #cddfc4;
  color:#315f2d;
  font-size:11.5px;
  line-height:1.2;
  font-weight:760;
  white-space:nowrap;
}
.schedule-item.is-current .schedule-chip{
  background:#dfeccf;
  border-color:#bfd5a8;
}
.schedule-item.is-done .schedule-chip{
  background:#f1f4ec;
  color:#64748b;
  border-color:#d2dacb;
}
.schedule-date-main{
  color:#0f172a;
  font-size:13px;
  line-height:1.35;
  font-weight:780;
  word-break:keep-all;
}
.schedule-content h3{
  margin:0;
  color:#0f172a;
  font-size:16px;
  line-height:1.32;
  font-weight:780;
  letter-spacing:-.03em;
  word-break:keep-all;
}
.schedule-content p{
  margin:5px 0 0;
  color:#475569;
  font-size:13.5px;
  line-height:1.5;
  font-weight:540;
  word-break:keep-all;
}
.schedule-note-card{
  margin-top:12px;
  padding:13px 14px;
  border-radius:15px;
  background:#fff7ed;
  border:1px solid #fed7aa;
  color:#9a3412;
  font-size:13.5px;
  line-height:1.55;
  font-weight:620;
  word-break:keep-all;
}
.home-guide-hero{
  margin-top:12px;
}
@media(max-width:430px){
  .top-tabs{gap:4px}
  .top-tabs .nav-btn{font-size:11.2px;letter-spacing:-.04em}
  .next-schedule-card{padding:13px 14px;border-radius:14px;gap:9px}
  .next-schedule-card h3{font-size:16px}
  .next-schedule-card p{font-size:13px}
  .next-schedule-card .schedule-dday{min-width:48px;font-size:12px;padding:6px 8px}
  .schedule-item{grid-template-columns:1fr;gap:8px;padding:13px;border-radius:14px}
  .schedule-left{flex-direction:row;align-items:center;justify-content:space-between;gap:8px}
  .schedule-content h3{font-size:15.5px}
  .schedule-content p{font-size:13px}
}

</style>
</head>

<script>window.BOSUNG_APP_DATA = {"version":"app_data_semantic_v6_clean_display","created":"2026-05-20","counts":{"courses":82,"departments":119,"course_offerings":84,"search_items":201,"total_detail_pages":201},"courses":[{"id":"course_경제","type":"course","name":"경제","basic":{"grade_semester":"2학년 1학기","subject_area":"사회","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"내가 가진 돈을 합리적으로 쓰는 방법을 배우고, 물건값·은행 이자·환율 같은 경제 현상이 왜 변하는지 이해하는 과목입니다.","keywords":["희소성","기회비용","가격","경쟁","인플레이션","금리","환율","무역","편익","수요","공급","조세","탄력성","자원배분","국내총생산","경제성장","경기변동","재정","통화정책"],"learning_md":"### 핵심 학습\n\n#### 1. 경제학과 경제문제\n- 두 재화의 가격과 편익, 기회비용을 비교하여 합리적인 선택 대안을 도출한다.\n> 질문: 두 재화의 가격이 각각 1,000원, 1,500원이라면 어느 것을 구입하는 것이 합리적일까?\n\n#### 2. 두쫀쿠의 가격은 어떻게 결정될까?\n- 수요와 공급에 따라 가격이 변동하는 원리를 파악한다.\n- 조세 부과에 따른 소비자 잉여와 생산자 잉여의 변화를 산출한다.\n\n#### 3. 국가 경제의 진단\n- 국내총생산, 물가, 실업률을 바탕으로 국가 경제 상태를 진단한다.\n- 경기 변동에 대응하기 위한 경제 정책의 역할을 이해한다.\n> 질문: 한국과 일본 중 어느 나라가 더 부유할까?\n\n#### 4. 국제 경제와 환율\n- 무역이 발생하는 원리와 환율이 결정되는 과정을 이해한다.\n- 국제 경제 환경의 변화가 국가와 개인의 선택에 미치는 영향을 파악한다.\n> 질문: 환율이 오르면 국외 여행을 가지 않는 것이 합리적일까?","activities_md":"### 자료 해석\n\n#### 경제 기사 분석\n- 경제 기사에서 수요, 공급, 가격, 시장 실패와 관련된 개념을 찾아 수업 내용과 연결한다.\n- 통계 자료와 그래프를 활용하여 경제 현상의 원인을 추론한다.\n> 예시: 물가 상승 기사에서 원자재 가격, 환율, 소비 심리의 영향을 구분해 볼 수 있다.\n\n### 적용과 표현\n\n#### 경제 의사결정 설명\n- 생활 속 소비·저축·투자 사례를 경제 개념으로 설명한다.\n- 분석 결과를 보고서, 발표, 토론 형태로 정리한다.","advanced_md":"### 경영·경제 계열\n\n#### 뉴스 기사를 활용한 거시 경제 분석\n- 언론 보도 자료를 활용하여 국가 및 지방자치단체의 정책을 경제학적 원리로 분석한다.\n- 관련 데이터를 조사하여 정책 변화가 자산시장과 실물경제에 미치는 영향을 탐구한다.\n> 예시: 중앙은행의 금리 인하가 자산시장과 실물경제에 미치는 영향\n\n### 인문·사회 계열\n\n#### 온라인 플랫폼 비판적으로 바라보기\n- 온라인 플랫폼의 시장 지배력 강화가 소비자와 협력업체에 미치는 영향을 탐구한다.\n- 법적 규제 수단, 사회적 불평등, 부의 배분 문제, 윤리적 쟁점을 다양한 진로와 연결하여 분석한다.\n\n### 과학·기술 계열\n\n#### 바이오 기업 주가 분석\n- 개발 기간과 비용이 크고 임상 성공률이 낮은 바이오 산업의 특성을 이해한다.\n- 대표 바이오 기업의 주가 변화를 분석하여 생명공학 기술의 발전 과정과 산업적 의미를 탐구한다.","fit_md":"- 원인과 결과의 관계를 통해 경제 현상을 직관적으로 이해하고자 하는 학생\n- 뉴스와 신문을 활용하여 경제 문제를 탐구하는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_경제_수학","type":"course","name":"경제 수학","basic":{"grade_semester":"3학년 1학기","subject_area":"수학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"이자, 환율, 세금, 연금, 수요와 공급, 최적 생산량 같은 경제 현상을 수학으로 표현하고 분석하는 과목입니다.","keywords":["생활경제","이자","환율","세금","수열","금융","함수","경제지표","행렬","역행렬","한계비용","최적화"],"learning_md":"### 핵심 학습\n\n#### 1. 생활 속 경제를 수학으로 읽기\n- 환율, 세금, 할인, 이자처럼 매일 접하는 경제 현상을 수와 식으로 표현한다.\n- 환율 변화에 따른 가격을 계산한다.\n- 세금과 할인율이 적용되는 사례를 분석한다.\n- 생활 속 경제 의사결정을 수학적으로 설명한다.\n\n#### 2. 금융 계산 원리\n- 단리와 복리, 연금, 현재 가치 같은 금융 개념을 수열과 함수로 이해한다.\n- 복리 계산을 수행한다.\n- 72의 법칙을 로그와 연결해 이해한다.\n- 연금의 현재 가치를 계산한다.\n\n#### 3. 경제 현상의 함수·행렬 표현\n- 수요, 공급, 비용, 수입, 산업 간 관계를 함수나 행렬로 표현한다.\n- 수요·공급 함수의 그래프를 해석한다.\n- 경제 데이터를 행렬로 구조화한다.\n- 역행렬을 활용해 경제 변수의 관계를 분석한다.\n\n#### 4. 미분을 활용한 최적 선택\n- 기업이나 소비자가 비용, 수입, 효용을 고려해 최적의 선택을 하는 과정을 이해한다.\n- 미분을 활용하여 이윤이 최대가 되는 지점이나 비용이 최소가 되는 지점을 찾는다.\n- 한계비용과 한계수입을 계산한다.\n- 이윤 함수의 극값을 구하고 최적 생산량을 도출한다.","activities_md":"### 금융 계산\n\n#### 단리·복리와 현재 가치\n- 단리와 복리를 비교한다.\n- 연금의 현재 가치를 계산한다.\n- 할인율과 인플레이션을 적용하여 금융 의사결정을 분석한다.\n\n### 경제 모델링\n\n#### 함수와 행렬로 경제 현상 표현하기\n- 수요·공급 함수를 분석한다.\n- 산업 간 관계를 행렬로 표현한다.\n- 경제지표를 수학적으로 해석한다.\n\n### 최적화\n\n#### 비용과 이윤 분석\n- 생산량에 따른 비용 함수를 설정한다.\n- 이윤 극대화 상황을 시뮬레이션한다.\n- 한계수입과 한계비용을 비교한다.","advanced_md":"### 상경 계열\n\n#### 72의 법칙과 현재 가치 할인율 탐구\n- 복리 예금이 두 배가 되는 시간을 로그로 설명한다.\n- 인플레이션을 고려하여 연금의 현재 가치를 계산한다.\n- 금융 의사결정 사례를 수학적으로 분석한다.\n\n### 공학 계열\n\n#### 미분을 활용한 생산비용 최소화 시뮬레이션\n- 생산량에 따른 수입 함수와 비용 함수를 설정한다.\n- 도함수로 이윤 함수의 극값을 계산한다.\n- 최적 생산량을 도출한다.","fit_md":"- 경제, 경영, 회계, 금융 분야에 관심이 있는 학생\n- 복잡한 사회 문제를 수치 데이터와 함수 모델링으로 분석하고 싶은 학생\n- 수학이 실제 경제 의사결정에 어떻게 쓰이는지 알고 싶은 학생\n- 상경 계열 진로를 구체적으로 생각하는 학생","related_department_names":["경제학과","경영학과","금융보험학과","세무·회계학과","통계학과","산업공학과","빅데이터학과","국제경제통상학과","무역·유통학과","행정학과"],"related_department_ids":["dept_경제학과","dept_경영학과","dept_금융보험학과","dept_세무·회계학과","dept_통계학과","dept_산업공학과","dept_빅데이터학과","dept_무역·유통학과","dept_행정학과"],"semantic_status":"text_reviewed"},{"id":"course_과학_교양","type":"course","name":"과학 교양","basic":{"grade_semester":"3학년 2학기","subject_area":"교양","course_type":"진로 선택","selection_group":"학년선택","credits":"원문 기준","exam":""},"one_liner":"상세 내용은 담당선생님께 문의하세요.","keywords":[],"learning_md":"### 담당교사 문의\n\n#### 과학 교양\n- 상세 내용은 담당선생님께 문의하세요.","activities_md":"### 담당교사 문의\n\n#### 활동 안내\n- 상세 내용은 담당선생님께 문의하세요.","advanced_md":"### 담당교사 문의\n\n#### 심화 탐구 안내\n- 상세 내용은 담당선생님께 문의하세요.","fit_md":"- 상세 내용은 담당선생님께 문의하세요.","related_department_names":["진로 관심 분야에 따라 학과 연결 필요"],"related_department_ids":[],"semantic_status":"담당교사 문의"},{"id":"course_과학의_역사와_문화","type":"course","name":"과학의 역사와 문화","basic":{"grade_semester":"3학년 2학기","subject_area":"과학","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"인류 문명을 바꾼 결정적 과학 현장을 탐구하고, 미래 기술 사회 속 과학의 역할과 가치를 발견하는 인문·사회 융합형 과학 탐구 과목입니다.","keywords":["과학혁명","과학과예술","현대과학과세계","미래과학기술","과학윤리","그리스문명","과학과예술의통합","현대과학과사회문화","감염병과백신","산업혁명의명암","AI콘텐츠","VR","과학기술과시민참여"],"learning_md":"### 핵심 학습\n\n#### 1. 고대 그리스인들은 우주를 어떻게 보았을까?\n- 그리스 문명과 과학의 태동을 이해한다.\n- 르네상스와 과학혁명 시기의 사회문화적 배경을 탐구한다.\n- 예술 작품 속에 담긴 과학적 원리를 분석한다.\n\n#### 2. 상대성 이론이 현대 사회에 어떤 영향을 주었을까?\n- 상대성 이론 등 현대 과학의 등장 과정과 논쟁을 이해한다.\n- 감염병이 사회 변화에 미친 영향을 탐구한다.\n- 산업혁명 이후 과학기술 발달의 양면성을 고찰한다.\n\n#### 3. 로봇과 인간이 공존하는 세상은 어떤 모습일까?\n- 과학기술 기반 문화 콘텐츠를 기획하거나 제작한다.\n- 증강 현실과 가상 현실이 사회에 미치는 영향을 분석한다.\n- 미래 사회 문제 해결을 위한 시민 참여와 가치 판단의 필요성을 이해한다.","activities_md":"### 과학사 탐구\n\n#### 과학 개념의 변화 읽기\n- 과학 개념이 시대와 사회문화적 배경에 따라 어떻게 변화했는지 살펴본다.\n- 과학자의 해석, 실험, 논쟁을 중심으로 과학 지식의 형성 과정을 분석한다.\n\n### 표현과 적용\n\n#### 과학 문화 콘텐츠 만들기\n- 과학사의 주요 장면을 발표, 보고서, 콘텐츠 제작 활동으로 표현한다.\n- 과학기술이 사회와 문화에 미친 영향을 현재의 기술 문제와 연결한다.","advanced_md":"### 공학·미디어 계열\n\n#### 패러다임을 바꾼 결정적 과학 실험 콘텐츠 제작\n- 시대에 따른 과학자들의 ‘낙하 운동’ 해석을 바탕으로 물리학의 패러다임이 변화하는 과정을 탐구한다.\n- 결정적 실험을 직접 재현해 보는 체험 중심 콘텐츠를 기획한다.\n\n### 예술·디자인 계열\n\n#### 르네상스 예술 작품 속 과학 원리 탐구\n- 움직이는 물체의 역동성을 강조한 미래주의 회화의 표현을 상대성 이론의 관점에서 해석한다.\n- 현대 미디어 아트의 시공간 연출 기법과 비교한다.\n\n### 사회·정치 계열\n\n#### 과학기술 발달에 따른 사회적 쟁점 정책 제안\n- 원자력 에너지, AI 도입 등 과학기술의 긍정적·부정적 효과와 관련된 집단 의사결정 사례를 조사한다.\n- 과학적 근거를 바탕으로 기술의 사회적 수용성을 높이기 위한 정책 제안서를 작성한다.","fit_md":"- 과학 기술이 인류 문명 발전에 기여한 역사적 과정에 호기심이 많은 학생\n- 과학 법칙을 수식으로 계산하기보다 과학과 사회·문화의 관계를 분석하고 성찰하고 싶은 학생\n- 과학 커뮤니케이터, 과학사학자, 교육 전문가, 문화 콘텐츠 기획자 등 문·이과 융합 소양이 필요한 진로를 희망하는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","영어영문학과","통번역학과","국제관계학과","무역·유통학과","호텔·관광경영학과","디자인과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_영어영문학과","dept_통번역학과","dept_국제관계학과","dept_무역·유통학과","dept_호텔·관광경영학과","dept_디자인과"],"semantic_status":"text_reviewed"},{"id":"course_교육의_이해","type":"course","name":"교육의 이해","basic":{"grade_semester":"3학년 1학기","subject_area":"교양","course_type":"진로 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"교육의 의미와 교수학습 원리를 이해하고, 미래 교육 환경에 능동적으로 대응하며 자신의 학습 전략과 교육적 관점을 세우는 과목입니다.","keywords":["교육활동","교육제도","교육의역사","교육발전","사회화","교육관","평생학습","학습자","인지주의","구성주의","학교교육","대안교육","교육정책","인공지능","글로벌시민의식"],"learning_md":"### 핵심 학습\n\n#### 1. 인간은 왜 배울까?\n- 교육적 존재로서의 인간을 이해한다.\n- 전통적 교육 개념과 새로운 교육 개념을 비교·분석한다.\n- 평생 학습 사회에서 필요한 자기주도적 학습 역량을 파악한다.\n\n#### 2. 나에게 맞는 학습 전략은?\n- 효과적인 학습 전략과 방법을 탐색하고 적용한다.\n- 효과적인 교수 전략과 방법을 탐색하고 적용한다.\n\n#### 3. 교육 제도는 어떻게 변화했을까?\n- 교육 제도의 형성과 변천을 이해한다.\n- 교육의 사회적 기능을 분석한다.\n- 한국 사회의 교육 문제와 해결 방안을 탐색한다.\n\n#### 4. 미래 사회에 요구되는 교육은?\n- 미래 교육의 과제를 탐색하고 실천 계획을 수립한다.\n- 미래 학습 환경과 교육 방법의 변화를 예측하고 대응 방안을 생각한다.","activities_md":"### 교육 현상 분석\n\n#### 교육 문제 탐구\n- 학교, 지역, 사회에서 나타나는 교육 문제를 사례 중심으로 조사한다.\n- 교육 제도와 교수학습 방법이 학습자에게 미치는 영향을 분석한다.\n\n### 표현과 적용\n\n#### 학습 전략과 수업 설계\n- 자신의 학습 전략을 점검하고 개선 방안을 세운다.\n- 교수학습 지도안, 정책 제안서, 캠페인 자료 등으로 탐구 결과를 표현한다.","advanced_md":"### 교육 계열\n\n#### 블룸의 완전학습 이론을 적용한 교수학습지도안 작성\n- 교육학 개론서를 참고하여 블룸의 완전학습 이론과 학습 과정을 이해한다.\n- 진단평가, 형성평가, 피드백, 재학습 구조가 반영된 교수학습지도안을 작성한다.\n\n### 국제·사회 계열\n\n#### 지역인재 전형의 장단점과 정책적 고려사항 탐구\n- 지방대학 및 지역균형인재 육성에 관한 법률, 『교육사회학』, 『대입정책과 국가균형발전』 등을 참고하여 지역인재 전형의 목적과 법적 근거를 조사한다.\n- 지역균형인재 선발제도 관련 논문과 해외 대입 전형 사례를 조사하여 교육 평등을 위한 정책 입안 시 고려사항을 탐구하고 보고서를 작성한다.\n\n### 정보·컴퓨터 계열\n\n#### 생성형 AI의 윤리적 활용 캠페인\n- 교육부, 한국지능정보사회진흥원 자료와 AI 윤리 관련 서적을 참고하여 생성형 AI의 작동 원리와 교육 활용 방식을 분석한다.\n- 표절, 편향성, 개인정보 유출 등 윤리적 쟁점을 조사한다.\n- 사용 범위, 학습 활용 원칙, 윤리 규범을 포함한 이용 규칙을 만들고 캠페인 활동을 진행한다.","fit_md":"- 교육의 다양한 의미와 중요성을 바탕으로 교육 문제의 해결 방안을 알아보고 싶은 학생\n- 사범계열, 상담심리계열, 사회과학계열 진학을 희망하는 학생\n- 가르치고 배우는 활동의 원리와 교수학습 방법을 익히고 싶은 학생","related_department_names":["컴퓨터공학과","소프트웨어학과","인공지능학과","빅데이터학과","정보보안학과","사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","교육학과"],"related_department_ids":["dept_컴퓨터공학과","dept_소프트웨어학과","dept_인공지능학과","dept_빅데이터학과","dept_정보보안학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_교육학과"],"semantic_status":"text_reviewed"},{"id":"course_국제_관계의_이해","type":"course","name":"국제 관계의 이해","basic":{"grade_semester":"3학년 2학기","subject_area":"사회","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"세계 여러 나라에서 발생하는 갈등과 협력의 양상을 이해하고, 국제 문제를 해결하기 위한 외교·국제법·세계시민적 대응 방안을 탐구하는 과목입니다.","keywords":["국제문제","국제기구","공정무역","공적개발원조","국제법","외교","조약","현실주의","이상주의","국가간불평등","전쟁과테러","팬데믹과보건","한반도평화","지역"],"learning_md":"### 핵심 학습\n\n#### 1. 국제기구에는 어떤 것들이 있을까?\n- 국제 관계의 변천 과정에서 형성된 국제 사회를 바라보는 관점을 이해한다.\n- 국가, 국제기구, 비정부기구 등 다양한 국제 사회의 행위 주체를 파악한다.\n\n#### 2. 우리는 왜 어려운 국가를 도와야 할까?\n- 국가 간 불평등에서 비롯된 국제 갈등 문제를 구체적으로 탐색한다.\n- 공정무역과 공적 개발 원조 등 불평등 해소를 위한 노력을 살펴본다.\n\n#### 3. 우리나라를 둘러싼 국제 관계는 어떻게 볼 수 있을까?\n- 우리나라를 둘러싼 다양한 국제 관계에 대한 여러 입장을 분석한다.\n\n#### 4. 평화와 안전을 위협하는 문제는 어떻게 해결할 수 있을까?\n- 전쟁, 테러, 팬데믹, 보건 문제처럼 평화와 안전을 위협하는 요인과 해결 방안을 탐구한다.\n- 한반도의 평화와 안전을 도모하기 위한 국제 사회의 협력 방안을 모색한다.\n- 국제 분쟁을 해결하기 위한 외교와 국제법의 역할을 파악한다.\n\n#### 5. 국제 분쟁의 해결\n- 우리나라가 가입한 조약과 지역 기구를 학습한다.\n- 세계시민으로서의 역할을 고민한다.\n> 질문: 미국산 소고기가 한우보다 가격이 저렴한 이유는 무엇일까?","activities_md":"### 국제 이슈 분석\n\n#### 국제 문제 자료 조사\n- 국제기구, 조약, 외교, 국제법과 관련된 자료를 조사한다.\n- 서로 다른 국가와 이해관계자의 입장을 비교한다.\n\n### 표현과 적용\n\n#### 토론과 발표\n- 국제 갈등 사례를 선정하여 해결 방안을 제안한다.\n- 모의 회의, 연설문, 보고서, 토론으로 탐구 결과를 표현한다.","advanced_md":"### 인문·사회 계열\n\n#### 모의 UN 총회 연설\n- 미·중 무역분쟁, 러시아·우크라이나 전쟁 등 국제 문제 중 하나를 선정한다.\n- 가상의 모의 UN 총회를 상정하여 특정 국가의 대표로서 연설문을 작성하고 발표한다.\n\n### 경영·경제 계열\n\n#### 공정무역 마케팅의 실태와 개선 방안\n- 일반 제품과 공정무역 제품 간 가격 결정 구조, 유통 단계, 생산자에게 돌아가는 이익 차이를 분석한다.\n- 기업의 공정무역 마케팅 사례를 비판적으로 탐구하고 개선 방안을 제시한다.","fit_md":"- 외국어 배우기를 좋아하고 사회 및 국제 문제에 관심이 많은 학생\n- 외교, 평화, 인권 등 국제 사회의 핵심 쟁점을 탐구하며 넓은 세계를 무대로 활약하고 싶은 학생","related_department_names":["생명과학과","생명공학과","의예과","약학과","간호학과","임상병리학과","사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_의예과","dept_약학과","dept_간호학과","dept_임상병리학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_금융과_경제생활","type":"course","name":"금융과 경제생활","basic":{"grade_semester":"2학년 2학기","subject_area":"사회","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"내가 가진 돈을 현명하게 쓰고, 미래를 위해 돈을 관리하는 방법을 배우는 과목입니다.","keywords":["저축","투자","채권","주식","신용","연금","금리","환율","물가","핀테크","약관","피싱","소득","연말정산","지출","예산","요구불예금","적금"],"learning_md":"### 핵심 학습\n\n#### 1. 금리가 상승하면 저축을 늘려야 할까?\n- 금융 거래와 계약 등 금융 생활과 의사결정에 필요한 기본 지식을 학습한다.\n- 금융 사기 예방과 피해 구제 수단 등 금융 소비자 보호 방안을 탐색한다.\n\n#### 2. 우리나라에서 명품이 잘 팔리는 이유는 무엇일까?\n- 수입과 소득, 지출과 소비를 중심으로 합리적인 소비를 위한 예산을 관리한다.\n- 장기와 단기 관점을 조화롭게 고려하여 금융 의사결정을 실천한다.\n\n#### 3. 내게 100만 원이 주어진다면?\n- 저축의 경제적 의의와 저축에 영향을 미치는 요인을 탐색한다.\n- 다양한 금융 투자 상품을 이해하고 자기 책임의 원칙에 따라 책임감 있는 금융 생활을 실천한다.\n\n#### 4. 신용카드의 사용 한도는 얼마일까?\n- 신용 관리의 중요성을 인식하고 자신의 신용을 효과적으로 관리하는 방안을 탐색한다.\n- 일상생활 속 위험에 대비하는 보험과 고령 사회에 필요한 연금을 이해한다.","activities_md":"### 금융 생활 분석\n\n#### 소비·저축·투자 점검\n- 자신의 소비 습관과 예산 관리 방식을 점검한다.\n- 저축, 투자, 보험, 연금 등 금융 상품의 특징을 비교한다.\n\n### 표현과 적용\n\n#### 금융 의사결정 실습\n- 금융 상품을 선택할 때 고려해야 할 기준을 정리한다.\n- 사례 분석, 보고서, 홍보물 제작, 토론으로 금융 생활 역량을 기른다.","advanced_md":"### 경영·경제 계열\n\n#### 모의 주식 활동\n- PER, PBR, ROE 등 주식에서 사용되는 지표를 학습한다.\n- 관심 기업의 재무제표를 분석하고 종목을 선정하여 모의투자 활동을 실시한다.\n- 모의투자 기간 종료 후 기업 분석, 수익률, 거시 경제 지표 분석 내용을 담은 탐구 보고서를 작성한다.\n\n### 인문·사회 계열\n\n#### 금융 상품 광고 포스터 제작\n- 예·적금 등 가상의 금융 상품을 설정하고 이를 홍보하기 위한 포스터를 제작한다.\n- 긍정적 프레이밍과 부정적 프레이밍 효과를 담은 두 가지 버전의 포스터를 만든다.\n- 설문 조사를 통해 어떤 상품의 홍보 효과가 컸는지 살펴보고 그 이유를 보고서로 작성한다.","fit_md":"- 복잡한 경제 지표와 숫자 속 흐름을 읽고, 데이터를 바탕으로 합리적인 선택 기준을 세우고 싶은 학생\n- 급변하는 경제 환경과 사회적 쟁점을 비판적으로 분석하며 더 나은 금융 해결책을 고민하고 싶은 학생","related_department_names":["생명과학과","생명공학과","의예과","약학과","간호학과","임상병리학과","사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_의예과","dept_약학과","dept_간호학과","dept_임상병리학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_기하","type":"course","name":"기하","basic":{"grade_semester":"2학년 2학기","subject_area":"수학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"평면과 입체 공간의 모양, 위치, 크기를 이해하고, 건축물·3D 그래픽·공간 설계처럼 현실의 형태를 수학적으로 표현하는 과목입니다.","keywords":["이차곡선","공간도형","공간좌표","벡터","포물선","타원","쌍곡선","삼수선정리","정사영","벡터의내적","평면벡터","공간벡터"],"learning_md":"### 핵심 학습\n\n#### 1. 원뿔을 절단하여 만든 곡선을 어떻게 식으로 표현할까?\n- 이차곡선의 정의와 성질을 이해한다.\n- 이차곡선의 성질을 방정식으로 나타내며 기하적 대상과 대수적 표현의 연결성을 탐구한다.\n\n#### 2. 3차원 공간의 구조와 위치 관계를 어떻게 수치화할까?\n- 평면을 넘어선 공간에서의 위치 관계를 이해한다.\n- 점의 좌표와 구의 방정식을 통해 입체적인 기하 현상을 분석한다.\n\n#### 3. 크기와 방향을 동시에 가진 양을 어떻게 연산할까?\n- 벡터의 연산과 성분을 학습하여 도형의 성질을 대수적으로 증명한다.\n- 직선과 평면의 방정식을 간결하게 표현한다.","activities_md":"### 기하 개념 분석\n\n#### 공간과 도형 해석\n- 이차곡선, 공간 좌표, 벡터를 활용하여 도형의 성질을 설명한다.\n- 기하 개념을 건축, 우주, 로봇, 3D 그래픽 같은 실제 사례와 연결한다.\n\n### 표현과 적용\n\n#### 모델링과 시각화\n- 수학적 모델을 세우고 그림, 그래프, 식으로 표현한다.\n- 공간적 문제를 분석하여 보고서나 발표 자료로 정리한다.","advanced_md":"### 항공·우주 계열\n\n#### 이차곡선의 성질을 활용한 인공위성 궤도 설계\n- 타원과 쌍곡선의 초점 성질을 탐구하여 케플러의 궤도 법칙을 이해한다.\n- 위성의 최저 고도와 최고 고도를 결정하는 방정식을 도출한다.\n\n### 건축 계열\n\n#### 정사영 원리를 활용한 비정형 건축물의 일조량 분석\n- 피라미드, 피사의 사탑 등 기하학적 정사영 개념이 적용되는 사례를 살펴본다.\n- 복잡한 형태의 외벽이 지면에 만드는 그림자 면적을 산출한다.\n- 건물의 에너지 효율성을 평가한다.\n\n### 공학 계열\n\n#### 벡터 역학을 이용한 로봇 팔의 관절 운동 제어\n- 평면 및 공간 벡터의 성분 분해를 활용한다.\n- 로봇 팔이 목표 지점에 도달하기 위한 각 관절의 이동 경로를 수학적으로 모델링한다.","fit_md":"- 컴퓨터공학, 데이터과학, 전기전자공학, 기계공학 등 공학 계열 진학을 희망하는 학생\n- 기하적 대상을 시각화하고 연역적으로 증명하는 것을 즐기는 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과"],"semantic_status":"text_reviewed"},{"id":"course_기후변화와_지속가능한_세계","type":"course","name":"기후변화와 지속가능한 세계","basic":{"grade_semester":"3학년 2학기","subject_area":"사회","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"통합적 관점에서 기후변화의 원인을 이해하고, 기후변화가 유발하는 사회·생태적 문제와 지속가능한 대응 방안을 탐구하는 과목입니다.","keywords":["기후변화","기후문제","지속가능한발전","온난화","인류세","기후재난","기후정의","기후문제의불평등","생태전환","적정기술","순환경제","에너지전환","지속가능발전목표","지속가능한소비","생태시민"],"learning_md":"### 핵심 학습\n\n#### 1. 기후 변화의 원인은 무엇이며 얼마나 심각한가?\n- 지도와 그래픽을 이용하여 기후변화와 관련한 쟁점을 찾고 탐구 주제를 설정한다.\n- 탐구 질문에 필요한 정보와 근거를 수집한다.\n\n#### 2. 기후정의와 지역 문제\n- 기후 정의의 의미와 지역에서 나타나는 기후 문제를 살펴본다.\n- 기후 재난, 기후 정의, 기후 문제의 불평등을 중심으로 쟁점을 탐구한다.\n- 공간적, 윤리적, 정치적 질문을 제시하고 탐구 방법을 계획한다.\n\n#### 3. 지속가능한 세계를 위한 생태전환\n- 지속가능한 세계를 위한 기후 변화 대응 노력을 탐구한다.\n- 생태전환, 적정기술, 순환경제, 에너지전환의 의미를 살펴본다.\n- 자료의 비교, 분석, 평가를 통해 합리적 판단과 의사결정을 한다.\n\n#### 4. 공존의 세계와 생태시민\n- 지속가능발전목표를 실현하기 위해 필요한 행동과 실천을 생각한다.\n- 지속가능한 소비와 생태시민의 역할을 탐구한다.\n\n#### 5. 해결 방안 도출\n- 분석된 자료에 근거하여 기후변화 쟁점에 대한 해결 방안을 도출한다.\n- 다양한 해결 방안을 비교하고 실천 가능성을 평가한다.","activities_md":"### 기후 자료 분석\n\n#### 쟁점 찾기와 자료 비교\n- 지도, 그래픽, 통계 자료를 활용하여 기후변화 쟁점을 찾는다.\n- 지역별·집단별 영향 차이를 비교하여 기후 정의의 관점에서 분석한다.\n\n### 표현과 적용\n\n#### 생태전환 실천 제안\n- 지속가능한 소비, 에너지 전환, 순환경제와 관련된 실천 방안을 제안한다.\n- 보고서, 정책 제안, 캠페인 자료 등으로 탐구 결과를 표현한다.","advanced_md":"### 정보·통계 계열\n\n#### 기후 예측 시나리오 만들기\n- 세계의 기후 데이터를 분석한다.\n- AI를 활용하여 에너지 사용량 증가, 생태 전환 등 다양한 기후 변화 시나리오를 만들어 본다.\n\n### 경영·경제 계열\n\n#### 지속가능 경영 사례 분석\n- 다국적 기업의 지속가능 경영 사례를 조사한다.\n- 그린워싱 사례와 비교하여 기업의 환경 책임을 비판적으로 분석한다.\n\n### 정치·국제 계열\n\n#### 지속가능발전목표를 위한 국제 협약\n- 우리나라의 NDC 보고서를 분석한다.\n- 온실가스 감축 목표 달성을 위한 구체적인 정책을 제안한다.","fit_md":"- 기후변화 문제에 관심을 갖고 통합적 관점에서 해결 방안을 탐구하고 싶은 학생\n- 생태시민의 입장에서 책임감을 가지고 지속가능한 세계를 만들기 위한 기후 변화 대응에 참여하고 싶은 학생","related_department_names":["화학과","화학공학과","약학과","신소재공학과","환경공학과","에너지자원공학과","사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_화학과","dept_화학공학과","dept_약학과","dept_신소재공학과","dept_환경공학과","dept_에너지자원공학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_기후변화와_환경생태","type":"course","name":"기후변화와 환경생태","basic":{"grade_semester":"2학년 1학기","subject_area":"과학","course_type":"융합 선택","selection_group":"학년선택","credits":"원문 기준","exam":""},"one_liner":"상세 내용은 담당선생님께 문의하세요.","keywords":[],"learning_md":"### 담당교사 문의\n\n#### 기후변화와 환경생태\n- 상세 내용은 담당선생님께 문의하세요.","activities_md":"### 담당교사 문의\n\n#### 활동 안내\n- 상세 내용은 담당선생님께 문의하세요.","advanced_md":"### 담당교사 문의\n\n#### 심화 탐구 안내\n- 상세 내용은 담당선생님께 문의하세요.","fit_md":"- 상세 내용은 담당선생님께 문의하세요.","related_department_names":["진로 관심 분야에 따라 학과 연결 필요"],"related_department_ids":[],"semantic_status":"담당교사 문의"},{"id":"course_논리와_사고","type":"course","name":"논리와 사고","basic":{"grade_semester":"3학년 2학기","subject_area":"교양","course_type":"진로 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"막연한 추측에서 벗어나 논리 규칙을 익히고, 근거를 바탕으로 주장의 정당성을 증명하여 합리적인 결론을 도출하는 과목입니다.","keywords":["추론","논증","비판적사고","합리적의사결정","종합적사고능력","인간사고와논리","논리적오류","연역","귀납","논증의타당성","논술","논리기호","추론규칙","코딩","가설과증거","확률과통계","머신러닝"],"learning_md":"### 핵심 학습\n\n#### 1. 내 말에 논리의 허점이 숨어 있지는 않을까?\n- 논리적 사고의 의미를 이해한다.\n- 추론과 논증의 특징을 이해하고 적용한다.\n- 논리적 오류를 피하고 합리적으로 결정하는 방법을 익힌다.\n\n#### 2. 언어와 논리\n- 연역 논증과 귀납 논증을 비교한다.\n- 타당한 논증과 건전한 논증의 차이를 이해한다.\n- 다양한 글에 제시된 논증을 분석·평가하여 토론과 글쓰기에 활용한다.\n> 질문: 열 번의 성공이 열한 번째의 성공을 확실히 보장할 수 있을까?\n\n#### 3. 복잡한 생각을 기호로 표현할 수 있을까?\n- 논리 기호를 사용하여 복잡한 주장을 형식화한다.\n- 논증의 타당성을 판단한다.\n- 자연 연역의 추론 규칙을 파악한다.\n\n#### 4. 과학과 논리\n- 귀납 추론의 종류를 구분한다.\n- 과학적 추론 속 확률과 통계의 역할을 탐구한다.\n- 귀납 논리와 머신 러닝의 관계를 이해한다.\n> 질문: 인공지능은 어떤 논리로 내 취향을 예측할까?","activities_md":"### 논증 분석\n\n#### 주장과 근거 따져보기\n- 글이나 말 속 주장, 근거, 전제를 구분한다.\n- 논리적 오류를 찾아 타당한 문장으로 고쳐 본다.\n\n### 표현과 적용\n\n#### 토론과 글쓰기\n- 사회적 쟁점에 대한 논증 구조를 분석한다.\n- 자신의 주장을 근거와 추론 규칙에 맞게 구성하여 토론문이나 글로 표현한다.","advanced_md":"### 인문·사회 계열\n\n#### 미디어 속 논증의 오류 분석\n- 가짜 뉴스, 신문 사설 등에서 나타나는 논증의 오류를 분석한다.\n- 오류가 있는 주장을 타당한 문장으로 재구성한다.\n- 가짜 뉴스 확산을 방지하기 위한 국내외 제도적 대안을 조사한다.\n\n### 사회 계열\n\n#### 법적 판결문으로 논증 구조 탐구\n- 실제 법적 판결문을 연역 논증 구조로 분석하고 판결 근거를 검토한다.\n- 특정 사회적 쟁점에 대해 판결문의 논리 형식을 빌려 자신만의 논증적 토론문을 작성하고 친구들과 토론한다.\n\n### 공학 계열\n\n#### 인공지능 알고리즘과 귀납적 추론 탐구\n- 인공지능이 방대한 데이터를 학습해 예측 모델을 만드는 과정에 담긴 귀납 논리를 탐구한다.\n- 알고리즘의 결과가 정답이 아닐 수 있는 이유를 확률적 특성과 연결하여 분석하고 발표한다.","fit_md":"- 자신의 주장을 근거로 뒷받침하는 연습을 통해 논리적인 말하기와 글쓰기 능력을 기르고 싶은 학생\n- 세상의 문제를 편견과 오해에서 벗어나 객관적이고 합리적으로 바라보고 싶은 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과"],"semantic_status":"text_reviewed"},{"id":"course_대수","type":"course","name":"대수","basic":{"grade_semester":"2학년 1학기","subject_area":"수학","course_type":"일반 선택","selection_group":"학교지정","credits":"4학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"복잡한 변화와 반복되는 현상 속에서 규칙을 찾아내고, 함수와 수열을 활용해 앞으로의 변화를 예측하는 수학 과목입니다.","keywords":["지수","로그함수","삼각함수","사인","코사인법칙","수열","추론","거듭제곱근","호도법","삼각함수의그래프","등차","등비수열","수열의합","수학적귀납법"],"learning_md":"### 핵심 학습\n\n#### 1. 아주 크거나 작은 수의 변화를 어떻게 다룰까?\n- 지수와 로그의 성질을 이해한다.\n- 급격히 증감하는 자연 및 사회 현상을 지수·로그함수의 그래프로 분석한다.\n\n#### 2. 반복되는 주기적 현상을 어떻게 수치화할까?\n- 일반각과 호도법의 정의를 바탕으로 삼각함수의 주기적 성질을 탐구한다.\n- 삼각형의 측정과 관련된 사인법칙과 코사인법칙을 학습한다.\n\n#### 3. 나열된 수들 사이의 규칙을 어떻게 증명할까?\n- 수의 나열에서 규칙을 발견하여 일반항과 합을 구한다.\n- 수학적 귀납법을 통해 모든 자연수에 대해 성립하는 명제를 논리적으로 정당화한다.","activities_md":"### 함수와 수열 분석\n\n#### 변화와 반복의 규칙 찾기\n- 지수·로그함수, 삼각함수, 수열을 활용하여 변화 현상을 분석한다.\n- 그래프, 일반항, 합 공식으로 현상을 수학적으로 표현한다.\n\n### 표현과 적용\n\n#### 실생활 모델링\n- 소리, 지진, 금융, 주기 현상 등 실생활 사례를 수학 모델로 설명한다.\n- 계산 과정과 해석 결과를 보고서나 발표로 정리한다.","advanced_md":"### 자연 계열\n\n#### 로그의 성질을 활용한 소리의 세기 및 지진 강도 분석\n- 로그를 활용하는 실생활 사례를 수집한다.\n- 데시벨(dB), 리히터 규모처럼 큰 데이터 범위를 로그로 압축하여 표현하는 원리를 탐구하고 발표한다.\n\n### 공학 계열\n\n#### 삼각함수와 노이즈 캔슬링\n- 소리와 진동을 삼각함수로 표현한다.\n- 상쇄 간섭의 원리를 수학적으로 분석한다.\n\n### 상경 계열\n\n#### 등비수열의 합을 이용한 연금의 현재 가치 산출 및 설계\n- 경제 수학의 개념과 연계하여 이자율 변동에 따른 적금 및 연금의 미래 가치를 수열 모델로 설계한다.\n- 합리적인 저축 계획을 수학적으로 제안한다.","fit_md":"- 자연계열, 공학계열 진학에 필요한 기초를 쌓고 싶은 학생\n- 복잡한 변화 현상을 함수와 수열로 구조화하고 수학적으로 정당화하는 과정에 흥미를 느끼는 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과","사회학과","정치외교학과","법학과","행정학과","사회복지학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_독서_토론과_글쓰기","type":"course","name":"독서 토론과 글쓰기","basic":{"grade_semester":"2학년 1학기","subject_area":"국어","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"다양한 분야의 책과 자료를 읽고 토론하며 글을 쓰는 과정에서 비판적·창의적 사고력과 의사소통 능력을 기르는 과목입니다.","keywords":["주제독서","비판적사고","토론능력","논증구성","협력학습","설득적글쓰기","근거중심사고","핵심논지파악","쟁점발견","관점비교","찬반논증","반론구성","경청과조정","논설문작성","비평글쓰기","자료활용"],"learning_md":"### 핵심 학습\n\n#### 1. 한 권의 책은 어떤 사회적 질문을 던질까?\n- 책의 핵심 주장과 논거를 구조화하여 정리한다.\n- 작품 속 인물, 사건, 문제 상황에서 사회적 쟁점을 도출한다.\n- 저자의 관점과 전제, 가치관을 분석한다.\n\n#### 2. 서로 다른 의견은 어떻게 새로운 관점을 만들어낼까?\n- 찬반 논증, 반론 구성, 경청과 조정의 과정을 이해한다.\n- 토론을 통해 자신의 생각이 어떻게 발전하는지 성찰한다.\n\n#### 3. 토론 주제를 어떻게 준비하고 진행할까?\n- 토론 주제를 중심으로 찬반 논거를 조사한다.\n- 근거 자료를 활용하여 토론을 진행한다.\n- 토론 과정에서 제시된 반론과 쟁점을 정리한다.\n\n#### 4. 논리적인 글로 어떻게 표현할 수 있을까?\n- 토론 내용을 반영하여 논설문을 작성한다.\n- 자료를 인용하여 사회 문제에 대한 비평문을 작성한다.\n- 정책 제안서나 칼럼 형식으로 자신의 관점을 정리한다.","activities_md":"### 읽기와 토론\n\n#### 쟁점 도출과 토론\n- 다양한 분야의 책과 자료를 읽고 사회적 쟁점을 찾는다.\n- 찬반 논거와 반론을 준비하여 토론한다.\n\n### 표현과 적용\n\n#### 글쓰기 결과물 만들기\n- 토론에서 발전한 생각을 논설문, 비평문, 제안서, 칼럼으로 표현한다.\n- 근거 자료를 적절히 인용하고 자신의 관점을 논리적으로 구성한다.","advanced_md":"### 인문·사회 계열\n\n#### 기술 발전과 인간 삶의 변화 탐구\n- AI, 자동화 등 기술 발전을 다룬 도서와 기사를 읽는다.\n- 기술 발전이 인간의 삶과 노동에 미치는 영향을 분석한다.\n- 찬반 토론 후 사회적 대안을 제시하는 글을 쓴다.\n\n### 자연·과학 계열\n\n#### 생명과학 기술과 윤리 문제 탐구\n- 유전자 편집, 생명 복제 등 관련 자료를 조사한다.\n- 과학 기사와 인문학 자료를 비교하여 읽는다.\n- 윤리적 쟁점을 중심으로 입장문을 작성한다.\n\n### 경제·경영 계열\n\n#### 소비 사회와 ‘가치’의 변화 읽기\n- 소비 사회 또는 관련 경제 텍스트를 발췌하여 읽는다.\n- ‘필요’와 ‘욕망’ 개념을 중심으로 핵심 주장을 정리한다.\n- 광고와 SNS 소비 사례를 텍스트의 개념과 연결해 해석한다.","fit_md":"- 사회적 쟁점에 대해 토론하며 사고의 폭을 넓히고 싶은 학생\n- 근거를 바탕으로 논리적으로 주장하는 능력을 기르고 싶은 학생\n- 협력적 학습을 통해 사고를 발전시키고 결과물을 완성하는 과정을 경험하고 싶은 학생\n- 언론, 법, 행정, 교육, 경영 등 의사소통과 논증 능력이 중요한 분야로 진학을 희망하는 학생","related_department_names":["국어국문학과","문헌정보학과","미디어학과","교육학과","법학과"],"related_department_ids":["dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_법학과"],"semantic_status":"text_reviewed"},{"id":"course_독서와_작문","type":"course","name":"독서와 작문","basic":{"grade_semester":"3학년 1학기","subject_area":"국어","course_type":"일반 선택","selection_group":"학교지정","credits":"3학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"글의 주장과 근거를 비판적으로 읽고, 자료를 활용하여 설득력 있는 글을 쓰는 능력을 기르는 과목입니다.","keywords":["비판적독해","논증구조","요약과정리","정보활용","문제해결","논리적글쓰기","자료분석","주제파악","논증분석","정보의신뢰성","개요작성","논리전개","자료활용","문단구성"],"learning_md":"### 핵심 학습\n\n#### 1. 우리는 글을 어떻게 비판적으로 읽을 수 있을까?\n- 글의 주장과 근거를 구조화하여 논증 구조를 도식화한다.\n- 통계 자료, 그래프, 사례 등 근거의 타당성을 분석한다.\n- 동일 주제를 다룬 기사나 칼럼의 관점과 전제를 비교한다.\n- 글 속 숨은 전제와 설득 전략을 비판적으로 분석한다.\n\n#### 2. 설득력 있는 글은 어떻게 구성되는가?\n- 논설문 개요를 작성하고 근거 자료를 활용하여 글을 완성한다.\n- 통계, 사례, 전문가 의견 등 다양한 자료를 활용하여 보고서를 작성한다.\n- 반론을 고려하여 자신의 주장을 보완하는 글쓰기 활동을 한다.\n- 자기소개서, 제안서, 칼럼 등 다양한 목적의 글 형식을 탐구한다.","activities_md":"### 비판적 읽기\n\n#### 주장과 근거 분석\n- 글의 핵심 주장과 근거를 구조화한다.\n- 자료의 신뢰성과 설득 전략을 비판적으로 평가한다.\n\n### 표현과 적용\n\n#### 목적에 맞는 글쓰기\n- 논설문, 보고서, 제안서, 칼럼 등 다양한 형식의 글을 작성한다.\n- 반론과 근거 자료를 반영하여 설득력을 높인다.","advanced_md":"### 전 계열\n\n#### 사회 현안에 대한 제안서 작성\n- 기사를 읽고 주장과 통계 자료의 신뢰성을 검토한다.\n- 기사에 드러난 사회 문제의 원인을 정리한다.\n- 청소년 또는 지역사회 차원의 해결 방안을 담은 정책 제안서를 작성한다.\n\n### 인문·사회 계열\n\n#### 사상가의 주장 비교 비평\n- 철학자 또는 사회 사상가의 글이나 칼럼을 읽는다.\n- 두 글의 주장과 가치관을 비교하여 논증 구조를 표나 그림으로 만든다.\n- ‘현대 사회에서 더 설득력 있는 관점은 무엇인가’를 주제로 비평문을 쓴다.\n\n### 자연·공학 계열\n\n#### 과학 정보 재구성 프로젝트\n- AI, 기후 변화, 유전자 편집 등 과학 기사나 연구 소개 글을 읽는다.\n- 핵심 개념과 원리를 정리하고 일반 독자가 이해하기 쉬운 설명문으로 재작성한다.\n- 설명 내용을 표, 도식, 그래프 등으로 시각화하여 제작한다.","fit_md":"- 사회 현안을 비판적으로 바라보고 합리적인 대안을 제시해 보고 싶은 학생\n- 대학 진학 후 요구되는 보고서 작성 능력과 논문 독해 능력을 미리 준비하고 싶은 학생\n- 자료를 분석하고 정리하여 문제 해결 중심의 사고력을 기르고 싶은 학생","related_department_names":["생명과학과","생명공학과","의예과","약학과","간호학과","임상병리학과","컴퓨터공학과","소프트웨어학과","인공지능학과","빅데이터학과","정보보안학과","국어국문학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_의예과","dept_약학과","dept_간호학과","dept_임상병리학과","dept_컴퓨터공학과","dept_소프트웨어학과","dept_인공지능학과","dept_빅데이터학과","dept_정보보안학과","dept_국어국문학과"],"semantic_status":"text_reviewed"},{"id":"course_동아시아_역사_기행","type":"course","name":"동아시아 역사 기행","basic":{"grade_semester":"2학년 2학기","subject_area":"사회","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"동아시아 각국의 특징을 역사적 맥락에서 파악하고, 교류와 갈등, 침략과 저항, 공존과 평화를 주제로 동아시아 역사를 탐구하는 과목입니다.","keywords":["역사기행","교류와갈등","침략과저항","평화와공존","동아시아생태환경","교류","종교","17세기전후전쟁","제국주의","아시아","태평양전쟁","냉전과열전","역사및영토갈등"],"learning_md":"### 핵심 학습\n\n#### 1. 동아시아로 떠나는 역사 기행\n- 역사 기행의 의미와 탐구 방법을 파악한다.\n- 동아시아의 범위와 특징을 파악한다.\n- 유목 세계, 농경 세계, 해양 세계의 삶을 이해한다.\n> 질문: 역사 기행이란 무엇이며, 동아시아 사람들은 어떻게 생활하고 있을까?\n\n#### 2. 교류와 갈등의 현장에서 만난 역사\n- 지역 간 교류를 보여주는 문화유산을 탐구한다.\n- 종교와 사상을 중심으로 각 지역 간 교류 양상을 파악한다.\n- 17세기 전후 동아시아 전쟁에 따른 변화를 이해한다.\n> 질문: 지역 간 교류의 시작과 17세기 전후 전쟁의 양상은 어떠하였을까?\n\n#### 3. 침략과 저항의 현장에서 만난 역사\n- 제국주의 열강의 침략과 전쟁을 탐구한다.\n- 아시아·태평양 전쟁과 이에 대한 저항과 연대를 파악한다.\n- 침략과 전쟁이 지역 생활과 생태환경에 미친 영향을 탐구한다.\n> 질문: 제국주의는 어떻게 아시아·태평양 전쟁까지 이어지게 되었을까?\n\n#### 4. 평화와 공존의 현장에서 만난 역사\n- 냉전 시기 지역 전쟁과 각국의 정치적 변화를 파악한다.\n- 경제와 사회 변화 양상을 분석한다.\n- 역사 및 영토 분쟁 사례를 파악하고 해결책을 모색한다.\n> 질문: 냉전 이후 동아시아의 변화와 오늘날 당면한 과제는 무엇일까?","activities_md":"### 역사 자료 분석\n\n#### 현장과 자료로 역사 읽기\n- 문화유산, 전쟁, 교류, 분쟁 사례를 역사적 맥락에서 분석한다.\n- 동아시아 각 지역의 생활, 생태환경, 교류 양상을 비교한다.\n\n### 표현과 적용\n\n#### 역사 기행 결과물 만들기\n- 역사 기행 보고서, 발표, 지도, 탐구 자료로 학습 결과를 표현한다.\n- 동아시아의 갈등과 공존 문제를 오늘날의 국제 관계와 연결한다.","advanced_md":"### 인문과학 계열\n\n#### 동아시아 각국 축제의 역사 탐구\n- 동아시아 각국을 대표하는 전통 축제를 조사한다.\n- 축제가 탄생한 역사적 배경과 오늘날 갖는 의의를 분석한다.\n\n### 사회·상경 계열\n\n#### 동아시아 지역 간 교류의 전개 양상 파악\n- 동아시아에서 특정 지역 두 곳을 선정하여 교류사를 정리한다.\n- 지역 간 교류가 가져온 긍정적·부정적 효과를 분석한다.\n\n### 자연과학 계열\n\n#### 동아시아 생태환경의 변화 분석\n- 동아시아 각국의 지정학적 위치에 따른 생태환경을 조사한다.\n- 생태환경의 변화를 초래한 인위적·자연적 원인을 분석한다.","fit_md":"- 한국사, 철학, 인문학의 배경 지식을 동아시아 지역으로 확장하여 깊이 있게 역사를 공부하려는 학생\n- 외교 및 국제 무역 분야로의 진출을 희망하는 학생\n- 중국 및 일본의 역사에 대한 심화 학습을 통해 관광 및 여행 분야로의 진출을 희망하는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_매체_의사소통","type":"course","name":"매체 의사소통","basic":{"grade_semester":"3학년 2학기","subject_area":"국어","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"매체를 통한 의사소통의 방식과 문제점을 비판적으로 탐구하고, 바람직한 매체 의사소통 문화를 만들어 가는 과목입니다.","keywords":["매체리터러시","디지털소통","정보판별","콘텐츠제작","비판적수용","미디어윤리","메시지전략","프레이밍","이미지와텍스트","정보신뢰성","스토리보드","타깃분석","콘텐츠기획"],"learning_md":"### 핵심 학습\n\n#### 1. 매체는 정보를 어떤 방식으로 구성하고 강조할까?\n- 동일 사건을 다룬 여러 뉴스 영상과 기사를 비교하며 매체가 정보를 구성하는 방식을 분석한다.\n- 기사 제목, 썸네일, 자막이 메시지 해석에 미치는 영향을 탐구한다.\n- 광고와 SNS 콘텐츠의 이미지, 음향, 편집 방식이 어떤 설득 전략으로 작동하는지 살펴본다.\n\n#### 2. 효과적인 매체 메시지는 어떻게 만들어지는가?\n- 전달하려는 목적과 대상에 맞게 카드뉴스나 숏폼 영상을 기획하고 제작한다.\n- 사회 문제를 주제로 공익 캠페인 콘텐츠를 제작하며 매체 표현의 효과를 점검한다.\n- 팟캐스트 대본을 작성하고 녹음 활동을 진행하며 음성 매체의 의사소통 방식을 경험한다.","activities_md":"### 매체 분석\n\n#### 뉴스와 영상 비교 분석\n- 동일 사건을 다룬 뉴스 영상과 기사를 비교하여 관점, 강조점, 표현 방식을 분석한다.\n- 제목, 자막, 썸네일, 이미지 배치가 독자의 이해와 판단에 미치는 영향을 정리한다.\n\n#### 광고와 SNS 콘텐츠 분석\n- 광고와 SNS 콘텐츠에 사용된 이미지, 음향, 편집 방식의 설득 전략을 탐구한다.\n- 콘텐츠가 특정 집단이나 사회 문제를 어떻게 재현하는지 비판적으로 살펴본다.\n\n### 매체 제작\n\n#### 카드뉴스·숏폼 영상 제작\n- 사회 문제나 학교생활 주제를 선정하여 카드뉴스 또는 숏폼 영상을 기획한다.\n- 대상 독자와 전달 목적에 맞춰 문구, 이미지, 편집 방식을 선택한다.\n\n#### 팟캐스트 제작\n- 주제 선정, 대본 작성, 녹음, 편집 과정을 거쳐 음성 콘텐츠를 제작한다.\n- 제작한 콘텐츠를 공유하고 친구들의 피드백을 반영한다.","advanced_md":"### 전 계열\n\n#### 추천 알고리즘과 정보 편향 탐구\n- 유튜브와 SNS 추천 알고리즘 사례를 조사한다.\n- 동일 주제를 검색했을 때 나타나는 콘텐츠 차이를 비교 분석한다.\n- 정보 편향 문제와 개선 방안을 탐구 보고서로 작성한다.\n\n### 언론·미디어 계열\n\n#### 뉴스 프레이밍과 여론 형성 분석\n- 동일 사건을 다룬 여러 매체의 기사를 수집한다.\n- 기사 제목, 사진, 표현 방식이 독자에게 주는 인상을 비교한다.\n- 매체의 관점이 독자 인식과 여론 형성에 미치는 영향을 비평문으로 정리한다.\n\n### 경영·마케팅 계열\n\n#### 브랜드 메시지와 콘텐츠 전략 연구\n- 기업 광고와 SNS 콘텐츠 사례를 분석한다.\n- 타깃 소비자 설정과 메시지 전략이 어떻게 연결되는지 살펴본다.\n- 새로운 브랜드 홍보 콘텐츠 기획서를 작성한다.","fit_md":"- 뉴스, SNS, 영상, 광고 등 다양한 매체가 사회에 미치는 영향을 비판적으로 보고 싶은 학생\n- 카드뉴스, 숏폼 영상, 팟캐스트 등 매체 콘텐츠 제작에 관심이 있는 학생\n- 언론, 미디어, 마케팅, 콘텐츠 기획, 사회 문제 탐구와 연결해 보고 싶은 학생","related_department_names":["컴퓨터공학과","소프트웨어학과","인공지능학과","빅데이터학과","정보보안학과","사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","국어국문학과"],"related_department_ids":["dept_컴퓨터공학과","dept_소프트웨어학과","dept_인공지능학과","dept_빅데이터학과","dept_정보보안학과","dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_국어국문학과"],"semantic_status":"text_reviewed"},{"id":"course_문학","type":"course","name":"문학","basic":{"grade_semester":"2학년 2학기","subject_area":"국어","course_type":"일반 선택","selection_group":"학교지정","credits":"4학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"시, 소설, 희곡 등 다양한 문학 작품을 읽고 인간과 사회를 이해하며, 작품을 해석하고 새롭게 표현하는 과목입니다.","keywords":["문학감상","비판적해석","공감과성찰","상징과서사","문화맥락","창의적표현","인간이해","서사구조","화자와시점","상징과이미지","시대적배경","창의적재구성","문학창작","비평적글쓰기"],"learning_md":"### 핵심 학습\n\n#### 1. 문학 작품은 어떤 방식으로 인간과 사회를 드러내는가?\n- 시에서 화자의 시선과 정서 변화를 추적한다.\n- 소설 속 인물 관계도와 갈등 구조를 그래프로 시각화한다.\n- 작품 속 상징, 사물, 공간, 색채가 의미하는 바를 해석한다.\n- 실제 역사·사회 자료를 찾아 작품의 시대적 배경과 연결한다.\n\n#### 2. 작품을 나만의 시각으로 다시 만들어 볼 수 있을까?\n- 작품의 결말을 다른 방향으로 다시 써 보며 서사의 가능성을 탐색한다.\n- 소설 장면을 희곡이나 대본 형식으로 각색한다.\n- 작품 속 인물의 이후 삶을 상상하여 단편 서사를 작성한다.\n- 작품에 대한 비평문을 작성하고 토론한다.","activities_md":"### 작품 이해와 분석\n\n#### 화자·인물·갈등 분석\n- 시의 화자와 정서 변화를 추적한다.\n- 소설의 인물 관계와 갈등 구조를 도식화한다.\n- 상징과 배경이 작품의 의미 형성에 어떻게 기여하는지 분석한다.\n\n#### 시대와 사회 맥락 탐구\n- 작품의 배경이 되는 역사적 사건과 사회 분위기를 조사한다.\n- 작품 속 갈등을 현실 사회 문제와 연결하여 해석한다.\n\n### 창작과 비평\n\n#### 작품 재구성\n- 작품의 결말이나 주요 장면을 다른 방식으로 재구성한다.\n- 소설을 희곡, 대본, 낭독극, 라디오 드라마 등 다른 장르로 바꿔 표현한다.\n\n#### 비평문 작성과 토론\n- 작품에 대한 자신의 관점을 비평문으로 작성한다.\n- 친구들과 해석을 나누며 작품의 의미를 확장한다.","advanced_md":"### 전 계열\n\n#### 문학 속 사회 문제 탐구 프로젝트\n- 동일 주제를 다룬 고전 작품과 현대 작품을 비교한다.\n- 작품 속 갈등 구조와 현실 사회 문제를 비교 분석한다.\n- 탐구 결과를 발표 자료로 제작하고 토론한다.\n\n### 인문·사회 계열\n\n#### 문학 속 시대정신과 이데올로기 연구\n- 특정 시대의 작품을 선정하여 역사적 사건과 사회 분위기를 조사한다.\n- 인물과 서사가 시대 상황을 어떻게 반영하는지 분석한다.\n- 작품 해석을 바탕으로 시대정신과 이데올로기를 설명하는 보고서를 작성한다.\n> 예시: 일제강점기 작품, 산업화 시대 작품\n\n### 예술·콘텐츠 계열\n\n#### 문학 작품의 영상·공연 콘텐츠화\n- 소설의 한 장면을 영상 시나리오로 각색한다.\n- 북트레일러나 짧은 영상을 제작한다.\n- 낭독극이나 라디오 드라마 형식으로 작품 장면을 표현한다.","fit_md":"- 문학 작품을 통해 인간의 감정, 관계, 사회 문제를 깊게 이해하고 싶은 학생\n- 읽기와 해석뿐 아니라 글쓰기, 각색, 발표, 토론 활동을 좋아하는 학생\n- 국어국문학, 문예창작, 교육, 미디어, 공연·영상 콘텐츠 분야에 관심이 있는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","국어국문학과","문헌정보학과","미디어학과","교육학과","디자인과","연극영화학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_디자인과","dept_연극영화학과"],"semantic_status":"text_reviewed"},{"id":"course_문학과_영상","type":"course","name":"문학과 영상","basic":{"grade_semester":"3학년 2학기","subject_area":"국어","course_type":"진로 선택","selection_group":"학교지정","credits":"3학점 (학교지정)","exam":""},"one_liner":"문학과 영상 매체를 함께 탐구하며, 원작의 의미가 영상 언어로 어떻게 바뀌고 확장되는지 이해하는 과목입니다.","keywords":["서사와영상","각색","스토리텔링","인물분석","시각적표현","장면구성","매체전환","카메라구도","편집","음향효과","스토리보드","시나리오","콘텐츠제작"],"learning_md":"### 핵심 학습\n\n#### 1. 영상은 이야기를 어떻게 시각적으로 구현하는가?\n- 원작 소설과 영화·드라마 장면의 서사 전달 방식을 비교 분석한다.\n- 카메라 구도와 장면 전환이 인물 표현에 미치는 효과를 분석한다.\n- 영화 속 색채, 음악, 공간 연출이 상징하는 의미를 탐구한다.\n\n#### 2. 문학 작품을 영상 콘텐츠로 다시 만들 수 있을까?\n- 소설의 특정 장면을 영상 시나리오로 각색한다.\n- 장면 구성과 카메라 구도를 포함한 스토리보드를 제작한다.\n- 짧은 영상 콘텐츠나 북트레일러를 제작한다.","activities_md":"### 문학과 영상 비교\n\n#### 원작과 영상 작품 비교 분석\n- 원작 소설과 영화·드라마의 장면을 비교하여 서사 전달 방식을 분석한다.\n- 인물 묘사, 사건 구성, 결말 변화가 작품 의미에 미치는 영향을 살펴본다.\n\n#### 영상 언어 분석\n- 카메라 구도, 장면 전환, 색채, 음악, 공간 연출이 인물과 주제를 어떻게 드러내는지 분석한다.\n- 영상 연출이 원작의 의미를 어떻게 바꾸거나 확장하는지 비평한다.\n\n### 창작과 제작\n\n#### 영상 시나리오와 스토리보드 제작\n- 문학 작품의 장면을 영상 시나리오로 각색한다.\n- 장면 구성, 촬영 구도, 배경음악, 색채 계획을 포함한 스토리보드를 만든다.\n\n#### 북트레일러 또는 짧은 영상 제작\n- 시나 소설 장면을 바탕으로 짧은 영상 콘텐츠를 제작한다.\n- 제작 과정과 표현 의도를 보고서로 정리한다.","advanced_md":"### 문학·인문 계열\n\n#### 고전 문학의 현대적 콘텐츠화\n- 고전 소설이나 고전 시를 현대 사회 배경으로 재구성한다.\n- 인물 설정과 갈등 구조를 현대적으로 변형한다.\n- 영상 시나리오나 콘텐츠 기획안을 작성한다.\n\n### 영화·영상 계열\n\n#### 문학 원작과 영상 작품의 서사 구조 비교\n- 원작 소설과 영화·드라마 장면을 비교 분석한다.\n- 인물 묘사, 사건 구성, 결말 변화를 분석표로 정리한다.\n- 영상 연출이 서사의 의미를 어떻게 바꾸는지 비평문으로 작성한다.\n\n### 콘텐츠 창작 계열\n\n#### 문학 기반 영상 콘텐츠 제작 프로젝트\n- 시 또는 소설 장면을 바탕으로 짧은 영상을 제작한다.\n- 배경음악, 색채, 촬영 구도를 선택한 이유를 정리한다.\n- 제작 과정과 표현 의도를 설명하는 제작 보고서를 작성한다.\n\n### 공연·예술 계열\n\n- 공연, 낭독극, 무대화 활동과 연결할 수 있으나, 구체 예시는 원문 또는 담당 부서 확인 후 보강해야 합니다.","fit_md":"- 문학 작품을 영화, 드라마, 영상 콘텐츠와 연결해 해석하고 싶은 학생\n- 시나리오, 스토리보드, 영상 제작, 북트레일러 제작에 관심이 있는 학생\n- 문학, 미디어, 영상, 공연, 콘텐츠 창작 분야와 연결해 보고 싶은 학생","related_department_names":["국어국문학과","문헌정보학과","미디어학과","교육학과","법학과","디자인과","연극영화학과","영상학과","음악교육과","미술교육과"],"related_department_ids":["dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_법학과","dept_디자인과","dept_연극영화학과","dept_영상학과","dept_음악교육과","dept_미술교육과"],"semantic_status":"text_reviewed"},{"id":"course_물리학","type":"course","name":"물리학","basic":{"grade_semester":"2학년 1학기","subject_area":"과학","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"운동, 에너지, 전기, 빛과 물질의 법칙을 통해 자연 현상과 첨단 기술의 작동 원리를 이해하는 과목입니다.","keywords":["운동","힘","에너지","운동량 보존","역학적 에너지 보존","전자기 유도","축전기","반도체","빛의 간섭","에너지 준위","특수상대성 이론"],"learning_md":"### 핵심 학습\n\n#### 1. 힘과 에너지\n- 물체에 힘이 작용할 때 운동이 어떻게 달라지는지 이해한다.\n- 에너지가 어떤 형태로 바뀌며 보존되는지 학습한다.\n- 구조물의 안정성, 충돌, 열효율 같은 일상과 기술 속 사례를 물리 법칙으로 설명한다.\n- 동영상으로 등가속도 운동을 분석하고, 충돌 상황에서 운동량 보존 법칙을 확인한다.\n\n#### 2. 전기와 자기\n- 눈에 보이지 않는 전기장과 자기장이 에너지를 저장하고 전달하는 방식을 이해한다.\n- 무선 충전, 스피커, 전기제품, 축전기 등 현대 기술과 연결된 사례를 탐구한다.\n- 저항 연결 방식에 따른 소비 전력을 계산하고, 안전한 전기제품 사용을 과학적 근거로 설명한다.\n- 전자기력을 활용한 스피커 설계와 축전기 원리를 탐구한다.\n\n#### 3. 빛과 물질\n- 빛과 물질의 이중성과 에너지의 양자화 개념을 이해한다.\n- 렌즈, 간섭, 스펙트럼, 상대성이론을 통해 현대 물리의 핵심 아이디어를 탐색한다.\n- 이중 슬릿 실험, 볼록렌즈 관찰, 수소 선스펙트럼 분석 활동을 통해 빛과 물질의 성질을 확인한다.\n- 반도체 구조와 특수상대성 이론의 길이수축, 시간팽창 개념을 이해한다.","activities_md":"### 측정과 분석\n\n#### 운동과 충돌 분석\n- 동영상으로 등가속도 운동을 분석한다.\n- 충돌 실험을 통해 운동량 보존을 확인한다.\n- 구조물의 안정성과 평형을 분석한다.\n\n#### 빛과 스펙트럼 관찰\n- 볼록렌즈의 초점거리를 측정한다.\n- 수소 선스펙트럼을 관찰하여 에너지 준위 양자화를 이해한다.\n- 이중 슬릿을 활용해 빛의 간섭 현상을 관찰한다.\n\n### 설계와 제작\n\n#### 전자기 기술 탐구\n- 전자기력을 활용한 스피커를 설계한다.\n- 무선 충전 원리를 탐구한다.\n- 축전기를 활용한 생활 물품 제작 아이디어를 구상한다.\n\n### 기술 원리 탐구\n\n#### 현대 기술 속 물리 법칙\n- 반도체 구조와 전기 소자의 작동 원리를 이해한다.\n- 안전한 전기제품 사용 원리를 물리 개념으로 설명한다.\n- 에너지 보존 법칙과 열효율을 적용해 문제를 해결한다.","advanced_md":"### 인문 계열\n\n#### 물리학 기반 안전 사고 예방 캠페인\n- 뉴턴 운동 법칙을 교통사고 사례에 적용한다.\n- 안전거리, 충돌, 관성의 관계를 조사한다.\n- 사고 예방 홍보물을 제작한다.\n\n### 자연·공학 계열\n\n#### 전기 소자와 반도체 원리 탐구\n- p-n 접합과 다이오드의 원리를 조사한다.\n- 반도체 소자의 특성을 탐구한다.\n- 축전기를 이용한 스마트 수위 조절기를 설계한다.\n\n### 예체능 계열\n\n#### 스포츠와 예술 속 물리 법칙 탐구\n- 운동량 보존과 작용·반작용을 활용하여 멀리뛰기 전략을 세운다.\n- 굴절 원리를 이용한 왜곡상 작품을 만든다.","fit_md":"- 자연 현상과 공학 기술의 원리를 수식, 실험, 모델로 이해하고 싶은 학생\n- 기계, 전기·전자, 반도체, 항공우주, 로봇, 스포츠과학 분야에 관심이 있는 학생\n- 실험과 측정, 분석, 설계 활동을 통해 과학 개념을 확인하고 싶은 학생","related_department_names":["물리학과","기계공학과","전기공학과","전자공학과","반도체공학과","신소재공학과","자동차공학과","로봇공학과","항공우주공학과","에너지자원공학과","컴퓨터공학과","스포츠과학과"],"related_department_ids":["dept_물리학과","dept_기계공학과","dept_전기공학과","dept_전자공학과","dept_신소재공학과","dept_자동차공학과","dept_로봇공학과","dept_항공우주공학과","dept_에너지자원공학과","dept_컴퓨터공학과","dept_스포츠과학과"],"semantic_status":"text_reviewed"},{"id":"course_물질과_에너지","type":"course","name":"물질과 에너지","basic":{"grade_semester":"2학년 2학기","subject_area":"과학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"물질의 상태와 성질, 화학 변화와 에너지의 관계를 탐구하며 화학 현상을 과학적으로 설명하는 과목입니다.","keywords":["물질의 상태","이상기체방정식","분자 간 상호작용","용액의 성질","삼투현상","엔탈피","엔트로피","헤스 법칙","반응 속도","촉매"],"learning_md":"### 핵심 학습\n\n#### 1. 물질은 어떤 상태로 존재할까?\n- 기체, 액체, 고체의 성질을 분자 수준에서 이해한다.\n- 이상기체방정식과 분자 간 상호작용을 활용해 물질의 상태가 일상생활에 미치는 영향을 설명한다.\n- 이상기체방정식으로 기체의 종류를 확인하는 실험을 설계한다.\n- 수소 화합물의 끓는점 차이를 분자 간 상호작용으로 추론하고, 고체의 분류와 성질을 비교한다.\n\n#### 2. 용액의 성질은 어떻게 나타날까?\n- 물의 특성과 용액의 농도가 끓는점, 어는점, 삼투현상에 미치는 영향을 이해한다.\n- 물의 특성 때문에 나타나는 생활 속 현상을 찾는다.\n- 설탕물 농도에 따른 끓는점과 어는점을 측정한다.\n- 농도와 삼투현상의 관계를 실험으로 설계한다.\n\n#### 3. 화학 변화는 왜 저절로 일어날까?\n- 엔탈피와 엔트로피를 통해 화학 변화의 자발성을 이해한다.\n- 에너지 변화와 무질서도 변화가 반응 방향을 결정하는 원리를 학습한다.\n- 대체 연료와 화석 연료의 효율성을 비교한다.\n- 중화 반응으로 헤스 법칙을 확인하고, 주변의 자발적 화학 변화를 설명한다.\n\n#### 4. 반응 속도는 어떻게 조절될까?\n- 화학 반응은 농도, 온도, 촉매 등 조건에 따라 빠르거나 느리게 진행됨을 이해한다.\n- 반응 속도 측정 실험을 설계한다.\n- 일차 반응의 반감기 활용 사례를 조사한다.\n- 농도, 온도, 촉매와 반응 속도의 관계를 탐구한다.","activities_md":"### 실험 설계\n\n#### 물질의 상태와 용액 실험\n- 이상기체방정식을 활용한 기체 확인 실험을 설계한다.\n- 농도와 삼투현상의 관계를 확인하는 실험을 설계한다.\n- 반응 속도 측정 실험을 설계한다.\n\n### 에너지 분석\n\n#### 화학 변화와 에너지\n- 대체 연료와 화석 연료의 효율성을 비교한다.\n- 중화 반응으로 헤스 법칙을 확인한다.\n- 엔탈피와 엔트로피를 활용해 반응 방향을 설명한다.\n\n### 환경·소재 탐구\n\n#### 촉매·소재·사회 전환 탐구\n- 촉매와 효소를 활용한 환경 문제 해결 사례를 조사한다.\n- 세라믹, 금속, 고분자, 에너지 소재의 특성을 탐구한다.\n- 저엔트로피 사회로 전환하기 위한 실천 방안을 토론한다.","advanced_md":"### 공학 계열\n\n#### 세상을 만드는 재료 탐구\n- 세라믹, 금속, 합금 소재를 조사한다.\n- 에너지·전기·광·자기 소재의 활용 분야를 탐색한다.\n- 신약 소재와 고분자 소재의 특성을 비교한다.\n\n### 사회 계열\n\n#### 저엔트로피 사회 전환 방안 탐구\n- 엔트로피 증가 법칙과 현대 사회 문제를 연결한다.\n- 에너지 소비 구조를 분석한다.\n- 실천 방안을 홍보 자료로 제작한다.\n\n### 자연 계열\n\n#### 환경 문제를 해결하는 촉매와 효소 탐구\n- 이산화 탄소 전환 효소 사례를 조사한다.\n- 광촉매를 활용한 오염물질 분해 사례를 정리한다.\n- 촉매 기술의 환경적 가치를 분석한다.","fit_md":"- 화학 반응, 물질의 성질, 에너지 변화의 원리를 실험과 자료로 이해하고 싶은 학생\n- 화학, 화학공학, 신소재, 환경공학, 생명공학, 약학 분야에 관심이 있는 학생\n- 소재와 에너지, 환경 문제를 화학 개념으로 탐구하고 싶은 학생","related_department_names":["화학과","화학공학과","신소재공학과","재료공학과","에너지자원공학과","환경공학과","생명공학과","약학과","식품공학과","물리학과"],"related_department_ids":["dept_화학과","dept_화학공학과","dept_신소재공학과","dept_재료공학과","dept_에너지자원공학과","dept_환경공학과","dept_생명공학과","dept_약학과","dept_식품공학과","dept_물리학과"],"semantic_status":"text_reviewed"},{"id":"course_미술_감상과_비평","type":"course","name":"미술 감상과 비평","basic":{"grade_semester":"3학년 1학기","subject_area":"예술","course_type":"진로 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"미술 작품 속에 숨겨진 의미와 이야기를 발견하고, 나만의 관점으로 해석하는 과목입니다.","keywords":["미술사적의의","맥락적이해","비평관점","디지털감상","문화다양성","진로연계주제","아이디어발상","매체탐구","심미적감성역량","정체성역량","매체실험과융합","전시기획","예술적성찰","창의융합역량","시각적소통역량","공동체역량"],"learning_md":"### 핵심 학습\n\n#### 1. 작품은 시대를 어떻게 담고 있을까?\n- 미술 작품이 시대, 사회, 경제적 변화와 어떤 관련이 있는지 알아본다.\n- 작품이 만들어진 맥락을 파악하며 작가와 작품의 의미를 해석한다.\n\n#### 2. 나에게 이 작품은 어떤 의미일까?\n- 내 삶이나 진로와 관련된 작가와 작품을 찾아 깊이 있게 감상한다.\n- 작품을 통해 자신의 경험, 관심사, 가치관을 돌아본다.\n\n#### 3. 작품의 가치를 어떻게 판단할까?\n- 다양한 비평 관점과 미술 용어를 활용해 작품의 의미를 분석한다.\n- 작품의 미적 가치와 사회적 의미를 논리적으로 설명한다.\n- 미술 비평에서 배운 비판적 사고를 우리 삶의 사회적 이슈와 연결한다.","activities_md":"### 감상과 맥락 읽기\n\n#### 작품의 시대·사회적 배경 분석\n- 작품이 만들어진 시대와 사회적 맥락을 조사한다.\n- 작가의 삶과 철학이 작품 세계에 미친 영향을 분석한다.\n\n#### 나의 삶과 진로에 연결하기\n- 자신의 관심 분야와 연결되는 작가나 작품을 찾아 감상한다.\n- 작품이 자신에게 주는 의미를 글이나 발표로 표현한다.\n\n### 비평과 공유\n\n#### 미술 비평문 작성\n- 미술 용어와 비평 관점을 활용하여 작품을 논리적으로 분석한다.\n- 작품의 사회적 메시지와 미적 가치를 함께 평가한다.\n\n#### 의견 나누기\n- 온라인 플랫폼이나 수업 발표를 통해 작품 해석을 공유한다.\n- 친구들의 다른 해석을 듣고 자신의 관점을 확장한다.","advanced_md":"### 인문·사회 계열\n\n#### 사회적 메시지를 담은 현대 미술 비평 보고서 작성\n- 인권, 평등, 환경 등 사회적 이슈를 다룬 작가의 작품을 선정한다.\n- 관련 기사나 문헌을 조사한다.\n- 작품의 사회적 의의를 분석하는 비평문을 쓰고, 친구들과 의견을 나눈다.\n\n### 예술·공학 계열\n\n#### 디지털 미술관 공간을 활용한 큐레이션 프로젝트\n- 온라인 미술관이나 메타버스 전시 공간을 탐방한다.\n- 디지털 환경에서 감상 방식이 어떻게 달라지는지 체험한다.\n- 특정 주제를 정해 디지털 작품을 선별하고, 가상 전시를 기획한다.\n> 예시 주제: 기술과 인간\n\n### 예술·디자인 계열\n\n#### 작가의 삶과 철학을 분석하는 내러티브 인물 탐구\n- 좋아하는 작가의 일생과 시대적 배경을 조사한다.\n- 작가의 삶과 철학이 작품 양식 변화에 미친 영향을 분석한다.\n- 작가의 예술 세계를 재해석한 발표 자료를 만들고, 미술 용어를 활용해 작품의 미적 가치를 논리적으로 설명한다.","fit_md":"- 미술 작품을 단순히 보는 데서 나아가 의미와 맥락을 해석하고 싶은 학생\n- 예술, 디자인, 미디어, 큐레이션, 문화 콘텐츠 분야에 관심이 있는 학생\n- 작품을 사회적 이슈, 작가의 삶, 시대 변화와 연결해 탐구하고 싶은 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","국어국문학과","문헌정보학과","미디어학과","교육학과","디자인과","연극영화학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_디자인과","dept_연극영화학과"],"semantic_status":"text_reviewed"},{"id":"course_미술_창작","type":"course","name":"미술 창작","basic":{"grade_semester":"2학년 2학기","subject_area":"예술","course_type":"진로 선택","selection_group":"학교지정","credits":"2학점 (학교지정)","exam":""},"one_liner":"자신의 진로나 관심 분야와 미술을 연결하고 작품을 제작함으로써 세계와 소통하는 방법을 창조하는 과목입니다.","keywords":["진로연계","아이디어발상","매체실험","창작설계","세상과소통","창의융합역량","시각적소통역량","진로연계주제","매체탐구","심미적감성역량","정체성역량","매체실험과융합","전시기획","예술적성찰","공동체역량"],"learning_md":"### 핵심 학습\n\n#### 1. 무엇을 작품으로 만들 수 있을까?\n- 자신의 진로나 관심 있는 사회 문제에서 창작 아이디어를 찾는다.\n- 환경, IT, 복지 등 다양한 주제를 미술 표현과 연결한다.\n- 뉴스, 책, 온라인 자료에서 정보를 수집하고 나만의 아이디어를 구체화한다.\n\n#### 2. 아이디어를 어떻게 시각화할까?\n- 스케치나 디지털 도구를 활용하여 생각을 시각화한다.\n- 아날로그 재료와 디지털 매체를 융합해 새로운 표현 효과를 실험한다.\n- 작품의 의도와 표현 방식이 잘 연결되는지 점검한다.\n\n#### 3. 작품으로 어떻게 소통할까?\n- 작품의 의도에 맞춰 온·오프라인 전시를 기획한다.\n- 친구들과 작품에 담긴 다양한 생각을 나누며 피드백을 반영한다.\n- 작품 제작과 전시 과정을 통해 세계와 소통하는 방식을 경험한다.","activities_md":"### 주제 탐색과 발상\n\n#### 진로와 사회 문제에서 아이디어 찾기\n- 자신의 진로 관심사나 사회 문제에서 창작 주제를 찾는다.\n- 관련 자료를 수집하고 시각적 상징이나 이미지를 구상한다.\n\n#### 아이디어 시각화\n- 스케치, 디지털 드로잉, 자료 조사 결과를 활용해 작품 구상을 발전시킨다.\n- 표현하고 싶은 메시지와 매체 선택의 이유를 정리한다.\n\n### 제작과 전시\n\n#### 융합 매체 표현\n- 아날로그 재료와 디지털 매체를 함께 사용하여 표현 효과를 실험한다.\n- 작품 제작 과정에서 재료의 물성과 표현 가능성을 탐구한다.\n\n#### 전시와 피드백\n- 작품의 주제와 의도에 맞는 전시 방식을 기획한다.\n- 친구들의 피드백을 듣고 작품의 의미와 전달 방식을 성찰한다.","advanced_md":"### 자연·공학 계열\n\n#### 기후 위기 극복을 위한 생태 전환 메시지 설치 미술\n- 환경 관련 뉴스나 도서에서 정보를 찾는다.\n- 주변의 폐기물을 수집하여 물성을 탐구한다.\n- 수집한 재료를 활용해 생태 감수성을 담은 입체 작품을 제작한다.\n- 교내 공공장소에 전시하여 환경 문제를 공유한다.\n\n### 공학 계열\n\n#### 메타버스 공간에서 만나는 나의 정체성 가상 전시회 기획\n- 디지털 드로잉 기법과 가상현실 기술을 실험한다.\n- 나만의 디지털 캐릭터나 상징물을 디자인한다.\n- 메타버스 전시 공간을 기획하여 작품을 공유한다.\n- 디지털 환경에서의 소통 방식을 성찰한다.\n\n### 인문·사회 계열\n\n#### 사회적 소수자를 향한 공감과 연대 캠페인 디자인\n- 문화 다양성이나 시민성 관련 사회적 이슈를 탐구한다.\n- 이슈를 상징하는 시각적 픽토그램을 구상한다.\n- 디자인 결과물을 SNS 등에 업로드하여 다양한 관점의 피드백을 수용한다.\n- 피드백을 바탕으로 작품의 소통 방식을 비판적으로 성찰한다.","fit_md":"- 자신의 관심사나 진로를 미술 작품으로 표현하고 싶은 학생\n- 디자인, 영상, 디지털 매체, 전시, 공공미술, 캠페인 제작에 관심이 있는 학생\n- 사회 문제와 예술 표현을 연결해 메시지를 전달하고 싶은 학생","related_department_names":["국어국문학과","문헌정보학과","미디어학과","교육학과","법학과","디자인과","연극영화학과","영상학과","음악교육과","미술교육과"],"related_department_ids":["dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_법학과","dept_디자인과","dept_연극영화학과","dept_영상학과","dept_음악교육과","dept_미술교육과"],"semantic_status":"text_reviewed"},{"id":"course_미술과_매체","type":"course","name":"미술과 매체","basic":{"grade_semester":"3학년 2학기","subject_area":"예술","course_type":"융합 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"붓부터 AI까지 다양한 매체를 넘나들며 창의적인 표현력을 기르는 과목입니다.","keywords":["아날로그와디지털","매체실험","융합적표현","디지털문해력","창의적소통","매체변천사","표현원리","개방적태도","매체융합","정교한표현","전시와보존"],"learning_md":"### 핵심 학습\n\n#### 1. 표현 도구는 어떻게 변해 왔을까?\n- 시대와 지역에 따라 미술 매체가 어떻게 변화해 왔는지 살펴본다.\n- 미술에서 매체가 갖는 의미와 역할을 이해한다.\n- 아날로그 매체와 디지털 매체의 특징을 직접 실험한다.\n\n#### 2. 나에게 맞는 표현 도구는 무엇일까?\n- 물감, 흙 등 아날로그 매체와 이미지, 영상 등 디지털 매체의 표현 원리를 비교한다.\n- 자신의 표현 의도에 맞는 매체와 표현 방식을 선택한다.\n\n#### 3. 장르의 벽을 넘어 새로운 가치를 만들어 볼까?\n- 서로 다른 매체를 섞거나 과학과 기술 등 다른 분야와 연결하여 독창적인 작품을 만든다.\n- 매체를 통해 사회·문화적 메시지를 담아 표현한다.\n- 온·오프라인 공간의 특성에 맞춰 작품을 전시한다.","activities_md":"### 매체 탐색\n\n#### 아날로그와 디지털 매체 비교\n- 전통 미술 재료와 디지털 이미지·영상 매체의 특징을 비교한다.\n- 표현 도구가 달라질 때 작품의 느낌과 전달 방식이 어떻게 달라지는지 탐구한다.\n\n#### 표현 원리 실험\n- 다양한 재료와 도구를 실험하며 나에게 맞는 표현 방식을 찾는다.\n- 매체 선택이 작품의 메시지와 어떻게 연결되는지 설명한다.\n\n### 융합 표현\n\n#### 과학·기술과 미술의 융합\n- AI, VR, 메타버스, 영상 기술 등 새로운 매체를 활용한 작품 사례를 탐구한다.\n- 서로 다른 장르와 매체를 결합하여 창의적인 표현을 시도한다.\n\n#### 전시와 공유\n- 실제 전시장과 온라인 공간의 특성을 비교한다.\n- 작품의 메시지가 효과적으로 전달되도록 전시 방식을 기획한다.","advanced_md":"### 공학·IT 계열\n\n#### 인공지능과 상호작용하는 인터랙티브 아트 기획\n- AI 드로잉 도구나 코딩 기술을 미술과 접목한다.\n- 관객의 움직임에 반응하는 디지털 작품을 구상한다.\n- 가상현실이나 메타버스 공간을 활용해 기술이 예술 표현을 어떻게 확장하는지 탐구한다.\n\n### 인문·사회 계열\n\n#### 기후 위기를 알리는 에코 미디어 업사이클링 프로젝트\n- 버려지는 아날로그 재료와 디지털 영상을 결합하여 환경 오염의 심각성을 알리는 설치 미술을 제작한다.\n- SNS나 온라인 플랫폼을 활용해 생태 전환 메시지를 전달한다.\n- 매체가 사회적 메시지를 확산하는 방식을 비판적으로 공유하고 토론한다.\n\n### 공학 계열\n\n#### 현실과 가상을 잇는 혼합 현실 전시 큐레이션\n- 디지털 매체의 특성을 활용하여 시각적 효과를 극대화한다.\n- 실제 전시장과 온라인 공간을 연결하는 전시를 기획한다.\n- 디지털 작품의 보존 방법을 이해하고, 매체가 소통 방식을 어떻게 바꾸는지 성찰한다.","fit_md":"- 전통 미술 재료와 디지털 매체를 함께 활용해 보고 싶은 학생\n- AI, VR, 메타버스, 영상, 인터랙티브 아트 등 새로운 표현 방식에 관심이 있는 학생\n- 예술과 기술, 사회적 메시지를 결합한 창작 활동을 해 보고 싶은 학생","related_department_names":["국어국문학과","문헌정보학과","미디어학과","교육학과","법학과","디자인과","연극영화학과","영상학과","음악교육과","미술교육과"],"related_department_ids":["dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과","dept_법학과","dept_디자인과","dept_연극영화학과","dept_영상학과","dept_음악교육과","dept_미술교육과"],"semantic_status":"text_reviewed"},{"id":"course_미적분Ⅰ","type":"course","name":"미적분Ⅰ","basic":{"grade_semester":"2학년 2학기","subject_area":"수학","course_type":"일반 선택","selection_group":"학교지정","credits":"3학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"아주 짧은 순간의 변화를 포착하고, 불규칙한 모양을 잘게 쪼개어 전체 크기를 알아내는 방법을 배우는 과목입니다.","keywords":["함수의극한","다항함수의미분","다항함수의적분","함수의연속","미분계수","도함수","극대와극소","부정적분","정적분","정적분과넓이"],"learning_md":"### 핵심 학습\n\n#### 1. 한없이 가까워지는 상태를 어떻게 정의할까?\n- 함수의 극한값을 계산하고 연속성의 뜻을 이해한다.\n- 그래프를 통해 극한과 연속의 성질을 직관적으로 탐구한다.\n- 그래프의 특정 구간에서 함수의 변화를 분석한다.\n\n#### 2. 순간적인 변화와 그래프의 개형을 어떻게 파악할까?\n- 미분계수의 기하학적 의미를 이해한다.\n- 다항함수의 미분법을 활용하여 접선의 방정식을 구한다.\n- 함수의 증감과 극값을 분석하고 최적화 문제를 해결한다.\n\n#### 3. 누적된 변화량과 도형의 넓이를 어떻게 구할까?\n- 미분과 역관계인 적분의 원리를 이해한다.\n- 정적분을 통해 곡선으로 둘러싸인 도형의 넓이를 구한다.\n- 수직선 위 물체의 위치 변화량을 정적분으로 산출한다.","activities_md":"### 개념 이해와 그래프 분석\n\n#### 극한과 연속 탐구\n- 함수의 극한값과 연속성을 그래프와 식으로 확인한다.\n- 불연속이 생기는 지점과 그 의미를 설명한다.\n\n#### 미분과 그래프 개형 분석\n- 접선의 기울기와 미분계수의 의미를 연결한다.\n- 도함수를 활용하여 함수의 증가와 감소, 극값을 분석한다.\n\n### 적용과 문제 해결\n\n#### 최적화 문제 해결\n- 다항함수의 미분법을 활용해 최대·최소 문제를 해결한다.\n- 일상이나 과학 현상의 변화량을 함수로 표현한다.\n\n#### 정적분 활용\n- 정적분으로 넓이와 누적 변화량을 계산한다.\n- 위치, 속도, 변화량 사이의 관계를 해석한다.","advanced_md":"### 공학 계열\n\n#### 물리 역학 문제의 미적분학적 해석\n- 물리 역학 단원에서 미적분으로 해석할 수 있는 문항을 선정한다.\n- 운동, 속도, 가속도, 힘의 관계를 정량적으로 해석하고 분석한다.\n\n### 자연 계열\n\n#### 다항함수의 특수한 성질 탐구\n- 다항함수가 갖는 성질을 일반화하고 특수화한다.\n- 정리한 내용을 구조적으로 발표한다.\n\n### 상경 계열\n\n#### 한계비용과 한계수입 분석을 통한 이윤 극대화 모델 탐구\n- 경제 수학의 개념과 미분법을 결합하여 기업의 총비용 함수를 미분하고 한계비용을 산출한다.\n- 한계비용과 한계수입을 비교하여 이윤이 극대화되는 생산 지점을 수학적으로 증명한다.","fit_md":"- 함수의 변화와 누적량을 수학적으로 분석하고 싶은 학생\n- 수학, 통계, 경제, 산업공학, 자연과학, 공학 분야에 관심이 있는 학생\n- 그래프 해석, 최적화, 변화율, 넓이 계산을 실제 문제와 연결하고 싶은 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과"],"semantic_status":"text_reviewed"},{"id":"course_미적분Ⅱ","type":"course","name":"미적분Ⅱ","basic":{"grade_semester":"3학년 1학기","subject_area":"수학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"미적분Ⅰ에서 다루던 단순한 곡선을 넘어, 훨씬 다채롭고 복잡한 모양의 그래프를 직접 그리고 분석해 보는 과목입니다.","keywords":["수열의극한","급수","초월함수의미분","치환적분과부분적분","입체도형의부피","수열의수렴과발산","등비급수","지수","로그","삼각함수의미분","합성함수의미분","치환적분","부분적분","정적분과부피"],"learning_md":"### 핵심 학습\n\n#### 1. 한없이 나열되는 수의 끝은 어디일까?\n- 수열과 급수의 극한 개념을 직관적으로 이해한다.\n- 다양한 수열의 수렴 조건을 판정한다.\n- 무한히 더한 값이 존재하는 경우를 계산하고 해석한다.\n\n#### 2. 변화가 복잡한 함수의 순간 변화율을 어떻게 구할까?\n- 몫, 합성함수, 매개변수, 음함수 미분 등 여러 가지 미분법을 익힌다.\n- 초월함수의 변화율을 해석한다.\n- 여러 가지 미분법을 활용해 초월함수의 그래프 개형을 그린다.\n\n#### 3. 곡선으로 둘러싸인 입체의 부피를 어떻게 측정할까?\n- 복잡한 형태의 함수를 적분하는 기법을 익힌다.\n- 정적분을 활용하여 평면도형의 넓이를 계산한다.\n- 입체도형의 부피를 정적분으로 구한다.","activities_md":"### 수열과 급수\n\n#### 수렴과 무한합 탐구\n- 수열과 급수의 수렴 여부를 판정한다.\n- 등비급수를 도형이나 실제 상황과 연결하여 해석한다.\n\n### 미분과 그래프\n\n#### 복잡한 함수의 변화율 분석\n- 초월함수, 합성함수, 매개변수 함수의 미분을 연습한다.\n- 도함수를 활용하여 그래프의 개형을 분석한다.\n\n### 적분과 모델링\n\n#### 넓이와 부피 계산\n- 정적분으로 평면도형의 넓이를 계산한다.\n- 회전체나 입체의 부피를 적분으로 구한다.\n- 실제 현상을 함수로 모델링하고 적분 결과를 해석한다.","advanced_md":"### 자연 계열\n\n#### 수렴하는 수열의 극한을 도형으로 표현하기\n- 동일한 모양이 한없이 반복되는 도형 문제를 해결한다.\n- 첫째항과 공비가 양수인 등비급수가 수렴할 때의 상황을 프랙탈과 같은 도형으로 표현한다.\n\n### 상경 계열\n\n#### 연속 복리 모델과 자연상수 e의 경제적 의미\n- 단리와 복리를 넘어 시시각각 이자가 붙는 연속 복리 개념을 자연상수 e의 정의와 연결하여 도출한다.\n- 영구 연금의 현재 가치를 등비급수로 산출한다.\n\n### 의생명 계열\n\n#### 약물 대사 시스템의 수치적 분석 및 AUC 산출\n- 약물 투여 후 혈중 농도 변화를 나타내는 초월함수 식을 세운다.\n- 치환적분과 부분적분을 활용하여 약물 흡수 총량인 AUC를 계산한다.","fit_md":"- 수열, 급수, 초월함수, 고급 적분을 통해 복잡한 변화를 분석하고 싶은 학생\n- 수학, 통계, 경제, 산업공학, 의생명 분야에 관심이 있는 학생\n- 자연 현상이나 금융·약물 모델을 수학적으로 표현하고 해석하고 싶은 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과"],"semantic_status":"text_reviewed"},{"id":"course_법과_사회","type":"course","name":"법과 사회","basic":{"grade_semester":"3학년 1학기","subject_area":"사회","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"일상생활과 사회 속에서 마주치는 법적 문제를 실제 사례로 이해하고, 권리와 의무를 바탕으로 정의로운 사회 질서를 생각하는 과목입니다.","keywords":["헌법","민법","형법","사회법","민주주의","법치주의","기본권","계약","불법행위","노동법","학교폭력","청소년 권리"],"learning_md":"### 핵심 학습\n\n#### 1. 개인 생활과 법\n- 결혼, 상속, 계약, 부동산 거래, 불법행위처럼 개인 사이에서 발생하는 법률관계를 학습한다.\n- 일상생활 속 권리와 의무를 이해한다.\n- 가족관계와 상속 관련 사례를 분석한다.\n- 계약과 불법행위 사례를 비교하고, 재산과 관련된 권리관계를 정리한다.\n\n#### 2. 국가 생활과 법\n- 헌법의 기본 원리, 기본권, 권력분립, 통치 구조를 이해한다.\n- 형법을 중심으로 범죄의 성립 요건과 형사 절차를 학습한다.\n- 기본권 침해 사례를 분석하고, 민주주의와 법치주의의 의미를 토론한다.\n\n#### 3. 사회 생활과 법\n- 노동법, 경제법, 사회보장법, 지식재산권처럼 현대 사회에서 필요한 법을 학습한다.\n- 고령화, 정보화, 세계화로 새롭게 등장하는 법률관계를 탐색한다.\n- 아르바이트 임금 체불, 근로기준법, 사회보장법, 지식재산권 침해 사례를 분석한다.\n\n#### 4. 학교 생활과 법\n- 청소년도 권리와 의무를 가진 사회 구성원임을 이해한다.\n- 학교폭력, 형사미성년자, 청소년 보호와 책임 문제를 법적 관점에서 학습한다.\n- 조약, 판례, 입법 자료를 활용하여 법적 쟁점의 해결 방안을 제안한다.","activities_md":"### 사례 분석\n\n#### 생활 속 법률 문제 분석\n- 계약과 불법행위 사례를 분석한다.\n- 학교폭력 쟁점을 정리한다.\n- 형사 절차를 흐름도로 만든다.\n\n### 토론과 논술\n\n#### 기본권과 사회 쟁점 토론\n- 기본권 충돌 사례를 토론한다.\n- 차별금지법 관련 찬반 논술을 작성한다.\n- 기업의 기후 공시 의무와 경영의 자유를 둘러싼 쟁점을 토론한다.\n\n### 자료 활용\n\n#### 법적 근거 찾기\n- 헌법 조항을 읽고 핵심 내용을 정리한다.\n- 판례와 입법 자료를 비교한다.\n- 법률 쟁점에 맞는 근거를 찾아 해결 방안을 구성한다.","advanced_md":"### 전 계열\n\n#### 헌법 토론 개요서 작성\n- 관심 분야의 사회 현안을 선정한다.\n- 기본권을 중심으로 쟁점을 정리한다.\n- 찬반 근거와 반박 논리를 구성한다.\n\n### 인문·사회 계열\n\n#### 차별금지법 주제 논술문 작성\n- 법안의 주요 내용을 정리한다.\n- 평등권과 과잉금지원칙을 검토한다.\n- 찬반 입장을 법리 중심으로 논술한다.","fit_md":"- 일상생활의 분쟁과 사회 쟁점을 법적 근거로 이해하고 싶은 학생\n- 법학, 행정학, 정치외교, 사회복지, 경영, 미디어, 교육 분야에 관심이 있는 학생\n- 사례 분석, 토론, 논술, 판례 읽기 활동을 통해 사회 문제를 탐구하고 싶은 학생","related_department_names":["법학과","행정학과","경찰행정 관련 학과","정치외교학과","사회복지학과","보건행정학과","경영학과","미디어학과","국제관계학과","교육학과"],"related_department_ids":["dept_법학과","dept_행정학과","dept_정치외교학과","dept_사회복지학과","dept_보건행정학과","dept_경영학과","dept_미디어학과","dept_국제관계학과","dept_교육학과"],"semantic_status":"text_reviewed"},{"id":"course_보건","type":"course","name":"보건","basic":{"grade_semester":"3학년 1학기","subject_area":"교양","course_type":"진로 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"몸과 마음의 건강을 이해하고, 개인과 공동체가 더 안전하고 건강하게 살아가기 위한 실천 방법을 배우는 과목입니다.","keywords":["건강증진","질병예방","정신건강","스트레스 관리","성 건강","성인지 감수성","감염병 관리","응급처치","건강권","보건의료환경"],"learning_md":"### 핵심 학습\n\n#### 1. 건강을 어떻게 이해하고 관리할까?\n- 건강은 단순히 질병이 없는 상태가 아니라 신체적·정신적·사회적 건강이 함께 유지되는 상태임을 이해한다.\n- 건강의 개념을 넓게 이해하고, 개인과 사회가 건강을 관리하는 방법을 학습한다.\n- 자신의 건강 상태를 평가하고, 건강관리의 역사와 사회적 역할을 이해한다.\n\n#### 2. 마음을 건강하게 돌보는 방법\n- 감정, 성격, 스트레스, 상실 경험이 정신건강과 깊이 연결되어 있음을 이해한다.\n- 마음의 변화를 이해하고 스트레스 관리 방법을 탐색한다.\n- 삶과 죽음, 상실의 의미를 개인적·사회적·문화적으로 탐색한다.\n\n#### 3. 성과 건강을 어떻게 바라볼까?\n- 성 건강이 생애주기, 관계, 존중, 성인지 감수성과 연결됨을 이해한다.\n- 성 역할과 성인지 감수성을 학습한다.\n- 생애주기별 성적 특성과 관리 방법을 배우고, 존중과 책임을 바탕으로 성 건강을 바라본다.\n\n#### 4. 응급상황에서 어떻게 대처할까?\n- 감염병 예방과 위험 상황 대처의 필요성을 이해한다.\n- 면역과 감염병 관리체계를 학습한다.\n- 안전수칙과 상황별 응급처치 방법을 실습한다.\n\n#### 5. 건강자원과 보건의료환경은 왜 중요할까?\n- 개인의 건강이 의료 제도, 건강권, 지역사회 자원, 정책과 연결됨을 이해한다.\n- 건강권의 역사와 의료보장 제도를 조사한다.\n- 건강자원과 건강정책을 탐구한다.","activities_md":"### 자기 건강 점검\n\n#### 건강 상태와 생활 습관 돌아보기\n- 건강의 여러 차원을 이해한다.\n- 자신의 건강습관을 점검한다.\n- 스트레스 관리 방법을 찾는다.\n\n### 사회 문제 탐구\n\n#### 건강권과 보건의료 제도 탐구\n- 건강불평등 사례를 조사한다.\n- 보건의료 제도를 살펴본다.\n- 건강권과 의료보장 제도를 조사한다.\n\n### 안전과 실습\n\n#### 감염병 예방과 응급처치\n- 감염병 예방과 관리체계를 이해한다.\n- 안전수칙을 상황에 맞게 적용한다.\n- 상황별 응급처치를 실습한다.\n\n### 윤리와 토론\n\n#### 보건의료 윤리 쟁점 토론\n- 존엄사와 환자의 자기 결정권을 토론한다.\n- 의료 윤리 쟁점을 분석한다.\n- 건강 정책 개선 방안을 제안한다.","advanced_md":"### 공학 계열\n\n#### 디지털 헬스케어와 건강 데이터 탐구\n- 스마트 워치나 헬스케어 앱이 수집하는 생체 데이터를 조사한다.\n- 생체 데이터의 측정 원리를 이해한다.\n- AI 알고리즘을 활용한 질병 진단 사례를 조사한다.\n- 진단 정확도와 한계를 분석한다.\n\n### 사회 계열\n\n#### 건강불평등과 존엄사를 주제로 보건의료의 사회적 쟁점 탐구\n- 소득 수준이나 거주 지역에 따른 의료 격차 문제를 조사한다.\n- 의료 격차 해소 방안을 생각한다.\n- 환자의 자기 결정권과 의료 윤리의 충돌을 토론한다.\n\n### 자연·의약학 계열\n\n#### 기온 상승과 항생제 내성의 관계 탐구\n- WHO 또는 질병관리청 자료를 활용해 지역별 평균 기온과 항생제 내성률을 비교한다.\n- 통계적 상관관계를 조사한다.\n- 원 헬스 관점에서 항생제 내성 대응 정책을 제안한다.","fit_md":"- 건강, 질병 예방, 응급처치, 보건의료 제도에 관심이 있는 학생\n- 간호, 의학, 약학, 임상병리, 응급구조, 보건행정, 심리, 스포츠의학 분야에 관심이 있는 학생\n- 개인의 건강뿐 아니라 공동체 건강과 보건 정책까지 함께 탐구하고 싶은 학생","related_department_names":["간호학과","보건행정학과","의예과","약학과","임상병리학과","응급구조학과","사회복지학과","심리학과","의공학과","환경보건학과","스포츠의학과"],"related_department_ids":["dept_간호학과","dept_보건행정학과","dept_의예과","dept_약학과","dept_임상병리학과","dept_응급구조학과","dept_사회복지학과","dept_심리학과","dept_환경공학과","dept_스포츠의학과"],"semantic_status":"text_reviewed"},{"id":"course_사회문제_탐구","type":"course","name":"사회문제 탐구","basic":{"grade_semester":"3학년 1학기","subject_area":"사회","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"우리 주변의 사회문제를 직접 선정하고, 자료를 수집·분석해 원인과 해결책을 찾아보는 탐구형 과목입니다.","keywords":["사회문제","기능론","갈등론","상징적 상호작용론","양적 연구","질적 연구","미디어 리터러시","저출생","고령화","개인정보","기후 불평등"],"learning_md":"### 핵심 학습\n\n#### 1. 어떤 문제가 사회문제일까?\n- 사회문제는 개인의 불편을 넘어 사회 구조, 제도, 가치관과 연결된 문제임을 이해한다.\n- 사회문제를 바라보는 관점과 탐구 방법을 학습한다.\n- 기능론, 갈등론, 상징적 상호작용론으로 문제를 분석한다.\n- 연구 윤리를 학습한다.\n\n#### 2. 일상 속 문제를 어떻게 볼까?\n- 성 불평등, 조작정보, 지식재산권 침해, 미디어 이용 문제처럼 생활 속에서 나타나는 사회문제를 분석한다.\n- 유튜브 추천 영상의 문제점을 탐구한다.\n- 미디어 리터러시 관점에서 정보를 분석하고 창의적 대안을 제시한다.\n\n#### 3. 변화하는 세계의 문제는 무엇일까?\n- 저출생·고령화, 사회보장, 사회양극화, 개인정보 침해, 인공지능과 책임 문제처럼 변화하는 사회의 쟁점을 학습한다.\n- 자율주행 사고 책임 문제를 토론한다.\n- 인공지능 발전 과정에서 나타나는 사회문제를 탐구한다.\n- 여러 차원의 해결 방안을 비교한다.\n\n#### 4. 연구 보고서를 어떻게 완성할까?\n- 사회문제를 선정하고 자료를 수집·분석하여 보고서를 작성한다.\n- 연구 주제를 선정하고 양적 또는 질적 자료를 수집한다.\n- 연구 보고서를 작성하고 발표하며 해결 방안을 실천해 본다.","activities_md":"### 문제 발견\n\n#### 연구 질문 만들기\n- 생활 속 사회문제를 찾는다.\n- 사회 현안을 관점별로 분석한다.\n- 탐구 가능한 연구 질문으로 정리한다.\n\n### 자료 수집과 분석\n\n#### 조사와 자료 해석\n- 설문조사, 인터뷰, 문헌 조사를 진행한다.\n- 통계 자료를 분석한다.\n- 미디어 자료를 비교하여 문제의 양상을 파악한다.\n\n### 해결 방안 제안\n\n#### 보고서와 실천 활동\n- 정책 대안을 만든다.\n- 캠페인이나 실천 활동을 설계한다.\n- 보고서와 발표 자료를 제작한다.","advanced_md":"### 전 계열\n\n#### 진로 연계 사회현상 연구\n- 관심 진로와 연결된 사회문제를 선정한다.\n- 연구 방법을 선택한다.\n- 실제 조사와 분석을 진행한다.\n\n### 인문·사회 계열\n\n#### 그린워싱 행위 비판적 분석\n- 기업의 그린워싱 사례를 조사한다.\n- 제도적·실천적 해결 방안을 모색한다.\n- 소비자와 기업의 책임을 정리한다.\n\n### 과학·기술 계열\n\n#### 기후 불평등의 발생 원인과 해결 방안 탐구\n- 국가·계층 간 기후 불평등 양상을 조사한다.\n- 기후 데이터와 생태계 변화를 분석한다.\n- 기술적 해결 방안을 제안한다.","fit_md":"- 사회문제를 직접 선정하고 조사·분석·보고서 작성까지 해 보고 싶은 학생\n- 사회학, 사회복지, 행정, 법, 정치, 미디어, 환경, 보건, 경영, 경제 분야에 관심이 있는 학생\n- 자료 수집, 설문, 인터뷰, 통계 분석, 정책 제안 활동에 관심이 있는 학생","related_department_names":["사회학과","사회복지학과","행정학과","법학과","정치외교학과","미디어학과","환경공학과","보건행정학과","경영학과","경제학과"],"related_department_ids":["dept_사회학과","dept_사회복지학과","dept_행정학과","dept_법학과","dept_정치외교학과","dept_미디어학과","dept_환경공학과","dept_보건행정학과","dept_경영학과","dept_경제학과"],"semantic_status":"text_reviewed"},{"id":"course_사회와_문화","type":"course","name":"사회와 문화","basic":{"grade_semester":"2학년 1학기","subject_area":"사회","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"사람들이 모여 살아가는 사회와 문화의 모습을 과학적으로 분석하고, 사회 문제를 다양한 관점에서 이해하는 과목입니다.","keywords":["기능론","갈등론","상징적 상호작용론","사회화","사회집단","대중문화","문화변동","다문화","사회불평등","사회복지"],"learning_md":"### 핵심 학습\n\n#### 1. 사회현상은 어떻게 탐구할까?\n- 등교, 유행, 진로 선택처럼 당연해 보이는 일상도 사회학적 관점에서 새롭게 볼 수 있음을 이해한다.\n- 기능론, 갈등론, 상징적 상호작용론을 비교한다.\n- 양적 연구와 질적 연구 방법을 이해한다.\n- 연구 윤리를 지키며 사회현상을 탐구한다.\n\n#### 2. 사회 구조는 개인의 삶에 어떤 영향을 줄까?\n- 개인의 선택이 사회 구조와 집단의 영향을 받을 수 있음을 이해한다.\n- 사회화, 사회집단, 조직, 일탈 행동, 사회 변동을 탐색한다.\n- 사회화 경험을 분석하고 일탈 행동 이론을 비교한다.\n- 사회 운동과 사회 변동 사례를 조사한다.\n\n#### 3. 문화는 어떻게 만들어지고 변할까?\n- 대중문화, 미디어, 하위문화, 다문화 현상을 분석한다.\n- 문화가 만들어지고 확산되고 변화하는 과정을 학습한다.\n- 대중문화를 바라보는 관점을 비교한다.\n- 문화 변동의 요인과 양상을 정리하고, 문화 다양성을 존중하는 태도를 기른다.\n\n#### 4. 불평등은 왜 생기고 어떻게 줄일까?\n- 사회 계층, 사회 이동, 빈곤, 사회복지 제도를 통해 불평등의 원인과 해결 방안을 탐구한다.\n- 사회 불평등의 원인과 양상을 분석한다.\n- 복지 제도의 유형과 특징을 비교한다.\n- 지역 격차와 의료서비스 격차 사례를 탐구한다.","activities_md":"### 연구 설계\n\n#### 사회현상 연구 계획 세우기\n- 관심 주제를 선정한다.\n- 자료 수집 방법을 선택한다.\n- 설문, 면담, 문헌 조사 계획을 설계한다.\n\n### 미디어 분석\n\n#### 알고리즘과 대중매체 분석\n- 검색 알고리즘의 정보 편향성을 탐구한다.\n- 워드 클라우드를 활용해 추천 정보의 차이를 비교한다.\n- 대중매체의 관점과 프레임을 분석한다.\n\n### 사회문제 탐구\n\n#### 불평등과 복지 문제 분석\n- 불평등, 고령화, 저출생, 복지 문제를 분석한다.\n- 사회적 소수자 문제를 조사한다.\n- 해결 방안을 제안한다.","advanced_md":"### 전 계열\n\n#### 진로 연계 사회현상 연구\n- 진로 관련 사회현상을 선정한다.\n- 양적 또는 질적 연구 방법을 적용한다.\n- 자료를 수집하고 분석하여 보고서를 작성한다.\n\n### 인문·사회 계열\n\n#### 대중매체와 알고리즘 편향성 분석\n- 서로 다른 관심사를 가진 가상 인물을 설정한다.\n- 검색 알고리즘으로 추천 정보를 비교한다.\n- 워드 클라우드 분석 보고서를 작성한다.\n\n### 보건·의료 계열\n\n#### 지역 간 의료서비스 격차 탐구\n- 지역 격차로 나타나는 불평등 사례를 조사한다.\n- 공공의료 확충 방안을 분석한다.\n- 보건 정책을 제안한다.","fit_md":"- 사회현상과 문화 현상을 자료와 이론으로 분석하고 싶은 학생\n- 사회학, 사회복지, 심리, 행정, 법, 보건행정, 미디어, 정치, 교육, 경제 분야에 관심이 있는 학생\n- 사회문제, 불평등, 대중문화, 알고리즘 편향성을 탐구하고 싶은 학생","related_department_names":["사회학과","사회복지학과","심리학과","행정학과","법학과","보건행정학과","미디어학과","정치외교학과","교육학과","경제학과"],"related_department_ids":["dept_사회학과","dept_사회복지학과","dept_심리학과","dept_행정학과","dept_법학과","dept_보건행정학과","dept_미디어학과","dept_정치외교학과","dept_교육학과","dept_경제학과"],"semantic_status":"text_reviewed"},{"id":"course_생명과학","type":"course","name":"생명과학","basic":{"grade_semester":"2학년 1학기","subject_area":"과학","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"우리 몸이 작동하는 방식부터 생물이 다양하게 진화해 온 과정까지, 생명 현상을 세포·몸·생태계의 관점에서 탐구하는 과목입니다.","keywords":["세포","물질대사","생태계","항상성","면역반응","신경계","내분비계","염색체","생식세포","진화","생물다양성","계통수"],"learning_md":"### 핵심 학습\n\n#### 1. 생명시스템의 구성\n- 세포에서 생태계까지 이어지는 생명시스템을 살펴본다.\n- 생물이 생명을 유지하기 위해 어떤 구조와 작용을 갖추고 있는지 학습한다.\n- 생물의 특징과 생명 활동 사이의 관계를 추론한다.\n- 소화 효소를 이용해 영양소가 분해되는 과정을 실험한다.\n- 방형구법으로 식물 군집을 분석하고 생태계 구조를 이해한다.\n> 핵심 개념: 세포, 물질대사, 생태계, 기관계의 통합 작용\n\n#### 2. 항상성과 몸의 조절\n- 우리 몸이 자극을 받아들이고 반응하며 체내 상태를 일정하게 유지하는 과정을 학습한다.\n- 신경계, 내분비계, 면역 반응을 함께 다루며 몸의 조절 원리를 이해한다.\n- 실감형 콘텐츠로 뇌 구조를 탐구한다.\n- 스마트 헬스케어 사례를 통해 항상성 유지 작용을 분석한다.\n- 약물이 시냅스 전달에 영향을 주는 사례를 조사하고, 혈액형 판별 원리를 이해한다.\n> 핵심 개념: 자극의 전도와 전달, 신경계, 내분비계, 항상성, 항원·항체 반응\n\n#### 3. 생명의 연속성과 다양성\n- 생명이 세대를 거쳐 이어지는 방식과 다양한 생물이 생겨나고 분류되는 과정을 학습한다.\n- 유전, 생식세포 형성, 진화, 생물다양성을 연결해서 이해한다.\n- 염색체 모형으로 핵형을 분석한다.\n- 생식세포 형성 과정을 창의적인 모델로 표현한다.\n- 온라인 식물도감을 제작하고, 생물 분류 프로그래밍을 활용해 계통수를 작성한다.\n> 핵심 개념: 염색체, 생식세포 형성, 진화, 생물다양성, 계통수","activities_md":"### 실험과 관찰\n\n#### 생명 현상 실험\n- 소화제와 소화 효소를 이용한 영양소 분해 실험을 진행한다.\n- 혈액형 검사와 혈액형 판별 활동을 한다.\n- 방형구법을 활용하여 식물 군집을 분석한다.\n- 물벼룩 심장 박동수 변화를 탐구한다.\n\n### 조사와 분석\n\n#### 신경·건강·운동 관련 자료 분석\n- 약물이 시냅스 전달에 미치는 영향을 조사한다.\n- 스트레스 수준과 카페인 섭취량의 관계를 분석한다.\n- 데드포인트와 러너스하이의 생리 변화를 조사한다.\n- 운동 습관에 따른 건강 지표를 탐구한다.\n\n### 모델링과 제작\n\n#### 유전과 분류 모델링\n- 염색체 모형을 이용해 핵형을 분석한다.\n- 생식세포 형성 과정 모델을 제작한다.\n- 온라인 식물도감을 제작한다.\n- 생물 분류 프로그래밍과 계통수 작성 활동을 한다.\n\n### 표현과 공유\n\n#### 탐구 결과 공유\n- 카페인 오남용 인식 개선 캠페인을 기획한다.\n- 실험 결과를 카드뉴스나 인포그래픽으로 제작한다.\n- 탐구 결과를 그래프와 통계로 정리해 발표한다.","advanced_md":"### 사회 계열\n\n#### 약물 오남용이 청소년기 정신 건강에 미치는 영향 탐구\n- 지각과 행동이 일어나는 신경 메커니즘을 조사한다.\n- 스트레스 수준과 카페인 섭취량의 상관관계를 분석한다.\n- 카페인 오남용 인식 개선 캠페인을 기획한다.\n> 연결 관심 분야: 심리학, 보건행정, 청소년 건강, 사회 문제 탐구\n\n### 자연 계열\n\n#### 물질에 따른 물벼룩의 심장 박동수 변화 탐구\n- 각성제 농도에 따른 물벼룩 심장 박동수 변화 실험을 설계한다.\n- 실험 결과를 그래프로 정리한다.\n- 통계 분석과 생리학적 해석을 수행한다.\n- 결과를 카드뉴스나 인포그래픽으로 제작한다.\n> 연결 관심 분야: 생명과학, 생명공학, 약학, 의학, 임상병리\n\n### 체육 계열\n\n#### 운동 강도에 따른 물질대사 변화 탐구\n- 데드포인트와 러너스하이의 생리 변화를 조사한다.\n- 휴대용 장비나 센서를 활용해 운동 습관별 건강 지표를 측정한다.\n- 운동 강도와 물질대사의 관계를 분석한다.\n> 연결 관심 분야: 체육학, 스포츠과학, 스포츠의학, 건강관리","fit_md":"- 세포, 몸의 조절, 유전, 진화, 생태계 등 생명 현상을 폭넓게 탐구하고 싶은 학생\n- 생명과학, 생명공학, 의학, 약학, 간호, 임상병리, 환경, 식품, 스포츠의학 분야에 관심이 있는 학생\n- 실험, 관찰, 자료 분석, 모델 제작, 캠페인 활동을 통해 생명 현상을 이해하고 싶은 학생","related_department_names":["생명과학과","생명공학과","식품공학과","식품영양학과","환경공학과","간호학과","임상병리학과","약학과","의예과","수의학과","스포츠의학과","과학 교과 교육과","지질학과","화학과","의류학과","식물자원학과","동물자원학과","원예학과","조경학과","해양공학과","섬유공학과","신소재공학과","에너지자원공학과","재료공학과","화장품과학과","화학공학과","물리치료학과","응급구조학과","재활치료학과","치기공학과","치위생학과","치의예과","한의예과","보건행정학과","심리학과","수학교육과","초등교육과","체육학과","스포츠과학과","체육교육과","로봇공학과","인공지능학과","융합학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_식품공학과","dept_식품영양학과","dept_환경공학과","dept_간호학과","dept_임상병리학과","dept_약학과","dept_의예과","dept_수의학과","dept_스포츠의학과","dept_과학_교과_교육과","dept_지질학과","dept_화학과","dept_의류학과","dept_식물자원학과","dept_동물자원학과","dept_원예학과","dept_조경학과","dept_해양공학과","dept_섬유공학과","dept_신소재공학과","dept_에너지자원공학과","dept_재료공학과","dept_화장품과학과","dept_화학공학과","dept_물리치료학과","dept_응급구조학과","dept_재활치료학과","dept_치기공학과","dept_치위생학과","dept_치의예과","dept_한의예과","dept_보건행정학과","dept_심리학과","dept_수학교육과","dept_초등교육과","dept_체육학과","dept_스포츠과학과","dept_체육교육과","dept_로봇공학과","dept_인공지능학과","dept_융합학과"],"semantic_status":"text_reviewed"},{"id":"course_생물의_유전","type":"course","name":"생물의 유전","basic":{"grade_semester":"3학년 1학기","subject_area":"과학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"생명체의 특징이 부모에서 자손으로 전달되는 원리를 DNA와 유전자 수준에서 이해하고, 유전 정보가 생명공학과 의학에 어떻게 활용되는지 탐구하는 과목입니다.","keywords":["DNA","유전자","염색체","유전 정보","유전 양식","돌연변이","유전체","생명공학","질병 유전","유전자 분석"],"learning_md":"### 핵심 학습\n\n#### 유전 정보는 어디에 저장될까\n- 생명체의 형질을 결정하는 정보가 DNA와 유전자에 저장되는 방식을 이해한다.\n- 염색체와 유전자의 관계를 통해 세포 안의 정보가 생명 현상 전체와 어떻게 연결되는지 탐구한다.\n- DNA와 염색체의 구조를 모형으로 표현한다.\n- 유전자와 형질의 관계를 설명한다.\n- 세포 분열 과정에서 유전 정보가 전달되는 방식을 이해한다.\n\n#### 형질은 어떤 방식으로 이어질까\n- 부모의 형질이 자손에게 전달되는 유전 양식을 이해한다.\n- 단순한 우열 관계뿐 아니라 다양한 유전 양식과 확률적 예측을 학습한다.\n- 가계도를 분석한다.\n- 유전 확률을 계산한다.\n- 유전 양식별 사례를 비교한다.\n\n#### 유전 정보가 달라지면 어떤 일이 생길까\n- 돌연변이와 염색체 이상이 생명체의 형질과 질병에 미치는 영향을 이해한다.\n- 유전적 변화가 질병, 다양성, 진화와 어떻게 연결되는지 탐구한다.\n- 돌연변이 사례를 조사한다.\n- 유전 질환의 원리를 탐구한다.\n- 유전 정보 변화와 생물 다양성의 관계를 생각한다.\n\n#### 유전 기술은 어디까지 활용될까\n- 유전자 분석과 생명공학 기술이 질병 진단, 치료, 식량, 환경, 법과 윤리 문제로 확장되는 과정을 이해한다.\n- 유전 기술의 가능성과 책임을 함께 탐색한다.\n- 유전체 분석 사례를 조사한다.\n- 유전자 기술의 장단점을 토론한다.\n- 생명윤리 쟁점을 정리한다.","activities_md":"### 분석과 추론\n\n#### 유전 자료 분석\n- 가계도를 분석한다.\n- 유전 확률을 계산한다.\n- 유전 질환 사례를 해석한다.\n\n### 모형과 시각화\n\n#### 유전 정보 표현\n- DNA 구조 모형을 제작한다.\n- 염색체와 유전자의 관계를 도식화한다.\n- 유전 정보 전달 과정을 표현한다.\n\n### 사회·윤리 탐구\n\n#### 유전 기술의 사회적 쟁점\n- 유전자 검사와 개인정보 문제를 토론한다.\n- 생명공학 기술 활용 사례를 조사한다.\n- 유전 기술의 윤리적 기준을 세운다.","advanced_md":"### 보건·의약학 계열\n\n#### 유전 질환과 맞춤형 치료 탐구\n- 특정 유전 질환의 원인을 조사한다.\n- 유전자 검사와 조기 진단의 장단점을 분석한다.\n- 맞춤형 치료와 생명윤리 쟁점을 토론한다.\n\n### 생명공학 계열\n\n#### 유전자 편집 기술의 가능성과 한계 탐구\n- 유전자 편집의 원리를 조사한다.\n- 농업, 의학, 환경 분야의 활용 사례를 정리한다.\n- 유전자 편집 기술의 안전성과 윤리 기준을 제안한다.","fit_md":"- 생명 현상을 분자 수준에서 이해하고 싶은 학생\n- 유전 질환, 유전자 검사, 생명공학 기술에 관심이 있는 학생\n- 생명과학, 의학, 약학, 생명공학 분야 진로를 생각하는 학생\n- 과학 기술의 윤리 문제까지 함께 고민하고 싶은 학생","related_department_names":["생명과학과","생명공학과","의예과","약학과","간호학과","임상병리학과","의생명공학과","식품공학과","환경공학과","수의학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_의예과","dept_약학과","dept_간호학과","dept_임상병리학과","dept_식품공학과","dept_환경공학과","dept_수의학과"],"semantic_status":"text_reviewed"},{"id":"course_생태와_환경","type":"course","name":"생태와 환경","basic":{"grade_semester":"2학년 2학기","subject_area":"과학","course_type":"진로 선택","selection_group":"학년선택","credits":"2~4학점","exam":""},"one_liner":"자연 현상과 환경 변화를 통합적으로 탐구하고, 인류의 지속 가능한 발전에 기여하는 시민 역량을 기르는 과목입니다.","keywords":["환경감수성","기후위기와기후행동","지속가능성과시민참여","환경관","환경윤리","지역환경","생태계","물과대기","토양","대기오염","폐기물","멸종","기후시스템","탄소중립","행복추구권","환경정의","실천"],"learning_md":"### 핵심 학습\n\n#### 환경과 인간은 어떤 관계일까\n- 인간과 환경의 상호 연결성을 파악한다.\n- 환경을 바라보는 다양한 관점을 이해한다.\n\n#### 지구 환경의 특징은 무엇일까\n- 환경 체계의 상호작용을 이해하고 시스템 사고력을 기른다.\n- 지구 환경의 구성 요소와 생물 다양성의 중요성을 이해한다.\n\n#### 환경 문제의 쟁점은 무엇일까\n- 물, 대기, 토양, 생물과 관련된 환경 문제와 쟁점을 이해한다.\n- 지역 및 지구 차원의 환경 문제와 쟁점을 이해한다.\n\n#### 기후 행동에 어떻게 참여할까\n- 기후 변화 양상과 기후 위기의 심각성을 이해한다.\n- 학교와 지역을 위한 기후 행동 계획을 수립하고 실천한다.\n\n#### 지속 가능 발전 목표란 무엇일까\n- 삶의 질 향상을 위한 지속 가능 발전 목표, 즉 SDGs를 이해하고 실천 방안을 모색한다.\n- 생태 시민의 역할과 책무를 알고 실천 방안을 찾는다.","activities_md":"### 이해와 분석\n\n#### 환경 문제 분석\n- 환경 문제를 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 실천 중심 활동\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 환경 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다.","advanced_md":"### 생활과학 계열\n\n#### 동물 복지의 개념과 대체육 시장 분석\n- 농림축산식품부 동물복지 인증제 자료와 동물 복지 관련 서적을 참고하여 동물 복지의 개념과 축산업의 문제점을 조사한다.\n- 대체육 관련 서적과 학술논문을 참고하여 식물성 대체육과 배양육의 과학적 원리를 탐구한다.\n- 대체육이 환경에 갖는 의미를 분석한다.\n\n### 기계·전기·전자 계열\n\n#### 스마트 그리드 기술을 활용한 가상 도시 설계\n- 산업통상자원부와 한국전력공사 자료, 스마트그리드 개론서를 참고하여 스마트 그리드의 개념과 필요성을 정리한다.\n- 스마트 그리드 적용 사례를 바탕으로 학교 또는 지역을 가상의 스마트 에너지 시스템으로 설정한다.\n- 전력 사용 개선 방안을 설계하고 카드뉴스로 제작한다.\n\n### 국제·사회 계열\n\n#### 기후 난민을 위한 정책 제안\n- 기후 난민에 관한 국내 서적을 참고하여 기후 난민의 정의와 발생 원인을 조사한다.\n- 유엔난민기구와 환경부 자료를 통해 기후 난민의 현황을 파악한다.\n- 학술논문 및 국제기구 보고서를 참고하여 기후 난민에 대한 국제 협력 방안을 조사하고 정책 제안서를 작성한다.","fit_md":"- 사물에 대한 호기심과 환경에 대한 관심이 있는 학생\n- 지구, 환경, 도시공학, 생명·화학 관련 진로를 희망하는 학생\n- 생태와 환경 문제를 합리적으로 해결하는 과학자나 세계 시민이 되고 싶은 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과"],"semantic_status":"text_reviewed"},{"id":"course_세계_문화와_영어","type":"course","name":"세계 문화와 영어","basic":{"grade_semester":"3학년 1학기","subject_area":"영어","course_type":"융합 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"세계 영어를 통해 다양한 문화 현상과 문화적 산물을 이해하고, 자신의 문화적 관점을 영어로 표현하고 공유하는 과목입니다.","keywords":["세계영어","문화현상","세계시민","문화감수성","감상과표현","설명하기","추론하기","의사소통에참여하기","비교","대조하기","재구성하기","문화콘텐츠제작하여공유하기"],"learning_md":"### 핵심 학습\n\n#### 새로운 문화 현상을 영어로 설명하기\n- 우리나라에서 최근 등장한 새로운 문화 현상을 영어로 설명할 수 있다.\n- 최근 등장한 새로운 문화 현상을 정의한다.\n- 인포그래픽 스토리보드를 제작한다.\n- 글로벌 리포트를 작성한다.\n> 관련 역량: 설명하기, 추론하기, 의사소통에 참여하기\n\n#### 다른 문화권의 영화와 우리 문화 비교하기\n- 다른 문화권의 영화에 나타난 요소 중 우리 문화와 다른 점을 말할 수 있다.\n- 영화에서 문화적 특징을 추출하고 대조하여 말한다.\n- 비언어적 의사소통 사전을 만든다.\n- 영화의 배경이 한국이라면 인물들이 어떻게 행동했을지 상상하여 대사를 고쳐 쓴다.\n> 관련 역량: 비교·대조하기, 재구성하기","activities_md":"### 이해와 분석\n\n#### 문화 현상 분석\n- 세계 영어와 문화 현상을 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 영어 표현 활동\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 영어로 표현한다.\n- 생활 속 문화 사례나 진로 관심 분야에 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다.","advanced_md":"### 상경 계열\n\n#### 글로벌 브랜드의 현지화 전략 분석 리포트\n- 유명 글로벌 기업을 골라 영미권 광고와 아시아권 광고를 비교한다.\n- 제3의 국가를 정해 해당 국가의 문화 특징을 조사한다.\n- 해당 국가를 위한 가상의 현지화 마케팅 제안서를 작성한다.\n\n### 인문과학 계열\n\n#### 나만의 문화 개념 사전 만들기\n- 영어로 옮기기 힘든 우리말 단어를 조사한다.\n- 해당 단어를 사전 형식의 영어 정의로 설명한다.\n- 나만의 문화 사전 페이지를 꾸민다.","fit_md":"- 외교, 국제기구, NGO 등에서 활동하고 싶은 학생\n- 글로벌 비즈니스와 마케팅처럼 다양한 국적의 사람들을 직접 응대하는 일에 관심이 많은 학생\n- 다른 나라의 의식주, 예술, 종교가 형성된 역사적 배경을 영어로 읽고 토론하는 과정을 즐기는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","영어영문학과","통번역학과","국제관계학과","무역·유통학과","호텔·관광경영학과","디자인과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_영어영문학과","dept_통번역학과","dept_국제관계학과","dept_무역·유통학과","dept_호텔·관광경영학과","dept_디자인과"],"semantic_status":"text_reviewed"},{"id":"course_세계사","type":"course","name":"세계사","basic":{"grade_semester":"2학년 1학기","subject_area":"사회","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"오늘날의 세계가 만들어지기까지 각 지역의 발전 과정과 고유한 역사·문화를 이해하고, 세계시민 의식을 기르는 과목입니다.","keywords":["지역세계의형성","교역망","문화변동","포용적관점","현대세계의과제","고대문명","고대종교와문화","이슬람","몽골제국","신항로개척","시민혁명","산업혁명","제1","2차세계대전","냉전"],"learning_md":"### 핵심 학습\n\n#### 지역 세계의 형성\n- 세계 각 지역의 서로 다른 문화가 어떻게 생겨나고 발전했는지 이해한다.\n- 문명의 형성 과정을 이해한다.\n- 각 지역의 문화, 종교, 사상을 분석한다.\n- 문화권의 성립이 갖는 의의를 파악한다.\n> 핵심어: 고대 문명, 고대 종교와 문화\n\n#### 교역망의 확대\n- 동서 문명의 만남과 신항로 개척에 따른 변화를 이해한다.\n- 이슬람 세계와 몽골 제국을 이해한다.\n- 신항로 개척 이후 재정·군사 국가의 출현을 파악한다.\n- 지역별 교역망을 분석한다.\n> 핵심어: 이슬람, 몽골 제국, 신항로 개척\n\n#### 국민 국가의 형성\n- 국민 국가의 개념과 세계 각지에서의 형성 과정을 이해한다.\n- 청, 무굴 제국, 오스만 제국을 이해한다.\n- 시민 혁명과 시민 사회 형성의 관계를 파악한다.\n- 산업 혁명의 영향을 분석한다.\n- 국민 국가 건설 운동을 조사한다.\n> 핵심어: 시민 혁명, 산업 혁명\n\n#### 현대 세계의 과제\n- 세계 대전의 영향과 오늘날 인류에게 주어진 과제를 이해한다.\n- 제1·2차 세계 대전의 양상을 파악한다.\n- 냉전의 전개에 따른 변화를 분석한다.\n- 현대 세계의 문제 해결을 위한 노력을 탐구한다.\n> 핵심어: 제1·2차 세계 대전, 냉전","activities_md":"### 이해와 분석\n\n#### 역사 자료와 개념 분석\n- 핵심 개념을 역사적 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 역사 해석 표현\n- 보고서, 발표, 토론, 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 역사적 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다.","advanced_md":"### 인문과학 계열\n\n#### 나의 희망 진로 분야의 각국 역사 조사\n- 희망 진로 분야가 세계 각국의 역사 속에서 어떻게 발전해 왔는지 조사한다.\n- 내가 꿈꾸는 진로에 대한 포트폴리오를 작성한다.\n\n### 사회·상경 계열\n\n#### 지역 분쟁의 역사적 근원 분석\n- 세계 각지에서 벌어지는 여러 분쟁의 역사적 연원을 분석한다.\n- 지역 분쟁이 무엇을 둘러싼 갈등에서 시작되었는지 파악하여 발표한다.\n\n### 자연과학 계열\n\n#### 인류가 당면한 기후 위기의 해결 방안\n- 기후 변화에 대한 선진국과 개발도상국의 대응을 조사한다.\n- 기후 불평등 해결을 위해 실천할 수 있는 방안을 모색한다.","fit_md":"- 세계 각 지역 문명의 형성과 발전 과정에 관심이 많은 학생\n- 세계의 역사, 언어, 문화, 경제, 미술 등에 흥미가 있는 학생\n- 현대 국제 분쟁 문제의 근원을 알아보고 해결책을 찾는 데 기여하고 싶은 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","영어영문학과","통번역학과","국제관계학과","무역·유통학과","호텔·관광경영학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_영어영문학과","dept_통번역학과","dept_국제관계학과","dept_무역·유통학과","dept_호텔·관광경영학과"],"semantic_status":"text_reviewed"},{"id":"course_세계시민과_지리","type":"course","name":"세계시민과 지리","basic":{"grade_semester":"2학년 1학기","subject_area":"사회","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"지구촌의 다양한 자연환경과 인간 생활의 모습을 공간적 관점에서 탐구하고, 세계시민으로서 지역과 세계의 문제를 이해하는 과목입니다.","keywords":["세계화","지역화","환경문제","세계문제","공간문제","세계시민","글로컬라이제이션","지리정보기술","세계기후구분","지형의형성과변화","지속가능성","보편종교","종교","음식문화","인구분포","인구구조","국제적이주","식량자원"],"learning_md":"### 핵심 학습\n\n#### 세계화는 우리의 삶을 어떻게 바꿀까\n- 다국적 기업의 현지화 전략을 분석한다.\n- 글로컬라이제이션 사례를 탐구한다.\n- 지리정보분석, 국제 통계 분석, 공공데이터 분석을 활용한다.\n\n#### 세계의 다양한 자연환경과 문화를 어떻게 이해할까\n- 세계의 다양한 자연환경과 문화를 이해하는 관점을 기른다.\n- 세계 기후 구분과 그에 따른 인간 생활 모습을 이해한다.\n- 세계 주요 지형을 탐구하고 지속 가능한 이용을 위한 대안을 모색한다.\n- 세계 주요 종교를 이해하고 종교 경관을 비교한다.\n- 세계의 다양한 음식문화와 축제 사례를 탐구한다.\n> 핵심어: 세계 기후 구분, 지형의 형성과 변화, 지속 가능성, 보편 종교, 세계 축제\n\n#### 인구·자원·경제 활동은 공간적으로 어떻게 나타날까\n- 인구 분포와 인구 구조를 이해하고 국제 이동 사례를 탐구한다.\n- 식량 자원의 생산과 소비, 이동을 분석하고 식량 문제 해결 방안을 모색한다.\n- 글로벌 가치 사슬과 공간적 불균등의 관계를 분석한다.\n\n#### 현존하는 세계 문제는 어떻게 해결할 수 있을까\n- 세계의 에너지 생산과 소비, 이동 패턴을 분석한다.\n- 세계 문제를 공간적 관점에서 파악하고 지속 가능한 해결 방안을 생각한다.","activities_md":"### 이해와 분석\n\n#### 지리 자료 분석\n- 핵심 개념을 사례와 연결해 설명한다.\n- 원문에 제시된 질문을 바탕으로 탐구 주제를 만든다.\n- 지도, 그래프, 통계 자료를 비교하고 근거를 찾아 정리한다.\n\n### 표현과 적용\n\n#### 공간 문제 표현 활동\n- 보고서, 발표, 토론, 지도 제작 활동으로 배운 내용을 표현한다.\n- 생활 속 사례나 진로 관심 분야에 지리적 관점을 적용한다.\n- 친구들과 결과를 공유하고 피드백을 반영한다.","advanced_md":"### 상경 계열\n\n#### 지리정보기술의 활용\n- 공공데이터를 활용하여 글로벌 데이터 센터의 최적 입지를 분석한다.\n- 전력 공급, 네트워크 연결성, 상수도 및 냉각 인프라, 재해 위험 평가, 기후 데이터를 고려한다.\n\n### 인문·예술 분야\n\n#### 기후 변화에 따른 경관 변화 예측\n- 205
