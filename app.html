전적 강화와 인간 존엄성 성찰\n- 유전자 편집 기술이 일상이 된 미래 사회의 가상 시나리오를 작성한다.\n- 하버마스 이론을 바탕으로 유전자 편집 기술이 인간의 주체성에 미치는 영향을 분석한다.\n- 유전적 강화와 치료의 윤리적 경계를 검토한다.\n\n### 인문·사회 계열\n\n#### 정의로운 분배 모델 탐구\n- 롤스와 노직의 이론을 바탕으로 국내외의 다양한 분배 정책을 비교 분석한다.\n- 정의로운 분배를 위한 국가의 역할을 탐구한다.\n- 미래 사회에 적합한 분배 정책을 제안한다.\n\n### 자연·공학 계열\n\n#### 과학 기술의 사회적 책임과 역사적 사례 탐구\n- 맨해튼 프로젝트나 탈리도마이드 사건 등 역사적 사례를 조사한다.\n- 하이데거와 야스퍼스의 관점에서 과학자의 책임을 분석한다.\n- 연구자가 가져야 할 태도와 연구 윤리에 대해 토론한다.","fit_md":"- 생명윤리, 인공지능, 환경, 정의, 다문화 문제를 깊이 있게 토론하고 싶은 학생\n- 사회 문제를 윤리 이론과 연결해 분석하고 자신의 판단을 세워 보고 싶은 학생\n- 의학, 생명과학, 사회과학, 공학 분야의 책임과 윤리 문제에 관심 있는 학생","related_department_names":["생명과학과","생명공학과","의예과","약학과","간호학과","임상병리학과","컴퓨터공학과","소프트웨어학과","인공지능학과","빅데이터학과","정보보안학과","사회학과"],"related_department_ids":["dept_생명과학과","dept_생명공학과","dept_의예과","dept_약학과","dept_간호학과","dept_임상병리학과","dept_컴퓨터공학과","dept_소프트웨어학과","dept_인공지능학과","dept_빅데이터학과","dept_정보보안학과","dept_사회학과"],"semantic_status":"text_reviewed"},{"id":"course_화법과_언어","type":"course","name":"화법과 언어","basic":{"grade_semester":"2학년 1학기","subject_area":"국어","course_type":"일반 선택","selection_group":"학교지정","credits":"3학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"듣기·말하기와 문법 영역을 심화·확장하여, 상황과 목적에 맞게 의사소통하고 언어 사용을 분석하는 과목입니다.","keywords":["의사소통","공감적이해","담화구성","비판적사고","언어생활","사회적맥락","문제해결","담화의맥락","화행","언어의사회성","청자분석","논증구조","언어예절"],"learning_md":"### 핵심 학습\n\n#### 우리는 왜 같은 말을 다르게 이해할까\n- 담화의 맥락, 화행, 언어의 사회성을 이해한다.\n- 목적과 상황에 맞게 설득력 있게 말하는 방법을 탐구한다.\n- 토론 및 발표 상황에서 발화 의도를 분석한다.\n> 핵심 개념: 담화의 맥락, 화행, 언어의 사회성\n\n#### 사회 속 언어 사용은 어떤 방식으로 의미를 만들까\n- 뉴스 기사, 광고, SNS 글의 언어 사용 방식을 비교 분석한다.\n- 혐오 표현, 오해가 발생한 대화 등 언어 갈등 사례를 분석하고 원인을 탐구한다.\n- 공적 담화에서 사용되는 설득 전략을 파악한다.\n\n#### 공적 상황에서 어떻게 말하고 쓸 수 있을까\n- 사회 문제를 주제로 설득을 위한 발표 원고를 작성하고 발표한다.\n- 토론 활동을 통해 주장과 반론을 구성한다.\n- 인터뷰를 기획하고 질문지를 구성한다.\n- 공적 상황에 적절한 언어 표현과 소통 방식을 탐구한다.","activities_md":"### 담화 분석\n\n#### 언어 사용 방식 비교\n- 기사, 광고, SNS, 토론 프로그램 등 다양한 담화 자료를 비교한다.\n- 표현 방식, 발화 의도, 설득 전략을 분석한다.\n\n#### 언어 갈등 사례 탐구\n- 혐오 표현, 오해, 세대 갈등 등 언어 갈등 사례를 조사한다.\n- 갈등이 발생한 맥락과 표현 방식을 분석한다.\n\n### 말하기와 공적 소통\n\n#### 발표와 토론\n- 사회 문제를 주제로 발표 원고를 작성하고 발표한다.\n- 주장, 근거, 반론을 구성하여 토론에 참여한다.\n\n#### 인터뷰와 질문 구성\n- 인터뷰 목적에 맞는 질문지를 구성한다.\n- 공적 상황에 적절한 언어 표현과 소통 방식을 적용한다.","advanced_md":"### 전 계열\n\n#### 사회적 이슈에 대한 공론장 분석\n- 혐오 표현, 정치적 갈등, 세대 갈등 등 사회 이슈 사례를 조사한다.\n- 언론 기사, SNS 댓글, 토론 프로그램 발언을 비교 분석한다.\n- 갈등을 완화하는 언어 표현 방식을 제안하고 발표한다.\n\n### 인문·사회 계열\n\n#### 정치·미디어 담론의 설득 전략 연구\n- 정치, 광고, 캠페인에서 사용되는 언어 전략을 분석한다.\n- 프레이밍 효과와 감정 호소 표현을 조사한다.\n- 언어 전략과 여론 형성의 관계를 탐구 보고서로 정리한다.\n\n### 자연·공학 계열\n\n#### 과학·기술 정보의 대중화 담화 탐구\n- 과학 논문 요약문과 대중 과학 기사를 비교하여 읽는다.\n- 어려운 과학 개념을 쉽게 설명하는 카드뉴스를 제작한다.\n- 설명 방식에 따른 이해도 차이를 조사한다.","fit_md":"- 말하기, 토론, 발표, 인터뷰 등 실제 의사소통 활동을 깊이 있게 연습하고 싶은 학생\n- 사회적 이슈와 미디어 담화 속 언어 표현을 분석하고 싶은 학생\n- 국어, 미디어, 교육, 사회과학, 과학 커뮤니케이션 분야에 관심 있는 학생","related_department_names":["사회학과","정치외교학과","법학과","행정학과","경제학과","사회복지학과","국어국문학과","문헌정보학과","미디어학과","교육학과"],"related_department_ids":["dept_사회학과","dept_정치외교학과","dept_법학과","dept_행정학과","dept_경제학과","dept_사회복지학과","dept_국어국문학과","dept_문헌정보학과","dept_미디어학과","dept_교육학과"],"semantic_status":"text_reviewed"},{"id":"course_화학","type":"course","name":"화학","basic":{"grade_semester":"2학년 1학기","subject_area":"과학","course_type":"일반 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"물질이 어떻게 구성되고 반응하는지 이해하며, 일상생활과 사회 문제를 화학의 법칙으로 설명하고 해결해 보는 과목입니다.","keywords":["몰","화학 반응식","양적 관계","분자 구조","전기음성도","화학 평형","평형 이동","몰농도","pH","중화 반응","중화 적정"],"learning_md":"### 핵심 학습\n\n#### 화학의 언어로 물질과 반응을 어떻게 표현할까\n- 눈에 보이지 않는 입자와 반응을 숫자와 식으로 표현하는 방법을 이해한다.\n- 몰, 몰질량, 화학 반응식, 양적 관계를 통해 물질의 양과 반응량을 계산한다.\n- 다양한 물질의 몰질량을 탐색하고, 특정 몰수에 해당하는 물질의 질량을 측정한다.\n- 화학 반응의 양적 관계를 확인하는 실험을 설계하고 수행한다.\n\n#### 분자의 구조가 달라지면 물질의 성질도 달라질까\n- 전기적 성질, 전기음성도, 분자 구조를 바탕으로 물질의 성질을 설명한다.\n- 물의 전기 분해 실험을 통해 화학 결합과 반응을 이해한다.\n- 소프트웨어로 분자 구조를 모델링한다.\n- 분자 구조에 따른 물질의 성질을 확인한다.\n\n#### 화학 반응은 어떤 조건에서 평형에 이를까\n- 정반응과 역반응이 함께 일어나는 화학 평형을 이해한다.\n- 농도, 압력, 온도 변화가 평형 이동에 미치는 영향을 학습한다.\n- 화학 평형에서 농도비의 규칙성을 찾고 반응의 진행 방향을 예측한다.\n- 조건 변화에 따른 화학 평형 이동을 실험으로 확인한다.\n\n#### 산과 염기의 반응은 어떻게 정량적으로 이해할 수 있을까\n- 수용액에서 수소 이온 농도를 표현하는 방법을 이해한다.\n- 산과 염기가 만나 일어나는 중화 반응을 정량적으로 해석한다.\n- 표준 용액을 만들고 강산 수용액을 희석할 때의 pH 변화를 측정한다.\n- 중화 적정을 통해 식초 속 아세트산 함량을 구한다.","activities_md":"### 실험과 측정\n\n#### 물질의 양과 반응량 측정\n- 몰수에 해당하는 물질의 질량을 측정한다.\n- 화학 반응식과 실험 결과를 연결하여 반응량을 계산한다.\n\n#### 산·염기 실험\n- pH 변화를 측정한다.\n- 중화 적정으로 식초 속 아세트산 함량을 구한다.\n\n### 계산과 예측\n\n#### 화학 반응의 양적 관계\n- 화학 반응식으로 반응량을 계산한다.\n- 화학 반응의 양적 관계를 확인한다.\n\n#### 평형과 반응 방향\n- 반응의 진행 방향을 예측한다.\n- 평형상수와 평형 이동을 해석한다.\n\n### 모델링과 시뮬레이션\n\n#### 분자 구조 모델링\n- 소프트웨어로 분자 구조를 모델링한다.\n- 분자 구조와 물질의 성질을 연결하여 설명한다.\n\n#### 평형 이동 탐구\n- 농도, 압력, 온도 변화에 따른 평형 이동을 탐구한다.","advanced_md":"### 체육 계열\n\n#### 고도와 산소량이 운동 능력에 미치는 영향 탐구\n- 경기장의 고도와 대기 중 산소량을 조사한다.\n- 고지대에서 호흡이 어려운 이유를 설명한다.\n- 화학 평형 이동을 바탕으로 경기 능력 향상 방안을 분석한다.\n\n### 자연 계열\n\n#### 중화 반응을 활용한 이산화 탄소 농도 감소 방안 탐구\n- 기후 변화와 이산화 탄소 농도의 관계를 조사한다.\n- 탄소 포집·활용·저장 기술을 탐색한다.\n- 광물 탄산화 기술을 중화 반응과 연결해 설명한다.\n\n### 공학 계열\n\n#### 화학 평형 이동을 이용한 그린 메탄올 수득률 향상 탐구\n- 그린 메탄올 합성 과정을 조사한다.\n- 평형 이동을 이용한 수득률 향상 조건을 분석한다.\n- 생산 공장 설비 조건을 검토한다.","fit_md":"- 실험, 계산, 모델링을 통해 물질의 구조와 반응을 이해하고 싶은 학생\n- 화학공학, 신소재, 에너지, 환경, 의약, 식품 분야에 관심 있는 학생\n- 일상생활과 산업 속 문제를 화학 원리로 설명하고 해결해 보고 싶은 학생","related_department_names":["화학과","화학공학과","신소재공학과","재료공학과","에너지자원공학과","환경공학과","생명공학과","약학과","의예과","식품공학과","화장품과학과","간호학과"],"related_department_ids":["dept_화학과","dept_화학공학과","dept_신소재공학과","dept_재료공학과","dept_에너지자원공학과","dept_환경공학과","dept_생명공학과","dept_약학과","dept_의예과","dept_식품공학과","dept_화장품과학과","dept_간호학과"],"semantic_status":"text_reviewed"},{"id":"course_화학_반응의_세계","type":"course","name":"화학 반응의 세계","basic":{"grade_semester":"3학년 1학기","subject_area":"과학","course_type":"진로 선택","selection_group":"학년선택","credits":"3학점","exam":""},"one_liner":"화학 반응이 왜 일어나고 어떻게 조절되는지 이해하며, 에너지·환경·의약·산업 속 화학 반응의 활용을 탐구하는 과목입니다.","keywords":["산화","환원","산과 염기","반응 속도","촉매","화학 평형","전기화학","에너지 전환","환경 화학","산업 공정"],"learning_md":"### 핵심 학습\n\n#### 화학 반응은 왜 일어날까\n- 물질이 서로 반응하며 새로운 물질로 바뀌는 과정을 에너지와 입자 관점에서 이해한다.\n- 반응의 방향과 조건을 살펴보며 화학 변화의 원리를 학습한다.\n- 화학 반응 전후의 물질 변화를 분석한다.\n- 반응 조건에 따른 결과를 비교하고, 에너지 변화와 반응의 관계를 설명한다.\n\n#### 산화·환원은 어디에 쓰일까\n- 전자 이동으로 설명되는 산화·환원 반응을 이해한다.\n- 산화·환원 반응이 배터리, 부식, 전기분해, 생명 현상과 연결됨을 살펴본다.\n- 전지와 전기분해의 원리를 비교한다.\n- 금속 부식과 방지 방법을 탐구한다.\n\n#### 반응 속도와 평형은 어떻게 조절할까\n- 온도, 농도, 촉매, 압력 등 조건이 반응 속도와 평형에 미치는 영향을 이해한다.\n- 산업 공정에서 원하는 생성물을 얻기 위해 조건을 조절하는 방법을 살펴본다.\n- 반응 속도에 영향을 주는 요인을 실험하고 촉매의 역할을 탐구한다.\n- 평형 이동을 이용한 산업 공정 사례를 분석한다.\n\n#### 화학 반응은 사회 문제 해결에 어떻게 쓰일까\n- 화학 반응이 에너지 생산, 환경 오염 제거, 의약품 개발, 신소재 생산에 활용되는 사례를 이해한다.\n- 화학 반응의 활용 과정에서 안전, 윤리, 환경 영향을 함께 고려한다.\n- 친환경 촉매 사례를 조사하고 의약품 합성과 화학 반응의 관계를 탐구한다.\n- 화학 산업의 안전 기준에 대해 토론한다.","activities_md":"### 실험과 관찰\n\n#### 반응 변화 관찰\n- 반응 속도를 측정한다.\n- 산화·환원 반응을 관찰한다.\n- 산·염기 반응을 분석한다.\n\n### 산업과 환경 탐구\n\n#### 화학 기술 사례 조사\n- 촉매를 활용한 환경 문제 해결 사례를 조사한다.\n- 전지와 에너지 저장 기술을 탐구한다.\n- 화학 공정에서 조건 조절의 의미를 분석한다.\n\n### 토론과 적용\n\n#### 사회적 영향 분석\n- 화학물질 안전 문제를 토론한다.\n- 친환경 화학 기술의 장단점을 비교한다.\n- 에너지 전환 기술의 사회적 영향을 정리한다.","advanced_md":"### 공학 계열\n\n#### 전기화학과 배터리 기술 탐구\n- 전지의 산화·환원 반응을 분석한다.\n- 리튬 이온 배터리의 작동 원리를 조사한다.\n- 배터리 재활용과 환경 문제를 토론한다.\n\n### 자연·의약학 계열\n\n#### 의약품 합성과 반응 조건 탐구\n- 특정 의약품의 합성 과정을 조사한다.\n- 반응 조건과 수율의 관계를 분석한다.\n- 의약품 생산 과정의 안전성을 검토한다.","fit_md":"- 화학 반응의 원리와 조건 조절을 실험과 사례로 이해하고 싶은 학생\n- 배터리, 촉매, 의약품, 환경 기술, 화학 산업 분야에 관심 있는 학생\n- 화학 반응이 사회 문제 해결에 어떻게 활용되는지 탐구하고 싶은 학생","related_department_names":["화학과","화학공학과","약학과","의예과","생명공학과","신소재공학과","재료공학과","에너지자원공학과","환경공학과","식품공학과"],"related_department_ids":["dept_화학과","dept_화학공학과","dept_약학과","dept_의예과","dept_생명공학과","dept_신소재공학과","dept_재료공학과","dept_에너지자원공학과","dept_환경공학과","dept_식품공학과"],"semantic_status":"text_reviewed"},{"id":"course_확률과_통계","type":"course","name":"확률과 통계","basic":{"grade_semester":"3학년 1학기","subject_area":"수학","course_type":"일반 선택","selection_group":"학교지정","credits":"3학점 (학교지정)","exam":"수능 출제 과목"},"one_liner":"불확실한 상황에서 가능성을 판단하고, 자료 속 흐름을 읽어 합리적으로 의사결정하는 방법을 배우는 과목입니다.","keywords":["순열","조합","이항정리","확률","조건부확률","확률분포","통계적추정","중복순열","중복조합","독립과종속","확률변수"],"learning_md":"### 핵심 학습\n\n#### 사건을 체계적으로 분류하고 세는 최적의 방법은 무엇일까\n- 중복순열과 중복조합의 원리를 이해하고 다양한 문제 상황에 적용한다.\n- 이항정리를 활용하여 다항식 전개식의 성질을 탐구한다.\n\n#### 조건이 주어진 상황에서 사건이 일어날 가능성은 어떻게 달라질까\n- 확률의 정의와 성질을 바탕으로 덧셈정리와 곱셈정리를 이해한다.\n- 실생활 속 조건부확률의 필요성을 이해한다.\n- 사건 간의 독립성을 판정한다.\n\n#### 표본을 통해 전체 집단의 특성을 어떻게 예측할까\n- 이항분포와 정규분포의 관계를 이해한다.\n- 표본을 통해 모집단의 평균과 비율을 과학적으로 추정한다.\n- 통계적 문제 해결 과정을 수행한다.","activities_md":"### 경우의 수와 확률 분석\n\n#### 조건 나열과 문항 변형\n- 순열과 조합의 문제 상황에서 조건을 체계적으로 나열한다.\n- 조건을 바꾸며 가능한 경우의 수와 확률 변화를 분석한다.\n\n#### 조건부확률 탐구\n- 실생활 사례에서 조건부확률이 필요한 상황을 찾는다.\n- 사건의 독립성과 종속성을 판단한다.\n\n### 자료 해석과 통계적 추정\n\n#### 표본조사 분석\n- 표본조사나 여론조사의 자료 수집 과정을 살펴본다.\n- 표본을 통해 모집단을 추정하는 과정을 분석한다.\n\n#### 통계 결과 비판\n- 조사 결과의 신뢰도와 한계를 검토한다.\n- 자료 해석 과정에서 발생할 수 있는 오류를 비판적으로 살펴본다.","advanced_md":"### 자연 계열\n\n#### What if not 전략을 이용한 문항 제작\n- 특정 조건을 만족하는 함수의 개수, 방정식의 정수해 개수 등 순열과 조합의 문제 상황에서 주어진 조건을 나열한다.\n- 조건을 다양하게 변형하며 문항을 제작하고 분석한다.\n\n### 생명·보건 계열\n\n#### 감염병 확산 경로 예측과 조건부확률 분석\n- 특정 감염병 검사 키트의 정확도 자료를 수집한다.\n- 민감도와 특이도 자료를 바탕으로 실제 양성 확률을 계산한다.\n- 조건부확률 분석을 바탕으로 방역 정책의 통계적 근거를 제시한다.\n\n### 전 계열\n\n#### 관심 분야 표본조사 또는 여론조사 분석\n- 관심 분야에서 이루어지는 표본조사나 여론조사를 찾아본다.\n- 해당 표본조사의 통계적 추정 과정을 분석하고 비판한다.","fit_md":"- 경우의 수, 확률, 통계 자료를 활용해 문제를 논리적으로 해결하고 싶은 학생\n- 수학, 통계, 경제, 데이터 분석, 생명·보건 분야에 관심 있는 학생\n- 실제 조사 자료와 확률 모델을 바탕으로 사회 현상을 해석하고 싶은 학생","related_department_names":["수학과","통계학과","경제학과","산업공학과","빅데이터학과"],"related_department_ids":["dept_수학과","dept_통계학과","dept_경제학과","dept_산업공학과","dept_빅데이터학과"],"semantic_status":"text_reviewed"}],"departments":[{"id":"dept_간호학과","type":"department","name":"간호학과","field":"보건·의약학 분야 · 보건 계열","one_liner":"사람의 건강 문제를 이해하고 돌보며, 환자와 가족, 지역사회를 돕는 전문 간호 역량을 기르는 학과입니다.","overview_md":"간호학과는 단순히 병원에서 환자를 돌보는 기술만 배우는 학과가 아닙니다. 사람의 몸과 질병을 과학적으로 이해하고, 환자의 상태를 관찰하며, 필요한 간호를 계획하고 실행하는 과정을 배웁니다.\n\n또한 간호는 사람을 직접 만나는 일입니다. 그래서 생명 존중, 공감, 의사소통, 협동, 윤리 의식이 중요합니다. 개인뿐 아니라 가족과 지역사회의 건강 문제까지 넓게 바라보는 힘도 함께 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 인체와 생명과학 기초\n- 사람의 몸이 어떻게 작동하는지 이해하기 위해 생물학, 화학, 생리학, 해부학을 바탕으로 건강과 질병의 원리를 학습합니다.\n- 일반생물학, 일반화학, 생리학, 해부학, 병리학, 임상미생물학 등을 다룹니다.\n\n#### 간호 과정과 임상 실무\n- 환자의 건강 문제를 사정하고, 필요한 간호를 계획하며, 실행과 평가까지 이어지는 간호 과정을 학습합니다.\n- 간호학개론, 성인간호학, 응급간호, 간호학실습, 임상약리학, 영양학 및 식이요법 등을 다룹니다.\n\n#### 성장·상담·지역사회 건강\n- 간호는 병원 안에서만 이루어지지 않으므로 인간의 성장과 발달, 상담, 가족과 지역사회의 건강 문제까지 함께 학습합니다.\n- 인간성장발달과 건강, 상담학개론, 사회간호학, 사회복지학개론, 모성간호학 등을 다룹니다.\n\n#### 보건의료 제도와 전문직 역량\n- 의료 현장의 전문직으로서 법과 제도, 윤리, 협업 구조를 이해합니다.\n- 보건의료관계법규, 간호학실습, 간호학개론 등을 다룹니다.","fit_md":"- 생명을 존중하고 사람을 돕는 일에 의미를 느끼는 학생\n- 생명과학, 화학, 보건 과목에 흥미가 있는 학생\n- 다른 사람의 아픔과 어려움에 공감하고 배려할 수 있는 학생\n- 건강 문제를 과학적으로 이해하고 해결해 보고 싶은 학생\n- 책임감을 가지고 꾸준히 학습할 수 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 생명과학\n- 화학\n- 보건\n- 세포와 물질대사\n- 생물의 유전\n- 화학 반응의 세계\n- 현대사회와 윤리\n- 확률과 통계\n- 대수\n- 미적분Ⅰ\n- 인공지능 기초\n- 융합과학 탐구","connected_course_names":["생명과학","화학","보건","세포와 물질대사","생물의 유전","화학 반응의 세계","현대사회와 윤리","확률과 통계","대수","미적분Ⅰ","인공지능 기초","융합과학 탐구"],"connected_course_ids":["course_생명과학","course_화학","course_보건","course_세포와_물질대사","course_생물의_유전","course_화학_반응의_세계","course_현대사회와_윤리","course_확률과_통계","course_대수","course_미적분Ⅰ","course_인공지능_기초","course_융합과학_탐구"],"careers_md":"#### 임상 간호 분야\n- 임상 간호사\n- 임상 전문 간호사\n- 응급 간호 분야\n- 병동·중환자실·수술실 등 병원 간호 분야\n\n#### 공공·지역사회 보건 분야\n- 보건공무원\n- 보건교육사\n- 초중고 보건교사\n- 국제간호사\n- 지역사회 건강관리 분야\n\n#### 산업·기업 분야\n- 산업체 간호사\n- 보험심사 간호사\n- 메디컬 코디네이터\n- 제약회사\n- 의료기기 회사\n\n#### 교육·연구·복지 분야\n- 대학교수\n- 사회복지시설 간호사\n- 보육교사\n- 간호 교육 및 연구 분야","similar_departments":["간호학부","임상간호학과"],"similar_departments_md":"- 간호학부\n- 임상간호학과","semantic_status":"text_reviewed"},{"id":"dept_건축공학과","type":"department","name":"건축공학과","field":"공학 분야 · 건축·환경 계열","one_liner":"인간과 환경에 대한 이해를 바탕으로 구조, 재료, 시공 기술 등 공학 지식을 융합하여 안전하고 지속 가능한 건축 환경을 설계하고 구현하는 학과입니다.","overview_md":"건축공학과는 건축물을 안전하고 효율적으로 만들기 위해 필요한 공학적 원리와 기술을 배우는 학과입니다. 건축의 구조, 재료, 시공, 설비, 환경, 건설 관리 등을 다루며, 실제 건축 현장에서 발생하는 문제를 분석하고 해결하는 능력을 기릅니다.\n\n건축학과가 공간 설계와 미적 표현에 더 무게를 둔다면, 건축공학과는 구조적 안전성, 시공 기술, 재료와 설비, 건설 과정의 관리에 더 초점을 둡니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 건축공학의 기본 개념과 기초 이론을 학습합니다.\n- 일반 물리학, 미분적분학, 기본설계, 공업수학, 건축개론, 건축제도, 동역학, 구조역학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 구조, 재료, 시공, 설비, 건설 관리 등 건축공학의 주요 영역을 깊이 있게 이해합니다.\n- 재료역학, 건축재료공학, 건축구조, 건축시공, 건축설비, 건설기술, 건설경영, 건축공학설계, 특수구조, 건축융합 등을 다룹니다.\n\n#### 실무·응용·융합\n- 전공 지식을 실제 건축 현장, 연구, 산업 문제와 연결합니다.\n- 건축환경공학, 확률통계론, 철근콘크리트구조, 건축음향, 수치해석, 스마트건축생산 등을 다룹니다.","fit_md":"- 수학·과학 기초 지식과 공간지각력을 바탕으로 구조를 이해하고 싶은 학생\n- 구조물의 원리와 시공 과정에 흥미가 있는 학생\n- 실제 문제를 분석하고 해결하는 데 관심이 있는 학생\n- 인간 중심 요소를 이해하면서 공간과 환경을 공학적으로 다루고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 지구과학\n- 정보\n- 기하\n- 미적분Ⅱ\n- 역학과 에너지\n- 물질과 에너지\n- 전자기와 양자\n- 지구시스템과학\n- 인공지능 기초","connected_course_names":["대수","미적분Ⅰ","확률과 통계","물리학","화학","지구과학","정보","기하","미적분Ⅱ","역학과 에너지","물질과 에너지","전자기와 양자","지구시스템과학","인공지능 기초"],"connected_course_ids":["course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_지구과학","course_기하","course_미적분Ⅱ","course_역학과_에너지","course_물질과_에너지","course_전자기와_양자","course_지구시스템과학","course_인공지능_기초"],"careers_md":"#### 기업 및 산업체 분야\n- 건축설계사\n- 시공 엔지니어\n- 인테리어 디자이너\n- 감리 기술자\n\n#### 학계 및 연구기관 분야\n- 건축 연구원\n- 구조·재료 연구자\n\n#### 정부 및 공공기관 분야\n- 건축 공무원\n- 공공기관 기술직\n- 건설관리 전문가","similar_departments":["건축학부(건축공학전공)","건축공학부","스마트건축공학과","토목건축공학과","그린스마트건축공학과"],"similar_departments_md":"- 건축학부(건축공학전공)\n- 건축공학부\n- 스마트건축공학과\n- 토목건축공학과\n- 그린스마트건축공학과","semantic_status":"text_reviewed"},{"id":"dept_건축학과","type":"department","name":"건축학과","field":"공학 분야 · 건축·환경 계열","one_liner":"인간과 도시, 환경에 대한 인문학적 통찰과 예술적 감각을 바탕으로 공간을 설계하고, 미적 감각과 기술 역량을 융합해 삶의 질을 높이는 건축물을 창조하는 5년제 전문 학위 과정의 학과입니다.","overview_md":"건축학과는 사람이 살아가는 공간을 설계하는 학과입니다. 건축물의 기능과 아름다움, 도시와 환경, 역사와 문화, 인간의 생활 방식을 함께 고려하여 공간을 구상하고 표현하는 능력을 기릅니다.\n\n건축공학과가 구조와 시공 등 공학적 구현에 무게를 둔다면, 건축학과는 공간 설계, 형태, 표현, 환경과 도시 맥락을 통합적으로 다룹니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 건축 설계와 표현, 구조, 제도, 컴퓨터 활용 등 기초 역량을 학습합니다.\n- 건축과 표현, 건축과 구조, 건축제도, 건축기초설계, 건축과 컴퓨터, 건축 표현기법, 건축과 환경, 건축구조시스템 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 건축의 역사, 환경계획, 재료와 시공, 형태와 심리, 설계 과정을 깊이 있게 탐구합니다.\n- 건축사, 건축환경계획, 건축재료역학, 건축시공 및 건설관리 입문, 건축 심리와 형태, 한국건축사, 건축형태와 표현, 건축설계, 건축구조계획 등을 다룹니다.\n\n#### 실무·응용·융합\n- 친환경 건축, 도시 디자인, 단지계획, 설비와 건설관리 등 실제 설계와 현장 문제를 연결합니다.\n- 친환경건축계획, 도시디자인과 형태, 단지계획, 건축설비, 건설관리, 주거와 형태 등을 다룹니다.","fit_md":"- 공간과 건축물에 관심이 있고 창의적 설계와 시각적 표현에 흥미가 있는 학생\n- 미적 감각과 함께 수학적·논리적 사고력으로 구조와 공간을 이해하고 싶은 학생\n- 건축 설계, 구조, 시공, 환경계획을 통합적으로 이해하고 적용하고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 지구과학\n- 세계시민과 지리\n- 기하\n- 미적분Ⅱ\n- 역학과 에너지\n- 물질과 에너지\n- 지구시스템과학\n- 한국지리 탐구\n- 융합과학 탐구","connected_course_names":["대수","미적분Ⅰ","확률과 통계","물리학","화학","지구과학","세계시민과 지리","기하","미적분Ⅱ","역학과 에너지","물질과 에너지","지구시스템과학","한국지리 탐구","융합과학 탐구"],"connected_course_ids":["course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_지구과학","course_세계시민과_지리","course_기하","course_미적분Ⅱ","course_역학과_에너지","course_물질과_에너지","course_지구시스템과학","course_한국지리_탐구","course_융합과학_탐구"],"careers_md":"#### 기업 및 산업체 분야\n- 건축설계사\n- 인테리어 디자이너\n- 시공 엔지니어\n- 감리 기술자\n\n#### 정부 및 공공기관 분야\n- 건축 공무원\n- 공공기관 기술직\n- 건설관리 전문가\n\n#### 학계 및 연구기관 분야\n- 건축 연구원\n- 구조·재료 연구자\n\n#### 기타 전문 분야\n- 건축사\n- 건축 창업자\n- 건축 콘텐츠 기획자","similar_departments":["건축학부(건축학 전공)","건축공학과(건축학 전공)","건축학과(건축학 전공)","건축학부","건축학부(도시설계전공)"],"similar_departments_md":"- 건축학부(건축학 전공)\n- 건축공학과(건축학 전공)\n- 건축학과(건축학 전공)\n- 건축학부\n- 건축학부(도시설계전공)","semantic_status":"text_reviewed"},{"id":"dept_경영학과","type":"department","name":"경영학과","field":"사회 분야 · 상경 계열","one_liner":"기업과 조직이 목표를 이루기 위해 사람, 돈, 정보, 전략을 어떻게 운영하고 관리하는지 배우는 학과입니다.","overview_md":"경영학과는 회사나 조직이 어떻게 움직이는지 배우는 학과입니다. 제품과 서비스를 만들고, 사람을 조직하고, 자금을 관리하고, 고객을 이해하며, 변화하는 시장 속에서 전략을 세우는 방법을 배웁니다.\n\n경영은 한 가지 분야만 다루지 않습니다. 회계, 재무, 마케팅, 인사, 생산, 데이터 분석, 창업, 기업윤리처럼 조직 운영에 필요한 여러 영역을 폭넓게 공부합니다.","learning_md":"### 주요 학습 영역\n\n#### 경영의 기본 구조\n- 조직이 어떻게 운영되는지, 경제와 회계의 기본 원리는 무엇인지 배우는 기초 영역입니다.\n- 경영학원론, 경제학원론, 회계원리, 통계학 등을 다룹니다.\n\n#### 돈과 자원 관리\n- 기업이 자금을 조달하고 투자하며, 비용과 성과를 관리하는 재무적 의사결정을 학습합니다.\n- 재무관리, 투자론, 관리회계, 금융경영 관련 과목 등을 다룹니다.\n\n#### 시장과 고객 이해\n- 고객의 필요를 파악하고 제품과 서비스를 효과적으로 전달하는 방법을 배웁니다.\n- 마케팅, 소비자행동분석, 디지털마케팅, 서비스관리 등을 다룹니다.\n\n#### 사람과 조직 운영\n- 팀을 이끌고, 갈등을 조정하고, 조직이 변화하도록 만드는 방법을 학습합니다.\n- 조직행동, 조직개발 및 변화관리, 리더십 이론 및 실습, 보상관리, 노사관계 등을 다룹니다.\n\n#### 운영·창업·데이터\n- 생산, 공급망, 품질, 법률, 데이터 분석, 창업과 벤처 경영 등 조직 운영의 응용 영역을 학습합니다.\n- 공급망관리, 품질관리, 창업 및 벤처경영, 비즈니스 법률, 데이터 분석 및 비즈니스 인텔리전스, 기업윤리 및 사회적책임 등을 다룹니다.","fit_md":"- 다양한 산업과 문화에 관심이 있는 학생\n- 데이터를 분석하고 문제를 해결하는 것을 좋아하는 학생\n- 사람들과 소통하고 협상하는 능력을 키우고 싶은 학생\n- 팀을 이끌고 조직을 관리하는 데 관심이 있는 학생\n- 마케팅, 금융, 창업, 데이터 분석, 국제 비즈니스에 관심이 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 경제 수학\n- 확률과 통계\n- 사회와 문화\n- 정보\n- 인공지능 기초\n- 금융과 경제생활\n- 영어 발표와 토론\n- 법과 사회\n- 화법과 언어\n- 독서와 작문\n- 실용 통계\n- 수학과제 탐구","connected_course_names":["경제 수학","확률과 통계","사회와 문화","정보","인공지능 기초","금융과 경제생활","영어 발표와 토론","법과 사회","화법과 언어","독서와 작문","실용 통계","수학과제 탐구"],"connected_course_ids":["course_경제_수학","course_확률과_통계","course_사회와_문화","course_인공지능_기초","course_금융과_경제생활","course_영어_발표와_토론","course_법과_사회","course_화법과_언어","course_독서와_작문","course_실용_통계","course_수학과제_탐구"],"careers_md":"#### 기업 경영과 관리 분야\n- 일반 기업체\n- 인사·조직 관리\n- 경영기획\n- 운영관리\n- 서비스관리\n\n#### 금융과 회계 분야\n- 은행\n- 증권사\n- 자산 운용사\n- 종합 금융사\n- 보험 회사\n- 회계법인\n\n#### 마케팅과 컨설팅 분야\n- 컨설팅 회사\n- 리서치 회사\n- 마케팅 기획\n- 소비자 분석\n- 디지털마케팅\n\n#### 무역과 글로벌 비즈니스 분야\n- 무역 회사\n- 글로벌비즈니스 분야\n- 국제경영 관련 분야\n\n#### 연구·공공기관 분야\n- 경영·경제 관련 연구소\n- 사회과학 관련 연구소\n- 중앙정부 및 지방자치단체\n- 한국조폐공사\n- 대한무역투자진흥공사","similar_departments":["관광경영학과","글로벌경영학과","AI경영학과","빅데이터경영학과","IT경영학과"],"similar_departments_md":"- 관광경영학과\n- 글로벌경영학과\n- AI경영학과\n- 빅데이터경영학과\n- IT경영학과","semantic_status":"text_reviewed"},{"id":"dept_경제학과","type":"department","name":"경제학과","field":"사회 분야 · 상경 계열","one_liner":"시장, 정책, 금융, 노동, 불평등 같은 경제 현상을 분석하고 사회 문제의 해결 방향을 탐구하는 학과입니다.","overview_md":"경제학과는 돈을 많이 버는 방법만 배우는 학과가 아닙니다. 사람들이 제한된 자원을 어떻게 선택하고 배분하는지, 시장은 어떻게 작동하는지, 정부 정책은 경제에 어떤 영향을 주는지 분석하는 학과입니다.\n\n경제학은 수학과 통계를 활용해 사회 현상을 체계적으로 분석합니다. 빈곤, 실업, 불평등, 금융 위기, 환율, 무역, 환경 문제처럼 복잡한 사회 문제를 경제적 관점에서 이해하고 해결책을 찾습니다.","learning_md":"### 주요 학습 영역\n\n#### 경제의 기본 구조\n- 개인, 기업, 정부, 시장이 어떻게 움직이는지 배우는 기초 영역입니다.\n- 경제학원론, 미시경제, 거시경제, 경제사 등을 다룹니다.\n\n#### 수학과 통계로 경제 분석하기\n- 경제학은 자료를 분석하고 모형을 세우는 학문입니다. 수학과 통계는 경제 현상을 설명하고 예측하는 도구가 됩니다.\n- 경제수학, 계량경제, 응용계량경제, 통계 분석 관련 과목 등을 다룹니다.\n\n#### 정책과 사회 문제\n- 세금, 재정, 복지, 노동, 불평등, 도시와 지역 경제처럼 정책과 사회 문제를 경제학적으로 분석합니다.\n- 조세론, 재정학, 후생경제, 노동경제, 도시 및 지역경제, 법경제 등을 다룹니다.\n\n#### 금융·산업·글로벌 경제\n- 금융시장, 국제무역, 산업 구조, 에너지와 환경 문제를 경제적 관점에서 분석합니다.\n- 금융경제, 산업조직론, 국제무역, 에너지경제, 환경경제, 산업경제, 농업경제, 디지털경제, 정보경제 등을 다룹니다.","fit_md":"- 경제 뉴스, 정책, 시장 동향에 관심이 많은 학생\n- 빈곤, 실업, 불평등 같은 사회 문제를 분석해 보고 싶은 학생\n- 수학과 통계로 사회 현상을 이해하는 데 흥미가 있는 학생\n- 복잡한 문제를 체계적으로 분석하고 해결책을 찾는 것을 좋아하는 학생\n- 국제 무역, 금융, 환율, 글로벌 경제 이슈에 관심이 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 경제 수학\n- 확률과 통계\n- 미적분Ⅰ\n- 사회와 문화\n- 금융과 경제생활\n- 국제 관계의 이해\n- 정보\n- 인공지능 기초\n- 화법과 언어\n- 독서와 작문\n- 정치\n- 법과 사회\n- 실용 통계\n- 수학과제 탐구","connected_course_names":["경제 수학","확률과 통계","미적분Ⅰ","사회와 문화","금융과 경제생활","국제 관계의 이해","정보","인공지능 기초","화법과 언어","독서와 작문","정치","법과 사회","실용 통계","수학과제 탐구"],"connected_course_ids":["course_경제_수학","course_확률과_통계","course_미적분Ⅰ","course_사회와_문화","course_금융과_경제생활","course_국제_관계의_이해","course_인공지능_기초","course_화법과_언어","course_독서와_작문","course_정치","course_법과_사회","course_실용_통계","course_수학과제_탐구"],"careers_md":"#### 금융 분야\n- 금융 분석가\n- 펀드 매니저\n- 리스크 매니저\n- 재무 분석가\n\n#### 공공 정책 분야\n- 경제 정책 분석가\n- 재정 관리사\n- 통계 분석가\n- 중앙은행 직원\n- 공공기관 경제 관련 업무\n\n#### 기업과 컨설팅 분야\n- 경영 컨설턴트\n- 마케팅 분석가\n- 인사 관리자\n- 데이터 분석가\n\n#### 연구와 학계 분야\n- 경제학 교수\n- 경제 연구소 연구원\n- 사회과학 연구원\n\n#### 국제기구와 미디어 분야\n- IMF, OECD 등 국제기구 경제 분석가\n- 개발도상국 경제 프로젝트 매니저\n- 경제 기자","similar_departments":["경제금융물류학부","경제금융학과","경제통상학부","국제경제통상학과","국제경제학과"],"similar_departments_md":"- 경제금융물류학부\n- 경제금융학과\n- 경제통상학부\n- 국제경제통상학과\n- 국제경제학과","semantic_status":"text_reviewed"},{"id":"dept_고고학과","type":"department","name":"고고학과","field":"인문 분야 · 인문과학 계열","one_liner":"유적과 유물을 통해 인류 문명의 변천과 문화 변동 과정을 탐구하고, 과거를 바탕으로 현재와 미래를 이해하는 통찰을 기르는 학과입니다.","overview_md":"고고학과는 인류 문명의 변천사와 문화의 변화 과정을 연구하는 학과입니다. 유적과 유물을 발굴하고 분석하여 역사 기록만으로는 알기 어려운 사실을 보완하며, 인간 사회의 변화 과정을 탐구합니다.\n\n고고학은 과거를 연구하는 데서 끝나지 않습니다. 인류의 삶과 문화가 어떻게 변화해 왔는지 이해함으로써 현재 사회와 미래를 바라보는 깊이 있는 관점을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 고고학의 기본 개념과 연구 방법, 인류 문화의 기원을 학습합니다.\n- 고고학 개론, 고고학 연구의 기초, 문명의 기원, 인류 문화의 기원, 고고학사, 문화유산 관리와 박물관, 고고학 실습, 인류 문화와 환경 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 고고학 자료를 분석하고, 지역과 시대별 문화 변동을 이해하는 방법을 학습합니다.\n- 현대고고학 특강, 고고학과 자료 분석, 동아시아의 선사 시대, 고고학 방법론, 한국고고학 등을 다룹니다.","fit_md":"- 인류의 유물과 유적에 관심이 많고 사물에 대한 관찰력이 뛰어난 학생\n- 인류와 사회의 발달 과정에 흥미를 느끼는 학생\n- 문화 변동의 이유를 탐구하고 싶은 학생\n- 방대한 고서와 유적 자료를 조사하고 연구할 수 있는 인내력과 집중력이 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 독서와 작문\n- 영어 독해와 작문\n- 세계시민과 지리\n- 세계사\n- 사회와 문화\n- 한문\n- 주제 탐구 독서\n- 영미 문학 읽기\n- 한국지리 탐구\n- 동아시아 역사 기행\n- 역사로 탐구하는 현대 세계\n- 사회문제 탐구","connected_course_names":["독서와 작문","영어 독해와 작문","세계시민과 지리","세계사","사회와 문화","한문","주제 탐구 독서","영미 문학 읽기","한국지리 탐구","동아시아 역사 기행","역사로 탐구하는 현대 세계","사회문제 탐구"],"connected_course_ids":["course_독서와_작문","course_영어_독해와_작문","course_세계시민과_지리","course_세계사","course_사회와_문화","course_주제_탐구_독서","course_영미_문학_읽기","course_한국지리_탐구","course_동아시아_역사_기행","course_역사로_탐구하는_현대_세계","course_사회문제_탐구"],"careers_md":"#### 연구기관 분야\n- 인문·사회과학 관련 연구소\n- 문화재 관련 연구소\n\n#### 정부 및 공공기관 분야\n- 중앙정부 및 지방자치단체 문서실\n- 국공립 및 국립대학 도서관\n- 박물관\n- 지역 문화원\n- 큐레이터 등 전문직\n\n#### 언론·출판 분야\n- 신문사\n- 잡지사\n- 방송국\n- 칼럼니스트\n- 출판사\n\n#### 문화재 및 기록 분야\n- 문화재 발굴 전문가\n- 문화재 복원 연구원\n- 문화재 감정평가사\n- 미술품 감정사\n- 문화해설사\n- 기업 문헌 자료실\n- 기록물관리사","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_공예과(조형학과)","type":"department","name":"공예과(조형학과)","field":"예술·체육 분야 · 예술 계열","one_liner":"도예, 금속공예, 가구디자인, 주얼리디자인 등 다양한 재료와 기법을 활용하여 실용성과 예술성을 겸비한 작품을 창작하는 공예 작가와 조형 예술가를 기르는 학과입니다.","overview_md":"공예과(조형학과)는 흙, 금속, 나무, 유리, 섬유 등 다양한 재료를 다루며 손과 도구, 기술과 감각을 함께 사용하는 학과입니다. 재료의 특성을 이해하고 제작 기법을 익히며, 실험적이고 창의적인 표현 방식을 탐구합니다.\n\n공예는 순수 예술과 디자인, 생활 속 물건의 실용성을 함께 고려합니다. 따라서 작품의 아름다움뿐 아니라 쓰임, 재료, 제작 과정, 전시와 산업적 활용까지 함께 배웁니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 조형의 기본 원리와 재료, 색채, 드로잉, 입체 표현의 기초를 학습합니다.\n- 기초 조형, 기초 드로잉 및 디자인 스케치, 소재와 기법 연구, 공간과 조형, 3D 컴퓨터 그래픽 및 모델링, 공예사 및 조형 이론, 색채학, 재료학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 재료별 공예 기법과 디자인 표현을 심화하여 학습합니다.\n- 디자인 기초, 도예 성형기법, 도자 유약 및 소성 연구, 금속가공 기법, 주얼리 디자인, 목조 조형 및 가구 설계, 유리 조형, 직조 기법, 패브릭 디자인 등을 다룹니다.\n\n#### 실무·응용·융합\n- 작품의 의미와 전시, 산업적 활용을 연결합니다.\n- 공예 미학 및 철학, 전시 기획 등을 다룹니다.","fit_md":"- 손으로 만드는 것을 좋아하고 입체적인 작업에 흥미가 있는 학생\n- 예술성과 실용성을 함께 고려하는 디자인에 관심이 있는 학생\n- 금속, 흙, 나무, 유리 등 다양한 재료를 다루는 데 관심이 있는 학생\n- 반복적이고 정밀한 작업을 견딜 수 있는 인내심과 꼼꼼함을 가진 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 문학\n- 영어 독해와 작문\n- 세계사\n- 사회와 문화\n- 현대사회와 윤리\n- 미술\n- 주제 탐구 독서\n- 문학과 영상\n- 미술 창작\n- 미술 감상과 비평\n- 미술과 매체","connected_course_names":["화법과 언어","독서와 작문","문학","영어 독해와 작문","세계사","사회와 문화","현대사회와 윤리","미술","주제 탐구 독서","문학과 영상","미술 창작","미술 감상과 비평","미술과 매체"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_문학","course_영어_독해와_작문","course_세계사","course_사회와_문화","course_현대사회와_윤리","course_주제_탐구_독서","course_문학과_영상","course_미술_창작","course_미술_감상과_비평","course_미술과_매체"],"careers_md":"#### 예술계 분야\n- 공예 작가\n- 공방 운영자\n- 문화예술 기획자\n- 큐레이터\n\n#### 교육계 분야\n- 대학교수\n- 미술교사\n- 공예교사\n- 예술치료사\n\n#### 연구·복원 분야\n- 미술품 복원가\n\n#### 산업계 분야\n- 제품 디자이너\n- 주얼리 디자이너\n- 세트 디자이너\n- 공예 기술자","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_과학_교과_교육과","type":"department","name":"과학 교과 교육과","field":"교육 분야 · 교육 계열","one_liner":"과학의 근본 원리와 교육학을 융합하여 자연 현상을 과학적으로 해석하도록 돕는 교수·학습 방법을 연구하고, 실험 중심 수업 설계 역량을 갖춘 과학 교사와 과학교육 전문가를 기르는 학과입니다.","overview_md":"과학 교과 교육과는 과학 지식과 교육 방법을 함께 배우는 학과입니다. 물리, 화학, 생명과학, 지구과학 등 과학의 기초 원리를 이해하고, 이를 학생들이 잘 배울 수 있도록 설명하고 실험하며 수업을 설계하는 방법을 익힙니다.\n\n단순히 과학 내용을 많이 아는 것만으로는 충분하지 않습니다. 어려운 개념을 어떻게 설명할지, 실험 활동을 어떻게 구성할지, 학생들의 오개념을 어떻게 도울지까지 함께 고민합니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 과학 교과의 기본 개념과 기초 이론을 폭넓게 학습합니다.\n- 일반물리학, 일반화학, 일반생물학, 일반지구과학, 기초 과학 실험, 수학적 사고와 논리, 고급 물리학, 현대 물리학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 과학 분야별 심화 개념과 실험·분석 방법을 학습합니다.\n- 전자기학 및 실험, 역학 및 실험, 유기화학, 분석화학, 물리화학, 무기화학, 분자생물학, 생태학, 유전학, 생리학 등을 다룹니다.\n\n#### 실무·응용·융합\n- 과학 지식을 교육 현장에 적용하고, 수업과 실험 활동을 설계하는 역량을 기릅니다.\n- 대기과학, 지질학, 천문학, 해양학, 과학교육학 및 교직, 과학교육론 등을 다룹니다.","fit_md":"- 자연 현상의 원리와 법칙을 논리적으로 탐구하는 것을 좋아하는 학생\n- 어려운 과학 개념을 친구들에게 쉽게 설명해 주는 데 보람을 느끼는 학생\n- 수학적 사고력을 바탕으로 실험과 실습을 통해 결과를 도출하는 것을 좋아하는 학생\n- 과학 기술이 사회에 미치는 영향과 올바른 과학 가치관 교육에 관심이 있는 학생\n- 에듀테크나 실험 기구 활용에 흥미가 있고 창의적인 수업을 설계해 보고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 생명과학\n- 지구과학\n- 정보\n- 역학과 에너지\n- 물질과 에너지\n- 세포와 물질대사\n- 지구시스템과학","connected_course_names":["화법과 언어","독서와 작문","대수","미적분Ⅰ","확률과 통계","물리학","화학","생명과학","지구과학","정보","역학과 에너지","물질과 에너지","세포와 물질대사","지구시스템과학"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_생명과학","course_지구과학","course_역학과_에너지","course_물질과_에너지","course_세포와_물질대사","course_지구시스템과학"],"careers_md":"#### 교육 및 연구기관 분야\n- 중등 과학교사\n- 과학고·영재학교 교사\n- 대학교수\n- 한국교육과정평가원 연구원\n- 교육 정책 연구원\n- 교육 관련 연구소 연구원\n- 기초 및 응용 물리학 연구원\n\n#### 출판·문화기관 분야\n- 과학 커뮤니케이터\n- 과학관 및 박물관 전시 기획자\n- 전문 저술가 및 번역가\n\n#### 기타 분야\n- 학원 및 사교육 분야 강사\n- 과학교육 전문 기자\n- 교육 기술 분야 종사자","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_관현악과","type":"department","name":"관현악과","field":"예술·체육 분야 · 예술 계열","one_liner":"관악기, 현악기, 타악기 등 다양한 악기의 연주 기술을 체계적으로 배우고, 음악 이론과 해석 능력, 실내악·앙상블·오케스트라 경험을 통해 전문 연주자로 성장하는 학과입니다.","overview_md":"관현악과는 악기 연주 능력을 중심으로 음악 이론, 해석, 합주와 무대 경험을 함께 배우는 학과입니다. 개인 연주 실력을 기르는 것뿐 아니라 실내악, 앙상블, 오케스트라 활동을 통해 다른 연주자와 호흡하는 능력도 중요하게 다룹니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 전공 실기와 합주, 관현악 문헌 등 연주자로서 필요한 기본기를 학습합니다.\n- 합창, 전공 실기, 관현악 합주, 실내악, 현악 합주, 관악 합주, 관현악 문헌, 현악 문헌 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 연주 해석과 음악 이론, 서양음악사의 흐름을 함께 학습합니다.\n- 실내악 앙상블, 관현악, 시창·청음, 서양음악사, 화성학, 대위법 등을 다룹니다.","fit_md":"- 관악기, 현악기, 타악기 연주에 흥미와 재능이 있는 학생\n- 오케스트라나 앙상블 활동에 적극적으로 참여하고 싶은 학생\n- 음악적 소통과 팀워크를 중요하게 생각하는 학생\n- 전문 연주자로 성장하고자 하는 목표가 분명한 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 문학\n- 영어 독해와 작문\n- 사회와 문화\n- 음악\n- 주제 탐구 독서\n- 심화 영어\n- 음악 연주와 창작\n- 음악 감상과 비평\n- 매체 의사소통\n- 음악과 미디어","connected_course_names":["화법과 언어","독서와 작문","문학","영어 독해와 작문","사회와 문화","음악","주제 탐구 독서","심화 영어","음악 연주와 창작","음악 감상과 비평","매체 의사소통","음악과 미디어"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_문학","course_영어_독해와_작문","course_사회와_문화","course_주제_탐구_독서","course_심화_영어","course_음악_연주와_창작","course_음악_감상과_비평","course_매체_의사소통","course_음악과_미디어"],"careers_md":"#### 음악 전문 분야\n- 음악 관련 대학원 진학 및 연구 활동\n- 전문 연주자\n- 실내악·앙상블·오케스트라 관련 활동\n\n#### 교육 분야\n- 중·고등학교 음악교사\n- 대학교수 또는 강사\n\n#### 예술치료 분야\n- 음악 치료사\n- 심리치료와 결합된 예술치료 분야","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_광고홍보학과","type":"department","name":"광고홍보학과","field":"사회 분야 · 광고·언론·정보 계열","one_liner":"광고와 홍보의 전문 지식과 실무 능력을 바탕으로 사람의 마음을 움직이는 메시지를 기획하고, 변화하는 미디어 환경에 대응하는 커뮤니케이션 전문가를 기르는 학과입니다.","overview_md":"광고홍보학과는 광고, 홍보, 미디어, 마케팅, 소비자 이해를 함께 배우는 학과입니다. 제품이나 서비스, 기관의 메시지를 어떻게 전달할지 고민하고, 사람들의 관심과 행동을 이끌어내는 커뮤니케이션 전략을 배웁니다.\n\n디지털 미디어 환경에서는 콘텐츠 제작 능력뿐 아니라 데이터 분석, 소비자 심리, 브랜드 전략, 광고 윤리와 법제에 대한 이해도 중요합니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 광고와 홍보, 커뮤니케이션의 기본 이론과 소비자 이해를 학습합니다.\n- 광고학개론, 홍보학개론, 광고연구방법, 커뮤니케이션이론, 광고심리학, 광고와 마케팅, 광고와 사회, 광고와 소비자행동 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 매체, 조사, 기획, 캠페인, 설득 커뮤니케이션을 통해 전략적 사고를 기릅니다.\n- 매체원론, 소셜미디어마케팅, 광고조사론, 광고기획론, 광고매체론, 광고캠페인, 매체기획론, 기업홍보론, 설득커뮤니케이션, 국제광고론 등을 다룹니다.\n\n#### 실무·응용·융합\n- 광고 제작과 브랜드 전략, 법과 윤리, 지식재산권 등 실제 현장과 연결되는 내용을 학습합니다.\n- 전략적기획론, 광고홍보연구방법론, 디지털미디어 광고제작, 광고홍보법제와 윤리, 브랜드마케팅전략, 광고와 지식재산권 등을 다룹니다.","fit_md":"- 풍부한 아이디어와 창의적 사고력을 가진 학생\n- 마케팅이나 비즈니스 관련 내용을 배우고 싶은 학생\n- 다른 사람들과 원활히 소통할 수 있는 학생\n- 최신 트렌드와 미디어 변화에 민감하고 이를 전략적으로 활용하고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 확률과 통계\n- 영어 독해와 작문\n- 사회와 문화\n- 세계시민과 지리\n- 세계사\n- 현대사회와 윤리\n- 문학과 영상\n- 영미 문학 읽기\n- 매체 의사소통\n- 인간과 심리\n- 사회문제 탐구","connected_course_names":["화법과 언어","독서와 작문","확률과 통계","영어 독해와 작문","사회와 문화","세계시민과 지리","세계사","현대사회와 윤리","문학과 영상","영미 문학 읽기","매체 의사소통","인간과 심리","사회문제 탐구"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_확률과_통계","course_영어_독해와_작문","course_사회와_문화","course_세계시민과_지리","course_세계사","course_현대사회와_윤리","course_문학과_영상","course_영미_문학_읽기","course_매체_의사소통","course_인간과_심리","course_사회문제_탐구"],"careers_md":"#### 기업 및 산업체 분야\n- 광고 및 PR대행사\n- 기업 마케팅 부서\n- 출판사\n- 영화 배급사\n- 연예 기획사\n- 홍보대행사\n- 광고매체사\n- 인터넷 광고대행사\n- 이벤트 회사\n- 일반 기업 홍보팀\n- 신문사\n- 잡지사\n- 방송국\n- 조사·리서치 업체\n\n#### 학계 및 연구기관 분야\n- 인문·사회과학 관련 연구소\n- 국가·민간 연구소\n\n#### 정부 및 공공기관 분야\n- 중앙정부 및 지방자치단체\n- 한국문화진흥주식회사\n- 한국저작권위원회\n- 광고·콘텐츠 관련 공공기관","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_교육학과","type":"department","name":"교육학과","field":"교육 분야 · 교육 계열","one_liner":"사람이 어떻게 배우고 성장하는지 이해하고, 더 좋은 교육 방법과 교육 환경을 설계하는 학과입니다.","overview_md":"교육학과는 단순히 교사가 되는 방법만 배우는 학과가 아닙니다. 사람의 성장과 학습, 교육 제도, 교육 방법, 교육 평가, 교육 행정을 폭넓게 연구합니다.\n\n교육을 통해 인간의 삶의 질을 높이고, 학교와 사회의 교육 문제를 해결하는 방법을 찾습니다. 학생을 이해하는 심리학적 관점, 교육의 역사와 철학, 수업 설계와 교육공학, 교육 정책과 행정까지 함께 다룹니다.","learning_md":"### 주요 학습 영역\n\n#### 교육의 의미와 역사\n- 교육이 무엇이며 시대와 사회에 따라 교육이 어떻게 변화해 왔는지 학습합니다.\n- 교육학 개론, 교육철학 및 교육사, 교육철학 심화 연구, 교육사회학 등을 다룹니다.\n\n#### 학습자 이해\n- 학생의 발달, 심리, 동기, 학습 과정을 이해합니다.\n- 교육심리학, 교육심리 심화 연구, 교수학습이론, 상담심리 관련 과목 등을 다룹니다.\n\n#### 교육 방법과 평가\n- 효과적인 수업 방법을 설계하고, 학습 결과를 평가하는 방법을 학습합니다.\n- 교육방법 및 교육공학, 교육과정론, 교육평가 및 통계, 교육실습 등을 다룹니다.\n\n#### 교육 제도와 행정\n- 학교와 교육기관의 운영, 교육 정책과 행정의 구조를 학습합니다.\n- 교육행정, 교육정책 관련 과목, 평생교육 관련 과목 등을 다룹니다.","fit_md":"- 사람을 이해하고 가르치는 것에 관심이 있는 학생\n- 소통 능력과 공감 능력이 뛰어난 학생\n- 문제 해결력과 비판적 사고를 기르고 싶은 학생\n- 인내심과 책임감이 강한 학생\n- 새로운 교육 방법과 교육 기술을 탐구하고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 교육의 이해\n- 인간과 심리\n- 사회와 문화\n- 현대사회와 윤리\n- 독서와 작문\n- 주제 탐구 독 atus":"text_reviewed"},{"id":"dept_국어국문학과","type":"department","name":"국어국문학과","field":"인문 분야 · 언어·문학 계열","one_liner":"우리말과 한국 문학을 연구하여 한국어와 한국 문화의 가치와 의미를 탐구하고, 이를 현대사회와 세계 속에서 확장하는 학과입니다.","overview_md":"국어국문학과는 한국어의 구조와 역사, 한국 문학 작품의 미학과 사회적 의미를 탐구하는 학과입니다. 고전문학과 현대문학, 국어학과 한국어 문법, 언어의 변화와 의미를 폭넓게 다룹니다.\n\n최근에는 디지털 인문학, 문화콘텐츠, 스토리텔링, K-콘텐츠와도 연결되며, 한국어와 한국문학을 현대사회와 세계 속에서 새롭게 해석하는 역량을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 국어학과 한국어 문법, 음운, 방언, 의미, 고전문학의 기초를 학습합니다.\n- 국어학, 국어학 강독, 한국어문법론, 한국어음운론, 한국어방언학, 한국어의미론, 디지털언어분석, 고전문학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 고전문학과 현대문학을 깊이 있게 읽고 분석합니다.\n- 한국고전시가강독, 한국고전산문강독, 한국고전소설론, 한국구비문학론, 한국현대시론, 한국현대소설론, 한국현대문학사, 세계 속의 한국문학, 문학과 문학콘텐츠 등을 다룹니다.","fit_md":"- 우리말의 구조와 역사, 언어의 변화에 관심이 있는 학생\n- 글쓰기나 창작 활동에 흥미가 있는 학생\n- 언어 감각, 논리적 사고력, 비판적 읽기 능력을 갖춘 학생\n- 언어·문화콘텐츠·스토리텔링·K-콘텐츠 분야에 관심이 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 문학\n- 영어 독해와 작문\n- 세계사\n- 사회와 문화\n- 현대사회와 윤리\n- 한문\n- 주제 탐구 독서\n- 문학과 영상\n- 독서 토론과 글쓰기\n- 매체 의사소통\n- 언어생활 탐구","connected_course_names":["화법과 언어","독서와 작문","문학","영어 독해와 작문","세계사","사회와 문화","현대사회와 윤리","한문","주제 탐구 독서","문학과 영상","독서 토론과 글쓰기","매체 의사소통","언어생활 탐구"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_문학","course_영어_독해와_작문","course_세계사","course_사회와_문화","course_현대사회와_윤리","course_주제_탐구_독서","course_문학과_영상","course_독서_토론과_글쓰기","course_매체_의사소통","course_언어생활_탐구"],"careers_md":"#### 학계·교육계 분야\n- 대학교수\n- 중등교사\n- 전문 기관 연구원\n- 언어학연구원\n- 논술 지도사\n\n#### 언론계 분야\n- 신문·방송기자\n- 편집기자\n- 아나운서\n- 방송 앵커\n- PD\n- 리포터\n\n#### 출판·문화계 분야\n- 작가\n- 시나리오 작가\n- 웹툰 작가\n- 성우\n- 출판사 경영\n- 시인\n- 소설가\n- 평론가\n- 극작가\n- 번역가\n- 작사가\n- 연극·연출 관련 직업\n- 카피라이터\n\n#### 기타 분야\n- 공공기관 공무원\n- 일반기업체\n- 스피치 강사\n- 광고기획사","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_국제관계학과","type":"department","name":"국제관계학과","field":"사회 분야 · 사회과학 계열","one_liner":"국제 통상, 국제 개발 협력, 국제 평화 안보, 지역학을 중심으로 글로벌 상호 의존 속 국제 문제를 이해하고 해결하는 전문가를 기르는 학과입니다.","overview_md":"국제관계학과는 국가와 국가, 국제기구, 시민사회, 기업이 서로 영향을 주고받는 국제사회의 구조를 배우는 학과입니다. 외교, 국제 통상, 국제 개발 협력, 평화 안보, 지역학, 국제법과 국제기구를 함께 다룹니다.\n\n이론적 배경뿐 아니라 국제 문제를 분석하고 협상하며, 다양한 문화와 정치·경제적 맥락을 이해하는 실무적 역량도 중요합니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 국제관계의 기본 이론과 정치·문화·경제의 기초를 학습합니다.\n- 국제관계이론, 정치학개론, 다문화사회론, 세계정치론, 국제교류론, 외교정책론, 국제기구론, 국제금융론 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 국제법, 국제통상, 협력과 분쟁, 국제관계사를 심화하여 분석합니다.\n- 경제원론, 국제법 이해, 국제통상법, 국제행정, 국제협상론, 국제관계론, 국제협력론, 국제문제론, 국제분쟁론, 국제관계사 등을 다룹니다.\n\n#### 실무·응용·융합\n- 국제정치경제와 국제문제 연구방법, 한국의 국제관계 등을 통해 실제 국제 현안을 분석합니다.\n- 국제정치경제론, 국제문제연구방법론, 정치과정과 변화, 한국학연구, 한국의 국제관계 등을 다룹니다.","fit_md":"- 외국어 능력을 활용하여 다국적 환경에서 의사소통하고 싶은 학생\n- 문화, 정치, 경제, 외교 등 다양한 국가와 문화에 관심이 있는 학생\n- 기후변화, 인권, 국제 분쟁 등 국제 문제에 관심이 있는 학생\n- 외교, 국제기구, 국제 분야의 진로를 생각하는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 독서와 작문\n- 영어 독해와 작문\n- 세계시민과 지리\n- 세계사\n- 사회와 문화\n- 제2외국어\n- 주제 탐구 독서\n- 영미 문학 읽기\n- 영어 발표와 토론\n- 동아시아 역사 기행\n- 정치\n- 법과 사회\n- 국제 관계의 이해\n- 세계 문화와 영어","connected_course_names":["독서와 작문","영어 독해와 작문","세계시민과 지리","세계사","사회와 문화","제2외국어","주제 탐구 독서","영미 문학 읽기","영어 발표와 토론","동아시아 역사 기행","정치","법과 사회","국제 관계의 이해","세계 문화와 영어"],"connected_course_ids":["course_독서와_작문","course_영어_독해와_작문","course_세계시민과_지리","course_세계사","course_사회와_문화","course_제2외국어(프랑스어,_일본어)","course_주제_탐구_독서","course_영미_문학_읽기","course_영어_발표와_토론","course_동아시아_역사_기행","course_정치","course_법과_사회","course_국제_관계의_이해","course_세계_문화와_영어"],"careers_md":"#### 국제기구·사회복지 분야\n- 국제기구 종사자\n- 국제 NGO 활동가\n\n#### 여행·관광 서비스 분야\n- 관광가이드\n- 의료관광코디네이터\n\n#### 언론 분야\n- 신문기자\n- 잡지기자\n- 방송기자","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_금융보험학과","type":"department","name":"금융보험학과","field":"사회 분야 · 상경 계열","one_liner":"금융과 보험 분야의 이론과 실무를 배우며, 금융 및 보험 산업에서 필요한 전문 지식과 실제 활용 능력을 기르는 학과입니다.","overview_md":"금융보험학과는 금융시장과 보험 제도, 위험 관리, 투자와 자산 운용, 보험 상품과 손해사정 등을 배우는 학과입니다. 경제와 통계, 법과 제도를 바탕으로 금융·보험 산업에서 실제로 활용할 수 있는 분석 능력을 기릅니다.\n\n돈의 흐름을 이해하는 것뿐 아니라 위험을 평가하고 관리하는 역량, 금융 상품과 보험 제도를 이해하는 능력이 중요합니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 금융과 보험의 기본 구조, 통계와 법적 기초를 학습합니다.\n- 경제학원론, 금융보험이해, 금융시장론, 금융통계, 국제금융론, 국제투자론, 위험관리론, 보험계약법 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 보험, 투자, 통화금융, 시사 금융 이슈를 분석합니다.\n- 생명보험론, 손해보험론, 시사금융보험, 통화금융론, 자동차보험론, 주식투자론, 거시경제론, 채권투자론, 글로벌 경제의 이해, 시사영어 등을 다룹니다.\n\n#### 실무·응용·융합\n- 금융기관과 보험 실무, 재무설계, 손해사정, 글로벌 보험 시장을 학습합니다.\n- 보험이론 및 실무, 금융기관론, 손해사정이론, 금융재무설계, 글로벌 보험시장의 이해, 투자의 기초 등을 다룹니다.","fit_md":"- 수학적 문제 해결과 통계 분석에 관심이 있는 학생\n- 경제 뉴스, 금융 정책, 시장 동향, 국제 금융에 관심이 많은 학생\n- 문제 해결력이 있고 다른 사람과 효과적으로 소통할 수 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 대수\n- 확률과 통계\n- 영어 독해와 작문\n- 세계시민과 지리\n- 세계사\n- 사회와 문화\n- 현대사회와 윤리\n- 정보\n- 경제 수학\n- 법과 사회\n- 실용 통계","connected_course_names":["화법과 언어","독서와 작문","대수","확률과 통계","영어 독해와 작문","세계시민과 지리","세계사","사회와 문화","현대사회와 윤리","정보","경제 수학","법과 사회","실용 통계"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_대수","course_확률과_통계","course_영어_독해와_작문","course_세계시민과_지리","course_세계사","course_사회와_문화","course_현대사회와_윤리","course_경제_수학","course_법과_사회","course_실용_통계"],"careers_md":"#### 금융 부문\n- 금융 분석가\n- 대출 심사관\n- 자산 관리자\n- 투자 분석가\n- 펀드 매니저\n- 리서치 애널리스트\n- 보험 계리사\n- 보험 상품 개발자\n\n#### 기업 분야\n- 재무 관리자\n- 리스크 매니저\n\n#### 공공 부문\n- 정부 기관의 금융 정책 분석가\n- 재정 관리사\n- 통계 분석가\n- 금융 및 보험 관련 공기업 직원\n\n#### 연구 및 학계 분야\n- 금융 및 보험 연구소 연구원\n- 교수","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_기계공학과","type":"department","name":"기계공학과","field":"공학 분야 · 기계·전기·전자 계열","one_liner":"일상생활과 산업 현장에 필요한 각종 기계를 설계하고 제작할 수 있는 인력을 기르는 학과입니다.","overview_md":"기계공학과는 기계가 움직이는 원리와 설계, 제작, 제어, 에너지 활용을 배우는 공학 분야입니다. 자동차, 로봇, 항공기, 생산 설비, 에너지 시스템 등 다양한 산업 분야와 연결됩니다.\n\n수학과 물리학을 바탕으로 구조, 열, 유체, 재료, 설계, 제조 과정을 이해하고 실제 문제를 해결하는 능력을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 기계공학의 기본 원리와 설계·제작의 기초를 학습합니다.\n- 고체역학, 열역학, 유체역학, 재료역학, 기계설계, 기계공작실습, CAD, 에너지공학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 동력, 열전달, 로봇, 진동, 자동차, 정밀공학 등 기계 시스템을 깊이 있게 분석합니다.\n- 동력공학, 열전달, 용접공학, 로봇공학, 연소공학, 기계진동학, 유체기계, 기계재료, 정밀공학, 자동차공학 등을 다룹니다.\n\n#### 실무·응용·융합\n- 실제 제작과 설계 응용을 학습합니다.\n- 공작기계실습, 응용기계설계 등을 다룹니다.","fit_md":"- 소형 가전, 로봇, 스마트 공장 설비, 항공기 설계 등 다양한 기계와 첨단 설계 기술에 흥미가 있는 학생\n- 자동차, 전기, 전자, 로봇공학, 친환경 에너지 같은 융합 기술에 관심이 있는 학생\n- 수학과 물리학의 기본 지식을 바탕으로 기계 작동 원리를 분석하고 싶은 학생\n- 도면이나 3D 설계를 입체적으로 이해할 수 있는 공간지각력을 가진 학생\n- 팀워크로 문제를 해결하고 새로운 기술 변화에 빠르게 적응하려는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 정보\n- 기하\n- 미적분Ⅱ\n- 역학과 에너지\n- 전자기와 양자\n- 물질과 에너지\n- 인공지능 기초","connected_course_names":["대수","미적분Ⅰ","확률과 통계","물리학","화학","정보","기하","미적분Ⅱ","역학과 에너지","전자기와 양자","물질과 에너지","인공지능 기초"],"connected_course_ids":["course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_기하","course_미적분Ⅱ","course_역학과_에너지","course_전자기와_양자","course_물질과_에너지","course_인공지능_기초"],"careers_md":"#### 자동차 설계 및 개발 분야\n- 자동차 설계 엔지니어\n- 안전 연구 전문가\n\n#### 유지보수 및 에너지·환경 기계 분야\n- 설비엔지니어\n- 에너지 기계 공학 전문가\n- 효율진단 전문가\n\n#### 의료·항공·연구 분야\n- 의료기기 개발자\n- 항공우주 연구원\n- 교수\n- 기술직 공무원","similar_departments":[],"similar_departments_md":"","semantic_status":"text_reviewed"},{"id":"dept_대기과학과","type":"department","name":"대기과학과","field":"자연 분야 · 자연과학 계열","one_liner":"지구와 행성의 대기에서 일어나는 현상을 이해하고, 기상·기후·대기환경 문제를 과학적으로 분석하는 전문 지식과 역량을 기르는 학과입니다.","overview_md":"대기과학과는 날씨, 기후, 대기 환경, 대기 운동과 에너지 흐름을 연구하는 학과입니다. 기상 관측 자료와 위성 자료, 수학·물리·화학적 원리를 활용하여 대기 현상을 이해하고 예측하는 방법을 배웁니다.\n\n기후변화, 대기오염, 태풍, 이상기후처럼 사회와 밀접하게 연결된 문제를 과학적으로 분석하는 역량도 중요합니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 지구 환경과 대기과학의 기본 개념, 대기화학과 기상통계를 학습합니다.\n- 지구 환경과학, 지구과학, 대기화학, 대기환경, 기후학, 대기역학, 고층대기학, 기상통계학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 대기 물리, 대기역학, 일기예보와 기후 시스템을 심화하여 분석합니다.\n- 물리기상학, 수리대기과학, 일기예보법, 기후역학, 대기오염, 대기열역학, 응용기상학, 대기대순환, 대기물리, 미기상학 등을 다룹니다.\n\n#### 실무·응용·융합\n- 관측과 자료 분석, 위성기상, 해양과 대기의 상호작용을 학습합니다.\n- 대기관측, 대기분석, 위성기상학, 해양물리, 고층대기, 통계분석 등을 다룹니다.","fit_md":"- 수학, 물리학, 화학, 지구과학 등 기초과학에 흥미가 있는 학생\n- 기상 현상, 기후변화, 대기환경 문제를 과학적으로 분석하고 해결하고 싶은 학생\n- 기상 관측, 위성 자료 분석, 실험 및 야외 조사에 흥미가 있는 학생\n- 컴퓨터 프로그램으로 대기 현상 ment","name":"생명공학과","field":"공학 분야 · 화학생명 계열","one_liner":"생명 현상을 세포와 분자 수준에서 이해하고, 그 원리를 의료·식품·환경·에너지 산업에 활용하는 바이오 기술을 배우는 학과입니다.","overview_md":"생명공학과는 생명과학을 이해하는 데서 더 나아가, 생명 현상의 원리를 실제 기술과 산업에 활용하는 방법을 배웁니다. 세포, 유전자, 단백질, 미생물, 대사 과정을 이해하고 이를 바탕으로 의약품, 식품, 환경 기술, 바이오 소재, 에너지 분야에 응용합니다.\n\n생명체를 다루는 학문이기 때문에 생물학뿐 아니라 화학, 물리, 수학, 정보 기술도 함께 필요합니다. 실험과 분석을 통해 생명 현상을 객관적으로 바라보고, 새로운 바이오 기술을 설계하는 힘을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 생명과학과 자연과학 기초\n- 일반생물학, 일반화학, 일반물리학, 물리화학, 유기화학을 통해 생명 현상을 이해하기 위한 기초 과학을 배웁니다.\n- 세포생물학, 유전학개론을 통해 생명체의 기본 구조와 유전 원리를 학습합니다.\n\n#### 세포·분자·유전자 이해\n- 유전학, 분자생물학, 생화학, 미생물학을 통해 생명 현상을 세포와 분자 수준에서 이해합니다.\n- 생리학, 바이러스학, 신경생물학을 통해 생명체의 기능과 조절 과정을 심화 학습합니다.\n\n#### 바이오 기술과 공학적 응용\n- 식품생명공학, 발생생명공학, 세포와 조직공학, 대사공학을 통해 생명 원리를 실제 기술로 연결합니다.\n- 분석화학, 식물생명과학 등을 통해 바이오 산업과 연구에 필요한 분석·응용 능력을 기릅니다.\n\n#### 데이터와 융합 생명공학\n- 생물정보학을 통해 생명 데이터를 해석하고 활용하는 방법을 배웁니다.\n- 대사공학, 분석화학 등과 연결하여 실험과 데이터 분석을 함께 활용합니다.","fit_md":"- 생명 현상에 대한 호기심이 크고 실험을 좋아하는 학생\n- 생명과학, 화학, 물리, 수학을 함께 활용해 보고 싶은 학생\n- 유전자, 세포, 단백질, 미생물 같은 미시적 세계에 관심이 있는 학생\n- 의료, 식품, 환경, 에너지 문제를 바이오 기술로 해결해 보고 싶은 학생\n- 관찰력, 논리적 사고, 분석력, 도전 정신을 가지고 꾸준히 탐구할 수 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 생명과학\n- 화학\n- 세포와 물질대사\n- 생물의 유전\n- 화학 반응의 세계\n- 물질과 에너지\n- 확률과 통계\n- 인공지능 기초\n- 대수\n- 미적분Ⅰ\n- 물리학\n- 지구과학\n- 정보\n- 기하\n- 미적분Ⅱ\n- 수학과제 탐구\n- 기후변화와 지속가능한 세계\n- 융합과학 탐구","connected_course_names":["생명과학","화학","세포와 물질대사","생물의 유전","화학 반응의 세계","물질과 에너지","확률과 통계","인공지능 기초","대수","미적분Ⅰ","물리학","지구과학","정보","기하","미적분Ⅱ","수학과제 탐구","기후변화와 지속가능한 세계","융합과학 탐구"],"connected_course_ids":["course_생명과학","course_화학","course_세포와_물질대사","course_생물의_유전","course_화학_반응의_세계","course_물질과_에너지","course_확률과_통계","course_인공지능_기초","course_대수","course_미적분Ⅰ","course_물리학","course_지구과학","course_기하","course_미적분Ⅱ","course_수학과제_탐구","course_기후변화와_지속가능한_세계","course_융합과학_탐구"],"careers_md":"#### 연구 분야\n- 생명과학연구원\n- 생명공학연구원\n- 대학 연구소 연구원\n- 대학교수\n- 바이오 관련 연구소 연구원\n\n#### 바이오 산업 분야\n- 의약품 관련 기업\n- 식품 관련 기업\n- 환경 관련 기업\n- 비료 및 유제품 관련 기업\n- ,{"id":"dept_음악교육과","type":"department","name":"음악교육과","field":"예술·체육 분야 · 예술 계열","one_liner":"음악 이론, 연주, 작곡, 음악사와 교육학을 함께 배우며 음악적 소양과 교육적 자질을 갖춘 음악 교사를 기르는 학과입니다.","overview_md":"음악교육과는 음악을 잘 연주하고 이해하는 능력뿐 아니라, 학생들에게 음악을 효과적으로 가르치는 교수 능력을 함께 기릅니다. 음악교육론, 실기, 국악, 성악, 피아노, 화성학, 음악사, 교재 연구, 교육 실습 등을 통해 음악 교사와 음악교육 전문가로 성장할 수 있는 기반을 다집니다.","learning_md":"### 주요 학습 영역\n\n#### 전공 기초 이해\n- 음악교육론, 시창·청음, 국악 개론, 음악 이론을 통해 음악교육의 기초와 음악적 기본기를 배웁니다.\n- 국악 실기, 화성학, 성악 실기, 피아노 실기를 통해 다양한 음악 표현 능력을 기릅니다.\n\n#### 전공 심화와 분석\n- 교실 악기 및 현악 실기, 국악·성악 실기를 통해 학교 음악 수업에서 필요한 실기 역량을 기릅니다.\n- 음악교육방법론, 음악과 교재연구, 음악(국악)교수법, 음악교육 실습세미나를 통해 수업 설계와 교수법을 익힙니다.\n- 음악과 논술, 합창, 음악 전공 실기를 통해 표현과 평가, 지도 능력을 심화합니다.\n\n#### 실무·응용·융합\n- 서양 음악사, 피아노 반주법, 음악 분석 및 형식론, 장구 반주법, 합창 지휘법, 악기론을 통해 음악을 해석하고 수업에 적용하는 능력을 기릅니다.","fit_md":"- 음악을 가르치고 나누는 데 보람과 흥미를 느끼는 학생\n- 음악 이론, 실기, 교육 전반에 균형 잡힌 관심이 있는 학생\n- 책임감 있고 배려심이 있으며 교육자로서의 소양을 갖춘 학생\n- 학교 음악 교사나 음악교육 전문가를 꿈꾸는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 문학\n- 영어Ⅰ\n- 영어Ⅱ\n- 영어 독해와 작문\n- 사회와 문화\n- 음악\n- 주제 탐구 독서\n- 심화 영어\n- 법과 사회\n- 윤리와 사상\n- 음악 연주와 창작\n- 음악 감상과 비평\n- 교육의 이해\n- 매체 의사소통\n- 세계 문화와 영어\n- 여행지리\n- 음악과 미디어","connected_course_names":["화법과 언어","독서와 작문","문학","영어Ⅰ","영어Ⅱ","영어 독해와 작문","사회와 문화","음악","주제 탐구 독서","심화 영어","법과 사회","윤리와 사상","음악 연주와 창작","음악 감상과 비평","교육의 이해","매체 의사소통","세계 문화와 영어","여행지리","음악과 미디어"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_문학","course_영어Ⅰ","course_영어Ⅱ","course_영어_독해와_작문","course_사회와_문화","course_주제_탐구_독서","course_심화_영어","course_법과_사회","course_윤리와_사상","course_음악_연주와_창작","course_음악_감상과_비평","course_교육의_이해","course_매체_의사소통","course_세계_문화와_영어","course_여행지리","course_음악과_미디어"],"careers_md":"#### 학교·교육 분야\n- 중·고등학교 음악 교사\n- 예술 강사\n- 방과후학교 지도사\n- 음악 학원 강사\n- 개인 레슨 교사\n\n#### 음악교육 콘텐츠 분야\n- 음악교육 콘텐츠 기획자\n- 교재·교구 개발자\n\n#### 상담·연구 분야\n- 음악 치료사\n- 음악 관련 교육 상담사\n- 음악교육 관련 대학원 진학 및 연구자","similar_departments":["음악교육과","예술교육 관련 학과","음악학과 교육 관련 전공"],"similar_departments_md":"- 음악교육과\n- 예술교육 관련 학과\n- 동차공학과는 내연기관 자동차뿐 아니라 하이브리드, 전기차, 수소차, 자율주행차 등 다양한 이동 수단을 이해하고 설계하는 분야입니다. 기계공학, 전기·전자공학, 정보·인공지능 기술이 함께 필요하며, 자동차를 하나의 복합 시스템으로 보고 문제를 해결하는 능력을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 기계·전기·전자 기초\n- 미분적분학, 일반물리학, 대학수학을 통해 공학 계산과 물리 원리를 배웁니다.\n- 공학입문, 기초기계공학, 전기전자기초를 통해 자동차 시스템을 이해하는 기본 지식을 익힙니다.\n- C프로그래밍과 논리회로를 통해 차량 제어와 소프트웨어 기초를 배웁니다.\n\n#### 자동차 시스템과 제어\n- 정역학, 재료역학, 열역학을 통해 차량 구조와 에너지 변환 원리를 이해합니다.\n- 융합기초전자공학, 스마트카전자제어, 차량네트워크(CAN 통신)를 통해 차량 내부의 전자 제어 시스템을 학습합니다.\n- 제어공학, 자동차센서공학을 통해 자동차의 움직임과 상태를 측정하고 제어하는 방법을 배웁니다.\n\n#### 미래 모빌리티와 자율주행\n- 자율주행시스템실습, 자율주행알고리즘, 딥러닝 기반 자율주행을 통해 자율주행 기술의 기본 흐름을 익힙니다.\n- 자동차AI소프트웨어와 미래차 인공지능 응용을 통해 인공지능이 모빌리티에 적용되는 방식을 탐구합니다.\n- 전기자동차설계와 전기구동시스템을 통해 전기차 구동 원리와 설계 요소를 이해합니다.","fit_md":"- 자율주행차, 전기차, 드론 등 스마트 모빌리티 기술에 관심이 많고, 미래 교통 산업을 이끌고 싶은 학생\n- 자동차에 관심이 있고 이와 관련된 전기, 기계, 화학, 전자 등 다양한 분야에 호기심이 있는 학생\n- 자동차와 관련된 다양한 문제를 논리적으로 생각하는 논리력과 창의적으로 문제 해결방법을 찾을 수 있는 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 정보\n- 기하\n- 미적분Ⅱ\n- 인공지능 수학\n- 역학과 에너지\n- 전자기와 양자\n- 물질과 에너지\n- 화학 반응의 세계\n- 인공지능 기초","connected_course_names":["대수","미적분Ⅰ","확률과 통계","물리학","화학","정보","기하","미적분Ⅱ","인공지능 수학","역학과 에너지","전자기와 양자","물질과 에너지","화학 반응의 세계","인공지능 기초"],"connected_course_ids":["course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_기하","course_미적분Ⅱ","course_인공지능_수학","course_역학과_에너지","course_전자기와_양자","course_물질과_에너지","course_화학_반응의_세계","course_인공지능_기초"],"careers_md":"#### 자동차 설계·개발 분야\n- 자동차 설계 엔지니어\n- 자동차 연구원\n- 차량 성능 평가 엔지니어\n\n#### 자율주행·인공지능 분야\n- 자율주행 엔지니어\n- 알고리즘 개발자\n- AI 엔지니어\n\n#### 전기차·전장 시스템 분야\n- 배터리 엔지니어\n- 전장 설계 엔지니어\n- 임베디드 개발자\n\n#### 정비·모빌리티 서비스 분야\n- 자동차 정비 기술자\n- 진단 엔지니어\n- 모빌리티 서비스 기획자","similar_departments":["스마트운행체공학과","스마트ICT융합공학과","미래모빌리티학과","미래자동차공학과","스마트모빌리티공학과","지능형드론융합전공","지능형모빌리티융합학과","자율운항시스템공학과","스마트자동차학과","자동차IT융합학과"],"similar_departments_md":"- 스마트운행체공학과\n- 스마트ICT융합공학과\n- 미래모빌리티학과\n- 미래자동차공학과\n- 스마트모빌리티공학과\n- 지능형드론융합전공\n- 지능형모빌리티융합학과\n- 자율운항시스템공학과\n- 스마트자동차학과\n- 자동차IT융합학과","semantic_status":"text_reviewed"},{"id":"dept_작곡과","type":"department","name":"작곡과","field":"예술·체육 분야 · 예술 계열","one_liner":"음악 이론과 작곡 기법을 바탕으로 선율, 화성, 편곡, 전자음악 등을 배우며 창의적인 음악을 만드는 학과입니다.","overview_md":"작곡과는 음악을 듣고 연주하는 데서 나아가 새로운 음악을 직접 만들어내는 능력을 기르는 분야입니다. 화성학, 대위법, 관현악법 같은 전통 작곡 기초와 전자음악, 컴퓨터 음악 등 현대 매체 기반의 창작 방법을 함께 다루며, 자신의 음악적 아이디어를 악보와 사운드로 구체화하는 과정을 배웁니다.","learning_md":"### 주요 학습 영역\n\n#### 작곡 이론과 음악 기초\n- 전공 실기와 작곡 실기를 통해 음악적 아이디어를 실제 작품으로 발전시키는 방법을 배웁니다.\n- 화성학, 대위법, 악기론, 관현악법을 통해 음악의 구조와 악기별 표현 방식을 이해합니다.\n- 시창·청음과 음악 통론을 통해 음악을 듣고 분석하고 표현하는 기초 능력을 기릅니다.\n\n#### 음악사와 작곡 분석\n- 서양 음악사와 20세기 음악사를 통해 시대별 작곡 양식과 음악적 흐름을 이해합니다.\n- 현대 작곡 기법 및 분석을 통해 다양한 음악 언어와 표현 방식을 탐구합니다.\n- 지휘 실기와 연주 경험을 통해 작곡물이 실제 연주로 구현되는 과정을 이해합니다.\n\n#### 전자음악과 매체 활용\n- 전자음악 실기와 컴퓨터 음악 작곡을 통해 디지털 환경에서 사운드를 제작하는 방법을 배웁니다.\n- MIDI, 사운드 디자인, 미디어 음악 등 현대 음악 제작 환경과 연결되는 창작 역량을 기릅니다.","fit_md":"- 창의적인 아이디어로 음악을 직접 만들어보고 싶은 학생\n- 음악 이론과 구조에 깊은 관심을 가진 학생\n- 선율 창작, 화성, 편곡 등에 감각이 뛰어난 학생\n- 다양한 악기와 사운드로 자신만의 음악 세계를 표현하고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 화법과 언어\n- 독서와 작문\n- 문학\n- 영어Ⅰ\n- 영어Ⅱ\n- 영어 독해와 작문\n- 사회와 문화\n- 음악\n- 주제 탐구 독서\n- 심화 영어\n- 법과 사회\n- 윤리와 사상\n- 음악 연주와 창작\n- 음악 감상과 비평\n- 매체 의사소통\n- 세계 문화와 영어\n- 여행지리\n- 음악과 미디어","connected_course_names":["화법과 언어","독서와 작문","문학","영어Ⅰ","영어Ⅱ","영어 독해와 작문","사회와 문화","음악","주제 탐구 독서","심화 영어","법과 사회","윤리와 사상","음악 연주와 창작","음악 감상과 비평","매체 의사소통","세계 문화와 영어","여행지리","음악과 미디어"],"connected_course_ids":["course_화법과_언어","course_독서와_작문","course_문학","course_영어Ⅰ","course_영어Ⅱ","course_영어_독해와_작문","course_사회와_문화","course_주제_탐구_독서","course_심화_영어","course_법과_사회","course_윤리와_사상","course_음악_연주와_창작","course_음악_감상과_비평","course_매체_의사소통","course_세계_문화와_영어","course_여행지리","course_음악과_미디어"],"careers_md":"#### 창작·제작 분야\n- 작곡가\n- 편곡가\n- 음악 프로듀서\n- MIDI 작·편곡자\n\n#### 미디어 음악 분야\n- 영화음악 작곡가\n- 광고음악 작곡가\n- 게임·미디어 음악 작곡가\n- 사운드 디자이너\n\n#### 음악 감독·교육 분야\n- 음악 감독\n- 음향 감독\n- 중·고등학교 음악교사\n- 대학교수 또는 강사","similar_departments":["음악학부 작곡 전공","음악학과 작곡 전공","공연예술학부 작곡 전공"," partments_md":"- 고분자공학과\n- 생명화학공학과\n- 에너지화학공학과\n- 화공생명공학과\n- 응용화학공학과\n- 화공생명배터리공학부","semantic_status":"text_reviewed"},{"id":"dept_화학과","type":"department","name":"화학과","field":"자연 분야 · 자연과학 계열","one_liner":"물질의 성분과 구조, 변화의 원리를 탐구하고 이를 신소재, 대체 에너지, 신약, 나노화학, 생명공학 등 다양한 분야에 응용하는 학과입니다.","overview_md":"화학과는 물질이 무엇으로 이루어져 있고, 어떤 구조와 성질을 가지며, 어떤 반응을 통해 변화하는지 탐구하는 분야입니다. 유기화학, 분석화학, 물리화학, 무기화학, 생화학을 바탕으로 새로운 물질을 이해하고 만들며, 과학과 산업 발전에 필요한 기초 연구 역량을 기릅니다.","learning_md":"### 주요 학습 영역\n\n#### 화학 기초와 물질 이해\n- 유기화학, 분석화학, 물리화학, 무기화학을 통해 물질의 구조와 성질, 반응을 이해합니다.\n- 생화학과 기초수리화학을 통해 생명 현상과 수리적 분석을 화학과 연결합니다.\n- 전기화학과 반응속도론을 통해 반응의 진행과 에너지 변화를 배웁니다.\n\n#### 심화 화학과 소재·환경\n- 유기이론, 물리유기화학, 유기합성을 통해 유기 분자의 구조와 합성 방법을 배웁니다.\n- 표면과학, 고분자화학, 나노화학을 통해 소재와 나노 분야로 학습을 확장합니다.\n- 공업화학, 의약화학, 환경화학을 통해 산업·의약·환경 분야와 연결되는 화학을 배웁니다.\n\n#### 분석·에너지·연구 응용\n- 분자구조결정법과 기기분석화학을 통해 물질의 구조와 성분을 분석하는 방법을 익힙니다.\n- 에너지화학과 양자화학을 통해 에너지와 물질의 미시적 성질을 이해합니다.\n- 과학논술을 통해 화학 지식을 설명하고 의사소통하는 능력을 기릅니다.","fit_md":"- 자연 현상에 대한 호기심과 관찰력이 뛰어나고 논리적인 분석력을 갖춘 학생\n- 새로운 현상에 대한 탐구심이 강하고 실험을 통한 도전 정신과 창의력을 가진 학생\n- 문제 해결을 위한 논리적 분석력과 끈기 있는 자세를 갖춘 학생\n- 화합물의 조성, 구조, 반응 과정에 관심이 있으며 꾸준하고 성실하게 연구하고 싶은 학생","connected_courses_md":"### 학과와 연결되는 선택과목\n\n- 대수\n- 미적분Ⅰ\n- 확률과 통계\n- 물리학\n- 화학\n- 생명과학\n- 기하\n- 미적분Ⅱ\n- 인공지능 수학\n- 역학과 에너지\n- 전자기와 양자\n- 물질과 에너지\n- 화학 반응의 세계\n- 세포와 물질대사\n- 생물의 유전\n- 수학과제 탐구\n- 융합과학 탐구","connected_course_names":["대수","미적분Ⅰ","확률과 통계","물리학","화학","생명과학","기하","미적분Ⅱ","인공지능 수학","역학과 에너지","전자기와 양자","물질과 에너지","화학 반응의 세계","세포와 물질대사","생물의 유전","수학과제 탐구","융합과학 탐구"],"connected_course_ids":["course_대수","course_미적분Ⅰ","course_확률과_통계","course_물리학","course_화학","course_생명과학","course_기하","course_미적분Ⅱ","course_인공지능_수학","course_역학과_에너지","course_전자기와_양자","course_물질과_에너지","course_화학_반응의_세계","course_세포와_물질대사","course_생물의_유전","course_수학과제_탐구","course_융합과학_탐구"],"careers_md":"#### 연구·개발 분야\n- 화학연구원\n- 화학공학기술자\n- 재료공학기술자\n- 고분자공학기술자\n- 석유화학공학기술자\n- 환경공학기술자\n\n#### 안전·품질·관리 분야\n- 산업안전원\n- 위험관리원\n- 화학물질안전관리사\n- 연구실안전전문가\n- 친환경제품인증심사원\n- 품질관리
