const COMPARE_MAX = 4;
const COMPARE_KEY = 'bosung_compare_semantic_v1';

const state = {
  courseFilter:'전체',
  courseView:'all',
  deptFilter:'전체',
  semesterFilter:'전체',
  q:'',
  navHistory:[],
  compare:loadCompare()
};

function esc(x){
  return String(x == null ? '' : x).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escAttr(x){ return esc(x); }
function stripMarks(x){ return String(x || '').replace(/[#*_`>\-•]+/g,' ').replace(/\s+/g,' ').trim(); }
function norm(x){ return String(x || '').normalize('NFC').toLocaleLowerCase('ko-KR').replace(/\s+/g,' ').trim(); }
function unique(arr){ return [...new Set((arr||[]).filter(Boolean))]; }
function snippet(x, n=120){
  const t = stripMarks(x || '');
  return t.length > n ? t.slice(0,n-1).trim() + '…' : t;
}
function prettySelectionLabel(group){
  const g = String(group || '').trim();
  if(!g) return '';
  if(g.includes('학년선택')) return '선택 과목';
  if(g.includes('학기선택')) return '학기 선택';
  if(g.includes('학교지정')) return '학교 지정';
  if(g.includes('공동')) return '공동교육과정';
  return g.replace(/선택$/, ' 선택');
}
function courseTermBadge(b){
  const term = String((b && b.grade_semester) || '').trim();
  const sel = prettySelectionLabel((b && b.selection_group));
  if(term && sel) return `${term} · ${sel}`;
  return term || sel;
}
function hasUseful(x){
  const t = String(x || '').trim();
  return !!t && !/원문에 별도 표기 없음|원문 기준/.test(t);
}
function badge(text, cls=''){
  if(!hasUseful(text)) return '';
  return `<span class="badge ${cls}">${esc(text)}</span>`;
}
function navigateHash(hash){
  const current = location.hash || '';
  clearSearch();
  if(current && current !== hash){
    state.navHistory.push(current);
    if(state.navHistory.length > 40) state.navHistory.shift();
  }
  if(current === hash) renderCurrent(true);
  else location.hash = hash;
}
function routeGo(route){ navigateHash('#/' + route); }
function goCourse(id){ navigateHash('#/course/' + encodeURIComponent(id)); }
function goDept(id){ navigateHash('#/dept/' + encodeURIComponent(id)); }
function goBackInternal(){
  clearSearch();
  const prev = state.navHistory.pop();
  if(prev){
    if(location.hash === prev) renderCurrent(true);
    else location.hash = prev;
    return;
  }
  if(location.hash && location.hash !== '#/home') location.hash = '#/home';
  else renderHome();
}
function setActive(nav){
  $$('.nav-btn').forEach(b => {
    const active = b.dataset.nav === nav;
    b.toggleAttribute('aria-current', active);
  });
}
function page(title, html){
  document.title = title ? `${title} · 보성여고 선택과목 안내` : '보성여고 선택과목 안내';
  main.innerHTML = html + `<footer class="app-footer">보성여자고등학교 교무기획부</footer>`;
  window.scrollTo({top:0, behavior:'auto'});
  updateCompareBadge();
}

function inlineFormat(text){
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
}
function splitTableRow(line){
  return line.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(x=>x.trim());
}
function renderTable(lines){
  if(lines.length < 2) return '';
  const head = splitTableRow(lines[0]);
  const body = lines.slice(2).map(splitTableRow);
  return `<table><thead><tr>${head.map(h=>`<th>${inlineFormat(h)}</th>`).join('')}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${inlineFormat(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
function md(raw, opts={}){
  const text = String(raw || '').replace(/\r/g,'').trim();
  if(!text) return `<p class="muted">정보를 정리 중입니다.</p>`;
  const lines = text.split('\n');
  let h = '';
  let inUl = false;
  let table = [];
  const closeUl = () => { if(inUl){ h += '</ul>'; inUl=false; } };
  const flushTable = () => { if(table.length){ closeUl(); h += renderTable(table); table=[]; } };
  for(let rawLine of lines){
    const line = rawLine.trim();
    if(!line){ flushTable(); closeUl(); continue; }
    // 검수 메모 구분선(---)은 화면에 노출하지 않는다.
    if(/^(?:-{3,}|—{2,})$/.test(line)){ flushTable(); closeUl(); continue; }
    if(/^\|.+\|$/.test(line)){ table.push(line); continue; }
    flushTable();
    const h3 = line.match(/^###\s+(.+)$/);
    const h4 = line.match(/^####\s+(.+)$/);
    const quote = line.match(/^>\s*(.+)$/);
    const bullet = line.match(/^[-•]\s+(.+)$/);
    if(h3){ closeUl(); h += `<h3>${inlineFormat(h3[1])}</h3>`; continue; }
    if(h4){ closeUl(); h += `<h4>${inlineFormat(h4[1])}</h4>`; continue; }
    if(quote){ closeUl(); h += `<blockquote>${inlineFormat(quote[1])}</blockquote>`; continue; }
    if(bullet){ if(!inUl){ h += '<ul>'; inUl=true; } h += `<li>${inlineFormat(bullet[1])}</li>`; continue; }
    closeUl(); h += `<p>${inlineFormat(line)}</p>`;
  }
  flushTable();
  closeUl();
  return `<article class="semantic-doc ${opts.compact?'compact-doc':''}">${h}</article>`;
}
function listMd(items){
  const arr = (items||[]).filter(Boolean);
  return md(arr.map(x => `- ${x}`).join('\n'));
}
function excerptMd(raw, maxLines=14){
  const lines = String(raw || '').split('\n').map(x=>x.trim()).filter(Boolean);
  const out = [];
  for(const line of lines){
    if(/^###\s+/.test(line) || /^####\s+/.test(line) || /^[-•]\s+/.test(line) || /^>\s+/.test(line) || /^[^#|]/.test(line)) out.push(line);
    if(out.length >= maxLines) break;
  }
  return out.join('\n');
}

function loadCompare(){
  try{
    const arr = JSON.parse(sessionStorage.getItem(COMPARE_KEY) || '[]');
    return Array.isArray(arr) ? arr.filter(x => x && x.id && x.kind).slice(0, COMPARE_MAX) : [];
  }catch(e){ return []; }
}
function saveCompare(){
  try{ sessionStorage.setItem(COMPARE_KEY, JSON.stringify(state.compare || [])); }catch(e){}
  updateCompareBadge();
}
function updateCompareBadge(){
  if(!compareFloating) return;
  const items = (state.compare || []).slice(0, COMPARE_MAX);
  const route = parseHash().route;
  const shouldShow = items.length > 0 && route !== 'compare' && !document.body.classList.contains('intro-mode');
  document.body.classList.toggle('has-compare-floating', shouldShow);
  compareFloating.classList.toggle('show', shouldShow);
  if(!shouldShow){ compareFloating.innerHTML = ''; return; }
  const names = items.map(compareName).filter(Boolean).join(' · ');
  const kindLabel = (items[0] && items[0].kind) === 'dept' ? '학과' : '과목';
  compareFloating.innerHTML = `<div class="compare-float-bar">
    <div class="compare-float-text"><b>${kindLabel} 비교</b><span>${esc(names || '선택한 항목')}</span></div>
    <div class="compare-float-actions"><button type="button" data-go="compare">보기</button><button type="button" class="ghost" data-action="clearCompare">전체 해제</button></div>
  </div>`;
}
function compareKindOk(kind){ return !state.compare.length || state.compare.every(x => x.kind === kind); }
function inCompare(kind,id){ return state.compare.some(x => x.kind === kind && x.id === id); }
function addCompare(kind,id){
  const exists = kind === 'course' ? courseById[id] : deptById[id];
  if(!exists) return;
  if(inCompare(kind,id)) return;
  if(!compareKindOk(kind)) state.compare = [];
  if(state.compare.length >= COMPARE_MAX) return;
  state.compare.push({kind,id});
  saveCompare();
  renderCurrent();
}
function removeCompare(kind,id){
  state.compare = state.compare.filter(x => !(x.kind === kind && x.id === id));
  saveCompare();
  renderCurrent();
}
function clearCompareAll(){ state.compare = []; saveCompare(); renderCurrent(); }
function compareButton(kind,id){

function dateOnly(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function parseLocalDate(iso){ const p=String(iso).split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
function daysBetween(a,b){ return Math.round((dateOnly(b) - dateOnly(a)) / 86400000); }
function scheduleLabel(ev){
  const s = String(ev.start || '');
  const e = String(ev.end || ev.start || '');
  const sd = s.split('-');
  const ed = e.split('-');
  const startText = `${Number(sd[1])}. ${Number(sd[2])}.`;
  const endText = `${Number(ed[1])}. ${Number(ed[2])}.`;
  const range = s === e ? startText : `${startText} ~ ${endText}`;
  return ev.time ? `${range} ${ev.time}` : range;
}
function scheduleState(ev, today=new Date()){
  const t = dateOnly(today);
  const s = parseLocalDate(ev.start);
  const e = parseLocalDate(ev.end || ev.start);
  if(t < s) return 'upcoming';
  if(t > e) return 'done';
  return 'current';
}
function scheduleDday(ev, today=new Date()){
  const st = scheduleState(ev, today);
  if(st === 'current') return '진행 중';
  if(st === 'done') return '완료';
  const n = daysBetween(today, parseLocalDate(ev.start));
  if(n === 0) return '오늘';
  return `D-${n}`;
}
function getNextSchedule(today=new Date()){
  const current = CHOICE_SCHEDULE_EVENTS.find(ev => scheduleState(ev, today) === 'current');
  if(current) return {event:current, label:'현재 진행'};
  const next = CHOICE_SCHEDULE_EVENTS.find(ev => scheduleState(ev, today) === 'upcoming');
  if(next) return {event:next, label:'다음 일정'};
  return {event:CHOICE_SCHEDULE_EVENTS[CHOICE_SCHEDULE_EVENTS.length - 1], label:'신청 일정 종료'};
}
function nextScheduleCard(){
  const item = getNextSchedule();
  const ev = item.event;
  return `<section class="next-schedule-card" aria-label="${escAttr(item.label)}">
    <div>
      <span class="schedule-kicker">${esc(item.label)}</span>
      <h3>${esc(ev.title)}</h3>
      <p>${esc(ev.desc)}</p>
      <div class="schedule-date">${esc(scheduleLabel(ev))}</div>
    </div>
    <span class="schedule-dday">${esc(scheduleDday(ev))}</span>
  </section>`;
}
function scheduleItem(ev){
  const st = scheduleState(ev);
  const className = st === 'current' ? ' is-current' : (st === 'done' ? ' is-done' : '');
  return `<article class="schedule-item${className}">
    <div class="schedule-left">
      <span class="schedule-chip">${esc(st === 'current' ? '진행 중' : ev.kind)}</span>
      <span class="schedule-date-main">${esc(scheduleLabel(ev))}</span>
    </div>
    <div class="schedule-content">
      <h3>${esc(ev.title)}</h3>
      <p>${esc(ev.desc)}</p>
    </div>
  </article>`;
}

function renderHome(){
  setActive('home');
  page('home', `${nextScheduleCard()}
  <section class="hero home-guide-hero">
    <span class="eyebrow">선택 전 알아두기</span>
    <h2>과목을 고르기 전<br>먼저 확인할 것들</h2>
    <p>일정은 위 카드에서 먼저 확인하고, 과목 선택 기준은 아래 안내를 차례대로 살펴보세요.</p>
  </section>
  <section class="doc-card"><h3>선택 전 핵심 안내</h3>
    <div class="home-guide-list">${HOME_GUIDE_CARDS.map(homeGuideCard).join('')}</div>
  </section>`);
}

function renderDepartments(){
  setActive('departments');
  const fields = ['전체', ...unique(DATA.departments.map(d => d.field))].filter(Boolean);
  const list = state.deptFilter === '전체' ? DATA.departments : DATA.departments.filter(d => d.field === state.deptFilter);
  page('학과', `<div class="section-title"><h3>학과</h3></div>
    <div class="chip-row">${fields.map(f=>`<button class="chip ${state.deptFilter===f?'active':''}" data-action="deptFilter" data-value="${escAttr(f)}">${esc(f)}</button>`).join('')}</div>
    <div class="list card-grid">${list.map(deptCard).join('')}</div>`);
}

function renderCourses(){
  setActive('courses');
  const activeView = state.courseView || 'all';
  const tabs = `<div class="sub-tabs" role="tablist" aria-label="선택과목 보기 방식">
    <button class="sub-tab ${activeView==='all'?'active':''}" data-action="courseView" data-value="all" role="tab" aria-selected="${activeView==='all'}">전체 선택과목</button>
    <button class="sub-tab ${activeView==='semester'?'active':''}" data-action="courseView" data-value="semester" role="tab" aria-selected="${activeView==='semester'}">학기별 선택과목</button>
  </div>`;
  if(activeView === 'semester') return renderCoursesBySemester(tabs);
  return renderAllCourses(tabs);
}
function renderAllCourses(tabs=''){
  const areas = ['전체', ...unique(DATA.courses.map(c => (c.basic && c.basic.subject_area)))].filter(Boolean);
  const list = state.courseFilter === '전체' ? DATA.courses : DATA.courses.filter(c => (c.basic && c.basic.subject_area) === state.courseFilter);
  page('선택과목', `<div class="section-title"><h3>선택과목</h3></div>
    ${tabs}
    <div class="chip-row">${areas.map(a=>`<button class="chip ${state.courseFilter===a?'active':''}" data-action="courseFilter" data-value="${escAttr(a)}">${esc(a)}</button>`).join('')}</div>
    <div class="list card-grid">${list.map(courseCard).join('')}</div>`);
}
function renderCoursesBySemester(tabs=''){
  const sems = ['전체', ...unique(DATA.course_offerings.map(o => o.semester || o.grade_semester))].filter(Boolean);
  let offs = DATA.course_offerings || [];
  if(state.semesterFilter !== '전체') offs = offs.filter(o => (o.semester || o.grade_semester) === state.semesterFilter);
  const grouped = {};
  offs.forEach(o => { (grouped[o.semester || o.grade_semester || '기타'] ||= []).push(o); });
  page('학기별 선택과목', `<div class="section-title"><h3>선택과목</h3></div>
    ${tabs}
    <div class="chip-row">${sems.map(s=>`<button class="chip ${state.semesterFilter===s?'active':''}" data-action="semesterFilter" data-value="${escAttr(s)}">${esc(s)}</button>`).join('')}</div>
    ${Object.entries(grouped).map(([sem, arr])=>`<section class="semester-group"><h3>${esc(sem)}</h3><div class="list">${arr.map(o=>`<button class="card offering" data-go="course:${encodeURIComponent(o.course_id)}"><div><b>${esc(o.course_name)}</b><span>${esc([o.subject_area,o.course_type,prettySelectionLabel(o.selection_group),o.credits].filter(Boolean).join(' · '))}</span></div><div class="arrow">›</div></button>`).join('')}</div></section>`).join('')}`);
}
function renderSemester(){
  state.courseView = 'semester';
  return renderCourses();
}
function renderCourse(id){
  setActive('courses');
  const c = courseById[id];
  if(!c) return renderNotFound();
  const b = c.basic || {};
  const related = (c.related_department_ids || []).map(x => deptById[x]).filter(Boolean);
  const missing = (c.related_department_names || []).filter(n => !related.some(d => d.name === n)).slice(0,8);
  const heroMeta = [courseTermBadge(b), b.subject_area, b.course_type, b.credits, hasUseful(b.exam) ? '수능 출제' : ''].filter(Boolean).join(' · ');
  page(c.name, `<section class="page-hero">
    <h2>${esc(c.name)}</h2><p>${esc(stripMarks(c.one_liner))}</p>
    <div class="course-hero-meta-strip"><span class="course-meta-text">${esc(heroMeta)}</span><span class="course-meta-action">${tinyCompareButton('course', c.id)}</span></div>
  </section>
  <section class="doc-card"><h3>핵심 키워드</h3><div class="badges keyword-list">${(c.keywords||[]).map(k=>badge(k)).join('') || badge(c.name)}</div></section>
  <section class="doc-card"><h3>이 과목에서 배우는 것</h3>${md(c.learning_md || cardsToMd(c.learning_cards))}</section>
  <section class="doc-card"><h3>수업 활동</h3>${md(c.activities_md)}</section>
  <section class="doc-card"><h3>더 깊게 해볼 탐구</h3>${md(c.advanced_md)}</section>
  <section class="doc-card"><h3>이런 학생에게 잘 맞아요</h3>${md(c.fit_md || (c.fit_students||[]).map(x=>`- ${x}`).join('\n'))}</section>
  <section class="doc-card"><h3>관련 학과</h3><div class="link-grid">${related.map(d=>linkPill(d.name, 'dept:'+encodeURIComponent(d.id))).join('')}${missing.map(n=>missingPill(n)).join('') || ''}</div></section>`);
}
function cardsToMd(cards){
  return (cards||[]).map(card => `#### ${card.title}\n${(card.items||[]).map(x=>`- ${x}`).join('\n')}`).join('\n\n');
}
function renderDept(id){
  setActive('departments');
  const d = deptById[id];
  if(!d) return renderNotFound();
  const connected = (d.connected_course_ids || d.priority_course_ids || []).map(x => courseById[x]).filter(Boolean);
  const connectedNames = d.connected_course_names || d.priority_course_names || [];
  const connectedMissing = connectedNames.filter(n => !connected.some(c => c.name === n));
  const recommended = (d.recommended_course_ids || []).map(x => courseById[x]).filter(Boolean);
  const heroMeta = deptMetaText(d);
  page(d.name, `<section class="page-hero">
    <h2>${esc(d.name)}</h2><p>${esc(stripMarks(d.one_liner))}</p>
    <div class="dept-hero-meta-strip"><span class="course-meta-text">${esc(heroMeta)}</span><span class="course-meta-action">${tinyCompareButton('dept', d.id)}</span></div>
  </section>
  <section class="doc-card"><h3>학과 소개</h3>${md(d.overview_md)}</section>
  <section class="doc-card"><h3>대학에서 배우는 것</h3>${md(d.learning_md || cardsToMd(d.learning_cards))}</section>
  <section class="doc-card compact-links-card"><h3>학과와 연결되는 선택과목</h3><div class="link-grid">${connected.map(c=>linkPill(c.name, 'course:'+encodeURIComponent(c.id))).join('')}${connectedMissing.map(n=>missingPill(n)).join('')}</div></section>
  <section class="doc-card"><h3>이런 학생에게 잘 맞아요</h3>${md(d.fit_md || (d.fit_students||[]).map(x=>`- ${x}`).join('\n'))}</section>
  <section class="doc-card"><h3>졸업 후 진로</h3>${md(d.careers_md)}</section>
  <section class="doc-card"><h3>비슷한 학과</h3>${md(d.similar_departments_md || (d.similar_departments||[]).map(x=>`- ${x}`).join('\n'))}</section>`);
}
function compareName(item){ const obj = item.kind === 'course' ? courseById[item.id] : deptById[item.id]; return (obj && obj.name) || ''; }
function compareObj(item){ return item.kind === 'course' ? courseById[item.id] : deptById[item.id]; }
function basicMdCourse(c){ const b=c.basic||{}; return [courseTermBadge(b), b.subject_area, b.course_type, b.credits].filter(hasUseful).map(x=>`- ${x}`).join('\n'); }

function connectedCourseNamesForDept(d){
  const names = [];
  ((d && d.connected_course_names) || (d && d.priority_course_names) || []).forEach(n => {
    const clean = String(n || '').trim();
    if(clean && !names.includes(clean)) names.push(clean);
  });
  ((d && d.connected_course_ids) || (d && d.priority_course_ids) || []).forEach(id => {
    const c = courseById[id];
    const name = (c && c.name);
    if(name && !names.includes(name)) names.push(name);
  });
  return names;
}

function compareCourseChip(name, cls=''){
  const c = (typeof courseByName !== 'undefined' && courseByName) ? courseByName[name] : null;
  const extra = cls ? ` ${cls}` : '';
  if(c) return `<button type="button" class="compare-chip-link${extra}" data-go="course:${encodeURIComponent(c.id)}">${esc(name)}</button>`;
  return `<span class="${cls}">${esc(name)}</span>`;
}

function compareDeptConnectedCourses(items){
  const depts = items.map(compareObj).filter(Boolean);
  if(!depts.length) return emptyTextMd('없음');

  const lists = depts.map(connectedCourseNamesForDept);
  const total = lists.length;

  const common = total
    ? lists[0].filter(name => lists.every(list => list.includes(name)))
    : [];
  const commonSet = new Set(common);

  const freq = {};
  lists.forEach(list => {
    new Set(list).forEach(name => {
      freq[name] = (freq[name] || 0) + 1;
    });
  });

  const partialNames = Object.keys(freq)
    .filter(name => freq[name] > 1 && freq[name] < total && !commonSet.has(name))
    .sort((a,b) => b.localeCompare(a, 'ko-KR') ? a.localeCompare(b, 'ko-KR') : 0);
  const partialColorIndex = new Map(partialNames.map((name, idx) => [name, idx % 16]));

  let out = '<div class="compare-common-strip">';
  out += '<b>공통 과목</b>';
  out += common.length
    ? `<div class="compare-mini-pills common-pills">${common.map(n=>compareCourseChip(n, 'all-common')).join('')}</div>`
    : '<p class="compare-none">없음</p>';
  out += '</div>';

  out += `<div class="compare-each-course-grid count-${items.length}">`;
  items.forEach((item, idx) => {
    const obj = compareObj(item);
    const own = (lists[idx] || []).filter(n => !commonSet.has(n));
    out += `<article class="compare-each-course"><b>${esc((obj && obj.name) || '')}</b>`;
    if(own.length){
      out += '<div class="compare-mini-pills">';
      own.forEach(n => {
        const isPartial = (freq[n] || 0) > 1;
        const colorClass = isPartial ? ` partial-common pc-${(partialColorIndex.get(n) == null ? 0 : partialColorIndex.get(n))}` : ' unique-course';
        out += compareCourseChip(n, colorClass.trim());
      });
      out += '</div>';
    }else{
      out += '<p class="compare-none">공통 과목 외 없음</p>';
    }
    out += '</article>';
  });
  out += '</div>';

  return out;
}
function emptyTextMd(text='없음'){
  return `<p class="compare-none">${esc(text)}</p>`;
}

function compareValue(item,key){
  const obj = compareObj(item); if(!obj) return md('');
  if(item.kind === 'course'){
    if(key==='intro') return `<p>${esc(stripMarks(obj.one_liner))}</p>`;
    if(key==='basic') return md(basicMdCourse(obj), {compact:true});
    if(key==='learning') return md(excerptMd(obj.learning_md || cardsToMd(obj.learning_cards), 12), {compact:true});
    if(key==='activity') return md(excerptMd(obj.activities_md, 10), {compact:true});
    if(key==='advanced') return md(excerptMd(obj.advanced_md, 10), {compact:true});
    if(key==='links') return md((obj.related_department_names||[]).slice(0,8).map(x=>`- ${x}`).join('\n'), {compact:true});
  }else{
    if(key==='intro') return `<p>${esc(stripMarks(obj.one_liner))}</p>`;
    if(key==='basic') return md(`- ${obj.field||'정보 없음'}`, {compact:true});
    if(key==='learning') return md(excerptMd(obj.learning_md || cardsToMd(obj.learning_cards), 12), {compact:true});
    if(key==='activity') return md(excerptMd(obj.connected_courses_md || (obj.connected_course_names||[]).map(x=>`- ${x}`).join('\n'), 12), {compact:true});
    if(key==='advanced') return md(excerptMd(obj.careers_md, 12), {compact:true});
    if(key==='links'){
      const simMd = obj.similar_departments_md || (obj.similar_departments||[]).map(x=>`- ${x}`).join('\n');
      const cleaned = stripMarks(simMd || '').trim();
      if(!cleaned) return emptyTextMd('없음');
      return md(excerptMd(simMd, 8), {compact:true});
    }
  }
  return md('');
}
function compareRow(title, items, key){
  return `<section class="compare-row"><h3>${esc(title)}</h3><div class="compare-grid count-${items.length}">${items.map(item=>`<article class="compare-col"><header><b>${esc(compareName(item))}</b><button class="mini-remove" data-action="removeCompare" data-kind="${item.kind}" data-id="${escAttr(item.id)}">해제</button></header>${compareValue(item,key)}</article>`).join('')}</div></section>`;
}
function renderCompare(){
  setActive('compare');
  const items = state.compare.slice(0,COMPARE_MAX);
  const kind = (items[0] && items[0].kind) || 'course';
  const isCourse = kind === 'course';
  const pool = isCourse ? DATA.courses : DATA.departments;
  const current = new Set(items.map(x=>x.id));
  const suggested = pool.filter(x => !current.has(x.id)).slice(0,8);
  page('비교', `<section class="page-hero"><div class="back-row"><span class="badge purple">비교</span></div><h2>비교</h2><p>같은 종류의 과목 또는 학과를 4개까지 비교할 수 있습니다.</p><div class="compare-actions">${items.length?`<button class="action-pill" data-action="clearCompare">전체 해제</button>`:''}<button class="action-pill" data-go="${isCourse?'courses':'departments'}">${isCourse?'과목 더 보기':'학과 더 보기'}</button></div></section>
  ${items.length ? `<div class="compare-section-list">${compareRow('한 줄 소개', items, 'intro')}${compareRow(isCourse?'기본 정보':'분야', items, 'basic')}${compareRow(isCourse?'이 과목에서 배우는 것':'대학에서 배우는 것', items, 'learning')}${isCourse ? compareRow('수업 활동', items, 'activity') : `<section class="compare-row"><h3>학과와 연결되는 선택과목</h3>${compareDeptConnectedCourses(items)}</section>`}${compareRow(isCourse?'더 깊게 해볼 탐구':'졸업 후 진로', items, 'advanced')}${compareRow(isCourse?'관련 학과':'비슷한 학과', items, 'links')}</div>` : `<section class="doc-card empty">과목 또는 학과 상세 페이지에서 비교할 항목을 선택해 주세요.</section>`}
  ${items.length < COMPARE_MAX ? `<section class="doc-card"><h3>추가로 비교할 항목</h3><div class="list card-grid">${suggested.map(x => isCourse ? courseCard(x) : deptCard(x)).join('')}</div></section>` : ''}`);
}
function renderSearch(){
  const q = state.q.trim();
  setActive('');
  if(!q) return renderCurrent(true);
  const items = [
    ...DATA.courses.map(c => ({kind:'course', id:c.id, name:c.name, desc:c.one_liner, text:[c.name,c.one_liner,(c.keywords||[]).join(' '),c.learning_md,c.activities_md,c.advanced_md].join(' ')})),
    ...DATA.departments.map(d => ({kind:'dept', id:d.id, name:d.name, desc:d.one_liner, text:[d.name,d.one_liner,d.field,d.overview_md,d.learning_md,d.connected_courses_md,d.careers_md].join(' ')}))
  ];
  const nq = norm(q);
  const res = items.map(item => {
    const nName = norm(item.name), nText = norm(item.text);
    let score = 0;
    if(nName === nq) score += 100;
    else if(nName.includes(nq)) score += 80;
    if(nText.includes(nq)) score += 30;
    return {...item, score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,80);
  page('검색', `<div class="section-title"><h3>검색 결과</h3></div><p class="search-note">검색어: <b>${esc(q)}</b></p><div class="list card-grid">${res.map(item => item.kind==='course' ? courseCard(courseById[item.id]) : deptCard(deptById[item.id])).join('') || `<div class="empty">검색 결과가 없습니다.</div>`}</div>`);
}
function renderNotFound(){ page('없음', `<section class="doc-card empty">페이지를 찾을 수 없습니다.</section>`); }
function clearSearch(){
  state.q = '';
  if(searchInput) searchInput.value = '';
  document.body.classList.remove('search-open');
}
function parseHash(){
  const raw = location.hash.replace(/^#\//,'') || 'home';
  const [route, ...rest] = raw.split('/');
  return {route, id: rest.length ? decodeURIComponent(rest.join('/')) : ''};
}
function renderCurrent(skipSearch=false){
  if(state.q && !skipSearch) return renderSearch();
  document.body.classList.remove('intro-mode');
  const {route, id} = parseHash();
  if(route === 'home' || !route) return renderHome();
  if(route === 'schedule') return renderSchedule();
  if(route === 'courses') return renderCourses();
  if(route === 'semester') return renderSemester();
  if(route === 'departments') return renderDepartments();
  if(route === 'compare') return renderCompare();
  if(route === 'course') return renderCourse(id);
  if(route === 'dept') return renderDept(id);
  return renderNotFound();
}

document.addEventListener('click', e => {
  const actionEl = e.target.closest('[data-action]');
  if(actionEl){
    e.preventDefault(); e.stopPropagation();
    const a = actionEl.dataset.action;
    if(a === 'courseFilter'){ state.courseFilter = actionEl.dataset.value || '전체'; state.courseView = 'all'; renderCourses(); return; }
    if(a === 'courseView'){ state.courseView = actionEl.dataset.value || 'all'; renderCourses(); return; }
    if(a === 'deptFilter'){ state.deptFilter = actionEl.dataset.value || '전체'; renderDepartments(); return; }
    if(a === 'semesterFilter'){ state.semesterFilter = actionEl.dataset.value || '전체'; state.courseView = 'semester'; renderCourses(); return; }
    if(a === 'addCompare'){ addCompare(actionEl.dataset.kind, actionEl.dataset.id); return; }
    if(a === 'removeCompare'){ removeCompare(actionEl.dataset.kind, actionEl.dataset.id); return; }
    if(a === 'clearCompare'){ clearCompareAll(); return; }
  }
  const goEl = e.target.closest('[data-go]');
  if(goEl){
    e.preventDefault();
    const go = goEl.dataset.go;
    if(go === 'home') { clearSearch(); return routeGo('home'); }
    if(go === 'schedule') { clearSearch(); return routeGo('schedule'); }
    if(go === 'courses') { state.courseView = 'all'; clearSearch(); return routeGo('courses'); }
    if(go === 'semester') { state.courseView = 'semester'; clearSearch(); return routeGo('semester'); }
    if(go === 'departments' || go === 'compare') { clearSearch(); return routeGo(go); }
    if(go.startsWith('course:')) return goCourse(decodeURIComponent(go.slice(7)));
    if(go.startsWith('dept:')) return goDept(decodeURIComponent(go.slice(5)));
  }
});
document.addEventListener('keydown', e => {
  if((e.key === 'Enter' || e.key === ' ') && e.target.matches('.clickable')){
    e.preventDefault(); e.target.click();
  }
});
const searchToggleBtn = $('#searchToggle');
if(searchToggleBtn){
  searchToggleBtn.addEventListener('click', function(){
    document.body.classList.toggle('search-open');
    if(document.body.classList.contains('search-open')) {
      setTimeout(function(){ if(searchInput) searchInput.focus(); }, 0);
    }
  });
}
const backBtn = $('#backBtn');
if(backBtn){
  backBtn.addEventListener('click', function(){ goBackInternal(); });
}
function closeCurrentView(){
  try{
    if(window.parent && window.parent !== window){
      window.parent.close();
      return;
    }
  }catch(e){}
  try{
    if(window.opener && !window.opener.closed){
      window.close();
      return;
    }
  }catch(e){}
  if(window.history && window.history.length > 1){
    window.history.back();
  }else{
    routeGo('home');
  }
}
const closeViewBtn = $('#closeViewBtn');
if(closeViewBtn){
  closeViewBtn.addEventListener('click', closeCurrentView);
}
if(searchInput){
  searchInput.addEventListener('input', function(e){ state.q = e.target.value; renderSearch(); });
}
if(searchClear){
  searchClear.addEventListener('click', function(){ clearSearch(); renderCurrent(true); });
}
window.addEventListener('hashchange', () => { clearSearch(); renderCurrent(true); });

renderCurrent();
})();

</script>
