<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>보성여고 선택과목 안내</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #f8faf5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: #334155;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .start-card {
      width: 100%;
      max-width: 420px;
      padding: 28px 22px;
      box-sizing: border-box;
      border: 1px solid #d2dacb;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 16px 40px rgba(15, 23, 42, .12);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eef6e9;
      color: #52734d;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.32;
      letter-spacing: -0.04em;
      color: #1f2937;
    }

    p {
      margin: 14px 0 22px;
      font-size: 15px;
      line-height: 1.65;
      color: #64748b;
      word-break: keep-all;
    }

    .start-btn {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 18px;
      background: #5f7f55;
      color: #ffffff;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(95, 127, 85, .28);
    }

    .start-btn:active {
      transform: translateY(1px);
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="start-card">
    <div class="badge">2026학년도</div>
    <h1>보성여고<br>선택과목 안내</h1>
    <p>
      과목별 안내, 진로·학과 연결,<br>
      선택과목 비교 기능을 확인할 수 있습니다.
    </p>
    <button type="button" class="start-btn" id="startBtn">시작!</button>
    <div class="small">버튼을 누르면 안내서가 새 창으로 열립니다.</div>
  </main>

  <script>
    (function () {
      var APP_URL = "https://bosunghs.github.io/choose2026/app.html?v=" + Date.now();

      function openAppBlank() {
        var win = window.open(
          "",
          "choose2026_app_view",
          "width=430,height=900,resizable=yes,scrollbars=yes"
        );

        if (!win) {
          alert("팝업이 차단되었습니다. 브라우저에서 팝업 허용 후 다시 눌러주세요.");
          return;
        }

        win.document.open();
        win.document.write(`
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>보성여고 선택과목 안내</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8faf5;
    }

    .wrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f8faf5;
    }

    .top {
      flex: 0 0 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      box-sizing: border-box;
      background: #ffffff;
      border-bottom: 1px solid #d2dacb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      color: #334155;
    }

    .top b {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 900;
    }

    .top button {
      flex: 0 0 auto;
      border: 1px solid #d2dacb;
      background: #ffffff;
      color: #334155;
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    iframe {
      flex: 1 1 auto;
      display: block;
      width: 100%;
      height: calc(100vh - 44px);
      border: 0;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <b>보성여고 선택과목 안내</b>
      <button type="button" onclick="window.close()">닫기</button>
    </div>
    <iframe src="${APP_URL}" scrolling="yes"></iframe>
  </div>
</body>
</html>
        `);
        win.document.close();
      }

      document.getElementById("startBtn").addEventListener("click", openAppBlank);
    })();
  </script>
</body>
</html>
