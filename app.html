 장소 마케팅 사례를 조사한다.\n- 모빌리티 변화가 생활 공간과 지역 구조에 미치는 영향을 예측한다.\n> 핵심 개념: 상품사슬, 장소 정체성, 장소 마케팅, 모빌리티, 공유서비스\n\n#### 국토의 변화와 균형 발전을 위해서는 어떤 대안이 필요할까\n- 우리나라의 인구 구조 변화를 이해하고 저출생·고령화 문제를 파악한다.\n- 산업 구조 변화에 따른 농촌 사회의 변화를 이해한다.\n- 수도권 집중 현상과 지방 소멸 문제를 분석한다.\n- 국토 불균등 문제를 파악하고 국가 균형 발전을 위한 대안을 모색한다.\n> 핵심 개념: 저출생, 고령화, 다문화사회, 지속가능한 농업\n\n#### 우리나라의 지속가능한 발전을 위해서는 어떤 정책과 대안이 필요할까\n- 세계유산, 환경문제, 자연재해, 재난대책을 지리적 관점에서 살펴본다.\n- 국토 환경과 지역사회의 지속가능성을 높이기 위한 정책과 대안을 탐구한다.\n> 핵심 개념: 세계유산, 환경문제, 자연재해, 재난대책 ### 공간자료 분석\n\n#### 지리정보기술 활용\n- 통계지리정보서비스와 지도 자료를 활용해 지역별 특성을 분석한다.\n- 인구, 산업, 교통, 환경 자료를 비교하여 공간적 차이를 해석한다.\n\n#### 지역 문제 탐구\n- 생활 속 지리적 현상을 조사하고 탐구 질문을 만든다.\n- 지역 문제의 원인과 영향을 자료를 바탕으로 정리한다.\n\n### 대안 제안과 표현\n\n#### 지리탐구 보고서 작성\n- 조사 결과를 근거로 국토 및 지역 문제에 대한 보고서를 작성한다.\n- 균형 발전, 재난 대응, 지속가능한 발전을 위한 대안을 제시한다.\n\n#### 발표와 공유\n- 조사 결과를 발표하고 친구들과 해결 방안을 비교한다.\n- 피드백을 반영하여 탐구 결과의 타당성을 높인다. ### 인문·예술 계열\n\n#### 장소 정체성과 장소 마케팅\n- 장소 정체성을 활용한 장소 마케팅 사례를 조사한다.\n- 문학 작품의 배경지나 작가 출생지가 지역 이미지 형성에 어떻게 활용되는지 분석한다.\n> 예시: 문학 작품 배경지 및 작가 출생지의 장소 마케팅 사례 분석\n\n### 정보·통계 계열\n\n#### 수도권 집중 문제 탐구\n- 교통 발달이 지역 불균형에 미치는 영향을 탐구한다.\n- 고속철도 개통 이후 수도권 의료 서비스 집중 현상을 사례로 분석한다.\n> 예시: 고속철도 개통 이후 수도권 의료 서비스 집중 현상 분석\n\n### 환경공학 계열\n\n#### GIS 기술을 이용한 재해 안전 시스템 구축\n- GIS 기술을 활용하여 재해 위험 지역을 분석한다.\n- 사면 경사 자료를 바탕으로 산사태 위험 지역을 파악하고 경보 프로그램 아이디어를 제안한다.\n> 예시: 사면 경사 분석을 통한 우리 동네 산사태 위험 지역 경보 프로그램 구축 - 지도, 통계, 공간 자료를 활용해 지역 문제를 분석하고 싶은 학생\n- 수도권 집중, 지방 소멸, 재난 대응, 지속가능한 발전 같은 국토 문제에 관심 있는 학생\n- 사회 문제를 지리정보기술과 연결해 보고서나 발표로 정리해 보고 싶은 학생 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_행성우주과학","name":"행성우주과학","text":"행성우주과학 태양계 행성부터 먼 은하까지, 현대 우주과학의 성과를 바탕으로 우주의 구조와 진화를 탐구하는 과목입니다. 탐사선 케플러법칙 외계행성계 시차 공간운동 별의 성간소광 우주거대구조 ### 핵심 학습\n\n#### 인류가 탐사한 태양계 천체의 특징은 무엇일까\n- 탐사 자료를 활용하여 태양계 천체의 특징을 조사한다.\n- 우주 환경 변화에 따른 우주 재난 가능성을 예측한다.\n- 외계 행성 탐사 방법을 이해하고 외계 생명체의 존재 조건과 가능성을 탐구한다.\n\n#### 밤하늘의 별들은 항상 같은 자리에 있을까\n- 태양 활동 관측 자료를 분석한다.\n- 별의 공간 운동을 이해하고 별자리를 구성하는 별들의 장기적인 형태 변화를 추론한다.\n- 쌍성 관측 자료를 분석하여 별의 물리적 성질을 탐구한다.\n> 핵심 개념: 시차, 공간운동, 별의 질량\n\n#### 우주를 구성하는 물질은 무엇이고 앞으로 우주는 어떻게 될까\n- 천체까지의 거리를 구하는 방법을 이해한다.\n- 은하의 회전 곡선을 분석하여 우주 구성 물질을 추론한다.\n- 최신 전천 탐사 자료를 바탕으로 우주거대구조를 탐구한다.\n> 핵심 개념: 성간소광, 우주거대구조 ### 관측과 자료 분석\n\n#### 태양계와 우주 환경 분석\n- 탐사 자료를 활용하여 태양계 천체의 특징을 비교한다.\n- 우주 쓰레기, 소행성 등 우주 환경 변화가 가져올 위험을 자료로 분석한다.\n\n#### 별과 은하 관측 자료 해석\n- 태양 활동, 별의 공간 운동, 쌍성 관측 자료를 분석한다.\n- 은하 회전 곡선과 전천 탐사 자료를 활용해 우주의 구조를 추론한다.\n\n### 모델링과 시각화\n\n#### 우주 현상 모형화\n- 천체의 거리, 운동, 궤도 자료를 수학적·시각적으로 표현한다.\n- 관측 자료를 바탕으로 우주 구조나 천체 운동을 모형화한다.\n\n#### 탐구 결과 발표\n- 분석 결과를 보고서, 발표, 시각화 자료로 정리한다.\n- 우주과학 탐구가 항공우주, 물리, 정보 분야와 연결되는 지점을 설명한다. ### 수학·항공우주 공학 계열\n\n#### 우주물체의 위협 예측\n- 우주 쓰레기나 지구 위협 소행성의 감시 데이터를 분석한다.\n- AI를 활용하여 위협이 되는 물체의 궤도 함수를 그린다.\n- 예상 낙하 지점을 분석하고 대응 시나리오를 작성한다.\n\n### 수학·물리 계열\n\n#### 우리은하의 모습 그려보기\n- 전파 관측 데이터를 분석하여 우리은하 중성수소구름의 시선속도를 계산한다.\n- 우리은하 전체의 회전 속도 경향을 분석한다.\n- 가스 구름의 위치를 역추적하여 나선팔 구조를 그린다.\n\n### 정보·통계 계열\n\n#### 보이드 내 은하의 분포 분석\n- 은하 데이터를 이용하여 거리를 계산하고, 파이썬 등을 활용해 은하의 위치를 시각화한다.\n- 장벽에 위치한 은하와 보이드에 위치한 은하의 특징을 비교한다. - 별, 행성, 은하, 우주 구조를 관측 자료와 데이터로 이해하고 싶은 학생\n- 물리, 수학, 항공우주, 천문학 분야에 관심이 있는 학생\n- 우주 현상을 데이터 분석, 시각화, 모델링 활동과 연결해 보고 싶은 학생 물리학과 기계공학과 전기공학과 전자공학과 항공우주공학과 천문학과 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과"},{"kind":"course","id":"course_현대사회와_윤리","name":"현대사회와 윤리","text":"현대사회와 윤리 현대사회의 다양한 문제를 동·서양 윤리 이론에 비추어 고민하고, 해결책을 찾아가는 과목입니다. 생명윤리 환경윤리 과학기술윤리 사회정의 평화 윤리학의분류 동양윤리 서양윤리 출생 죽음 사랑 성 환경 과학기술의사회적책임 정보사회 인공지능 직업윤리 시민불복종 ### 핵심 학습\n\n#### 윤리 이론이 우리에게 어떤 지혜를 줄 수 있을까\n- 윤리학의 분류를 이해한다.\n- 동·서양의 다양한 윤리 이론을 탐구한다.\n- 윤리 이론을 현대 사회의 문제를 판단하는 기준으로 활용한다.\n\n#### 생명을 다루는 기술은 어디까지 허용될 수 있을까\n- 출생과 죽음, 사랑과 성의 의미를 이해한다.\n- 생명 기술과 환경 문제를 윤리적 관점에서 성찰한다.\n\n#### 인공지능과의 공존을 위해 무엇을 준비해야 할까\n- 과학기술과 정보통신 기술의 발달에 따른 책임을 탐구한다.\n- 인공지능과 인간의 관계를 윤리적 관점에서 이해한다.\n\n#### 우리가 꿈꾸는 정의로운 사회의 모습은 무엇일까\n- 다양한 직업에 따른 직업윤리를 탐색한다.\n- 정치 참여와 정의로운 사회 수립 방안을 제안한다.\n\n#### 서로 다른 생각과 문화를 어떻게 조화시킬까\n- 예술과 도덕의 관계를 탐색한다.\n- 의식주, 경제생활, 다문화 사회의 쟁점을 윤리적으로 탐구한다. ### 윤리 이론과 쟁점 분석\n\n#### 현대 사회 문제 해석\n- 생명윤리, 인공지능, 환경, 분배 정의 등 현대 사회의 쟁점을 조사한다.\n- 동·서양 윤리 이론을 적용하여 쟁점의 핵심을 분석한다.\n\n#### 사례 비교\n- 과학기술, 직업윤리, 문화 갈등 사례를 비교한다.\n- 서로 다른 윤리적 관점이 같은 문제를 어떻게 다르게 해석하는지 정리한다.\n\n### 토론과 대안 제안\n\n#### 윤리적 판단 구성\n- 찬반 입장을 정리하고 근거를 바탕으로 자신의 판단을 구성한다.\n- 다른 입장의 논거를 검토하며 균형 있는 해결 방안을 모색한다.\n\n#### 정책·실천 방안 제안\n- 정의로운 사회, 책임 있는 기술 활용, 문화 공존을 위한 실천 방안을 제안한다.\n- 토론과 발표를 통해 자신의 윤리적 판단을 설명한다. ### 의학·생명 계열\n\n#### 유전적 강화와 인간 존엄성 성찰\n- 유전자 편집 기술이 일상이 된 미래 사회의 가상 시나리오를 작성한다.\n- 하버마스 이론을 바탕으로 유전자 편집 기술이 인간의 주체성에 미치는 영향을 분석한다.\n- 유전적 강화와 치료의 윤리적 경계를 검토한다.\n\n### 인문·사회 계열\n\n#### 정의로운 분배 모델 탐구\n- 롤스와 노직의 이론을 바탕으로 국내외의 다양한 분배 정책을 비교 분석한다.\n- 정의로운 분배를 위한 국가의 역할을 탐구한다.\n- 미래 사회에 적합한 분배 정책을 제안한다.\n\n### 자연·공학 계열\n\n#### 과학 기술의 사회적 책임과 역사적 사례 탐구\n- 맨해튼 프로젝트나 탈리도마이드 사건 등 역사적 사례를 조사한다.\n- 하이데거와 야스퍼스의 관점에서 과학자의 책임을 분석한다.\n- 연구자가 가져야 할 태도와 연구 윤리에 대해 토론한다. - 생명윤리, 인공지능, 환경, 정의, 다문화 문제를 깊이 있게 토론하고 싶은 학생\n- 사회 문제를 윤리 이론과 연결해 분석하고 자신의 판단을 세워 보고 싶은 학생\n- 의학, 생명과학, 사회과학, 공학 분야의 책임과 윤리 문제에 관심 있는 학생 생명과학과 생명공학과 의예과 약학과 간호학과 임상병리학과 컴퓨터공학과 소프트웨어학과 인공지능학과 빅데이터학과 정보보안학과 사회학과"},{"kind":"course","id":"course_화법과_언어","name":"화법과 언어","text":"화법과 언어 듣기·말하기와 문법 영역을 심화·확장하여, 상황과 목적에 맞게 의사소통하고 언어 사용을 분석하는 과목입니다. 의사소통 공감적이해 담화구성 비판적사고 언어생활 사회적맥락 문제해결 담화의맥락 화행 언어의사회성 청자분석 논증구조 언어예절 ### 핵심 학습\n\n#### 우리는 왜 같은 말을 다르게 이해할까\n- 담화의 맥락, 화행, 언어의 사회성을 이해한다.\n- 목적과 상황에 맞게 설득력 있게 말하는 방법을 탐구한다.\n- 토론 및 발표 상황에서 발화 의도를 분석한다.\n> 핵심 개념: 담화의 맥락, 화행, 언어의 사회성\n\n#### 사회 속 언어 사용은 어떤 방식으로 의미를 만들까\n- 뉴스 기사, 광고, SNS 글의 언어 사용 방식을 비교 분석한다.\n- 혐오 표현, 오해가 발생한 대화 등 언어 갈등 사례를 분석하고 원인을 탐구한다.\n- 공적 담화에서 사용되는 설득 전략을 파악한다.\n\n#### 공적 상황에서 어떻게 말하고 쓸 수 있을까\n- 사회 문제를 주제로 설득을 위한 발표 원고를 작성하고 발표한다.\n- 토론 활동을 통해 주장과 반론을 구성한다.\n- 인터뷰를 기획하고 질문지를 구성한다.\n- 공적 상황에 적절한 언어 표현과 소통 방식을 탐구한다. ### 담화 분석\n\n#### 언어 사용 방식 비교\n- 기사, 광고, SNS, 토론 프로그램 등 다양한 담화 자료를 비교한다.\n- 표현 방식, 발화 의도, 설득 전략을 분석한다.\n\n#### 언어 갈등 사례 탐구\n- 혐오 표현, 오해, 세대 갈등 등 언어 갈등 사례를 조사한다.\n- 갈등이 발생한 맥락과 표현 방식을 분석한다.\n\n### 말하기와 공적 소통\n\n#### 발표와 토론\n- 사회 문제를 주제로 발표 원고를 작성하고 발표한다.\n- 주장, 근거, 반론을 구성하여 토론에 참여한다.\n\n#### 인터뷰와 질문 구성\n- 인터뷰 목적에 맞는 질문지를 구성한다.\n- 공적 상황에 적절한 언어 표현과 소통 방식을 적용한다. ### 전 계열\n\n#### 사회적 이슈에 대한 공론장 분석\n- 혐오 표현, 정치적 갈등, 세대 갈등 등 사회 이슈 사례를 조사한다.\n- 언론 기사, SNS 댓글, 토론 프로그램 발언을 비교 분석한다.\n- 갈등을 완화하는 언어 표현 방식을 제안하고 발표한다.\n\n### 인문·사회 계열\n\n#### 정치·미디어 담론의 설득 전략 연구\n- 정치, 광고, 캠페인에서 사용되는 언어 전략을 분석한다.\n- 프레이밍 효과와 감정 호소 표현을 조사한다.\n- 언어 전략과 여론 형성의 관계를 탐구 보고서로 정리한다.\n\n### 자연·공학 계열\n\n#### 과학·기술 정보의 대중화 담화 탐구\n- 과학 논문 요약문과 대중 과학 기사를 비교하여 읽는다.\n- 어려운 과학 개념을 쉽게 설명하는 카드뉴스를 제작한다.\n- 설명 방식에 따른 이해도 차이를 조사한다. - 말하기, 토론, 발표, 인터뷰 등 실제 의사소통 활동을 깊이 있게 연습하고 싶은 학생\n- 사회적 이슈와 미디어 담화 속 언어 표현을 분석하고 싶은 학생\n- 국어, 미디어, 교육, 사회과학, 과학 커뮤니케이션 분야에 관심 있는 학생 사회학과 정치외교학과 법학과 행정학과 경제학과 사회복지학과 국어국문학과 문헌정보학과 미디어학과 교육학과"},{"kind":"course","id":"course_화학","name":"화학","text":"화학 물질이 어떻게 구성되고 반응하는지 이해하며, 일상생활과 사회 문제를 화학의 법칙으로 설명하고 해결해 보는 과목입니다. 몰 화학 반응식 양적 관계 분자 구조 전기음성도 화학 평형 평형 이동 몰농도 pH 중화 반응 중화 적정 ### 핵심 학습\n\n#### 화학의 언어로 물질과 반응을 어떻게 표현할까\n- 눈에 보이지 않는 입자와 반응을 숫자와 식으로 표현하는 방법을 이해한다.\n- 몰, 몰질량, 화학 반응식, 양적 관계를 통해 물질의 양과 반응량을 계산한다.\n- 다양한 물질의 몰질량을 탐색하고, 특정 몰수에 해당하는 물질의 질량을 측정한다.\n- 화학 반응의 양적 관계를 확인하는 실험을 설계하고 수행한다.\n\n#### 분자의 구조가 달라지면 물질의 성질도 달라질까\n- 전기적 성질, 전기음성도, 분자 구조를 바탕으로 물질의 성질을 설명한다.\n- 물의 전기 분해 실험을 통해 화학 결합과 반응을 이해한다.\n- 소프트웨어로 분자 구조를 모델링한다.\n- 분자 구조에 따른 물질의 성질을 확인한다.\n\n#### 화학 반응은 어떤 조건에서 평형에 이를까\n- 정반응과 역반응이 함께 일어나는 화학 평형을 이해한다.\n- 농도, 압력, 온도 변화가 평형 이동에 미치는 영향을 학습한다.\n- 화학 평형에서 농도비의 규칙성을 찾고 반응의 진행 방향을 예측한다.\n- 조건 변화에 따른 화학 평형 이동을 실험으로 확인한다.\n\n#### 산과 염기의 반응은 어떻게 정량적으로 이해할 수 있을까\n- 수용액에서 수소 이온 농도를 표현하는 방법을 이해한다.\n- 산과 염기가 만나 일어나는 중화 반응을 정량적으로 해석한다.\n- 표준 용액을 만들고 강산 수용액을 희석할 때의 pH 변화를 측정한다.\n- 중화 적정을 통해 식초 속 아세트산 함량을 구한다. ### 실험과 측정\n\n#### 물질의 양과 반응량 측정\n- 몰수에 해당하는 물질의 질량을 측정한다.\n- 화학 반응식과 실험 결과를 연결하여 반응량을 계산한다.\n\n#### 산·염기 실험\n- pH 변화를 측정한다.\n- 중화 적정으로 식초 속 아세트산 함량을 구한다.\n\n### 계산과 예측\n\n#### 화학 반응의 양적 관계\n- 화학 반응식으로 반응량을 계산한다.\n- 화학 반응의 양적 관계를 확인한다.\n\n#### 평형과 반응 방향\n- 반응의 진행 방향을 예측한다.\n- 평형상수와 평형 이동을 해석한다.\n\n### 모델링과 시뮬레이션\n\n#### 분자 구조 모델링\n- 소프트웨어로 분자 구조를 모델링한다.\n- 분자 구조와 물질의 성질을 연결하여 설명한다.\n\n#### 평형 이동 탐구\n- 농도, 압력, 온도 변화에 따른 평형 이동을 탐구한다. ### 체육 계열\n\n#### 고도와 산소량이 운동 능력에 미치는 영향 탐구\n- 경기장의 고도와 대기 중 산소량을 조사한다.\n- 고지대에서 호흡이 어려운 이유를 설명한다.\n- 화학 평형 이동을 바탕으로 경기 능력 향상 방안을 분석한다.\n\n### 자연 계열\n\n#### 중화 반응을 활용한 이산화 탄소 농도 감소 방안 탐구\n- 기후 변화와 이산화 탄소 농도의 관계를 조사한다.\n- 탄소 포집·활용·저장 기술을 탐색한다.\n- 광물 탄산화 기술을 중화 반응과 연결해 설명한다.\n\n### 공학 계열\n\n#### 화학 평형 이동을 이용한 그린 메탄올 수득률 향상 탐구\n- 그린 메탄올 합성 과정을 조사한다.\n- 평형 이동을 이용한 수득률 향상 조건을 분석한다.\n- 생산 공장 설비 조건을 검토한다. - 실험, 계산, 모델링을 통해 물질의 구조와 반응을 이해하고 싶은 학생\n- 화학공학, 신소재, 에너지, 환경, 의약, 식품 분야에 관심 있는 학생\n- 일상생활과 산업 속 문제를 화학 원리로 설명하고 해결해 보고 싶은 학생 화학과 화학공학과 신소재공학과 재료공학과 에너지자원공학과 환경공학과 생명공학과 약학과 의예과 식품공학과 화장품과학과 간호학과"},{"kind":"course","id":"course_화학_반응의_세계","name":"화학 반응의 세계","text":"화학 반응의 세계 화학 반응이 왜 일어나고 어떻게 조절되는지 이해하며, 에너지·환경·의약·산업 속 화학 반응의 활용을 탐구하는 과목입니다. 산화 환원 산과 염기 반응 속도 촉매 화학 평형 전기화학 에너지 전환 환경 화학 산업 공정 ### 핵심 학습\n\n#### 화학 반응은 왜 일어날까\n- 물질이 서로 반응하며 새로운 물질로 바뀌는 과정을 에너지와 입자 관점에서 이해한다.\n- 반응의 방향과 조건을 살펴보며 화학 변화의 원리를 학습한다.\n- 화학 반응 전후의 물질 변화를 분석한다.\n- 반응 조건에 따른 결과를 비교하고, 에너지 변화와 반응의 관계를 설명한다.\n\n#### 산화·환원은 어디에 쓰일까\n- 전자 이동으로 설명되는 산화·환원 반응을 이해한다.\n- 산화·환원 반응이 배터리, 부식, 전기분해, 생명 현상과 연결됨을 살펴본다.\n- 전지와 전기분해의 원리를 비교한다.\n- 금속 부식과 방지 방법을 탐구한다.\n\n#### 반응 속도와 평형은 어떻게 조절할까\n- 온도, 농도, 촉매, 압력 등 조건이 반응 속도와 평형에 미치는 영향을 이해한다.\n- 산업 공정에서 원하는 생성물을 얻기 위해 조건을 조절하는 방법을 살펴본다.\n- 반응 속도에 영향을 주는 요인을 실험하고 촉매의 역할을 탐구한다.\n- 평형 이동을 이용한 산업 공정 사례를 분석한다.\n\n#### 화학 반응은 사회 문제 해결에 어떻게 쓰일까\n- 화학 반응이 에너지 생산, 환경 오염 제거, 의약품 개발, 신소재 생산에 활용되는 사례를 이해한다.\n- 화학 반응의 활용 과정에서 안전, 윤리, 환경 영향을 함께 고려한다.\n- 친환경 촉매 사례를 조사하고 의약품 합성과 화학 반응의 관계를 탐구한다.\n- 화학 산업의 안전 기준에 대해 토론한다. ### 실험과 관찰\n\n#### 반응 변화 관찰\n- 반응 속도를 측정한다.\n- 산화·환원 반응을 관찰한다.\n- 산·염기 반응을 분석한다.\n\n### 산업과 환경 탐구\n\n#### 화학 기술 사례 조사\n- 촉매를 활용한 환경 문제 해결 사례를 조사한다.\n- 전지와 에너지 저장 기술을 탐구한다.\n- 화학 공정에서 조건 조절의 의미를 분석한다.\n\n### 토론과 적용\n\n#### 사회적 영향 분석\n- 화학물질 안전 문제를 토론한다.\n- 친환경 화학 기술의 장단점을 비교한다.\n- 에너지 전환 기술의 사회적 영향을 정리한다. ### 공학 계열\n\n#### 전기화학과 배터리 기술 탐구\n- 전지의 산화·환원 반응을 분석한다.\n- 리튬 이온 배터리의 작동 원리를 조사한다.\n- 배터리 재활용과 환경 문제를 토론한다.\n\n### 자연·의약학 계열\n\n#### 의약품 합성과 반응 조건 탐구\n- 특정 의약품의 합성 과정을 조사한다.\n- 반응 조건과 수율의 관계를 분석한다.\n- 의약품 생산 과정의 안전성을 검토한다. - 화학 반응의 원리와 조건 조절을 실험과 사례로 이해하고 싶은 학생\n- 배터리, 촉매, 의약품, 환경 기술, 화학 산업 분야에 관심 있는 학생\n- 화학 반응이 사회 문제 해결에 어떻게 활용되는지 탐구하고 싶은 학생 화학과 화학공학과 약학과 의예과 생명공학과 신소재공학과 재료공학과 에너지자원공학과 환경공학과 식품공학과"},{"kind":"course","id":"course_확률과_통계","name":"확률과 통계","text":"확률과 통계 불확실한 상황에서 가능성을 판단하고, 자료 속 흐름을 읽어 합리적으로 의사결정하는 방법을 배우는 과목입니다. 순열 조합 이항정리 확률 조건부확률 확률분포 통계적추정 중복순열 중복조합 독립과종속 확률변수 ### 핵심 학습\n\n#### 사건을 체계적으로 분류하고 세는 최적의 방법은 무엇일까\n- 중복순열과 중복조합의 원리를 이해하고 다양한 문제 상황에 적용한다.\n- 이항정리를 활용하여 다항식 전개식의 성질을 탐구한다.\n\n#### 조건이 주어진 상황에서 사건이 일어날 가능성은 어떻게 달라질까\n- 확률의 정의와 성질을 바탕으로 덧셈정리와 곱셈정리를 이해한다.\n- 실생활 속 조건부확률의 필요성을 이해한다.\n- 사건 간의 독립성을 판정한다.\n\n#### 표본을 통해 전체 집단의 특성을 어떻게 예측할까\n- 이항분포와 정규분포의 관계를 이해한다.\n- 표본을 통해 모집단의 평균과 비율을 과학적으로 추정한다.\n- 통계적 문제 해결 과정을 수행한다. ### 경우의 수와 확률 분석\n\n#### 조건 나열과 문항 변형\n- 순열과 조합의 문제 상황에서 조건을 체계적으로 나열한다.\n- 조건을 바꾸며 가능한 경우의 수와 확률 변화를 분석한다.\n\n#### 조건부확률 탐구\n- 실생활 사례에서 조건부확률이 필요한 상황을 찾는다.\n- 사건의 독립성과 종속성을 판단한다.\n\n### 자료 해석과 통계적 추정\n\n#### 표본조사 분석\n- 표본조사나 여론조사의 자료 수집 과정을 살펴본다.\n- 표본을 통해 모집단을 추정하는 과정을 분석한다.\n\n#### 통계 결과 비판\n- 조사 결과의 신뢰도와 한계를 검토한다.\n- 자료 해석 과정에서 발생할 수 있는 오류를 비판적으로 살펴본다. ### 자연 계열\n\n#### What if not 전략을 이용한 문항 제작\n- 특정 조건을 만족하는 함수의 개수, 방정식의 정수해 개수 등 순열과 조합의 문제 상황에서 주어진 조건을 나열한다.\n- 조건을 다양하게 변형하며 문항을 제작하고 분석한다.\n\n### 생명·보건 계열\n\n#### 감염병 확산 경로 예측과 조건부확률 분석\n- 특정 감염병 검사 키트의 정확도 자료를 수집한다.\n- 민감도와 특이도 자료를 바탕으로 실제 양성 확률을 계산한다.\n- 조건부확률 분석을 바탕으로 방역 정책의 통계적 근거를 제시한다.\n\n### 전 계열\n\n#### 관심 분야 표본조사 또는 여론조사 분석\n- 관심 분야에서 이루어지는 표본조사나 여론조사를 찾아본다.\n- 해당 표본조사의 통계적 추정 과정을 분석하고 비판한다. - 경우의 수, 확률, 통계 자료를 활용해 문제를 논리적으로 해결하고 싶은 학생\n- 수학, 통계, 경제, 데이터 분석, 생명·보건 분야에 관심 있는 학생\n- 실제 조사 자료와 확률 모델을 바탕으로 사회 현상을 해석하고 싶은 학생 수학과 통계학과 경제학과 산업공학과 빅데이터학과"},{"kind":"department","id":"dept_간호학과","name":"간호학과","text":"간호학과 사람의 건강 문제를 이해하고 돌보며, 환자와 가족, 지역사회를 돕는 전문 간호 역량을 기르는 학과입니다. 보건·의약학 분야 · 보건 계열 간호학과는 단순히 병원에서 환자를 돌보는 기술만 배우는 학과가 아닙니다. 사람의 몸과 질병을 과학적으로 이해하고, 환자의 상태를 관찰하며, 필요한 간호를 계획하고 실행하는 과정을 배웁니다.\n\n또한 간호는 사람을 직접 만나는 일입니다. 그래서 생명 존중, 공감, 의사소통, 협동, 윤리 의식이 중요합니다. 개인뿐 아니라 가족과 지역사회의 건강 문제까지 넓게 바라보는 힘도 함께 기릅니다. ### 주요 학습 영역\n\n#### 인체와 생명과학 기초\n- 사람의 몸이 어떻게 작동하는지 이해하기 위해 생물학, 화학, 생리학, 해부학을 바탕으로 건강과 질병의 원리를 학습합니다.\n- 일반생물학, 일반화학, 생리학, 해부학, 병리학, 임상미생물학 등을 다룹니다.\n\n#### 간호 과정과 임상 실무\n- 환자의 건강 문제를 사정하고, 필요한 간호를 계획하며, 실행과 평가까지 이어지는 간호 과정을 학습합니다.\n- 간호학개론, 성인간호학, 응급간호, 간호학실습, 임상약리학, 영양학 및 식이요법 등을 다룹니다.\n\n#### 성장·상담·지역사회 건강\n- 간호는 병원 안에서만 이루어지지 않으므로 인간의 성장과 발달, 상담, 가족과 지역사회의 건강 문제까지 함께 학습합니다.\n- 인간성장발달과 건강, 상담학개론, 사회간호학, 사회복지학개론, 모성간호학 등을 다룹니다.\n\n#### 보건의료 제도와 전문직 역량\n- 의료 현장의 전문직으로서 법과 제도, 윤리, 협업 구조를 이해합니다.\n- 보건의료관계법규, 간호학실습, 간호학개론 등을 다룹니다. 생명과학 화학 보건 세포와 물질대사 생물의 유전 화학 반응의 세계 현대사회와 윤리 확률과 통계 대수 미적분Ⅰ 인공지능 기초 융합과학 탐구 - 생명을 존중하고 사람을 돕는 일에 의미를 느끼는 학생\n- 생명과학, 화학, 보건 과목에 흥미가 있는 학생\n- 다른 사람의 아픔과 어려움에 공감하고 배려할 수 있는 학생\n- 건강 문제를 과학적으로 이해하고 해결해 보고 싶은 학생\n- 책임감을 가지고 꾸준히 학습할 수 있는 학생 #### 임상 간호 분야\n- 임상 간호사\n- 임상 전문 간호사\n- 응급 간호 분야\n- 병동·중환자실·수술실 등 병원 간호 분야\n\n#### 공공·지역사회 보건 분야\n- 보건공무원\n- 보건교육사\n- 초중고 보건교사\n- 국제간호사\n- 지역사회 건강관리 분야\n\n#### 산업·기업 분야\n- 산업체 간호사\n- 보험심사 간호사\n- 메디컬 코디네이터\n- 제약회사\n- 의료기기 회사\n\n#### 교육·연구·복지 분야\n- 대학교수\n- 사회복지시설 간호사\n- 보육교사\n- 간호 교육 및 연구 분야 - 간호학부\n- 임상간호학과"},{"kind":"department","id":"dept_건축공학과","name":"건축공학과","text":"건축공학과 인간과 환경에 대한 이해를 바탕으로 구조, 재료, 시공 기술 등 공학 지식을 융합하여 안전하고 지속 가능한 건축 환경을 설계하고 구현하는 학과입니다. 공학 분야 · 건축·환경 계열 건축공학과는 건축물을 안전하고 효율적으로 만들기 위해 필요한 공학적 원리와 기술을 배우는 학과입니다. 건축의 구조, 재료, 시공, 설비, 환경, 건설 관리 등을 다루며, 실제 건축 현장에서 발생하는 문제를 분석하고 해결하는 능력을 기릅니다.\n\n건축학과가 공간 설계와 미적 표현에 더 무게를 둔다면, 건축공학과는 구조적 안전성, 시공 기술, 재료와 설비, 건설 과정의 관리에 더 초점을 둡니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 건축공학의 기본 개념과 기초 이론을 학습합니다.\n- 일반 물리학, 미분적분학, 기본설계, 공업수학, 건축개론, 건축제도, 동역학, 구조역학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 구조, 재료, 시공, 설비, 건설 관리 등 건축공학의 주요 영역을 깊이 있게 이해합니다.\n- 재료역학, 건축재료공학, 건축구조, 건축시공, 건축설비, 건설기술, 건설경영, 건축공학설계, 특수구조, 건축융합 등을 다룹니다.\n\n#### 실무·응용·융합\n- 전공 지식을 실제 건축 현장, 연구, 산업 문제와 연결합니다.\n- 건축환경공학, 확률통계론, 철근콘크리트구조, 건축음향, 수치해석, 스마트건축생산 등을 다룹니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 지구과학 정보 기하 미적분Ⅱ 역학과 에너지 물질과 에너지 전자기와 양자 지구시스템과학 인공지능 기초 - 수학·과학 기초 지식과 공간지각력을 바탕으로 구조를 이해하고 싶은 학생\n- 구조물의 원리와 시공 과정에 흥미가 있는 학생\n- 실제 문제를 분석하고 해결하는 데 관심이 있는 학생\n- 인간 중심 요소를 이해하면서 공간과 환경을 공학적으로 다루고 싶은 학생 #### 기업 및 산업체 분야\n- 건축설계사\n- 시공 엔지니어\n- 인테리어 디자이너\n- 감리 기술자\n\n#### 학계 및 연구기관 분야\n- 건축 연구원\n- 구조·재료 연구자\n\n#### 정부 및 공공기관 분야\n- 건축 공무원\n- 공공기관 기술직\n- 건설관리 전문가 - 건축학부(건축공학전공)\n- 건축공학부\n- 스마트건축공학과\n- 토목건축공학과\n- 그린스마트건축공학과"},{"kind":"department","id":"dept_건축학과","name":"건축학과","text":"건축학과 인간과 도시, 환경에 대한 인문학적 통찰과 예술적 감각을 바탕으로 공간을 설계하고, 미적 감각과 기술 역량을 융합해 삶의 질을 높이는 건축물을 창조하는 5년제 전문 학위 과정의 학과입니다. 공학 분야 · 건축·환경 계열 건축학과는 사람이 살아가는 공간을 설계하는 학과입니다. 건축물의 기능과 아름다움, 도시와 환경, 역사와 문화, 인간의 생활 방식을 함께 고려하여 공간을 구상하고 표현하는 능력을 기릅니다.\n\n건축공학과가 구조와 시공 등 공학적 구현에 무게를 둔다면, 건축학과는 공간 설계, 형태, 표현, 환경과 도시 맥락을 통합적으로 다룹니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 건축 설계와 표현, 구조, 제도, 컴퓨터 활용 등 기초 역량을 학습합니다.\n- 건축과 표현, 건축과 구조, 건축제도, 건축기초설계, 건축과 컴퓨터, 건축 표현기법, 건축과 환경, 건축구조시스템 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 건축의 역사, 환경계획, 재료와 시공, 형태와 심리, 설계 과정을 깊이 있게 탐구합니다.\n- 건축사, 건축환경계획, 건축재료역학, 건축시공 및 건설관리 입문, 건축 심리와 형태, 한국건축사, 건축형태와 표현, 건축설계, 건축구조계획 등을 다룹니다.\n\n#### 실무·응용·융합\n- 친환경 건축, 도시 디자인, 단지계획, 설비와 건설관리 등 실제 설계와 현장 문제를 연결합니다.\n- 친환경건축계획, 도시디자인과 형태, 단지계획, 건축설비, 건설관리, 주거와 형태 등을 다룹니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 지구과학 세계시민과 지리 기하 미적분Ⅱ 역학과 에너지 물질과 에너지 지구시스템과학 한국지리 탐구 융합과학 탐구 - 공간과 건축물에 관심이 있고 창의적 설계와 시각적 표현에 흥미가 있는 학생\n- 미적 감각과 함께 수학적·논리적 사고력으로 구조와 공간을 이해하고 싶은 학생\n- 건축 설계, 구조, 시공, 환경계획을 통합적으로 이해하고 적용하고 싶은 학생 #### 기업 및 산업체 분야\n- 건축설계사\n- 인테리어 디자이너\n- 시공 엔지니어\n- 감리 기술자\n\n#### 정부 및 공공기관 분야\n- 건축 공무원\n- 공공기관 기술직\n- 건설관리 전문가\n\n#### 학계 및 연구기관 분야\n- 건축 연구원\n- 구조·재료 연구자\n\n#### 기타 전문 분야\n- 건축사\n- 건축 창업자\n- 건축 콘텐츠 기획자 - 건축학부(건축학 전공)\n- 건축공학과(건축학 전공)\n- 건축학과(건축학 전공)\n- 건축학부\n- 건축학부(도시설계전공)"},{"kind":"department","id":"dept_경영학과","name":"경영학과","text":"경영학과 기업과 조직이 목표를 이루기 위해 사람, 돈, 정보, 전략을 어떻게 운영하고 관리하는지 배우는 학과입니다. 사회 분야 · 상경 계열 경영학과는 회사나 조직이 어떻게 움직이는지 배우는 학과입니다. 제품과 서비스를 만들고, 사람을 조직하고, 자금을 관리하고, 고객을 이해하며, 변화하는 시장 속에서 전략을 세우는 방법을 배웁니다.\n\n경영은 한 가지 분야만 다루지 않습니다. 회계, 재무, 마케팅, 인사, 생산, 데이터 분석, 창업, 기업윤리처럼 조직 운영에 필요한 여러 영역을 폭넓게 공부합니다. ### 주요 학습 영역\n\n#### 경영의 기본 구조\n- 조직이 어떻게 운영되는지, 경제와 회계의 기본 원리는 무엇인지 배우는 기초 영역입니다.\n- 경영학원론, 경제학원론, 회계원리, 통계학 등을 다룹니다.\n\n#### 돈과 자원 관리\n- 기업이 자금을 조달하고 투자하며, 비용과 성과를 관리하는 재무적 의사결정을 학습합니다.\n- 재무관리, 투자론, 관리회계, 금융경영 관련 과목 등을 다룹니다.\n\n#### 시장과 고객 이해\n- 고객의 필요를 파악하고 제품과 서비스를 효과적으로 전달하는 방법을 배웁니다.\n- 마케팅, 소비자행동분석, 디지털마케팅, 서비스관리 등을 다룹니다.\n\n#### 사람과 조직 운영\n- 팀을 이끌고, 갈등을 조정하고, 조직이 변화하도록 만드는 방법을 학습합니다.\n- 조직행동, 조직개발 및 변화관리, 리더십 이론 및 실습, 보상관리, 노사관계 등을 다룹니다.\n\n#### 운영·창업·데이터\n- 생산, 공급망, 품질, 법률, 데이터 분석, 창업과 벤처 경영 등 조직 운영의 응용 영역을 학습합니다.\n- 공급망관리, 품질관리, 창업 및 벤처경영, 비즈니스 법률, 데이터 분석 및 비즈니스 인텔리전스, 기업윤리 및 사회적책임 등을 다룹니다. 경제 수학 확률과 통계 사회와 문화 정보 인공지능 기초 금융과 경제생활 영어 발표와 토론 법과 사회 화법과 언어 독서와 작문 실용 통계 수학과제 탐구 - 다양한 산업과 문화에 관심이 있는 학생\n- 데이터를 분석하고 문제를 해결하는 것을 좋아하는 학생\n- 사람들과 소통하고 협상하는 능력을 키우고 싶은 학생\n- 팀을 이끌고 조직을 관리하는 데 관심이 있는 학생\n- 마케팅, 금융, 창업, 데이터 분석, 국제 비즈니스에 관심이 있는 학생 #### 기업 경영과 관리 분야\n- 일반 기업체\n- 인사·조직 관리\n- 경영기획\n- 운영관리\n- 서비스관리\n\n#### 금융과 회계 분야\n- 은행\n- 증권사\n- 자산 운용사\n- 종합 금융사\n- 보험 회사\n- 회계법인\n\n#### 마케팅과 컨설팅 분야\n- 컨설팅 회사\n- 리서치 회사\n- 마케팅 기획\n- 소비자 분석\n- 디지털마케팅\n\n#### 무역과 글로벌 비즈니스 분야\n- 무역 회사\n- 글로벌비즈니스 분야\n- 국제경영 관련 분야\n\n#### 연구·공공기관 분야\n- 경영·경제 관련 연구소\n- 사회과학 관련 연구소\n- 중앙정부 및 지방자치단체\n- 한국조폐공사\n- 대한무역투자진흥공사 - 관광경영학과\n- 글로벌경영학과\n- AI경영학과\n- 빅데이터경영학과\n- IT경영학과"},{"kind":"department","id":"dept_경제학과","name":"경제학과","text":"경제학과 시장, 정책, 금융, 노동, 불평등 같은 경제 현상을 분석하고 사회 문제의 해결 방향을 탐구하는 학과입니다. 사회 분야 · 상경 계열 경제학과는 돈을 많이 버는 방법만 배우는 학과가 아닙니다. 사람들이 제한된 자원을 어떻게 선택하고 배분하는지, 시장은 어떻게 작동하는지, 정부 정책은 경제에 어떤 영향을 주는지 분석하는 학과입니다.\n\n경제학은 수학과 통계를 활용해 사회 현상을 체계적으로 분석합니다. 빈곤, 실업, 불평등, 금융 위기, 환율, 무역, 환경 문제처럼 복잡한 사회 문제를 경제적 관점에서 이해하고 해결책을 찾습니다. ### 주요 학습 영역\n\n#### 경제의 기본 구조\n- 개인, 기업, 정부, 시장이 어떻게 움직이는지 배우는 기초 영역입니다.\n- 경제학원론, 미시경제, 거시경제, 경제사 등을 다룹니다.\n\n#### 수학과 통계로 경제 분석하기\n- 경제학은 자료를 분석하고 모형을 세우는 학문입니다. 수학과 통계는 경제 현상을 설명하고 예측하는 도구가 됩니다.\n- 경제수학, 계량경제, 응용계량경제, 통계 분석 관련 과목 등을 다룹니다.\n\n#### 정책과 사회 문제\n- 세금, 재정, 복지, 노동, 불평등, 도시와 지역 경제처럼 정책과 사회 문제를 경제학적으로 분석합니다.\n- 조세론, 재정학, 후생경제, 노동경제, 도시 및 지역경제, 법경제 등을 다룹니다.\n\n#### 금융·산업·글로벌 경제\n- 금융시장, 국제무역, 산업 구조, 에너지와 환경 문제를 경제적 관점에서 분석합니다.\n- 금융경제, 산업조직론, 국제무역, 에너지경제, 환경경제, 산업경제, 농업경제, 디지털경제, 정보경제 등을 다룹니다. 경제 수학 확률과 통계 미적분Ⅰ 사회와 문화 금융과 경제생활 국제 관계의 이해 정보 인공지능 기초 화법과 언어 독서와 작문 정치 법과 사회 실용 통계 수학과제 탐구 - 경제 뉴스, 정책, 시장 동향에 관심이 많은 학생\n- 빈곤, 실업, 불평등 같은 사회 문제를 분석해 보고 싶은 학생\n- 수학과 통계로 사회 현상을 이해하는 데 흥미가 있는 학생\n- 복잡한 문제를 체계적으로 분석하고 해결책을 찾는 것을 좋아하는 학생\n- 국제 무역, 금융, 환율, 글로벌 경제 이슈에 관심이 있는 학생 #### 금융 분야\n- 금융 분석가\n- 펀드 매니저\n- 리스크 매니저\n- 재무 분석가\n\n#### 공공 정책 분야\n- 경제 정책 분석가\n- 재정 관리사\n- 통계 분석가\n- 중앙은행 직원\n- 공공기관 경제 관련 업무\n\n#### 기업과 컨설팅 분야\n- 경영 컨설턴트\n- 마케팅 분석가\n- 인사 관리자\n- 데이터 분석가\n\n#### 연구와 학계 분야\n- 경제학 교수\n- 경제 연구소 연구원\n- 사회과학 연구원\n\n#### 국제기구와 미디어 분야\n- IMF, OECD 등 국제기구 경제 분석가\n- 개발도상국 경제 프로젝트 매니저\n- 경제 기자 - 경제금융물류학부\n- 경제금융학과\n- 경제통상학부\n- 국제경제통상학과\n- 국제경제학과"},{"kind":"department","id":"dept_고고학과","name":"고고학과","text":"고고학과 유적과 유물을 통해 인류 문명의 변천과 문화 변동 과정을 탐구하고, 과거를 바탕으로 현재와 미래를 이해하는 통찰을 기르는 학과입니다. 인문 분야 · 인문과학 계열 고고학과는 인류 문명의 변천사와 문화의 변화 과정을 연구하는 학과입니다. 유적과 유물을 발굴하고 분석하여 역사 기록만으로는 알기 어려운 사실을 보완하며, 인간 사회의 변화 과정을 탐구합니다.\n\n고고학은 과거를 연구하는 데서 끝나지 않습니다. 인류의 삶과 문화가 어떻게 변화해 왔는지 이해함으로써 현재 사회와 미래를 바라보는 깊이 있는 관점을 기릅니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 고고학의 기본 개념과 연구 방법, 인류 문화의 기원을 학습합니다.\n- 고고학 개론, 고고학 연구의 기초, 문명의 기원, 인류 문화의 기원, 고고학사, 문화유산 관리와 박물관, 고고학 실습, 인류 문화와 환경 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 고고학 자료를 분석하고, 지역과 시대별 문화 변동을 이해하는 방법을 학습합니다.\n- 현대고고학 특강, 고고학과 자료 분석, 동아시아의 선사 시대, 고고학 방법론, 한국고고학 등을 다룹니다. 독서와 작문 영어 독해와 작문 세계시민과 지리 세계사 사회와 문화 한문 주제 탐구 독서 영미 문학 읽기 한국지리 탐구 동아시아 역사 기행 역사로 탐구하는 현대 세계 사회문제 탐구 - 인류의 유물과 유적에 관심이 많고 사물에 대한 관찰력이 뛰어난 학생\n- 인류와 사회의 발달 과정에 흥미를 느끼는 학생\n- 문화 변동의 이유를 탐구하고 싶은 학생\n- 방대한 고서와 유적 자료를 조사하고 연구할 수 있는 인내력과 집중력이 있는 학생 #### 연구기관 분야\n- 인문·사회과학 관련 연구소\n- 문화재 관련 연구소\n\n#### 정부 및 공공기관 분야\n- 중앙정부 및 지방자치단체 문서실\n- 국공립 및 국립대학 도서관\n- 박물관\n- 지역 문화원\n- 큐레이터 등 전문직\n\n#### 언론·출판 분야\n- 신문사\n- 잡지사\n- 방송국\n- 칼럼니스트\n- 출판사\n\n#### 문화재 및 기록 분야\n- 문화재 발굴 전문가\n- 문화재 복원 연구원\n- 문화재 감정평가사\n- 미술품 감정사\n- 문화해설사\n- 기업 문헌 자료실\n- 기록물관리사"},{"kind":"department","id":"dept_공예과(조형학과)","name":"공예과(조형학과)","text":"공예과(조형학과) 도예, 금속공예, 가구디자인, 주얼리디자인 등 다양한 재료와 기법을 활용하여 실용성과 예술성을 겸비한 작품을 창작하는 공예 작가와 조형 예술가를 기르는 학과입니다. 예술·체육 분야 · 예술 계열 공예과(조형학과)는 흙, 금속, 나무, 유리, 섬유 등 다양한 재료를 다루며 손과 도구, 기술과 감각을 함께 사용하는 학과입니다. 재료의 특성을 이해하고 제작 기법을 익히며, 실험적이고 창의적인 표현 방식을 탐구합니다.\n\n공예는 순수 예술과 디자인, 생활 속 물건의 실용성을 함께 고려합니다. 따라서 작품의 아름다움뿐 아니라 쓰임, 재료, 제작 과정, 전시와 산업적 활용까지 함께 배웁니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 조형의 기본 원리와 재료, 색채, 드로잉, 입체 표현의 기초를 학습합니다.\n- 기초 조형, 기초 드로잉 및 디자인 스케치, 소재와 기법 연구, 공간과 조형, 3D 컴퓨터 그래픽 및 모델링, 공예사 및 조형 이론, 색채학, 재료학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 재료별 공예 기법과 디자인 표현을 심화하여 학습합니다.\n- 디자인 기초, 도예 성형기법, 도자 유약 및 소성 연구, 금속가공 기법, 주얼리 디자인, 목조 조형 및 가구 설계, 유리 조형, 직조 기법, 패브릭 디자인 등을 다룹니다.\n\n#### 실무·응용·융합\n- 작품의 의미와 전시, 산업적 활용을 연결합니다.\n- 공예 미학 및 철학, 전시 기획 등을 다룹니다. 화법과 언어 독서와 작문 문학 영어 독해와 작문 세계사 사회와 문화 현대사회와 윤리 미술 주제 탐구 독서 문학과 영상 미술 창작 미술 감상과 비평 미술과 매체 - 손으로 만드는 것을 좋아하고 입체적인 작업에 흥미가 있는 학생\n- 예술성과 실용성을 함께 고려하는 디자인에 관심이 있는 학생\n- 금속, 흙, 나무, 유리 등 다양한 재료를 다루는 데 관심이 있는 학생\n- 반복적이고 정밀한 작업을 견딜 수 있는 인내심과 꼼꼼함을 가진 학생 #### 예술계 분야\n- 공예 작가\n- 공방 운영자\n- 문화예술 기획자\n- 큐레이터\n\n#### 교육계 분야\n- 대학교수\n- 미술교사\n- 공예교사\n- 예술치료사\n\n#### 연구·복원 분야\n- 미술품 복원가\n\n#### 산업계 분야\n- 제품 디자이너\n- 주얼리 디자이너\n- 세트 디자이너\n- 공예 기술자"},{"kind":"department","id":"dept_과학_교과_교육과","name":"과학 교과 교육과","text":"과학 교과 교육과 과학의 근본 원리와 교육학을 융합하여 자연 현상을 과학적으로 해석하도록 돕는 교수·학습 방법을 연구하고, 실험 중심 수업 설계 역량을 갖춘 과학 교사와 과학교육 전문가를 기르는 학과입니다. 교육 분야 · 교육 계열 과학 교과 교육과는 과학 지식과 교육 방법을 함께 배우는 학과입니다. 물리, 화학, 생명과학, 지구과학 등 과학의 기초 원리를 이해하고, 이를 학생들이 잘 배울 수 있도록 설명하고 실험하며 수업을 설계하는 방법을 익힙니다.\n\n단순히 과학 내용을 많이 아는 것만으로는 충분하지 않습니다. 어려운 개념을 어떻게 설명할지, 실험 활동을 어떻게 구성할지, 학생들의 오개념을 어떻게 도울지까지 함께 고민합니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 과학 교과의 기본 개념과 기초 이론을 폭넓게 학습합니다.\n- 일반물리학, 일반화학, 일반생물학, 일반지구과학, 기초 과학 실험, 수학적 사고와 논리, 고급 물리학, 현대 물리학 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 과학 분야별 심화 개념과 실험·분석 방법을 학습합니다.\n- 전자기학 및 실험, 역학 및 실험, 유기화학, 분석화학, 물리화학, 무기화학, 분자생물학, 생태학, 유전학, 생리학 등을 다룹니다.\n\n#### 실무·응용·융합\n- 과학 지식을 교육 현장에 적용하고, 수업과 실험 활동을 설계하는 역량을 기릅니다.\n- 대기과학, 지질학, 천문학, 해양학, 과학교육학 및 교직, 과학교육론 등을 다룹니다. 화법과 언어 독서와 작문 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 지구과학 정보 역학과 에너지 물질과 에너지 세포와 물질대사 지구시스템과학 - 자연 현상의 원리와 법칙을 논리적으로 탐구하는 것을 좋아하는 학생\n- 어려운 과학 개념을 친구들에게 쉽게 설명해 주는 데 보람을 느끼는 학생\n- 수학적 사고력을 바탕으로 실험과 실습을 통해 결과를 도출하는 것을 좋아하는 학생\n- 과학 기술이 사회에 미치는 영향과 올바른 과학 가치관 교육에 관심이 있는 학생\n- 에듀테크나 실험 기구 활용에 흥미가 있고 창의적인 수업을 설계해 보고 싶은 학생 #### 교육 및 연구기관 분야\n- 중등 과학교사\n- 과학고·영재학교 교사\n- 대학교수\n- 한국교육과정평가원 연구원\n- 교육 정책 연구원\n- 교육 관련 연구소 연구원\n- 기초 및 응용 물리학 연구원\n\n#### 출판·문화기관 분야\n- 과학 커뮤니케이터\n- 과학관 및 박물관 전시 기획자\n- 전문 저술가 및 번역가\n\n#### 기타 분야\n- 학원 및 사교육 분야 강사\n- 과학교육 전문 기자\n- 교육 기술 분야 종사자"},{"kind":"department","id":"dept_관현악과","name":"관현악과","text":"관현악과 관악기, 현악기, 타악기 등 다양한 악기의 연주 기술을 체계적으로 배우고, 음악 이론과 해석 능력, 실내악·앙상블·오케스트라 경험을 통해 전문 연주자로 성장하는 학과입니다. 예술·체육 분야 · 예술 계열 관현악과는 악기 연주 능력을 중심으로 음악 이론, 해석, 합주와 무대 경험을 함께 배우는 학과입니다. 개인 연주 실력을 기르는 것뿐 아니라 실내악, 앙상블, 오케스트라 활동을 통해 다른 연주자와 호흡하는 능력도 중요하게 다룹니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 전공 실기와 합주, 관현악 문헌 등 연주자로서 필요한 기본기를 학습합니다.\n- 합창, 전공 실기, 관현악 합주, 실내악, 현악 합주, 관악 합주, 관현악 문헌, 현악 문헌 등을 다룹니다.\n\n#### 전공 심화와 분석\n- 연주 해석과 음악 이론, 서양음악사의 흐름을 함께 학습합니다.\n- 실내악 앙상블, 관현악, 시창·청음, 서양음악사, 화성학, 대위법 등을 다룹니다. 화법과 언어 독서와 작문 문학 영어 독해와 작문 사회와 문화 음악 주제 탐구 독서 심화 영어 음악 연주와 창작 음악 감상과 비평 매체 의사소통 음악과 미디어 - 관악기, 현악기, 타악기 연주에 흥미와 재능이 있는 학생\n- 오케스트라나 앙상블 활동에 적극적으로 참여하고 싶은 학생\n- 음악적 소통과 팀워크를 중요하게 생각하는 학생\n- 전문 연주자로 성장하고자 하는 목표가 분명한 학생 #### 음악 전문 분야\n- 음악 관련 대학원 진학 및 연구 활동\n- 전문 연주자\n- 실내악·앙상블·오케스트라 관련 활동\n\n#### 교육 분야\n- 중·고등학교 음악교사\n- 대학교수 또는 강사\n\n#### 예술치료 분야\n- 음악 치료사\n- 심리치료와 결합된 예술치료 분야"},{"kind":"department","id":"dept_광고홍보학과","name":"광고홍보학과","text":"광고홍보학과 광고와 홍보의 전문 지식과 실무 능력을 바탕으로 사람의 마음을 움직이는 메시지를 기획하고, 변화하는 미디어 환경에 대응하는 커뮤니케이션 전문가를 기르는 학과입니다. 사회 분야 · 광고·언론·정보 계열 광고홍보학과는 광고, 홍보, 미디어, 마케팅, 소비자 이해를 함께 배우는 학과입니다. 제품이나 서비스, 기관의 메시지를 어떻게 전달할지 고민하고, 사람들의 관심과 행동을 이끌어내는 커뮤니케이션 전략을 배웁니다.\n\n디지털 미디어 환경에서는 콘텐츠 제작 능력뿐 아니라 데이터 분석, 소비자 심리, 브랜드 전략, 광고 윤리와 법제에 대한 학, 반도체물리학, 고급물리실험 등 등을 다룹니다.\n\n#### 실무·응용·융합\n- 전공 지식을 실제 현장, 연구, 산업, 사회 문제와 연결합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 지구과학 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 수학과제 탐구 융합과학 탐구 - 일상의 당연한 현상 이면에 숨겨진 근본적인 이유를 끝까지 파고드는 학생\n- 복잡한 자연 현상을 단순하고 명쾌한 수학 공식으로 표현하는 과정에서 지적 희열을 느끼는 학생\n- 논리적인 사고력을 바탕으로 가설을 세우고, 정밀한 실험을 통해 이를 증명하는 과정을 즐기는 학생\n- 반도체, 양자 컴퓨터, 우주 항공 등 미래 첨단 기술의 핵심 원리를 연구하고 싶은 도전적인 학생 #### 연구·개발 분야\n- 물리학연구원\n- 반도체공학기술자\n- 나노공학기술자\n- 에너지공학기술자\n- 원자력공학기술자\n- 인공위성 개발원\n- 데이터 과학자\n- 의료 물리학자\n\n#### 소프트웨어·계측 분야\n- 시스템소프트웨어개발자\n- 응용소프트웨어개발자\n- 전자 계측제어기술자\n- 전자제품개발기술자\n\n#### 교육 분야\n- 과학교사\n- 물리학원강사\n- 과학커뮤니케이터\n- 방과후 교사\n\n#### 기타 전문 분야\n- 기술직 공무원\n- 품질관리사무원\n- 금융 분석가\n- 변리사 - 물리·천문학부(물리학전공)\n- 반도체물리학과\n- 응용물리학과\n- 전자물리학과\n- 나노전자물리학과 등"},{"kind":"department","id":"dept_미디어학과","name":"미디어학과","text":"미디어학과 방송, 영화, 온라인 플랫폼, 소셜미디어, 데이터와 기술을 연결해 콘텐츠를 기획하고 제작하는 방법을 배우는 학과입니다. 사회 분야 · 광고·언론·정보 계열 미디어학과는 콘텐츠를 만드는 감각과 사회를 읽는 능력, 디지털 기술 이해가 함께 필요한 학과입니다. 방송, 광고, 온라인 미디어, 소셜미디어, 뉴미디어 환경에서 콘텐츠가 어떻게 만들어지고 유통되는지 배웁니다.\n\n미디어는 단순한 표현 수단이 아니라 사회적 영향력을 가진 정보 환경입니다. 그래서 커뮤니케이션 이론, 미디어 윤리, 미디어와 법, 데이터 분석, 영상 제작, 콘텐츠 기획을 함께 다룹니다. ### 주요 학습 영역\n\n#### 커뮤니케이션과 미디어 이해\n- 미디어가 사람과 사회에 어떤 영향을 미치는지 학습합니다.\n- 커뮤니케이션의 이해, 방송론, 광고론, 정보사회와 뉴미디어, 매스컴효과론, 디지털미디어사회 이해 등을 다룹니다.\n\n#### 미디어 조사와 윤리\n- 미디어 현상을 조사하고, 정보와 표현의 책임을 학습합니다.\n- 매스미디어조사방법, 정보미디어조사방법, 사회통계, 미디어윤리, 미디어와 법 등을 다룹니다.\n\n#### 콘텐츠 기획과 제작\n- 영상, 웹, 방송, 온라인 콘텐츠를 기획하고 제작하는 방법을 학습합니다.\n- 인터넷영상기획, 웹미디어기획, 미디어콘텐츠 기획론, 방송제작법, 영상과 사운드, 영상창작론, 방송편집실무 등을 다룹니다.\n\n#### 데이터와 디지털 기술\n- 데이터와 기술을 활용해 미디어 콘텐츠와 플랫폼을 분석하고 기획\n- 데이터사이언스, 프로젝트 기획 및 관리, 예술과 테크놀로지, 인터넷미디어개론, 온라인 저널리즘 등을 다룹니다. 매체 의사소통 사회와 문화 인간과 심리 정보 법과 사회 사회문제 탐구 독서와 작문 화법과 언어 문학 확률과 통계 영어 독해와 작문 세계시민과 지리 현대사회와 윤리 영미 문학 읽기 정치 윤리와 사상 윤리문제 탐구 - 영화, 방송, 온라인 미디어, 소셜미디어에 관심이 있는 학생\n- 글, 영상, 이미지, 사운드로 메시지를 표현하는 것을 좋아하는 학생\n- 컴퓨터, 소프트웨어, 네트워크, 데이터 처리에도 관심이 있는 학생\n- 기술과 디자인, 커뮤니케이션을 연결하는 융합적 사고를 좋아하는 학생\n- 창의적인 문제 해결과 콘텐츠 기획을 즐기는 학생 #### 방송·영상 분야\n- 방송기자\n- 방송연출가\n- 웹방송전문가\n- 1인미디어콘텐츠창작자\n- 방송기술감독\n- 촬영기사\n 학과\n- 화학생명과학과\n- 화학생명환경과학부\n- 생명시스템학부\n- 생명분자과학부\n- 응용생명과학부\n- 생명환경학과\n- 생명응용생명과학부"},{"kind":"department","id":"dept_서양어학과","name":"서양어학과","text":"서양어학과 서양의 여러 언어를 체계적으로 배우고 각 언어권의 문화와 사회를 이해하여 국제적 감각을 갖춘 지역 전문가를 기르는 학과입니다. 인문 분야 · 언어·문학 계열 서양어학과는 서양 각 언어권의 언어를 배우는 데서 출발해, 해당 지역의 문학, 역사, 문화, 정치, 경제를 함께 이해하는 학과입니다. 언어 능력뿐 아니라 문화 해석 능력과 지역 전문성을 기르며, 국제 교류와 통번역, 관광, 출판, 홍보, 해외 영업 분야와 연결될 수 있습니다. ### 주요 학습 영역\n\n#### 어학 기초\n- 각 언어별 전공 외국어를 초급, 중급, 고급, 비즈니스, 실용 단계로 학습합니다.\n- 각 언어의 어학적 특징, 음운학, 음성학 등을 통해 언어의 구조와 발음을 이해합니다.\n\n#### 문학과 언어 심화\n- 문법론, 어휘론을 통해 언어를 분석하는 방법을 배웁니다.\n- 각 언어별 문학의 이해, 고전문학사, 현대문학사, 고전소설, 현대소설 등을 통해 문학과 문화의 흐름을 학습합니다.\n\n#### 지역학과 문화 이해\n- 각 언어권 국가의 역사와 사상, 지역 연구, 정치 연구, 경제 연구 등을 통해 언어와 사회를 연결해 이해합니다. 화법과 언어 독서와 작문 문학 영어 독해와 작문 세계시민과 지리 세계사 사회와 문화 제2외국어 심화 제2외국어 언어생활 탐구 여행지리 역사로 탐구하는 현대 세계 - 서양 각 언어권 국가의 언어, 사회, 문화에 관심과 흥미가 있는 학생\n- 새로운 세계를 탐구해 나가려는 호기심이 있는 학생\n- 외국어 학습과 문화 이해를 함께 발전시키고 싶은 학생 #### 교육 분야\n- 대학교수\n- 중등교사\n- 어학원 강사\n\n#### 관광·국제교류 분야\n- 관광통역안내원\n- 여행사무원\n- 해외 영업 담당자\n- 마케팅 담당자\n\n#### 광고·홍보·출판 분야\n- 작가\n- 번역가\n- 통역가\n- 출판물 편집자\n- 유학상담사\n- 자막 제작자 - 노어노문학과\n- 노어과\n- 러시아어학과\n- 러시아언어문화전공\n- 러시아·유라시아학과\n- 독어독문학과\n- 독일어과\n- 독일어언어문화학과\n- 독일어문학전공\n- 불어불문학과\n- 프랑스어학부\n- 유럽문화학부\n- 서어서문학과\n- 스페인어과\n- 스페인·중남미학과\n- 네덜란드어과\n- 루마니아어과"},{"kind":"department","id":"dept_섬유공학과","name":"섬유공학과","text":"섬유공학과 의류, 산업용 소재, 첨단 복합 소재 등 다양한 섬유 재료의 개발·가공·활용 기술을 연구하는 학과입니다. 공학 분야 · 화학생명 계열 섬유공학과는 섬유의 물리적·화학적 특성과 기능성을 공학적으로 분석하고 응용하는 학과입니다. 천연섬유와 합성섬유, 기능성 섬유, 스마트 섬유, 친환경 소재 등을 다루며, 의류뿐 아니라 산업용 소재와 첨단 복합 소재까지 폭넓게 연결됩니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 일반물리학, 일반화학을 통해 소재를 이해하기 위한 기초 과학을 배웁니다.\n- 섬유재료학, 섬유고분자화학, 합성섬유재료, 천연섬유재료, 섬유제품공학을 통해 섬유 소재의 구조와 특성을 학습합니다.\n\n#### 전공 심화와 분석\n- 섬유계면화학, 염색공학, 편성공학, 합성섬유, 섬유가공학 및 실험을 통해 소재 가공과 기능화 과정을 이해합니다.\n- 의복공학 및 설계, 색채과학, 의류생산관리, 패션마케팅 등을 통해 섬유와 의류 산업의 응용 영역을 다룹니다.\n\n#### 실무·응용·융합\n- 기능성 섬유, 스마트 섬유, 친환경 소재, 섬유제품 평가와 인증 등 산업 현장과 연결된 문제를 다룹니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 정보 기하 미적분Ⅱ 역학과 에너지 물질과 에너지 화학 반응의 세계 세포와 물질대사 수학과제 탐구 기후변 name":"식품영양학과","text":"식품영양학과 식품의 생산·취급·소비 과정과 인체 내 생리·생화학적 변화를 연구하여 식생활과 영양 개선에 기여하는 전문 인재를 기르는 학과입니다. 자연 분야 · 생활과학 계열 식품영양학과는 식품과 영양, 조리, 위생, 임상영양, 급식, 식생활 관리를 함께 다루는 학과입니다. 식품이 인체에 미치는 영향을 과학적으로 이해하고, 건강한 식생활과 국민 보건 향상을 위한 지식과 실무 능력을 기릅니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 식품학, 영양생화학, 영양생리학, 식품위생학을 통해 식품과 영양의 기본 원리를 배웁니다.\n- 조리과학, 공중보건학, 임상영양학, 고급식품학을 통해 식생활과 보건을 연결해 이해합니다.\n\n#### 전공 심화와 분석\n- 조리원리 및 실습, 생애주기영양학, 급식경영, 지역사회영양학을 통해 대상과 환경에 따른 영양 관리를 배웁니다.\n- 식품가공 및 저장학, 영양교육 및 상담, 식생활관리, 식문화사, 운동영양학, 식품화학을 통해 식품과 영양의 응용 영역을 다룹니다.\n\n#### 실무·응용·융합\n- 식품미생물학, 식품분석 및 실험, 한국조리 및 실습, 식품영양통계, 분자영양학을 통해 실험·실습과 자료 분석 역량을 기릅니다. 대수 미적분Ⅰ 확률과 통계 사회와 문화 화학 생명과학 정보 미적분Ⅱ 물질과 에너지 화학 반응의 세계 세포와 물질대사 생물의 유전 실용 통계 - 식품과 영양에 대한 과학적 탐구에 흥미가 있는 학생\n- 화학, 생명과학 등 기초 과학 과목을 좋아하고 실험·실습에 끈기 있게 참여할 수 있는 학생\n- 식품과 영양의 중요성을 인식하고 첨단 기술을 식품에 응용해 보고 싶은 학생 #### 연구·기술직 분야\n- 보건연구사\n- 식품공학 기술자 및 연구원\n- 식품공학 시험원\n- 음식료품감정사\n- 식품개발자\n- 품질관리자\n- 식품위생 전문가\n- 건강기능식품 전문가\n\n#### 사무·관리 분야\n- 식품위생직 공무원\n- 품질관리사무원\n- 외식경영컨설턴트\n- 식품위생감시원\n- 친환경제품 인증심사원\n- 고객상담원\n\n#### 음식 서비스 분야\n- 한식·일식·양식 조리사\n- 푸드스타일리스트\n- 음식메뉴개발자\n- 단체급식조리사\n- 소믈리에\n- 제빵사 및 제과사\n\n#### 보건·교육 분야\n- 영양사\n- 위생사\n- 영양 교사\n- 임상영양사\n- 요리강사\n- 식생활지도사 - 바이오헬스융합학부\n- 바이오식품공학과\n- 식품영양학 전공\n- 식품공학과\n- 식품공학부\n- 식품산업관리학과\n- 식품생명공학과\n- 식품유통학과"},{"kind":"department","id":"dept_신문방송학과","name":"신문방송학과","text":"신문방송학과 신문, 방송, 영상, 정보통신 등 대중매체의 특성과 사회적 영향력을 이해하고 커뮤니케이션 현상을 연구하는 학과입니다. 사회 분야 · 광고·언론·정보 계열 신문방송학과는 사회현상으로서의 커뮤니케이션을 연구하고, 대중매체가 사회와 문화에 미치는 영향을 분석하는 학과입니다. 신문, 방송, 영화, 광고, 뉴미디어, 여론, 대중문화, 언론법제 등을 배우며 정보를 비판적으로 해석하고 효과적으로 전달하는 능력을 기릅니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 커뮤니케이션의 이해, 한국언론사, 신문론, 방송론, 영화론을 통해 미디어와 커뮤니케이션의 기본 개념을 배웁니다.\n- 취재보도론, 저널리즘의 이해, 포토저널리즘을 통해 보도와 저널리즘의 기초를 익힙니다.\n\n#### 전공 심화와 분석\n- 미디어와 여론, 출판잡지론, 광고론, 미디어조사방법, 매스컴이론을 통해 미디어의 사회적 영향과 조사 방법을 배웁니다.\n- 커뮤니케이션연구방법론, 뉴미디어론, 대중문화론, 언론법제론, 매스컴효과론을 통해 매체 환경과 커뮤니케이션 효과를 분석합니다.\n\n#### 실무·응용·융합\n- 매스컴사회학, 미디어산업론, 영상커뮤니케이션, 비판커뮤니케이션, 방송편성론, 광고PR을 통해 미디어 실무와 산업 구조를 이해합니다. 화법과 언어 독서와 작문 세계시민과 지리 사회와 문화 현대사회와 윤리 주제 탐구 독서 정치 법과 사회 논리와 사고 인문학과 윤리 윤리와 사상 독서 토론과 글쓰기 언어생활 탐구 역사로 탐구하는 현대 세계 사회문제 탐구 - 신문, 방송, 온라인 콘텐츠 등 다양한 미디어 분야에서 활동하고 싶은 학생\n- 창의적이고 비판적인 사고로 정보를 해석하고 싶은 학생\n- 사회 변화, 문화, 정치 이슈를 깊이 있게 다루는 데 관심이 있는 학생\n- 다양한 방식으로 사람들과 소통하고 사회적 이슈를 논의하는 데 흥미가 있는 학생 #### 방송·기자 분야\n- 광고제작감독\n- 방송기자\n- 방송연출가\n- 신문제작관리자\n- 아나운서\n- 기상캐스터\n- 리포터\n- 웹방송전문가\n- 잡지기자\n- 편집기자\n- 신문기자\n- 사진기자\n- 인터넷전문기자\n\n#### 기획·홍보·조사 분야\n- 광고기획자\n- 홍보기획자\n- 마케팅사무원\n- 소셜미디어전문가\n- 기획·홍보 및 광고 관리자\n- 사회조사전문가\n\n#### 작가·비평 분야\n- 평론가\n- 카피라이터\n- 상품공간스토리텔러 - 미디어커뮤니케이션학과\n- 언론정보학과\n- 언론영상학과\n- 저널리즘전공\n- 방송정보학과\n- 정보문화학과"},{"kind":"department","id":"dept_신소재공학과","name":"신소재공학과","text":"신소재공학과 금속, 세라믹, 고분자, 반도체, 나노소재 등 다양한 소재의 구조와 특성, 제조 및 응용 기술을 연구하며 미래 산업에 필요한 고기능성 소재를 설계하고 활용하는 학과입니다. 공학 분야 · 화학생명 계열 신소재공학과는 소재가 어떤 구조를 가지고 어떤 성질을 나타내는지 분석하고, 이를 반도체, 배터리, 디스플레이, 에너지, 항공·자동차, 바이오 등 다양한 산업에 적용하는 방법을 배웁니다. 화학과 물리학의 기초를 바탕으로 재료의 합성, 가공, 분석, 성능 개선까지 폭넓게 다룹니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 일반물리학, 일반화학, 신소재공학개론을 통해 소재를 이해하는 기초 과학 지식을 배웁니다.\n- 재료구조물성, 결정학개론, 재료열역학을 통해 소재의 구조와 물성, 에너지 관계를 이해합니다.\n- 나노재료학, 전자 및 반도체재료학을 통해 첨단 소재 분야의 기본 개념을 익힙니다.\n\n#### 전공 심화와 분석\n- 재료공학, 복합재료, 전자공학개론을 통해 소재의 성질과 응용 가능성을 분석합니다.\n- 반도체공정 및 소자, 분광학, 자성재료를 통해 소재 분석과 전자·자성 소재의 활용을 배웁니다.\n- 진공과학 및 박막공학을 통해 박막 소재와 반도체·디스플레이 공정의 기초를 이해합니다.\n\n#### 실무·응용·융합\n- 금속, 세라믹, 고분자, 반도체 소재를 산업 현장과 연구 개발 문제에 연결합니다.\n- 2차전지, 태양전지, 수소연료전지, 디스플레이 소재처럼 미래 산업과 연결되는 소재 응용 분야를 탐구합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 세포와 물질대사 생물의 유전 수학과제 탐구 융합과학 탐구 - 물질의 성질과 구조에 대한 과학적 호기심이 있는 학생\n- 화학과 물리학을 바탕으로 실험과 분석 활동에 적극적으로 참여할 수 있는 학생\n- 반도체, 배터리, 나노소재, 고분자 등 첨단 소재의 활용 가능성을 탐구하고 싶은 학생 #### 기업 및 산업체 분야\n- 반도체 재료 개발자\n- 2차전지 및 전지소재 연구개발 엔지니어\n- 금속·세라믹·고분자 복합소재 개발자\n- 디스플레이, 태양전지, 수소연료전지용 소재 엔지니어\n\n#### 정부 및 공공기관 분야\n- 산업통상자원부·중소벤처기업부 기술직 공무원\n- 국가기술표준원\n- 국방과학연구소\n- 한국화학융합시험연구원\n\n#### 학계 및 연구기관 분야\n- 한국과학기술연구원(KIST)\n- 한국재료연구원(KIMS)\n- 한국전자통신연구원(ETRI)\n- 한국생산기술연구원\n- 대기업 부설연구소\n\n#### 기술사업화·융합 분야\n- 특허 및 기술사업화 전문가\n- 신소재 기반 스타트업 창업자\n- 첨단소재 데이터 기반 분석가 - 나노신소재공학과\n- 신소재시스템공학과\n- 화학신소재학과\n- 융합신소재공학과\n- 화공신소재공학과\n- 에너지신소재공학과"},{"kind":"department","id":"dept_실용음악과","name":"실용음악과","text":"실용음악과 대중음악을 중심으로 보컬, 악기 연주, 작곡, 싱어송라이터, 컴퓨터 음악, 프로듀싱, 음향 디자인 등을 배우며 음악 콘텐츠를 창작하고 표현하는 학과입니다. 예술·체육 분야 · 예술 계열 실용음악과는 보컬, 기타, 베이스, 드럼, 건반 등 연주 분야와 작곡, 편곡, 프로듀싱, MIDI, 녹음, 믹싱 등 제작 분야를 함께 다룹니다. 음악 기초 이론을 바탕으로 대중음악 트렌드와 공연·녹음 현장의 실무를 배우며, 무대와 디지털 음악 제작 환경에서 활동할 수 있는 역량을 기릅니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 실용음악이론, 대중음악사, 시창·청음, 리듬 트레이닝을 통해 음악의 기초를 배웁니다.\n- 전공 실기, 재즈화성학, 합주(앙상블), 작·편곡을 통해 연주와 창작 능력을 기릅니다.\n\n#### 전공 심화와 분석\n- MIDI와 DAW를 활용해 디지털 음악 제작 과정을 익힙니다.\n- 레코딩, 믹싱·마스터링, 음악 프로듀싱, 무대 실습을 통해 실제 음악 제작과 공연 현장을 경험합니다.\n\n#### 실무·응용·융합\n- 보컬, 악기, 작곡, 프로듀싱, 음향 기술을 결합해 자신만의 음악 콘텐츠를 기획하고 제작합니다.\n- 개인 창작뿐 아니라 합주와 협업을 통해 무대와 음원 제작 과정을 이해합니다. 화법과 언어 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 사회와 문화 음악 주제 탐구 독서 심화 영어 법과 사회 윤리와 사상 음악 연주와 창작 음악 감상과 비평 매체 의사소통 세계 문화와 영어 여행지리 음악과 미디어 - 음악적 재능과 함께 자신을 적극적으로 표현하고 싶은 학생\n- 노래, 악기 연주, 작곡 중 하나 이상을 꾸준히 깊게 해 보고 싶은 학생\n- DAW, MIDI, 녹음, 음향, 편집 등 디지털 음악 제작에 관심이 있는 학생\n- 다양한 대중음악 장르와 음악 콘텐츠 기획에 흥미가 있는 학생 #### 연주·창작 분야\n- 대중가수\n- 전문 연주자(세션)\n- 싱어송라이터\n- 작곡가·편곡가\n- 음악 프로듀서\n\n#### 음악 산업 분야\n- 음반 기획자\n- 연예 기획사 관련 직무\n- 방송사 음악 관련 직무\n\n#### 교육 분야\n- 실용음악 학원 강사\n- 방과후학교 강사\n- 개인 레슨 교사 - 공연예술학부 실용음악전공\n- 문화예술학부 실용음악전공\n- 실용음악학과\n- 실용음악학부\n- 음악학과 실용음악전공\n- 현대실용음악학과\n- 뮤지컬·실용음악학과\n- K-POP학과\n- K-POP학부"},{"kind":"department","id":"dept_심리학과","name":"심리학과","text":"심리학과 사람의 마음과 행동을 과학적으로 연구하고, 개인과 사회의 문제를 이해하고 해결하는 방법을 배우는 학과입니다. 사회 분야 · 사회과학 계열 심리학과는 사람이 왜 그렇게 생각하고 느끼고 행동하는지를 이론, 실험, 관찰, 통계, 상담, 검사 등을 통해 체계적으로 탐구합니다. 개인의 삶뿐 아니라 상담, 임상, 교육, 조직, 소비, 범죄, 환경, 미디어, 인공지능과 인간공학까지 다양한 분야에서 사람을 이해하는 지식이 활용됩니다. ### 주요 학습 영역\n\n#### 마음과 행동의 기초\n- 발달심리학, 인지심리학, 성격심리학, 정서심리학, 학습심리학, 언어심리학을 통해 인간의 성장, 사고, 감정, 성격, 학습 과정을 배웁니다.\n\n#### 개인과 사회의 관계 이해\n- 사회심리학, 조직심리학, 산업심리학, 소비자심리학, 커뮤니케이션심리학, 환경심리학을 통해 타인과 집단, 문화, 조직이 행동에 미치는 영향을 학습합니다.\n\n#### 상담·임상·치료 분야\n- 이상심리학, 임상심리학, 상담심리학, 심리검사, 응용발달심리학, 범죄심리학을 통해 심리적 어려움을 이해하고 도울 수 있는 이론과 방법을 배웁니다.\n\n#### 연구와 데이터 분석\n- 심리학연구법, 심리통계학, 실험설계, 인지과정 및 실험, 신경과학, 인간공학의 심리학을 통해 이론을 실험과 통계로 검증하는 방법을 익힙니다. 인간과 심리 사회와 문화 현대사회와 윤리 확률과 통계 생명과학 독서와 작문 영어 독해와 작문 주제 탐구 독서 영미 문학 읽기 윤리와 사상 인문학과 윤리 교육의 이해 역사로 탐구하는 현대 세계 사회문제 탐구 윤리문제 탐구 - 사람의 마음과 행동이 왜 그렇게 나타나는지 궁금한 학생\n- 다른 사람의 감정을 이해하고 공감하는 학생\n- 상담, 교육, 사회 문제, 조직, 소비자 행동에 관심이 있는 학생\n- 실험과 통계를 통해 이론을 검증하는 과학적 탐구도 해보고 싶은 학생 #### 상담·복지·치료 분야\n- 상담전문가\n- 직업상담사\n- 정신건강상담전문가\n- 스포츠심리상담사\n- 놀이치료사\n- 미술치료사\n- 임상심리사\n- 중독치료사\n- 아동발달전문가\n\n#### 연구·데이터 분석 분야\n- 심리학연구원\n- 사회과학연구원\n- 산업심리전문가\n- 감성인식기술전문가\n- 빅데이터 분석 전문가\n\n#### 조직·소비자·기획 분야\n- 마케팅사무원\n- 미디어콘텐츠 제작자\n- 경영컨설턴트\n- 게임기획자\n- 취업지원관 - 뇌·인지과학전공\n- 명상치료학과\n- 심리치료학부\n- 아동보육상담학과\n- 재활상담심리학과\n- 사회심리학과\n- 예술심리치료전공"},{"kind":"department","id":"dept_아동학과","name":"아동학과","text":"아동학과 아동의 발달 과정과 교육 이론을 바탕으로 영유아 보육, 교육, 발달, 상담 분야의 전문가를 기르는 학과입니다. 사회 분야 · 사회과학 계열 아동학과는 아동의 신체·인지·정서·사회성 발달을 이해하고, 보육과 교육, 상담, 복지 현장에서 아동을 지원하는 방법을 배웁니다. 아동 인권 보장과 아동 문제 해결을 위해 이론 학습과 현장 실습을 연결하며, 아동과 가족을 둘러싼 사회적 환경까지 함께 다룹니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 사회복지개론, 사회복지실천론, 사회복지조사방법론, 사회복지발달사를 통해 아동과 가족을 지원하는 복지의 기초를 배웁니다.\n- 정신건강론, 아동복지론, 유아교육개론, 연구방법론을 통해 아동 발달과 교육·복지 연구의 기본 개념을 익힙니다.\n\n#### 전공 심화와 분석\n- 상담심리, 가족관계와 가족상담치료, 특수아동지도, 청소년심리 및 상담을 통해 아동과 가족의 심리·상담 영역을 이해합니다.\n- 언어재활치료, 가족복지론, 영유아발달, 아동권리와 복지, 유아교육과정, 아동관찰 및 행동연구를 통해 발달과 교육 현장을 심화 학습합니다.\n\n#### 실무·응용·융합\n- 사회복지행정론, 가족정책론, 언어지도, 건강가족론을 통해 아동과 가족 지원을 제도와 현장 실천으로 연결합니다. 독서와 작문 영어 독해와 작문 현대사회와 윤리 사회와 문화 주제 탐구 독서 영미 문학 읽기 정치 법과 사회 역사로 탐구하는 현대 세계 사회문제 탐구 윤리문제 탐구 - 아동의 심리와 사회적 상호작용을 이해하고 싶은 학생\n- 창의적 문제 해결력을 갖추고 다른 사람을 돕는 일에 가치를 두는 학생\n- 아동의 권리와 복지, 사회적 약자 지원에 관심이 있는 학생\n- 어린이 교육 이론과 실습을 통해 유치원 교사, 보육교사 등으로 일하고 싶은 학생 #### 사회복지·상담 분야\n- 보육교사 및 보육사\n- 사회복지사\n- 청소년지도사\n- 사회단체활동가\n- 직업상담사\n- 아동발달전문가\n- 병원아동생활전문가\n- 아동학대예방 및 치료 전문요원\n- 아동진술분석전문가\n\n#### 교육·개발 분야\n- 유치원 교사\n- 소년원학교 교사\n- 난독증·학습장애 지도사\n- 아동용 소프트웨어 개발자\n\n#### 치료·문화 콘텐츠 분야\n- 놀이치료사\n- 미술치료사\n- 음악치료사\n- 아동공연기획자\n- 아동출판물기획자\n- 아동미디어콘텐츠개발자 - 아동청소년학과\n- 아동보육전공\n- 아동학전공\n- 영유아발달치료 융합전공\n- 영유아보육학전공"},{"kind":"department","id":"dept_약학과","name":"약학과","text":"약학과 약물이 몸에서 어떻게 작용하는지 이해하고, 약의 개발·제조·활용·관리까지 배우며 건강 증진과 질병 치료에 기여하는 학과입니다. 보건·의약학 분야 · 의약학 계열 약학과는 약을 조제하는 방법만 배우는 학과가 아니라, 약물이 어떤 원리로 만들어지고 몸 안에서 어떻게 작용하며 어떤 방식으로 안전하게 사용되어야 하는지를 과학적으로 배웁니다. 화학, 생명과학, 의학이 깊게 연결된 융합 학문이며, 신약 개발, 약물 치료, 제약 산업, 임상 현장, 지역 약국, 공공 보건까지 다양한 분야로 확장됩니다. ### 주요 학습 영역\n\n#### 약학을 위한 기초과학\n- 일반화학, 유기화학, 생물학, 의약통계를 통해 약물과 생명 현상을 이해하는 기초를 다집니다.\n\n#### 공통약학\n- 약물치료학, 약물학, 제제학, 생약학을 통해 약물이 질병 치료에 사용되는 방식과 약의 형태, 천연물 기반 약물의 활용을 배웁니다.\n\n#### 임상약학\n- 임상화학, 임상약동학, 의약정보학을 통해 환자에게 약물이 실제로 적용되는 과정과 약물 농도, 작용, 부작용, 정보 관리를 학습합니다.\n\n#### 산업약학과 실무\n- 제약산업학, 바이오의약품학, 신약개발을 통해 제약 산업과 신약 연구를 이해합니다.\n- 지역약국 실습, 의료기관 실습, 제약산업 실습을 통해 실제 현장 업무를 경험합니다. 화학 생명과학 화학 반응의 세계 세포와 물질대사 생물의 유전 보건 확률과 통계 현대사회와 윤리 대수 미적분Ⅰ 물리학 기하 미적분Ⅱ 물질과 에너지 법과 사회 과학의 역사와 문화 융합과학 탐구 기후변화와 환경생태 - 생명과학, 화학, 의학 관련 학문에 관심이 있는 학생\n- 약물이 몸에 작용하는 원리를 깊이 이해하고 싶은 학생\n- 신약 개발이나 제약 산업에 관심이 있는 학생\n- 사람의 건강 증진과 질병 치료에 기여하고 싶은 학생\n- 세밀한 관찰력과 분석적 사고를 가진 학생\n- 윤리적 직업의식과 책임감을 중요하게 생각하는 학생 #### 약사 및 임상 분야\n- 약사\n- 개국 약사\n- 병원 약사\n- 전문 약사\n- 공공 약사\n\n#### 제약 연구와 개발 분야\n- 제약회사 연구원\n- 신약개발연구원\n- 바이오의약품 연구\n- 약물 평가 연구\n\n#### 품질관리와 의약품 정보 분야\n- 의약품 품질관리 및 평가 업무\n- 의약정보 관련 업무\n- 임상약학 관련 업무 - 미래산업약학전공\n- 제약학과"},{"kind":"department","id":"dept_언어_교과_교육과","name":"언어 교과 교육과","text":"언어 교과 교육과 국어·영어·중국어·일본어 등 언어 교과를 효과적으로 가르칠 수 있는 교사를 양성하고, 언어의 구조와 교수·학습 방법을 연구하는 학과입니다. 교육 분야 · 교육 계열 언어 교과 교육과는 언어의 구조와 특성을 이해하고, 이를 학교 교육 현장에서 학생들에게 효과적으로 가르치는 방법을 배웁니다. 문법, 음운, 의미, 읽기·쓰기·말하기 교육뿐 아니라 교과 교육론, 교수·학습 방법, 평가, 교육 실습을 통해 언어 교사로서의 전문성을 기릅니다. 최근에는 디지털 교육 환경과 AI 기반 학습 도구를 고려한 언어 교육 역량도 중요해지고 있습니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 각 언어별 언어학 개론, 언어 문법론, 음운론, 의미론을 통해 언어 구조의 기초를 배웁니다.\n- 언어교육론과 교과 교육론을 통해 언어 교과를 가르치는 기본 관점을 익힙니다.\n- 각 언어별 문법 교육론과 의미 교육론을 통해 언어 지식을 교육 내용으로 구성하는 방법을 학습합니다.\n\n#### 전공 심화와 분석\n- 통사론을 통해 문장 구조와 언어 체계를 심화해서 이해합니다.\n- 언어 교수 학습론, 교육평가론, 교육실습을 통해 수업 설계와 평가, 실제 교육 현장 경험을 연결합니다.\n\n#### 실무·응용·융합\n- 디지털 교육 환경, 다문화·국제화 환경, AI 입니다. 예술·체육 분야 · 예술 계열 음악교육과는 음악을 잘 연주하고 이해하는 능력뿐 아니라, 학생들에게 음악을 효과적으로 가르치는 교수 능력을 함께 기릅니다. 음악교육론, 실기, 국악, 성악, 피아노, 화성학, 음악사, 교재 연구, 교육 실습 등을 통해 음악 교사와 음악교육 전문가로 성장할 수 있는 기반을 다집니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 음악교육론, 시창·청음, 국악 개론, 음악 이론을 통해 음악교육의 기초와 음악적 기본기를 배웁니다.\n- 국악 실기, 화성학, 성악 실기, 피아노 실기를 통해 다양한 음악 표현 능력을 기릅니다.\n\n#### 전공 심화와 분석\n- 교실 악기 및 현악 실기, 국악·성악 실기를 통해 학교 음악 수업에서 필요한 실기 역량을 기릅니다.\n- 음악교육방법론, 음악과 교재연구, 음악(국악)교수법, 음악교육 실습세미나를 통해 수업 설계와 교수법을 익힙니다.\n- 음악과 논술, 합창, 음악 전공 실기를 통해 표현과 평가, 지도 능력을 심화합니다.\n\n#### 실무·응용·융합\n- 서양 음악사, 피아노 반주법, 음악 분석 및 형식론, 장구 반주법, 합창 지휘법, 악기론을 통해 음악을 해석하고 수업에 적용하는 능력을 기릅니다. 화법과 언어 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 사회와 문화 음악 주제 탐구 독서 심화 영어 법과 사회 윤리와 사상 음악 연주와 창작 음악 감상과 비평 교육의 이해 매체 의사소통 세계 문화와 영어 여행지리 음악과 미디어 - 음악을 가르치고 나누는 데 보람과 흥미를 느끼는 학생\n- 음악 이론, 실기, 교육 전반에 균형 잡힌 관심이 있는 학생\n- 책임감 있고 배려심이 있으며 교육자로서의 소양을 갖춘 학생\n- 학교 음악 교사나 음악교육 전문가를 꿈꾸는 학생 #### 학교·교육 분야\n- 중·고등학교 음악 교사\n- 예술 강사\n- 방과후학교 지도사\n- 음악 학원 강사\n- 개인 레슨 교사\n\n#### 음악교육 콘텐츠 분야\n- 음악교육 콘텐츠 기획자\n- 교재·교구 개발자\n\n#### 상담·연구 분야\n- 음악 치료사\n- 음악 관련 교육 상담사\n- 음악교육 관련 대학원 진학 및 연구자 - 음악교육과\n- 예술교육 관련 학과\n- 음악학과 교육 관련 전공"},{"kind":"department","id":"dept_응급구조학과","name":"응급구조학과","text":"응급구조학과 응급 상황에서 생명을 보호하기 위해 환자를 구조하고 신속하고 정확한 응급처치를 수행하는 전문가를 기르는 학과입니다. 보건·의약학 분야 · 보건 계열 응급구조학과는 사고나 질병으로 긴급한 처치가 필요한 사람을 돕는 학과입니다. 응급환자를 평가하고 필요한 처치를 시행하며, 안전하게 이송하고 관리하는 능력을 배웁니다. 응급 상황에서는 지식뿐 아니라 빠른 판단, 침착함, 체력, 책임감이 중요하며 인체와 질병, 구조 활동, 소생술, 외상 처치, 법규와 공중보건까지 폭넓게 다룹니다. ### 주요 학습 영역\n\n#### 인체와 응급의학 기초\n- 일반생물학, 병리학, 생리학, 해부학을 통해 응급 상황을 이해하는 의학 기초를 배웁니다.\n- 공중보건학과 소방법규를 통해 응급의료와 구조 활동의 제도적 배경을 이해합니다.\n\n#### 응급처치와 구조 기술\n- 외상응급처치학, 환경응급처치학, 정형외과처치학, 신경외과처치학, 외과처치술을 통해 응급환자에게 필요한 처치와 구조 기술을 배웁니다.\n\n#### 전문 소생술과 구조 활동\n- 전문심장소생술, 전문소아소생술, 수상인명구조를 통해 심정지, 소아 응급, 수상 사고처럼 긴급하고 전문적인 상황에 대응하는 방법을 학습합니다. 보건 생명과학 세포와 물질대사 생물의 유전 법과 사회 화학 현대사회와 윤리 과학의 역사와 문화 대수 미적분Ⅰ 확률과 통계 - 긴박한 상황에서도 침착하게 대응할 수 있는 학생\n- 빠른 판단력과 책임감을 갖춘 학생\n- 체력 관리를 잘하고 구조 활동에 관심이 있는 학생\n- 인체 생명과학과 응급처치 지식에 흥미가 있는 학생\n- 사람의 생명을 직접 돕는 일에 의미를 느끼는 학생 #### 응급 구조와 소방 분야\n- 응급구조사\n- 소방관\n- 소방관리자\n- 인명구조원\n\n#### 산업·보건 분야\n- 산업체 보건 부서\n- 산업 응급구조사\n\n#### 응급 안전관리 분야\n- 응급 안전관리 관련 직무 - 산업보건응급구조학과\n- 응급구조과"},{"kind":"department","id":"dept_의류학과","name":"의류학과","text":"의류학과 의복의 재료, 디자인, 제작, 유통, 소비 등 의류 산업 전반을 배우고 패션 및 섬유 산업과 연결하는 학과입니다. 자연 분야 · 생활과학 계열 의류학과는 섬유와 의복 재료, 패션 디자인, 의복 제작, 패션 유통과 소비, 의류 상품 기획 등 의류 산업의 전 과정을 배웁니다. 의생활 환경과 패션 문화를 이해하고, 미적 감각과 과학적 소재 이해를 바탕으로 패션 및 섬유 산업에서 활용할 수 있는 역량을 기릅니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 한국복식사, 서양복식사를 통해 의복과 패션의 역사와 문화를 배웁니다.\n- 의류소재, 섬유학을 통해 의복 재료의 특성과 활용을 이해합니다.\n- 패션일러스트레이션, 색채와 패션, 의복구성원리, 패션디자인기초를 통해 디자인과 제작의 기초를 익힙니다.\n\n#### 전공 심화와 분석\n- 직물학, 섬유과학, 피복재료학을 통해 소재를 심화해서 분석합니다.\n- 의상심리, 의복구성, 의상디자인, 의류산업론, 의류상품학, 패션마케팅을 통해 의복과 소비자, 산업 구조를 이해합니다.\n- 복식염색을 통해 소재와 색채 표현을 배웁니다.\n\n#### 실무·응용·융합\n- 의복구성실습, 텍스타일디자인, 패션미학, 패션머천다이징, 소재기획, 입체재단을 통해 패션 제품 기획과 제작 실무를 경험합니다. 대수 미적분Ⅰ 확률과 통계 사회와 문화 세계사 화학 생명과학 정보 미적분Ⅱ 물질과 에너지 화학 반응의 세계 실용 통계 - 섬유 소재, 패션 흐름, 유행, 의복에 관심이 많은 학생\n- 미적 감각과 창의력이 뛰어나며 색감과 조화미에 대한 안목이 있는 학생\n- 컴퓨터 및 관련 소프트웨어 프로그램을 다룰 수 있는 학생 #### 공학 기술직 분야\n- 섬유공학기술자\n- 스마트웨어전문가\n- 의류기술자\n- 의류품질관리전문가\n- 의류생산관리자\n\n#### 디자인 분야\n- 패션디자이너\n- 한복디자이너\n- 가방디자이너\n- 신발디자이너\n- 무대의상디자이너\n- 패션일러스트레이터\n\n#### 영업·판매 분야\n- 의류판매원\n- 홈쇼핑 MD\n- 의류매장 관리자\n- 패션바이어\n- 브랜드매니저\n- 온라인쇼핑몰 운영자\n- 패션마케터\n\n#### 교육·연구·컨설팅 분야\n- 패션 관련 강사\n- 패션연구원\n- 패션컨설턴트 - 외식의류학부\n- 의류산업학과\n- 의류패션학과\n- 의류환경학과\n- 의상학과\n- 패션산업학과"},{"kind":"department","id":"dept_의예과","name":"의예과","text":"의예과 인간의 생명과 건강을 깊이 이해하고, 질병의 예방과 치료를 통해 사람과 사회에 기여하는 의학 인재를 준비하는 학과입니다. 보건·의약학 분야 · 의약학 계열 의예과는 의사가 되기 위한 긴 학습 과정의 출발점입니다. 사람의 몸과 질병을 과학적으로 이해하고, 환자를 대하는 윤리의식과 책임감, 봉사정신을 함께 기릅니다. 의학은 생명과학, 화학, 물리, 통계, 정보, 윤리, 사회 이해가 모두 연결되는 분야이며, 기초과학을 바탕으로 인체 구조와 기능, 질병의 원리, 치료 방법, 보건의료 체계를 단계적으로 배웁니다. 의예과와 본과를 포함한 과정을 마친 뒤 의사 국가시험 응시 자격이 주어집니다. ### 주요 학습 영역\n\n#### 의학을 위한 기초과학\n- 일반화학, 생명물리학, 물리화학, 유기화학을 통해 의학에 필요한 기초과학을 배웁니다.\n- 인체유전학, 세포생물학, 분자생물학을 통해 생명 현상과 인체의 기본 원리를 이해합니다.\n\n#### 인체 계통과 임상 의학\n- 감염학, 혈액학, 신경과학, 내분비학, 호흡기학, 소화기학, 순환기학을 통해 인체의 주요 계통과 질병을 배웁니다.\n- 일반외과학, 응급의학, 정신과학, 산부인과학, 소아과학을 통해 다양한 임상 영역을 이해합니다.\n\n#### 의학 연구와 보건의료 시스템\n- 의학개론, 의료정보학개론, 의학통계학, 의공학을 통해 의학 연구와 기술 활용을 배웁니다.\n- 의료윤리학, 역학, 의료관리학, 임상약리학, 의학교육학, 법의학을 통해 의료 제도와 윤리, 공중보건을 이해합니다. 생명과학 화학 세포와 물질대사 생물의 유전 물리학 확률과 통계 현대사회와 윤리 법과 사회 대수 미적분Ⅰ 기하 미적분Ⅱ 물질과 에너지 화학 반응의 세계 과학의 역사와 문화 융합과학 탐구 기후변화와 환경생태 - 의학에 진지한 관심과 열정이 있는 학생\n- 생명과학, 화학, 물리 등 다양한 학문적 경험을 즐길 수 있는 학생\n- 사람을 돕고 돌보는 일에 깊은 의미를 느끼는 학생\n- 긴 학습 과정과 많은 학습량을 감당할 끈기와 성실함이 있는 학생\n- 과학적 탐구심과 윤리의식을 함께 갖추고 싶은 학생 #### 임상 진료 분야\n- 병원 진료\n- 전문 진료 분야\n- 응급의료\n- 정신건강\n- 소아·산부인과 등 다양한 임상 영역\n\n#### 연구·교육 분야\n- 의학 연구\n- 기초의학 연구\n- 임상 연구\n- 의학교육\n\n#### 보건 정책과 공공의료 분야\n- 보건 분야 정책 전문가\n- 공공의료 관련 직무\n- 역학과 감염병 관리\n- 의료관리와 보건의료 제도 관련 직무"},{"kind":"department","id":"dept_인공지능학과","name":"인공지능학과","text":"인공지능학과 수학, 통계, 컴퓨터공학을 기반으로 머신러닝, 딥러닝, 자연어 처리, 컴퓨터 비전 등을 배우며 AI 문제 해결 역량을 기르는 학과입니다. 공학 분야 · 정보·컴퓨터 계열 인공지능학과는 데이터를 분석하고 모델을 학습시켜 예측, 분류, 생성, 판단을 수행하는 인공지능 기술을 배웁니다. 수학과 통계, 프로그래밍, 알고리즘, 컴퓨터 시스템의 기초를 바탕으로 머신러닝, 딥러닝, 자연어 처리, 컴퓨터 비전, 강화학습 등 다양한 AI 분야를 다룹니다. ### 주요 학습 영역\n\n#### 전공 기초 이해\n- 프로그래밍 기초, 자료구조, 이산수학, 선형대수학, 확률과 통계를 통해 AI 학습에 필요한 수학·컴퓨터 기초를 다집니다.\n- 머신러닝 기초, 데이터베이스, 알고리즘을 통해 데이터를 처리하고 학습 모델을 만드는 기본 원리를 배웁니다.\n\n#### 전공 심화와 분석\n- 컴퓨터구조, 소프트웨어공학을 통해 AI 시스템이 작동하는 기술 기반을 이해합니다.\n- 딥러닝, 자연어 처리, 컴퓨터 비전, 강화학습, 빅데이터 분석, 인공지능 응용, 로봇공학을 통해 AI 기술을 심화 학습합니다.\n\n#### 실무·응용·융합\n- 데이터 마이닝과 고급 머신러닝을 통해 실제 데이터에서 패턴을 발견하고 예측 모델을 설계합니다.\n- 인공지능 윤리를 통해 AI 기술의 사회적 영향과 책임 있는 활용을 함께 고민합니다. 대수 확률과 통계 미적분Ⅰ 영어Ⅰ 영어Ⅱ 영어 독해와 작문 물리학 생명과학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 인공지능 기초 실용 통계 수학과제 탐구 사회문제 탐구 윤리문제 탐구 - AI, 로봇, 자율주행 등 첨단 기술이 어떻게 작동하는지 배우고 싶은 학생\n- 데이터를 분석하고 패턴을 찾는 과정에 흥미가 있는 학생\n- AI 기술로 사회 문제 해결에 기여해 보고 싶은 학생\n- 수학, 특히 확률·통계와 선형대수에 흥미가 있는 학생 #### 기업 및 산업체 분야\n- 인공지능 개발 및 서비스 회사\n- 시스템 소프트웨어 개발 회사\n- 게임 개발 회사\n- 모바일 웹 및 앱 개발 회사\n- 정보 시스템 운영 및 개발 회사\n- 정보 통신 및 네트워크 관련 회사\n- 무인 자동차 개발 회사\n- 컴퓨터 및 IT 분야 회사\n\n#### 학계 및 연구기관 분야\n- 한국전자통신연구원\n- 정보통신정책연구원\n- 공공 및 민간 AI 연구기관\n\n#### 정부 및 공공기관 분야\n- 과학기술정보통신부 등 정부·지방자치단체 공무원\n- 생물학, 진단세포학, 임상혈액학, 조직검사학, 임상생화학, 임상화학을 통해 혈액, 세포, 조직, 미생물 등 다양한 검체를 분석하는 방법을 배웁니다.\n\n#### 면역·생리와 검사 장비\n- 면역학, 인체생리학을 통해 질병과 면역 반응, 인체 기능을 이해합니다.\n- 검사기기분석학, 핵의학을 통해 검사 장비와 특수 검사 원리를 학습합니다. 생명과학 화학 세포와 물질대사 생물의 유전 화학 반응의 세계 보건 확률과 통계 물질과 에너지 대수 미적분Ⅰ 물리학 현대사회와 윤리 법과 사회 과학의 역사와 문화 - 생명과학과 화학 분야에 흥미가 있는 학생\n- 실험과 분석 업무를 꼼꼼하게 수행하는 것을 좋아하는 학생\n- 작은 차이를 관찰하고 정확하게 기록하는 능력이 있는 학생\n- 검사 결과가 환자의 진단과 치료에 영향을 준다는 책임감을 가진 학생\n- 보건의료 분야에서 과학적 데이터를 다루고 싶은 학생 #### 의료 검사 분야\n- 임상병리사\n- 병리분석가\n- 병원 검사실 관련 업무\n\n#### 연구·실험 분야\n- 생명과학시험원\n- 보건환경연구원\n- 임상연구코디네이터\n\n#### 의생명 연구 분야\n- 의생명 연구 관련 직무 - 임상병리과"},{"kind":"department","id":"dept_자동차공학과","name":"자동차공학과","text":"자동차공학과 자동차의 기계 구조, 전기·전자 시스템, 자율주행, 전기차 기술을 함께 배우며 미래 모빌리티를 설계하고 개발하는 학과입니다. 공학 분야 · 기계·전기·전자 계열 자동차공학과는 내연기관 자동차뿐 아니라 하이브리드, 전기차, 수소차, 자율주행차 등 다양한 이동 수단을 이해하고 설계하는 분야입니다. 기계공학, 전기·전자공학, 정보·인공지능 기술이 함께 필요하며, 자동차를 하나의 복합 시스템으로 보고 문제를 해결하는 능력을 기릅니다. ### 주요 학습 영역\n\n#### 기계·전기·전자 기초\n- 미분적분학, 일반물리학, 대학수학을 통해 공학 계산과 물리 원리를 배웁니다.\n- 공학입문, 기초기계공학, 전기전자기초를 통해 자동차 시스템을 이해하는 기본 지식을 익힙니다.\n- C프로그래밍과 논리회로를 통해 차량 제어와 소프트웨어 기초를 배웁니다.\n\n#### 자동차 시스템과 제어\n- 정역학, 재료역학, 열역학을 통해 차량 구조와 에너지 변환 원리를 이해합니다.\n- 융합기초전자공학, 스마트카전자제어, 차량네트워크(CAN 통신)를 통해 차량 내부의 전자 제어 시스템을 학습합니다.\n- 제어공학, 자동차센서공학을 통해 자동차의 움직임과 상태를 측정하고 제어하는 방법을 배웁니다.\n\n#### 미래 모빌리티와 자율주행\n- 자율주행시스템실습, 자율주행알고리즘, 딥러닝 기반 자율주행을 통해 자율주행 기술의 기본 흐름을 익힙니다.\n- 자동차AI소프트웨어와 미래차 인공지능 응용을 통해 인공지능이 모빌리티에 적용되는 방식을 탐구합니다.\n- 전기자동차설계와 전기구동시스템을 통해 전기차 구동 원리와 설계 요소를 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 인공지능 기초 - 자율주행차, 전기차, 드론 등 스마트 모빌리티 기술에 관심이 많고, 미래 교통 산업을 이끌고 싶은 학생\n- 자동차에 관심이 있고 이와 관련된 전기, 기계, 화학, 전자 등 다양한 분야에 호기심이 있는 학생\n- 자동차와 관련된 다양한 문제를 논리적으로 생각하는 논리력과 창의적으로 문제 해결방법을 찾을 수 있는 학생 #### 자동차 설계·개발 분야\n- 자동차 설계 엔지니어\n- 자동차 연구원\n- 차량 성능 평가 엔지니어\n\n#### 자율주행·인공지능 분야\n- 자율주행 엔지니어\n- 알고리즘 개발자\n- AI 엔지니어\n\n#### 전기차·전장 시스템 분야\n- 배터리 엔지니어\n- 전장 설계 엔지니어\n- 임베디드 개발자\n\n#### 정비·모빌리티 서비스 분야\n- 자동차 정비 기술자\n- 진단 엔지니어\n- 모빌리티 서비스 기획자 - 스마트운행체공학과\n- 스마트ICT융합공학과\n- 미래모빌리티학과\n- 미래자동차공학과\n- 스마트모빌리티공학과\n- 지능형드론융합전공\n- 지능형모빌리티융합학과\n- 자율운항시스템공학과\n- 스마트자동차학과\n- 자동차IT융합학과"},{"kind":"department","id":"dept_작곡과","name":"작곡과","text":"작곡과 음악 이론과 작곡 기법을 바탕으로 선율, 화성, 편곡, 전자음악 등을 배우며 창의적인 음악을 만드는 학과입니다. 예술·체육 분야 · 예술 계열 작곡과는 음악을 듣고 연주하는 데서 나아가 새로운 음악을 직접 만들어내는 능력을 기르는 분야입니다. 화성학, 대위법, 관현악법 같은 전통 작곡 기초와 전자음악, 컴퓨터 음악 등 현대 매체 기반의 창작 방법을 함께 다루며, 자신의 음악적 아이디어를 악보와 사운드로 구체화하는 과정을 배웁니다. ### 주요 학습 영역\n\n#### 작곡 이론과 음악 기초\n- 전공 실기와 작곡 실기를 통해 음악적 아이디어를 실제 작품으로 발전시키는 방법을 배웁니다.\n- 화성학, 대위법, 악기론, 관현악법을 통해 음악의 구조와 악기별 표현 방식을 이해합니다.\n- 시창·청음과 음악 통론을 통해 음악을 듣고 분석하고 표현하는 기초 능력을 기릅니다.\n\n#### 음악사와 작곡 분석\n- 서양 음악사와 20세기 음악사를 통해 시대별 작곡 양식과 음악적 흐름을 이해합니다.\n- 현대 작곡 기법 및 분석을 통해 다양한 음악 언어와 표현 방식을 탐구합니다.\n- 지휘 실기와 연주 경험을 통해 작곡물이 실제 연주로 구현되는 과정을 이해합니다.\n\n#### 전자음악과 매체 활용\n- 전자음악 실기와 컴퓨터 음악 작곡을 통해 디지털 환경에서 사운드를 제작하는 방법을 배웁니다.\n- MIDI, 사운드 디자인, 미디어 음악 등 현대 음악 제작 환경과 연결되는 창작 역량을 기릅니다. 화법과 언어 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 사회와 문화 음악 주제 탐구 독서 심화 영어 법과 사회 윤리와 사상 음악 연주와 창작 음악 감상과 비평 매체 의사소통 세계 문화와 영어 여행지리 음악과 미디어 - 창의적인 아이디어로 음악을 직접 만들어보고 싶은 학생\n- 음악 이론과 구조에 깊은 관심을 가진 학생\n- 선율 창작, 화성, 편곡 등에 감각이 뛰어난 학생\n- 다양한 악기와 사운드로 자신만의 음악 세계를 표현하고 싶은 학생 #### 창작·제작 분야\n- 작곡가\n- 편곡가\n- 음악 프로듀서\n- MIDI 작·편곡자\n\n#### 미디어 음악 분야\n- 영화음악 작곡가\n- 광고음악 작곡가\n- 게임·미디어 음악 작곡가\n- 사운드 디자이너\n\n#### 음악 감독·교육 분야\n- 음악 감독\n- 음향 감독\n- 중·고등학교 음악교사\n- 대학교수 또는 강사 - 음악학부 작곡 전공\n- 음악학과 작곡 전공\n- 공연예술학부 작곡 전공\n- 뉴미디어 작곡과\n- 아트앤테크놀로지 작곡과\n- 작곡과 이론 전공\n- 작곡과 작곡 전공\n- 음악학과 작·편곡 전공"},{"kind":"department","id":"dept_재료공학과","name":"재료공학과","text":"재료공학과 물질의 구조와 성질을 이해하고 금속, 세라믹, 고분자, 반도체 등 다양한 재료를 설계·제조하는 학과입니다. 공학 분야 · 화학생명 계열 재료공학과는 물질의 미세 구조와 성질 사이의 관계를 분석하고, 산업에 필요한 재료를 개발하는 분야입니다. 물리, 화학, 수학을 바탕으로 재료의 구조, 열역학, 공정, 분석 방법을 배우며 반도체, 디스플레이, 에너지, 바이오 재료 등 다양한 응용 분야로 확장됩니다. ### 주요 학습 영역\n\n#### 재료 과학 기초\n- 일반물리학, 일반화학을 통해 재료를 이해하는 과학 기초를 다집니다.\n- 재료과학개론, 재료결정학, 물리금속학을 통해 재료의 구조와 성질을 배웁니다.\n- 재료열역학과 고체물리를 통해 재료 변화와 안정성을 이해합니다.\n\n#### 재료 설계와 분석\n- 재료설계학, 재료현미경분석, 재료역학을 통해 재료의 성능을 분석하고 설계하는 방법을 배웁니다.\n- 재료공정과 계산재료과학을 통해 재료 제조 과정과 예측·모델링 방법을 이해합니다.\n- 반도체공학, 디스플레이공학, 나노공학을 통해 첨단 재료의 활용 분야를 탐구합니다.\n\n#### 신소재 응용 분야\n- 에너지재료공학과 바이오재료공학을 통해 미래 산업과 연결되는 재료 기술을 배웁니다.\n- 금속, 세라믹, 고분자, 반도체 재료가 실제 산업에서 어떻게 쓰이는지 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 지구과학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 세포와 물질대사 수학과제 탐구 융합과학 탐구 - 눈에 보이지 않는 미세구조나 원자 수준의 세계를 이해하려는 탐구심과 집중력이 있는 학생\n- 실험과 데이터 분석에 흥미가 있고 실제 산업에 적용되는 과정에 관심이 있는 응용 지향적인 학생\n- 새로운 소재를 설계하거나 기존 재료를 개선하는 데 흥미가 있는 창의적 문제 해결력을 갖춘 학생 #### 기업 및 산업 분야\n- 반도체 재료 연구원\n- 디스플레이 분야 연구원\n- 소재 공정 엔지니어\n- 재료 물성 평가 담당자\n\n#### 연구기관 분야\n- 신소재 연구원\n- 재료 물성 평가 전문 연구원\n- 국가전략기술 연구원\n\n#### 공공·인증 분야\n- 산업통상자원부·과학기술정보통신부 기술직 공무원\n- 한국세라믹기술원\n- 한국화학융합시험연구원\n- 한국에너지기술평가원\n- 국제표준 및 기술인증 전문가 - 금속재료공학과\n- 유기재료공학과\n- 전자재료공학과\n- 나노신소재공학과\n- 신소재공학부\n- 디스플레이신소재공학과\n- 화공신소재공학과\n- 첨단신소재공학과\n- 반도체학부"},{"kind":"department","id":"dept_재활치료학과","name":"재활치료학과","text":"재활치료학과 신체적·정신적 기능 회복을 돕기 위해 재활 방법, 치료 기술, 상담과 직업재활을 배우는 학과입니다. 보건·의약학 분야 · 보건 계열 재활치료학과는 환자나 장애인이 일상생활로 복귀하고 사회에 참여할 수 있도록 돕는 전문성을 기르는 분야입니다. 인체 구조와 기능, 운동 원리, 재활 방법을 배우고, 물리치료·작업치료·직업재활·상담과 같은 영역을 통해 사람의 기능 회복과 적응을 지원하는 방법을 탐구합니다. ### 주요 학습 영역\n\n#### 인체와 재활 기초\n- 해부학, 일반생물학, 일반물리학을 통해 인체와 움직임의 기초를 배웁니다.\n- 운동역학을 통해 신체 움직임과 재활 운동의 원리를 이해합니다.\n- 장애총론을 통해 장애와 재활의 기본 개념을 익힙니다.\n\n#### 심리·상담과 직업재활\n- 발달심리학, 이상심리학, 발달정신병리학을 통해 재활 대상자의 심리와 발달 특성을 이해합니다.\n- 직업재활개론, 직업재활상담, 상담이론과 실제를 통해 사회 복귀와 직업 적응을 지원하는 방법을 배웁니다.\n- 직업적응훈련과 정서장애교육을 통해 실제 지원 장면에서 필요한 실무 지식을 익힙니다.\n\n#### 치료 방법과 실무 적용\n- 특수치료와 직업재활방법론을 통해 대상자에게 맞는 재활 방법을 선택하고 적용하는 역량을 기릅니다.\n- 재활 도구와 다양한 치료 접근을 활용해 신체적·정신적 기능 회복을 돕는 과정을 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 현대사회와 윤리 세포와 물질대사 생물의 유전 법과 사회 스포츠 과학 인간과 심리 보건 과학의 역사와 문화 융합과학 탐구 - 환자의 신체 및 정신적 어려움을 지원하며 치료에 기여한다는 사명감을 갖추고 타인에게 도움 주기를 좋아하는 학생\n- 신체 운동의 원리와 재활을 배우고 싶어하는 운동과 건강에 관심이 많은 학생\n- 인체 구조와 생리를 깊이 이해하고 이를 기반으로 치료 활동을 하고자 하는 의학적 접근을 선호하는 학생 #### 재활치료 분야\n- 재활치료 관련 전문가\n- 작업치료 관련 직무\n- 물리치료 관련 직무\n\n#### 상담·직업재활 분야\n- 직업재활상담 관련 직무\n- 재활 상담 분야\n- 장애인 직업 적응 지원 분야\n\n#### 청능·특수치료 분야\n- 청능사 또는 청능치료사\n- 특수치료 관련 직무 - 재활공학과\n- 언어재활과\n- 언어치료학과\n- 직업재활학과\n- 스포츠재활학과\n- 작업치료학과\n- 재활치료학부\n- 스포츠과학부 운동재활 전공"},{"kind":"department","id":"dept_전기공학과","name":"전기공학과","text":"전기공학과 전기에너지, 전력 시스템, 전기기기, 제어, 스마트그리드와 전기차 충전 인프라를 다루는 학과입니다. 공학 분야 · 기계·전기·전자 계열 전기공학과는 전기에너지를 생산하고 전달하며 안전하고 효율적으로 사용하는 기술을 배우는 분야입니다. 회로, 전자기학, 제어, 전력전자, 전력 시스템을 기초로 하며, 신재생에너지, 스마트그리드, 전기차 인프라 같은 미래 에너지 기술과도 연결됩니다. ### 주요 학습 영역\n\n#### 전기회로와 전자기 기초\n- 전기회로, 회로이론을 통해 전류와 전압, 회로 분석의 기본 원리를 배웁니다.\n- 전자기학과 전자기장을 통해 전기·자기 현상과 전력 전달 원리를 이해합니다.\n- 디지털회로와 신호 및 시스템을 통해 전기 신호를 분석하고 처리하는 기초를 익힙니다.\n\n#### 전력·제어 시스템\n- 자동제어와 제어공학을 통해 시스템을 원하는 상태로 조절하는 방법을 배웁니다.\n- 배전계통운용, 전기에너지공학, 전기설비를 통해 전력 공급과 설비 운영을 이해합니다.\n- 전력기기실험과 전력전자응용을 통해 전기기기의 동작과 응용을 학습합니다.\n\n#### 스마트 에너지 응용\n- 스마트그리드와 전기차충전시스템을 통해 미래 전력망과 모빌리티 인프라를 탐구합니다.\n- 반도체공학, 로봇공학, 신호처리, 디지털시스템설계를 통해 전기공학의 융합 분야를 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 인공지능 기초 - 수학·물리를 바탕으로 전기·전자 원리를 이해하고 문제를 해결하는 데 흥미가 있는 학생\n- 전력, 제어, 반도체 등 전기공학 분야에 관심이 있고 설계 역량을 키우고자 하는 학생\n- 스마트 그리드, 전기차, 신재생에너지 등 융합 기술 분야에 관심이 있는 학생 #### 전력 시스템 및 송·배전 분야\n- 전력계통 엔지니어\n- 송·배전 기술자\n- 변전소 운영 기술자\n\n#### 전기기기·자동화 제어 분야\n- 전동기 설계자\n- 제어 엔지니어\n- PLC 프로그래머\n\n#### 신재생에너지·에너지관리 분야\n- 태양광 엔지니어\n- ESS 엔지니어\n- 에너지관리 전문가\n\n#### 공공기관·안전관리 분야\n- 전기안전관리자\n- 공기업 기술직\n- 전기설비 검사원 - 전기전자공학부\n- 스마트전기전자공학부\n- 에너지전기공학과\n- 전기 및 제어공학과\n- 전기정보공학부\n- 전기시스템공학과\n- 전기에너지공학전공\n- 전기전자제어공학부"},{"kind":"department","id":"dept_전자공학과","name":"전자공학과","text":"전자공학과 전자회로, 반도체, 통신, 인공지능, 로봇, 컴퓨터 시스템 등 첨단 전자 기술을 설계하고 개발하는 학과입니다. 공학 분야 · 기계·전기·전자 계열 전자공학과는 전자 이론을 바탕으로 다양한 전자 시스템과 제품을 설계하는 분야입니다. 회로와 전자기학, 반도체, 통신, 센서, 컴퓨터 구조를 배우며, 인공지능, 로봇, IoT, 스마트 디바이스 같은 융합 기술과도 연결됩니다. ### 주요 학습 영역\n\n#### 회로와 전자기 기초\n- 회로이론, 전자회로를 통해 전자 시스템의 기본 동작 원리를 배웁니다.\n- 전자기학과 전자장을 통해 전자파와 전기·자기 현상을 이해합니다.\n- 컴퓨터프로그래밍언어와 설계프로젝트를 통해 전자 시스템 구현의 기초를 익힙니다.\n\n#### 반도체·통신·신호 처리\n- 반도체소자공학과 집적회로를 통해 전자 부품과 반도체 소자의 원리를 배웁니다.\n- 통신공학, 무선공학, 디지털신호처리를 통해 정보를 전달하고 처리하는 방법을 이해합니다.\n- 센서공학, 디스플레이공학, 멀티미디어시스템을 통해 전자 기술의 응용 분야를 탐구합니다.\n\n#### 임베디드·IoT·AI 하드웨어\n- 컴퓨터구조, VLSI시스템설계, IoT응용시스템을 통해 하드웨어와 소프트웨어가 결합된 시스템을 배웁니다.\n- AI하드웨어설계와 로봇·인공지능 응용 분야를 통해 전자공학의 미래 기술을 탐구합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 인공지능 기초 - 수학과 물리에 흥미가 있으며, 전기 현상과 시스템을 논리적으로 이해하고 문제 해결에 적용하고 싶은 학생\n- 전력, 반도체, 통신, 제어 등 전기공학 분야의 핵심 기술에 관심과 탐구 열정을 가진 학생\n- AI, IoT, 스마트 디바이스 등 융합 기술을 전기·전자 시스템과 연결하여 구현하고 싶은 학생 #### 임베디드·IoT 시스템 분야\n- 임베디드 개발자\n- 펌웨어 엔지니어\n- IoT 개발자\n\n#### 인공지능·로봇 융합 분야\n- AI 엔지니어\n- 머신러닝 개발자\n- 로봇 제어 엔지니어\n\n#### 전자제품·가전 개발 분야\n- 전자제품 설계 엔지니어\n- PCB 설계자\n- 품질시험 엔지니어\n\n#### 반도체·통신 분야\n- 반도체 설계·공정 관련 직무\n- 통신 시스템 개발자\n- 센서·디스플레이 관련 엔지니어 - IT전자융합공학과\n- IoT전자공학과\n- 나노광전자학과\n- 반도체공학과\n- 반도체시스템공학과\n- 융합전자공학부\n- 반도체전자공학부\n- 전기·전자·통신공학부\n- 전기전자공학과\n- 전기전자제어공학부"},{"kind":"department","id":"dept_정보보안학과","name":"정보보안학과","text":"정보보안학과 정보 시스템과 네트워크를 보호하기 위해 해킹 대응, 암호, 보안 시스템 설계와 운영을 배우는 학과입니다. 공학 분야 · 정보·컴퓨터 계열 정보보안학과는 디지털 사회에서 정보를 안전하게 보호하는 기술과 방법을 배우는 분야입니다. 네트워크, 운영체제, 프로그래밍, 암호학을 기초로 하며, 해킹과 사이버 공격에 대응하고 보안 시스템을 설계·운영하는 능력을 기릅니다. ### 주요 학습 영역\n\n#### 컴퓨터와 보안 기초\n- 컴퓨터 구조, 운영체제, 프로그래밍을 통해 정보 시스템의 기본 구조를 배웁니다.\n- 네트워크 기초를 이해하고 데이터가 이동하는 과정을 학습합니다.\n- 정보보호개론을 통해 보안의 목적과 기본 원리를 익힙니다.\n\n#### 암호·해킹 대응·시스템 보안\n- 암호학을 통해 정보를 안전하게 보호하는 수학적 원리를 배웁니다.\n- 시스템 보안과 네트워크 보안을 통해 취약점을 분석하고 대응하는 방법을 익힙니다.\n- 해킹·사이버 공격 사례를 바탕으로 보안 사고를 예방하고 대응하는 역량을 기릅니다.\n\n#### 보안 운영과 디지털 사회\n- 보안 시스템 설계와 운영을 통해 실제 조직에서 필요한 보안 관리 방법을 배웁니다.\n- 개인정보 보호, 정보 윤리, 사이버 범죄 대응처럼 사회적 책임과 연결되는 문제를 함께 탐구합니다. 대수 미적분Ⅰ 확률과 통계 영어Ⅰ 영어Ⅱ 영어 독해와 작문 현대사회와 윤리 물리학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 인공지능 기초 수학과 문화 실용 통계 수학과제 탐구 사회문제 탐구 - 해킹·보안·암호화 기술에 관심이 있고 시스템의 취약점을 분석해 보고 싶은 학생\n- 수학적·논리적 사고를 바탕으로 문제를 체계적으로 분석하는 데 흥미가 있는 학생\n- 네트워크와 운영체제 등 시스템 구조를 이해하고 보안 관점에서 탐구하고 싶은 학생\n- 사이버 공격 대응과 보안 시스템 설계를 통해 안전한 디지털 환경 구축에 기여하고 싶은 학생 #### 기업 및 산업체 분야\n- 기업 정보보안 담당자\n- IT 및 정보보안 회사 보안 전문가\n- 정보 시스템 관련 회사\n- 백신 및 보안 기술 개발 회사\n\n#### 학계 및 연구기관 분야\n- 한국국방연구원\n- 국방과학연구소\n- 공공 및 민간 보안 연구기관\n\n#### 정부 및 공공기관 분야\n- 과학기술정보통신부 등 정부·지방자치단체 공무원\n- 한국지능정보사회진흥원\n- 한국인터넷진흥원\n- 국가정보원\n- 공공기관 정보보안 담당자 - 사이버보안학과\n- 정보보호학과\n- 컴퓨터보안학과\n- 융합보안학과\n- 디지털포렌식 관련 학과"},{"kind":"department","id":"dept_정보통신학과","name":"정보통신학과","text":"정보통신학과 유·무선 통신, 네트워크, IoT 등 정보통신 시스템을 설계·구축하고 운영하는 기술을 배우는 학과입니다. 공학 분야 · 정보·컴퓨터 계열 정보통신학과는 전자와 컴퓨터, 통신 기술을 바탕으로 사람과 기기, 시스템이 정보를 주고받는 방법을 배우는 분야입니다. 유·무선 통신, 네트워크, 사물인터넷, 정보 시스템 운영 기술을 다루며, 미래 정보통신 산업을 이끌 수 있는 역량을 기릅니다. ### 주요 학습 영역\n\n#### 전자·통신 기초\n- 전자회로와 통신 이론을 통해 정보통신 시스템의 기본 원리를 배웁니다.\n- 프로그래밍과 컴퓨터 구조를 통해 정보 시스템을 구현하는 기초 능력을 기릅니다.\n- 신호와 시스템의 개념을 이해해 통신 데이터가 처리되는 과정을 학습합니다.\n\n#### 네트워크와 무선 통신\n- 유선·무선 네트워크의 구조와 운영 방식을 배웁니다.\n- 이동통신, 인터넷, 네트워크 장비와 프로토콜을 이해합니다.\n- 정보통신 시스템의 설계와 구축 과정을 실제 사례와 연결합니다.\n\n#### IoT와 미래 통신 응용\n- 사물인터넷(IoT) 기술을 통해 기기와 서비스가 연결되는 방식을 탐구합니다.\n- 무인 자동차, 스마트 기기, 금융·방송·산업 시스템 등 다양한 정보통신 응용 분야를 이해합니다. 대수 확률과 통계 미적분Ⅰ 영어Ⅰ 영어Ⅱ 영어 독해와 작문 물리학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 인공지능 기초 실용 통계 수학과제 탐구 융합과학 탐구 - 논리적 사고와 프로그래밍을 바탕으로 통신·네트워크 문제를 체계적으로 해결하고 싶은 학생\n- 5G, IoT, 임베디드 시스템 등 통신 기술의 원리와 구현 과정에 관심이 있는 학생\n- 전자·신호·네트워크 기술을 함께 이해하며 시스템 설계에 흥미가 있는 학생\n- 실생활과 연결된 무선통신·네트워크 분야를 공학적으로 탐구해 보고 싶은 학생 #### 기업 및 산업체 분야\n- 정보 시스템 운영 및 개발 회사\n- 정보통신 및 네트워크 관련 회사\n- 컴퓨터 및 IT 분야 회사\n- 금융 회사 전산·통신 관련 부서\n- 방송국 및 방송 제작 관련 기술 분야\n- 정보통신 분야 대기업\n\n#### 학계 및 연구기관 분야\n- 한국전자통신연구원\n- 정보통신정책연구원\n- 공공 및 민간 연구기관\n\n#### 정부 및 공공기관 분야\n- 과학기술정보통신부 등 정부·지방자치단체 공무원\n- 한국지능정보사회진흥원\n- 한국인터넷진흥원\n- 정보통신산업진흥원 - 정보통신공학과\n- 통신공학과\n- 전자정보통신공학과\n- 컴퓨터정보통신공학과\n- 네트워크 관련 학과"},{"kind":"department","id":"dept_정치외교학과","name":"정치외교학과","text":"정치외교학과 정치 현상과 국제 관계를 분석하고, 국내외 정치와 외교 문제를 이해하는 전문성을 기르는 학과입니다. 사회 분야 · 사회과학 계열 정치외교학과는 국가, 시민, 권력, 제도, 국제 관계를 분석하는 분야입니다. 국내 정치와 국제 정치, 외교, 분쟁과 협력, 정책 결정 과정을 배우며, 복잡한 사회 문제를 논리적으로 분석하고 의견을 설득력 있게 표현하는 능력이 중요합니다. ### 주요 학습 영역\n\n#### 정치 이론과 제도 이해\n- 정치학의 기본 개념과 정치 제도의 작동 방식을 배웁니다.\n- 민주주의, 권력, 시민 참여, 정책 결정 과정을 이해합니다.\n- 국내 정치 현상을 자료와 사례를 바탕으로 분석합니다.\n\n#### 국제 관계와 외교\n- 국제 정치, 외교, 국가 간 갈등과 협력의 원리를 배웁니다.\n- 영토 분쟁, 역사 갈등, 국제기구, 세계 질서 변화를 탐구합니다.\n- 외교적 해결 능력과 국제 문제를 보는 관점을 기릅니다.\n\n#### 자료 분석과 공론장 참여\n- 정치·사회 이슈를 읽고 토론하며 논증을 구성하는 능력을 기릅니다.\n- 언론 자료, 정책 자료, 역사·지리 자료를 활용해 정치 현상을 분석합니다. 화법과 언어 영어 독해와 작문 사회와 문화 세계시민과 지리 세계사 주제 탐구 독서 영미 문학 읽기 영어 발표와 토론 정치 법과 사회 국제 관계의 이해 윤리와 사상 동아시아 역사 기행 기후변화와 지속가능한 세계 사회문제 탐구 윤리문제 탐구 역사로 탐구하는 현대 세계 - 외교관이 되거나 국제기구, NGO 등에서 활동하고자 하는 학생\n- 논리적 사고를 갖추고 다양한 의견을 조정하는 능력을 갖춘 학생\n- 외교 및 국제관계에 관심이 있거나 세계 여러 나라의 정치적, 경제적 상황을 이해하고 싶은 학생\n- 정치와 정책이 사람들의 삶에 어떤 영향을 미치는지 고민할 줄 알며 사회문제 해결에 관심이 많은 학생 #### 연구 분야\n- 정치학연구원\n- 국제정치연구원\n- 사회과학연구원\n\n#### 국제·사회 분야\n- 국제기구 종사자\n- 사회단체활동가\n- 정책 관련 기관 종사자\n\n#### 언론·공론장 분야\n- 방송기자\n- 신문기자\n- 잡지기자\n- 정치평론가 - 국제관계학과\n- 외교학과\n- 정치학과\n- 국제학부\n- 공공정책 관련 학과"},{"kind":"department","id":"dept_제어계측공학과","name":"제어계측공학과","text":"제어계측공학과 자동화 시스템을 정밀하게 측정하고 제어하기 위해 전기·전자, 컴퓨터, 기계공학 기술을 융합해 배우는 학과입니다. 공학 분야 · 기계·전기·전자 계열 제어계측공학과는 산업 자동화, 스마트팩토리, 로봇 제어, 자율주행 같은 분야에서 시스템의 상태를 측정하고 원하는 방식으로 움직이게 만드는 기술을 배우는 분야입니다. 센서, 제어, 임베디드 시스템, 계측 장비, 자동화 설계를 함께 다룹니다. ### 주요 학습 영역\n\n#### 전기·전자와 컴퓨터 기초\n- 전기·전자 회로와 센서의 기본 원리를 배웁니다.\n- 컴퓨터와 프로그래밍을 통해 제어 시스템을 구현하는 기초를 익힙니다.\n- 기계 시스템의 움직임과 측정 원리를 이해합니다.\n\n#### 제어와 계측 시스템\n- 제어공학을 통해 시스템을 안정적으로 조절하는 방법을 배웁니다.\n- 계측공학을 통해 온도, 압력, 위치, 속도 등 다양한 물리량을 측정하는 방법을 익힙니다.\n- 임베디드 시스템과 IoT 제어를 통해 센서와 제어 장치를 연결하는 방법을 학습합니다.\n\n#### 자동화·모빌리티·플랜트 응용\n- 스마트팩토리, 공정제어, 로봇제어, 자율주행 제어 등 실제 산업 자동화 사례를 탐구합니다.\n- 에너지·플랜트·자동차·항공 분야에서 제어계측 기술이 어떻게 활용되는지 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 인공지능 기초 - 수학·과학 기초를 바탕으로 컴퓨터를 활용하여 시스템을 이해하고 제어 논리를 적용하는 데 흥미가 있는 학생\n- 센서 기반 데이터 측정과 신호 처리, 제어 시스템 설계에 관심이 있는 학생\n- 자동화, 로봇, 자율주행, 스마트팩토리 등에서 제어 기술을 활용하여 시스템을 구현하고자 하는 학생 #### 임베디드·IoT 제어 분야\n- 임베디드 개발자\n- 펌웨어 엔지니어\n- IoT 제어 시스템 개발자\n\n#### 에너지·플랜트·자동화 분야\n- 스마트그리드 엔지니어\n- 플랜트 자동화 기술자\n- 공정제어 엔지니어\n\n#### 항공·자동차·방위 산업 분야\n- 항공전자 엔지니어\n- 자율주행 제어 엔지니어\n- ECU 제어 엔지니어 - 전기전자제어공학부\n- 제어로봇공학과\n- 메카트로닉스공학과\n- 자동화공학과\n- 로봇공학과\n- 스마트팩토리 관련 학과"},{"kind":"department","id":"dept_조경학과","name":"조경학과","text":"조경학과 식물, 토목재료, 수공간, 조형물 등을 활용해 공원, 거리, 도시 공간을 계획·설계·관리하는 학과입니다. 자연 분야 · 농학 계열 조경학과는 자연환경과 인간의 생활공간을 를 배웁니다.\n- 지구의 구조와 변화 과정을 이해하고 지질 현상을 해석하는 기초를 익힙니다.\n\n#### 자원·환경·국토 개발 분석\n- 지하자원, 에너지 자원, 지반, 수자원과 관련된 지질 문제를 분석합니다.\n- 토목·건설·환경 분야에서 지질 자료가 어떻게 활용되는지 이해합니다.\n- 지질 재해와 안전 문제를 과학적으로 살펴봅니다.\n\n#### 조사·분석과 연구 방법\n- 야외 지질 조사, 지도 작성, 시료 분석, 데이터 해석 등 지질 연구 방법을 배웁니다.\n- 고도화된 연구 장비와 분석 방법을 활용해 사회가 필요로 하는 지질 정보를 생산하는 역량을 기릅니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 지구과학 기하 미적분Ⅱ 인공지능 수학 한국지리 탐구 역학과 에너지 물질과 에너지 지구시스템과학 전자기와 양자 화학 반응의 세계 행성우주과학 수학과제 탐구 실용 통계 기후변화와 환경생태 융합과학 탐구 - 지구환경 중 지질 분야에 관심과 호기심이 있으며 암석, 자원, 자연환경 등에 대한 흥미가 있는 학생\n- 물리학, 생물학, 화학 등 자연과학뿐만 아니라 공학에 대한 기초적인 지식을 갖추고 있는 학생\n- 관찰과 조사를 위한 꼼꼼함과 탐구심이 있는 학생 #### 기업 및 산업체 분야\n- 자원 개발 관련 기업\n- 환경 관련 기업\n- 토목·건설 관련 기업\n\n#### 학계 및 연구기관 분야\n- 대학교수\n- 한국지질자원연구원\n- 한국원자력안전기술원\n- 한국원자력연구원\n- 한국해양과학기술원\n- 국립환경연구원\n- 수자원연구원\n- 건설기술연구원\n\n#### 정부 및 공공기관 분야\n- 한국석유공사\n- 한국수력원자력\n- 한국수자원공사\n- 한국가스공사\n- 한국농어촌공사\n- 한국광물자원공사\n- 한국석탄공사\n- 한국시설안전공단\n- 한국광해관리공단\n- 한국환경공단\n- 한국원자력환경공단 - 지질환경과학과\n- 지구시스템과학과\n- 지구환경과학과"},{"kind":"department","id":"dept_천문학과","name":"천문학과","text":"천문학과 우주의 기원, 별과 은하, 천체의 운동, 우주 탐사를 물리학과 수학을 바탕으로 연구하는 학과입니다. 자연 분야 · 자연과학 계열 천문학과는 우주와 물질의 기원을 이해하기 위해 별, 행성, 은하, 우주 구조와 천체의 운동을 탐구하는 분야입니다. 물리학, 수학, 지구과학을 바탕으로 관측과 계산, 시뮬레이션, 우주 탐사 기술을 함께 다룹니다. ### 주요 학습 영역\n\n#### 천문학과 물리 기초\n- 일반천문학과 현대물리학을 통해 우주와 천체를 이해하는 기초를 배웁니다.\n- 수학과 천문계산법을 통해 천체의 위치와 운동을 계산하는 방법을 익힙니다.\n- 천문관측법을 통해 실제 관측 자료를 얻고 해석하는 방법을 배웁니다.\n\n#### 천체물리와 우주 구조\n- 항성진화론, 천체물리학, 항성계를 통해 별과 은하의 구조와 변화를 이해합니다.\n- 전파천문학, 구면천문학, 우주과학을 통해 다양한 관측 방법과 우주 현상을 탐구합니다.\n- 우주론을 통해 우주의 기원과 진화를 살펴봅니다.\n\n#### 우주 시스템과 응용\n- 위성천문학, 인공위성시스템, 우주시스템을 통해 우주 관측과 탐사 기술을 배웁니다.\n- 우주비행학, 우주동력학을 통해 우주 탐사와 비행체 운동의 원리를 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 지구과학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 물질과 에너지 지구시스템과학 전자기와 양자 행성우주과학 인공지능 기초 수학과 문화 융합과학 탐구 - 수학, 물리학, 지구과학 등 기초과학 과목에 적성과 흥미가 있는 학생\n- 평소 별의 움직임과 원리, 성질 및 우주 세계에 호기심이 있는 학생\n- 별을 세심하게 관찰할 수 있는 꼼꼼한 성격을 가진 학생\n- 천문 계산을 위한 소프트웨어 사용법, 수치계산, 수치적분, 프로그래밍 능력에 관심 있는 학생 #### 기업 및 산업체 분야\n- 항공우주 산업체\n- 항공사\n- 천문대\n- 과학 언론 관련 분야\n\n#### 학계 및 연구기관 분야\n- 대학교수\n- n- 육상, 체조, 구기 종목, 수영, 스키, 요트 등 다양한 실기 종목을 경험합니다.\n- 종목별 기능을 익히고, 이를 다른 사람에게 안전하고 효과적으로 지도하는 역량을 기릅니다. 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 사회와 문화 현대사회와 윤리 물리학 생명과학 화학 체육1 체육2 정보 세포와 물질대사 인문학과 윤리 법과 사회 스포츠 문화 스포츠 과학 교육의 이해 매체 의사소통 실용 통계 스포츠 생활1 - 다양한 스포츠에 관심이 많고, 종목별 기본 기능을 어렵지 않게 익힐 수 있는 학생\n- 자신이 터득한 이론적·신체적·사회적 역량을 남에게 전달하는 것을 좋아하는 학생\n- 인간의 움직임에 포함된 인문·사회학적 의미와 자연·과학적 원리에 관심이 많은 학생\n- 여러 사람들과 어울리는 것을 즐기는 진취적인 리더십을 가진 학생 #### 교육 분야\n- 체육교사\n- 대학교수\n- 스포츠 교육 관련 강사\n\n#### 행정·언론 분야\n- 체육 관련 공무원\n- 시설 관리자\n- 스포츠 기자\n- 해설가\n- 아나운서\n\n#### 연구·의료 분야\n- 스포츠 관련 연구소\n- 체육정책 관련 업무\n- 운동처방사\n- 트레이너\n\n#### 경영·공공안전 분야\n- 스포츠 에이전트\n- 스포츠 마케팅 직무\n- 경영관리·기획 직무\n- 경호원\n- 경찰·소방공무원\n- 군인 - 특수체육교육과\n- 체육학과\n- 스포츠과학과\n- 생활체육학과\n- 사범계열 체육 관련 학과"},{"kind":"department","id":"dept_체육학과","name":"체육학과","text":"체육학과 인간의 신체 활동과 운동을 과학적으로 연구하고, 이론과 실기를 바탕으로 건강과 스포츠 분야를 탐구하는 학과입니다. 예술·체육 분야 · 체육 계열 체육학과는 운동을 통해 삶의 질을 높이고 인간과 환경의 관계를 탐구하는 분야입니다. 스포츠심리학, 운동생리학, 운동역학, 스포츠사회학 등 이론을 배우고, 다양한 종목 실기를 통해 신체 활동을 실제로 이해합니다. ### 주요 학습 영역\n\n#### 체육 이론 기초\n- 스포츠심리학, 운동생리학, 운동역학을 통해 운동과 신체의 관계를 배웁니다.\n- 체육교수방법론, 스포츠사회학, 체육사 및 철학을 통해 스포츠의 교육적·사회적 의미를 이해합니다.\n- 여가레크리에이션을 통해 생활 속 신체 활동의 가치를 탐구합니다.\n\n#### 운동 분석과 건강 관리\n- 건강교육, 운동학습, 체육측정평가를 통해 운동 능력과 건강 상태를 분석하는 방법을 배웁니다.\n- 특수체육을 통해 다양한 대상자의 신체 활동 참여를 지원하는 관점을 익힙니다.\n\n#### 종목 실기와 현장 적용\n- 축구, 농구, 배구, 야구, 배드민턴, 테니스, 양궁, 럭비, 수영, 스키 등 여러 종목의 실기를 경험합니다.\n- 운동 지도, 경기 분석, 스포츠 현장 운영과 연결되는 실무 역량을 기릅니다. 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 사회와 문화 현대사회와 윤리 물리학 생명과학 체육1 체육2 정보 세포와 물질대사 인문학과 윤리 법과 사회 스포츠 문화 스포츠 과학 매체 의사소통 실용 통계 스포츠 생활1 스포츠 생활2 - 다양한 운동에 관심이 많고, 여러 종목의 기본 기능을 이해하고 시합에 적용할 수 있는 학생\n- 운동 동작의 과학적 원리를 이해하고 다양한 종목에 응용할 수 있는 학생\n- 건강의 개념을 잘 알고, 건강 유지를 위한 운동을 꾸준히 실천할 수 있는 학생\n- 단체 활동에 필요한 예절과 매너를 잘 갖추고 있는 학생 #### 스포츠 현장 분야\n- 생활체육 지도사\n- 코치\n- 스포츠강사\n- 퍼스널트레이너\n- 체형관리사\n- 운동처방사\n\n#### 경기 운영 분야\n- 경기심판\n- 경기 기록원\n- 경기 분석원\n- 종목별 가맹 단체 행정직원\n- 프로팀 소속 직원\n\n#### 공공·정책 분야\n- 대한체육회 관련 업무\n- 국민체육진흥공단 정책연구\n- 체육계열 행정직 공무원 - 체육교육과\n- 사회체육학과\n- 레저스포츠학과\n- 스포츠과학과\n- 생활체육학과"},{"kind":"department","id":"dept_초등교육과","name":"초등교육과","text":"초등교육과 아동의 성장과 발달을 이해하고, 전인적 인격과 교직 전문성을 갖춘 초등교사를 기르는 학과입니다. 교육 분야 · 교육 계열 초등교육과는 초등학생의 발달 특성과 학습 과정을 이해하고, 여러 교과를 균형 있게 지도할 수 있는 교사를 양성하는 분야입니다. 교육학 기초, 아동발달, 교육과정, 교수학습, 상담, 학급경영, 교육실습을 통해 교직 전문성과 책임감을 기릅니다. ### 주요 학습 영역\n\n#### 교육학과 아동 이해\n- 교육학 개론, 교육사회학, 교육심리학, 교육철학 및 교육사를 통해 교육의 기본 관점을 배웁니다.\n- 아동발달 및 상담을 통해 초등학생의 성장과 학습 특성을 이해합니다.\n- 교육과정 및 교육평가를 통해 수업 목표와 평가를 설계하는 방법을 익힙니다.\n\n#### 교수학습과 학급 운영\n- 교수학습이론을 통해 학생에게 적합한 수업 방법을 탐구합니다.\n- 교육행정 및 교육경영, 학급경영 및 상담실습을 통해 학교와 학급 운영의 실제를 배웁니다.\n- 생활지도 및 상담을 통해 학생의 학교생활과 정서적 성장을 지원하는 방법을 익힙니다.\n\n#### 연구·특수교육·현장실습\n- 교육연구방법론을 통해 교육 문제를 자료 기반으로 분석하는 방법을 배웁니다.\n- 특수교육학을 통해 다양한 학생의 학습권과 지원 방법을 이해합니다.\n- 교육실습을 통해 실제 초등학교 현장에서 수업과 생활지도를 경험합니다. 화법과 언어 독서와 작문 문학 대수 미적분Ⅰ 확률과 통계 영어Ⅰ 영어Ⅱ 영어 독해와 작문 세계시민과 지리 세계사 사회와 문화 현대사회와 윤리 물리학 화학 생명과학 지구과학 체육1 체육2 음악 미술 주제 탐구 독서 - 소통능력과 공감능력이 있는 학생\n- 아이들과 함께하는 것을 즐기고, 그들의 성장을 돕고 싶은 마음이 있는 학생\n- 기본적인 학습 지도 능력이 있는 학생\n- 인내심과 책임감이 있는 학생\n- 창의성이 있고 유연하게 사고할 줄 아는 학생 #### 교육 분야\n- 초등교사\n- 대학 교수\n- 교육 관련 공무원\n- 학원 및 교육기업 강사\n\n#### 연구·개발 분야\n- 초등교육 관련 연구원\n- 교재 및 교구 개발자\n- 교육 콘텐츠 개발자\n\n#### 상담·아동 분야\n- 상담전문가\n- 아동상담사\n- 청소년지도사\n- 아동발달전문가\n\n#### 사회복지·기관 분야\n- 사회복지 및 어린이 관련 기관 교육자\n- 교육기관 컨설턴트\n- 아동방송작가 - 교육학과"},{"kind":"department","id":"dept_치기공학과","name":"치기공학과","text":"치기공학과 치과 보철물과 교정 장치물 제작에 필요한 이론과 실기를 배우는 치과 의료 분야의 전문 학과입니다. 보건·의약학 분야 · 보건 계열 치기공학과는 손상되거나 결손된 치아와 구강 구조의 기능을 회복하기 위해 보철물과 교정 장치물을 설계·제작하는 분야입니다. 치아 형태, 구강 해부, 치과 재료, 보철학, 교정기공학을 배우며, 정밀한 손기술과 디지털 치과 기술을 함께 다룹니다. ### 주요 학습 영역\n\n#### 치과 기초와 구강 구조\n- 일반생물학, 생리학을 통해 인체와 생명 현상의 기초를 배웁니다.\n- 치아형태학, 구강해부학을 통해 치아와 구강 구조를 이해합니다.\n- 구강보건학과 치아재료학을 통해 치과 보철물 제작에 필요한 기초 지식을 익힙니다.\n\n#### 보철·교정·심미 기공\n- 국소의치기공학, 총의치기공학, 관교의치기공학을 통해 다양한 치과 보철물 제작 원리를 배웁니다.\n- 치과교정기공학을 통해 부정교합 치료에 필요한 교정 장치물 제작을 이해합니다.\n- 치과도재기공학, 심미치과기공학, 임플란트기공학을 통해 심미성과 기능을 고려한 제작 방법을 배웁니다.\n\n#### 실무와 디지털 치기공\n- 치과보철학을 바탕으로 보철물의 기능과 적합성을 이해합니다.\n- 정밀 작업, 재료 이해, 디지털 장비 활용 능력을 바탕으로 실제 치과 의료 현장과 연결되는 실무 역량을 기릅니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 역학과 에너지 물질과 에너지 세포와 물질대사 화학 반응의 세계 생물의 유전 인공지능 기초 보건 과학의 역사와 문화 융합과학 탐구 - 치과 재료과학, 디지털 기술 등 다양한 전문 지식이 요구되므로 과학과 기술에 관심이 많은 학생\n- 물체를 입체적으로 생각하고 표현하는 공간지각력을 갖추고 있으며, 지구력과 집중력이 좋은 학생\n- 정교한 손기술과 섬세한 작업이 필요하므로 세밀하고 정밀한 작업을 좋아하는 학생 #### 치과기공 분야\n- 치과기공사\n- 치과 보철물 제작 관련 직무\n- 치과 교정 장치물 제작 관련 직무\n\n#### 의료기기·재료 분야\n- 의료장비기사\n- 의료장비기술영업원\n- 치과공학 재료 연구 관련 직무 - 치기공과"},{"kind":"department","id":"dept_치위생학과","name":"치위생학과","text":"치위생학과 치위생학과는 구강 건강 증진과 구강 질환 예방을 공부하며, 치위생 기초과학과 임상 실무를 바탕으로 구강 보건 전문 역량을 기르는 학과입니다. 보건·의약학 분야 · 보건 계열 치위생학과는 치아와 구강을 건강하게 유지하고 질환을 예방하는 방법을 배우는 분야입니다. 구강생리학, 치아형태학, 구강병리학 같은 기초 지식부터 구강보건, 치주 관리, 치과 방사선, 임상 실습까지 다루며, 환자의 구강 상태를 관찰하고 관리하는 전문성을 기릅니다. ### 주요 학습 영역\n\n#### 구강보건 기초\n- 일반생물학, 일반화학, 생리학을 통해 인체와 생명 현상의 기초를 배웁니다.\n- 치과영양학과 치과위생학개론을 통해 구강 건강과 생활 관리의 기본 원리를 익힙니다.\n- 구강병리학을 통해 구강 질환의 발생과 변화 과정을 이해합니다.\n\n#### 치과 임상과 구강 관리\n- 치아형태학을 통해 치아의 구조와 기능을 학습합니다.\n- 치과교정학, 치과보철학, 치주학을 통해 다양한 치과 치료 영역의 기본 지식을 익힙니다.\n- 치과방사선학, 임상치과학, 구강외과학, 치과재료학을 통해 진료 현장과 연결되는 실무 지식을 배웁니다.\n\n#### 현장 실습과 보건 서비스\n- 임상실습을 통해 실제 치과 진료 환경에서 필요한 관찰력과 의사소통 능력을 기릅니다.\n- 환자의 구강 상태를 확인하고 예방 중심의 구강 관리 방법을 안내하는 역량을 키웁니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 역학과 에너지 물질과 에너지 세포와 물질대사 화학 반응의 세계 생물의 유전 인공지능 기초 보건 과학의 역사와 문화 융합과학 탐구 - 사람들의 건강 유지와 향상, 특히 치아와 구강 건강 관리에 관심이 많은 학생\n- 손기술과 관찰력이 좋고, 환자의 구강 상태를 세심하게 살펴볼 수 있는 학생\n- 의료·보건 관련 직업의 책임감과 성실한 태도를 중요하게 생각하는 학생 #### 치과·구강보건 분야\n- 치과위생사\n- 구강보건 관련 실무자\n\n#### 보건 서비스 분야\n- 공중보건연구원\n- 의료코디네이터 - 치위생과\n- 치위생관리학과"},{"kind":"department","id":"dept_치의예과","name":"치의예과","text":"치의예과 치의예과는 치과의사가 되기 위한 기초 과정으로, 의료인문학과 자연과학 지식을 바탕으로 치아·구강·얼굴 부위의 질환을 이해하고 치료·예방하는 전문 역량의 토대를 쌓는 학과입니다. 보건·의약학 분야 · 의약학 계열 치의예과는 치의학 본격 전공 학습에 앞서 화학, 생물학, 물리학 등 자연과학 기초와 의료인문학적 소양을 함께 익히는 과정입니다. 이후 구강해부학, 구강생리학, 치아형태학 등 치의학 전공으로 확장하며, 치아와 구강 및 얼굴 부위의 질환과 장애를 치료하고 예방하는 전문 인력으로 성장할 준비를 합니다. ### 주요 학습 영역\n\n#### 자연과학 기초\n- 일반화학, 일반생물학, 일반물리학을 통해 치의학 학습에 필요한 과학 기초를 다집니다.\n- 발생학, 유전학, 세포분자생물학을 통해 인체와 생명 현상의 기본 원리를 이해합니다.\n- 기초물리화학과 기초유기화학을 통해 물질의 구조와 반응을 학습합니다.\n\n#### 치의학 전공 기초\n- 치의학개론을 통해 치의학의 주요 영역과 진로를 이해합니다.\n- 구강해부학, 구강생리학, 치아형태학을 통해 구강 구조와 기능을 배웁니다.\n- 구강악안면외과학, 근관치료학, 안면동통학 등으로 임상 전공 영역을 넓힙니다.\n\n#### 임상과 치료 실습\n- 임상보존학실습, 임상보철학실습을 통해 실제 치료 과정과 연결되는 실습 역량을 기릅니다.\n- 치주병학, 치료교정학, 전신마취학을 통해 구강 치료와 전신 건강의 연관성을 이해합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 현대사회와 윤리 기하 미적분Ⅱ 물질과 에너지 화학 반응의 세계 세포와 물질대사 생물의 유전 과학의 역사와 문화 융합과학 탐구 - 구강 건강과 치아 관리에 관심이 있고 과학적인 사고 능력을 가진 학생\n- 과학적 탐구심과 손기술이 있으며, 세부 사항에 주의를 기울일 수 있는 학생\n- 치과 장비와 기계를 다루는 데 흥미가 있는 학생\n- 많은 학습량과 실습 과정을 꾸준히 소화할 수 있는 학생 #### 치과 진료 분야\n- 임상치과의사\n\n#### 연구·공중보건 분야\n- 기초치의학자\n- 치의학 연구자\n- 공중보건 분야 종사자\n\n#### 의료산업 분야\n- 치의학 관련 연구원\n- 의료산업 분야 연구·개발 인력"},{"kind":"department","id":"dept_컴퓨터공학과","name":"컴퓨터공학과","text":"컴퓨터공학과 컴퓨터가 작동하는 원리를 이해하고, 프로그램과 소프트웨어를 직접 설계·개발하는 방법을 배우는 학과입니다. 공학 분야 · 정보·컴퓨터 계열 컴퓨터공학과는 컴퓨터 시스템이 어떻게 구성되고 작동하는지 배우고, 그 위에서 실행되는 소프트웨어를 설계하고 구현하는 방법을 익히는 분야입니다. 단순히 코딩만 배우는 학과가 아니라, 문제를 논리적으로 분석하고 알고리즘으로 해결하며, 데이터를 저장·처리하고 네트워크로 정보를 주고받는 원리를 함께 배웁니다. ### 주요 학습 영역\n\n#### 프로그래밍과 문제 해결\n- 프로그래밍 기초, 자료구조, 알고리즘을 통해 문제를 절차적으로 해결하는 방법을 배웁니다.\n- 이산수학을 통해 컴퓨터공학의 논리적 사고 기반을 다집니다.\n- 코드를 통해 생각을 구현하고, 효율적인 해결 절차를 설계하는 능력을 기릅니다.\n\n#### 컴퓨터 시스템 이해\n- 컴퓨터구조와 운영체제를 통해 소프트웨어가 컴퓨터 안에서 실행되는 원리를 이해합니다.\n- 임베디드 시스템, 병렬 프로그래밍, 분산 시스템을 통해 여러 장치와 프로그램이 함께 작동하는 방식을 배웁니다.\n- 시스템 자원을 효율적으로 활용하는 능력을 기릅니다.\n\n#### 데이터와 네트워크\n- 데이터베이스를 통해 정보를 체계적으로 저장하고 활용하는 방법을 배웁니다.\n- 컴퓨터 네트워크를 통해 인터넷과 네트워크 구조를 이해합니다.\n- 소프트웨어 공학을 통해 여러 사람이 함께 개발하는 소프트웨어를 설계하고 관리하는 방법을 익힙니다.\n\n#### 인공지능·보안·응용 분야\n- 인공지능, 머신러닝, 컴퓨터 비전으로 데이터를 이용해 예측하고 판단하는 기술을 학습합니다.\n- 정보 보안을 통해 보안 위협을 이해하고 대응하는 방법을 배웁니다.\n- 컴퓨터 그래픽스, 인간-컴퓨터 상호작용, 캡스톤 디자인을 통해 실제 서비스와 프로젝트 구현 역량을 기릅니다. 대수 확률과 통계 미적분Ⅰ 영어Ⅰ 영어Ⅱ 영어 독해와 작문 물리학 정보 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 물질과 에너지 전자기와 양자 인공지능 기초 실용 통계 수학과제 탐구 - 문제를 논리적으로 분석하고 차근차근 해결하는 것을 좋아하는 학생\n- 프로그래밍이나 알고리즘에 관심이 있는 학생\n- 컴퓨터가 실제로 어떻게 작동하는지 궁금한 학생\n- 앱, 웹사이트, 게임, 인공지능 서비스처럼 직접 무언가를 만들어 보고 싶은 학생\n- 하드웨어와 소프트웨어를 함께 이해하며 기술을 폭넓게 다뤄 보고 싶은 학생\n- 수학적 사고와 끈기 있는 디버깅 과정을 견딜 수 있는 학생 #### 소프트웨어 개발 분야\n- 시스템 소프트웨어 개발자\n- 응용 소프트웨어 개발자\n- 비스학과"},{"kind":"department","id":"dept_항공우주공학과","name":"항공우주공학과","text":"항공우주공학과 비행기, 인공위성, 드론, 헬리콥터, 우주선 등 항공·우주 비행체의 설계와 개발에 필요한 공학 지식을 배우는 학과입니다. 공학 분야 · 기계·전기·전자 계열 항공우주공학과는 기계공학을 바탕으로 항공기와 우주 비행체의 구조, 운동, 추진, 제어를 배우는 분야입니다. 항공역학, 추진공학, 우주 궤도 설계, 비행 제어 등을 다루며 미래 항공우주산업을 이끌 전문성을 기릅니다. ### 주요 학습 영역\n\n#### 공학 기초와 비행 원리\n- 항공우주공학개론을 통해 항공우주 분야의 주요 영역을 이해합니다.\n- 열역학, 고체역학, 구조역학, 재료역학, 동역학을 통해 비행체 구조와 운동 원리를 배웁니다.\n- 수학과 물리학을 통해 항공우주 공학 계산의 기초를 다집니다.\n\n#### 비행체 설계와 제어\n- 비행역학, 항공기진동, 헬리콥터공학을 통해 비행체의 움직임과 구조적 특성을 이해합니다.\n- 자동제어, 항공우주제어원리, 항공기시스템설계를 통해 비행체를 제어하고 설계하는 방법을 배웁니다.\n- 컴퓨터프로그래밍을 통해 해석과 설계에 필요한 계산 도구를 익힙니다.\n\n#### 우주 시스템과 추진\n- 우주역학과 로켓공학을 통해 우주 비행체의 운동과 추진 원리를 배웁니다.\n- 우주비행체공학을 통해 위성, 발사체, 우주탐사 장비 등으로 학습 범위를 확장합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 지구과학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 지구시스템과학 행성우주과학 인공지능 기초 - 수학·물리에 흥미가 있으며 비행 원리를 이해하고 문제 해결에 관심이 있는 학생\n- 항공기·우주선 구조와 작동 원리를 도전적으로 탐구하고 싶은 학생\n- 영어 독해력과 글로벌 감각을 바탕으로 항공우주 분야에 관심을 가진 학생 #### 항공기 설계·개발 분야\n- 항공기 설계 엔지니어\n- 항공역학 연구원\n- 추진기관 개발자\n\n#### 우주항공 시스템 분야\n- 위성 시스템 엔지니어\n- 발사체 개발자\n- 우주탐사 장비 개발자\n\n#### 항공전자·제어 분야\n- 항공전자 엔지니어\n- 비행제어 시스템 설계자\n- 자동제어 엔지니어\n\n#### 정비·운항·안전 분야\n- 항공정비사\n- 항공기 검사원\n- 항공 안전관리 전문가 - 기계항공공학부\n- 우주과학과\n- 우주공학부\n- 천문우주학과"},{"kind":"department","id":"dept_항공운항학과","name":"항공운항학과","text":"항공운항학과 비행 원리, 항공기 운항 시스템, 항공법규, 항법, 조종 실습 등을 배우며 조종사와 항공 운항 전문 인력을 준비하는 학과입니다. 공학 분야 · 기계·전기·전자 계열 항공운항학과는 항공기를 안전하게 운항하는 데 필요한 이론과 실습을 배우는 분야입니다. 비행 원리, 항공기 시스템, 항공법규, 항법, 관제 영어, 조종 실기와 운항 실습을 통해 조종사 및 항공 운항 분야의 전문성을 기릅니다. ### 주요 학습 영역\n\n#### 항공 운항 기초\n- 비행안전론, 항공기시스템, 항공우주학개론을 통해 항공기의 구조와 안전 운항 원리를 이해합니다.\n- 국내항공법과 항공우주산업론을 통해 항공 산업과 제도의 기본을 배웁니다.\n- 미분적분학을 통해 비행 원리와 항법 계산에 필요한 기초를 다집니다.\n\n#### 항법·관제와 운항 절차\n- 공중항법, 계기비행이론, 최신항법시스템을 통해 항공기의 위치와 경로를 파악하는 방법을 배웁니다.\n- 항공교통업무와 항공교통관제영어를 통해 관제와 통신 절차를 이해합니다.\n- 국제항공법, 항공운항정보 및 절차를 통해 국제 항공 환경에서 필요한 규정을 익힙니다.\n\n#### 조종 실습과 비행 분석\n- 조종실기와 운항실습을 통해 실제 비행 훈련과 운항 절차를 익힙니다.\n- 항공의학과 비행기술분석론을 통해 조종사의 신체 조건과 비행 수행을 함께 이해합니다. 대수 미적분Ⅰ 확률과 통계 세계시민과 지리 물리학 화학 지구과학 정보 기하 역학과 에너지 전자기와 양자 심화 영어 한국지리 탐구 지구시스템과학 행성우주과학 인공지능 기초 여행지리 - 비행 원리와 항공 운항 시스템에 흥미가 있는 학생\n- 파일럿 등 항공 전문직을 목표로 하며 체계적인 훈련과 상황 판단 능력을 기르고 싶은 학생\n- 항공 영어, 국제 규정, 항공 통신 절차를 이해하고 글로벌 항공 환경에서 소통하고 싶은 학생 #### 항공기 운항·조종 분야\n- 항공기 조종사\n- 항공사 기장\n- 항공교관\n- 드론 조종사\n\n#### 운항관리·항공교통 분야\n- 운항관리사\n- 항공관제사\n- 항공정보 분석가\n\n#### 항공안전·보안 분야\n- 항공안전감독관\n- 항공보안 분석가\n- 사고조사관\n\n#### 공항·항공사 운영 분야\n- 항공사 운영직\n- 공항운영 관리자\n- 지상조업 관리자\n\n#### 교육·훈련 분야\n- 비행 교관\n- 항공기술 교육자\n- 항공훈련 강사 - 무인항공기학과\n- 항공조종전공"},{"kind":"department","id":"dept_해양공학과","name":"해양공학과","text":"해양공학과 선박, 해양 구조물, 해양플랜트, 해양 자원과 환경을 다루며 바다를 기반으로 한 공학 기술을 배우는 학과입니다. 공학 분야 · 건축·환경 계열 해양공학과는 선박 기술뿐 아니라 해양 환경, 자원 개발, 해양플랜트 등 해양을 활용한 공학 기술 전반을 연구하는 분야입니다. 해양 구조물의 설계와 시공, 선박 운항과 제어, 해양 자원의 효율적 이용과 보존에 필요한 역량을 기릅니다. ### 주요 학습 영역\n\n#### 공학 기초와 해양 구조\n- 일반물리학, 일반화학, 미적분학을 통해 해양공학의 기초를 다집니다.\n- 컴퓨터프로그래밍을 통해 공학 계산과 설계 도구를 활용하는 방법을 익힙니다.\n- 재료역학, 유체역학, 기초구조동역학을 통해 선박과 해양 구조물의 움직임과 안정성을 이해합니다.\n\n#### 선박·해양 시스템 설계\n- 해양공학실험을 통해 해양공학의 기본 현상을 실험으로 확인합니다.\n- 선박유체역학, 선박운항제어론을 통해 선박의 운동과 제어를 배웁니다.\n- 조선해양공학계획, 전산선박설계, 해양장비설계를 통해 선박과 해양 장비를 설계하는 방법을 익힙니다.\n\n#### 구조·시공과 안전\n- 선체진동과 용접구조설계를 통해 해양 구조물의 안정성과 제작 과정을 이해합니다.\n- 해양플랜트와 해양 구조물의 설계·시공 문제를 공학적으로 분석합니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 지구과학 정보 기하 미적분Ⅱ 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 세포와 물질대사 지구시스템과학 생물의 유전 융합과학 탐구 - 해양 환경과 관련된 다양한 현상에 관심이 있고 과학적으로 탐구해 보고 싶은 학생\n- 수학, 물리, 지구과학 등 이공계 과목에 흥미가 있고 실제 문제를 해결하고 싶은 학생\n- 바다를 기반으로 한 미래 산업과 기술, 선박이나 해양 구조물 설계에 호기심이 있는 학생 #### 선박·조선 분야\n- 선박운항관리사\n- 조선공학기술자\n- 조선 해양 설계사\n\n#### 해양 구조물·플랜트 분야\n- 해양 구조물 설계 및 시공 엔지니어\n- 해양플랜트 엔지니어\n\n#### 해양수산·공공기관 분야\n- 해양수산기술자\n- 해양수산부 및 해양·항만·안전 관련 공무원\n- 선박안전기술공단, 항만공사, 해양안전심판원 등 공공기관 종사자\n\n#### 연구기관 분야\n- 한국해양과학기술원 연구원\n- 한국해사문제연구소 연구원\n- 한국조선해양기자재연구원 연구원 - 선박해양공학과\n- 조선해양공학과\n- 조선해양플랜트과\n- 해양과학과\n- 해양융합공학과"},{"kind":"department","id":"dept_행정학과","name":"행정학과","text":"행정학과 정부와 공공기관이 사회 문제를 해결하고 공공서비스를 운영하는 방식을 배우는 학과입니다. 사회 분야 · 법·행정 계열 행정학과는 공공의 문제를 어떻게 해결할지 연구하는 분야입니다. 정부와 지방자치단체, 공공기관이 어떤 정책을 만들고, 진행과 에너지 변화를 배웁니다.\n\n#### 심화 화학과 소재·환경\n- 유기이론, 물리유기화학, 유기합성을 통해 유기 분자의 구조와 합성 방법을 배웁니다.\n- 표면과학, 고분자화학, 나노화학을 통해 소재와 나노 분야로 학습을 확장합니다.\n- 공업화학, 의약화학, 환경화학을 통해 산업·의약·환경 분야와 연결되는 화학을 배웁니다.\n\n#### 분석·에너지·연구 응용\n- 분자구조결정법과 기기분석화학을 통해 물질의 구조와 성분을 분석하는 방법을 익힙니다.\n- 에너지화학과 양자화학을 통해 에너지와 물질의 미시적 성질을 이해합니다.\n- 과학논술을 통해 화학 지식을 설명하고 의사소통하는 능력을 기릅니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 기하 미적분Ⅱ 인공지능 수학 역학과 에너지 전자기와 양자 물질과 에너지 화학 반응의 세계 세포와 물질대사 생물의 유전 수학과제 탐구 융합과학 탐구 - 자연 현상에 대한 호기심과 관찰력이 뛰어나고 논리적인 분석력을 갖춘 학생\n- 새로운 현상에 대한 탐구심이 강하고 실험을 통한 도전 정신과 창의력을 가진 학생\n- 문제 해결을 위한 논리적 분석력과 끈기 있는 자세를 갖춘 학생\n- 화합물의 조성, 구조, 반응 과정에 관심이 있으며 꾸준하고 성실하게 연구하고 싶은 학생 #### 연구·개발 분야\n- 화학연구원\n- 화학공학기술자\n- 재료공학기술자\n- 고분자공학기술자\n- 석유화학공학기술자\n- 환경공학기술자\n\n#### 안전·품질·관리 분야\n- 산업안전원\n- 위험관리원\n- 화학물질안전관리사\n- 연구실안전전문가\n- 친환경제품인증심사원\n- 품질관리기술자\n- 생산관리기술자\n\n#### 사무·영업 분야\n- 의약품 인허가 전문가\n- 조향사\n- 품질관리 사무원\n- 환경안전관리자\n- 화학제품 기술영업원\n- 의약품영업원\n- 화학제품영업원\n- 환경 관련 제품 영업원\n\n#### 법률·지식재산 분야\n- 변리사\n- 특허사무원 - 나노화학과\n- 바이오나노학과\n- 생화학과\n- 응용화학과\n- 정밀화학과\n- 화학부"},{"kind":"department","id":"dept_환경공학과","name":"환경공학과","text":"환경공학과 대기, 수질, 토양, 폐기물 등 환경 문제를 과학적·공학적으로 해결하고 지속 가능한 환경 시스템을 설계·관리하는 학과입니다. 공학 분야 · 건축·환경 계열 환경공학과는 다양한 환경 문제를 분석하고 해결하기 위한 기술과 시스템을 배우는 분야입니다. 화학, 생물학, 생태학, 지구환경, 환경정책을 바탕으로 대기오염, 수질오염, 토양오염, 폐기물 처리, 환경영향평가 등 실제 환경 문제를 다룹니다. ### 주요 학습 영역\n\n#### 환경과학 기초\n- 일반화학, 일반생물학을 통해 환경 현상을 이해하는 과학 기초를 다집니다.\n- 환경공학개론, 환경생물학, 생태학개론을 통해 환경공학의 주요 영역을 배웁니다.\n- 지구환경입문을 통해 지구 시스템과 환경 변화의 기본 구조를 이해합니다.\n\n#### 환경 오염 분석과 관리\n- 대기화학, 수질분석, 대기오염관리를 통해 오염 물질의 특성과 관리 방법을 배웁니다.\n- 고도폐수처리, 토양오염, 유해물분석법을 통해 물·토양·유해물질 문제를 분석합니다.\n- 환경영향평가를 통해 개발과 환경 보전 사이의 영향을 평가하는 방법을 익힙니다.\n\n#### 정책·국제 협력과 지속가능성\n- 환경관리학과 환경정책학을 통해 환경 문제를 제도와 정책 차원에서 이해합니다.\n- 국제환경협력과 지속가능자원을 통해 환경 문제가 국제 사회와 자원 관리와 연결되는 방식을 배웁니다. 대수 미적분Ⅰ 확률과 통계 물리학 화학 생명과학 지구과학 정보 기하 미적분Ⅱ 역학과 에너지 물질과 에너지 화학 반응의 세계 세포와 물질대사 생물의 유전 지구시스템과학 전자기와 양자 기후변화와 환경생태 융합과학 탐구 - 환경 오염, 자원 고갈, 기후 변화 등 사회적 문제에 관심이 많은 학생\n- 생물, 화학, 물리 등 기초 과학 지식에 흥미가 있는 학생\n- 데이터 분석, 시뮬레이션, 시스템 설계 등 실무 중심의 환경 기술에 관심이 있는 학생\n- 실험과 실습에 끈기 있게 참여하며 환경 분야의 연구나 현장에 도전하고 싶은 학생 #### 환경 전문 분야\n- 환경 데이터 분석가\n- 환경정책 컨설턴트\n- 환경기술 전문가\n- 친환경 창업자\n\n#### 기업 및 산업체 분야\n- 환경 설비 엔지니어\n- 환경 분석·진단 전문가\n- 환경 컨설턴트\n\n#### 정부 및 공공기관 분야\n- 환경 공무원\n- 환경 행정 담당자\n\n#### 학계 및 연구기관 분야\n- 환경공학 교수\n- 수질·대기 연구원 - 바이오환경과학과\n- 자원환경공학과\n- 조경·지역시스템공학부(지역시스템공학전공)\n- 지구환경과학과\n- 지구환경과학부\n- 화학생명환경과학부\n- 환경시스템공학과"},{"kind":"department","id":"dept_회화과","name":"회화과","text":"회화과 드로잉, 색채학, 조형 원리, 유화, 수채화, 판화, 혼합 매체 등을 배우며 독창적인 예술 세계를 구축하는 학과입니다. 예술·체육 분야 · 예술 계열 회화과는 창의적 사고와 표현력을 바탕으로 다양한 회화 기법과 조형 원리를 배우는 분야입니다. 기초 과정에서는 드로잉, 색채, 소묘, 미술사 등을 익히고, 심화 과정에서는 재료와 기법, 매체 확장, 현대 미술과 비평, 전시 기획 등을 통해 자신만의 작품 세계를 발전시킵니다. ### 주요 학습 영역\n\n#### 회화 기초와 조형 원리\n- 기초 드로잉, 기초 조형, 기초 회화를 통해 시각 표현의 기본을 익힙니다.\n- 소묘와 색채학을 통해 형태와 색을 관찰하고 표현하는 능력을 기릅니다.\n- 미술사와 조형 원리를 통해 작품을 이해하고 분석하는 기초를 다집니다.\n\n#### 심화 회화와 매체 연구\n- 심화 회화와 재료·기법 연구를 통해 다양한 회화 재료와 표현 방식을 탐구합니다.\n- 매체 확장 회화, 추상 회화, 개인 프로젝트를 통해 자신만의 표현 방식을 발전시킵니다.\n- 현대 미술과 비평, 미학, 작가 연구를 통해 작품의 의미와 맥락을 해석합니다.\n\n#### 전시와 창작 실무\n- 전시 기획을 통해 작품을 발표하고 관객과 만나는 과정을 이해합니다.\n- 다양한 매체와 작업 방식을 활용해 독창적인 예술 세계를 구축하는 경험을 쌓습니다. 화법과 언어 독서와 작문 문학 영어Ⅰ 영어Ⅱ 영어 독해와 작문 세계사 사회와 문화 현대사회와 윤리 미술 주제 탐구 독서 문학과 영상 법과 사회 인문학과 윤리 미술 창작 미술 감상과 비평 인간과 철학 인간과 심리 매체 의사소통 세계 문화와 영어 여행지리 미술과 매체 - 그림 그리는 것을 좋아하고, 그림 그리는 과정을 즐기는 학생\n- 다양한 재료를 활용하고 새로운 표현 방식에 도전하는 것을 즐기는 학생\n- 자기 생각과 감정을 시각적으로 표현하는 것에 흥미가 있는 학생\n- 작품을 완성하기까지의 끈기와 몰입력을 가지고 있는 학생 #### 예술 창작 분야\n- 순수 화가\n- 일러스트레이터\n- 디자이너\n- 문화예술 기획자\n- 큐레이터\n\n#### 교육 분야\n- 대학교수\n- 미술교사\n- 미술치료사\n\n#### 연구·보존 분야\n- 미술품 복원가\n- 미술사 연구자 - 미술창작학부\n- FineArts학부\n- 조형예술(학)과\n- 미술학과\n- 현대미술학과\n- 서양화과\n- 동양화과\n- 판화과\n- 서양화 전공\n- 회화전공\n- 회화작가전공\n- 현대미술전공\n- 한국화전공"}],"course_offerings":[{"offering_id":"offering_화법과_언어_2학년_1학기_학교지정","course_id":"course_화법과_언어","course_name":"화법과 언어","semester":"2학년 1학기","grade_semester":"2학년 1학기","selection_group":"학교지정","subject_area":"국어","course_type":"일반 선택","credits":"3학점 (학교지정)"},{"offering_id":"offering_대수_2학년_1학기_학교지정","course_id":"course_대수","course <script>
(function(){
'use strict';

const DATA = window.BOSUNG_APP_DATA || {courses:[], departments:[], course_offerings:[], counts:{}};
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const main = $('#main');

const searchClear = $('#searchClear');
const compareFloating = $('#compareFloating');
function keyBy(arr, key){
  const out = {};
  (arr || []).forEach(function(x){
    if(x && x[key]) out[x[key]] = x;
  });
  return out;
}
const courseById = keyBy(DATA.courses || [], 'id');
const courseByName = keyBy(DATA.courses || [], 'name');
